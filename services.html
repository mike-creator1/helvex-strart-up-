<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Services — HelveX</title>
  <meta name="description" content="HelveX Services — connect, configure and monitor the integrations powering your AI workspace." />
  <link rel="icon" type="image/png" href="/helvex-logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://yjmpallrtpeinpdilptj.supabase.co" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/platform.css" />
  <link rel="stylesheet" href="/workbench.css" />
  <style>
    .svc-card { display:flex; flex-direction:column; }
    .svc-emoji { width:44px; height:44px; border-radius:12px; display:grid; place-items:center; font-size:22px; background:var(--hx-bg-2); border:1px solid var(--hx-line); flex-shrink:0; }
    .svc-usage { display:flex; align-items:center; justify-content:space-between; font-size:11.5px; color:var(--hx-text-mid); margin:2px 0 8px; }
    .perm-row { display:flex; align-items:center; gap:10px; padding:11px 0; border-bottom:1px solid var(--hx-line-soft); }
    .perm-row:last-child { border-bottom:0; }
    .perm-row .pt { font-size:13px; font-weight:500; }
    .dr-section { margin:18px 0 8px; font-size:11px; font-weight:600; letter-spacing:.05em; text-transform:uppercase; color:var(--hx-text-dim); }
  </style>
</head>
<body data-active="services">

  <div class="hx-app">
    <aside class="hx-sidebar"></aside>
    <div>
      <div class="hx-topbar"></div>
      <main class="hx-main">

        <div class="hx-aura" aria-hidden="true"></div>
        <header class="hx-pg-hero">
          <p class="hx-pg-eyebrow"><span class="hx-pg-eyebrow-dot" aria-hidden="true"></span>Services · integrations</p>
          <div class="hx-pg-hero-grid">
            <div>
              <h1 class="hx-pg-title">Services</h1>
              <p class="hx-pg-sub">The integrations that power your workspace — messaging, code, docs and webhooks. Connect a service, set its permissions and manage it from one place.</p>
            </div>
          </div>
        </header>

        <div class="wb-metrics" id="svc-metrics"></div>

        <div class="wb-toolbar">
          <div class="wb-search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="search" id="svc-q" placeholder="Search services…" />
          </div>
          <div class="wb-seg" id="svc-cats"></div>
        </div>

        <div id="svc-host"></div>

      </main>
    </div>
  </div>

  <script src="/platform.js"></script>
  <script src="/workbench.js"></script>
  <script>
  (function(){
    var $=function(id){return document.getElementById(id);};
    // Catalog is fixed to the providers the backend accepts.
    var CATALOG=[
      { id:'slack',   name:'Slack',   cat:'Communication', emoji:'💬', desc:'Send alerts and let agents post to channels.', perms:['Read messages','Post as bot','Manage channels'] },
      { id:'github',  name:'GitHub',  cat:'Developer',     emoji:'🐙', desc:'Trigger deployments and read repositories.', perms:['Read repos','Write commits','Manage webhooks'] },
      { id:'linear',  name:'Linear',  cat:'Developer',     emoji:'📐', desc:'Create issues from chats and track work.', perms:['Read issues','Create issues'] },
      { id:'notion',  name:'Notion',  cat:'Productivity',  emoji:'📓', desc:'Sync docs into the knowledge base.', perms:['Read pages','Write pages'] },
      { id:'email',   name:'Email',   cat:'Communication', emoji:'✉️', desc:'Send transactional and campaign email.', perms:['Send email','Manage domains'] },
      { id:'webhook', name:'Webhook', cat:'Developer',     emoji:'🔗', desc:'POST workspace events to any endpoint.', perms:['Send events','Sign payloads'] }
    ];
    var ST={ q:'', cat:'all', loading:true, error:null, rows:[] };
    var sb=null, owner=null, db=null;

    // latest integration row for a provider
    function rowFor(id){ return ST.rows.filter(function(r){return r.provider===id;}).sort(function(a,b){return new Date(b.created_at)-new Date(a.created_at);})[0]||null; }
    function isConnected(id){ var r=rowFor(id); return !!(r&&r.status==='connected'); }

    function metrics(){
      var conn=CATALOG.filter(function(s){return isConnected(s.id);}).length;
      $('svc-metrics').innerHTML=
        mt('Connected',conn+' / '+CATALOG.length,'active integrations','<path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>')+
        mt('Available',CATALOG.length,'services to connect','<rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>')+
        mt('Categories',new Set(CATALOG.map(function(s){return s.cat;})).size,'integration types','<path d="M4 5h16M4 12h16M4 19h16"/>')+
        mt('Health',conn?'Operational':'—',conn?'all systems normal':'nothing connected','<path d="M22 12h-4l-3 9L9 3l-3 9H2"/>');
    }
    function mt(l,v,m,icon){return '<div class="wb-metric"><div class="ml">'+WB.svg(icon)+l+'</div><div class="mv" style="font-size:'+(String(v).length>6?'19px':'26px')+'">'+v+'</div><div class="mm">'+m+'</div></div>';}

    function cats(){
      var cs=Array.from(new Set(CATALOG.map(function(s){return s.cat;})));
      var html='<button data-k="all" class="'+(ST.cat==='all'?'on':'')+'">All <span class="ct">'+CATALOG.length+'</span></button>';
      html+='<button data-k="connected" class="'+(ST.cat==='connected'?'on':'')+'">Connected <span class="ct">'+CATALOG.filter(function(s){return isConnected(s.id);}).length+'</span></button>';
      cs.forEach(function(c){ html+='<button data-k="'+c+'" class="'+(ST.cat===c?'on':'')+'">'+c+' <span class="ct">'+CATALOG.filter(function(s){return s.cat===c;}).length+'</span></button>'; });
      $('svc-cats').innerHTML=html;
      $('svc-cats').querySelectorAll('button').forEach(function(b){b.onclick=function(){ST.cat=b.dataset.k;cats();render();};});
    }

    function visible(){
      var rows=CATALOG.slice();
      if(ST.cat==='connected') rows=rows.filter(function(s){return isConnected(s.id);});
      else if(ST.cat!=='all') rows=rows.filter(function(s){return s.cat===ST.cat;});
      if(ST.q){var q=ST.q.toLowerCase();rows=rows.filter(function(s){return (s.name+' '+s.desc+' '+s.cat).toLowerCase().indexOf(q)>=0;});}
      rows.sort(function(a,b){return (isConnected(b.id)-isConnected(a.id))||a.name.localeCompare(b.name);});
      return rows;
    }

    function render(){
      var host=$('svc-host');
      if(ST.loading){ host.innerHTML=WB.skeletonCards(6); return; }
      if(ST.error){ host.innerHTML='<div class="wb-empty"><div class="orb">'+WB.svg('<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>')+'</div><h3>Couldn’t load services</h3><p>'+WB.esc(ST.error)+'</p><button class="wb-btn" id="svc-retry">Try again</button></div>'; $('svc-retry').onclick=load; return; }
      var rows=visible();
      if(!rows.length){ host.innerHTML='<div class="wb-empty"><div class="orb">'+WB.svg('<path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>')+'</div><h3>No services found</h3><p>Try a different search or category.</p><button class="wb-btn" id="svc-clear">Clear filters</button></div>'; var c=$('svc-clear'); if(c)c.onclick=function(){ST.q='';ST.cat='all';$('svc-q').value='';cats();render();}; return; }
      host.innerHTML='<div class="wb-grid">'+rows.map(card).join('')+'</div>';
      rows.forEach(function(s){ $('svc-open-'+s.id).onclick=function(){openDetail(s);}; var a=$('svc-act-'+s.id); if(a)a.onclick=function(e){e.stopPropagation(); isConnected(s.id)?openDetail(s):connect(s);}; });
    }

    function card(s){
      var conn=isConnected(s.id), row=rowFor(s.id);
      return '<div class="wb-card svc-card" id="svc-open-'+s.id+'">'+
        '<div class="wb-card-head"><div class="svc-emoji">'+s.emoji+'</div>'+
          '<div style="flex:1;min-width:0"><h3>'+WB.esc(s.name)+'</h3><div class="sub">'+WB.esc(s.cat)+'</div></div>'+
          '<span class="wb-pill '+(conn?'connected':'disconnected')+'"><span class="d"></span>'+(conn?'Connected':'Not connected')+'</span></div>'+
        '<p class="desc" style="min-height:34px">'+WB.esc(s.desc)+'</p>'+
        (conn&&row?'<div class="svc-usage"><span>'+WB.esc((row.display_name||s.name))+'</span><span>connected '+WB.relTime(row.connected_at||row.created_at)+'</span></div>':'')+
        '<div class="wb-card-foot" style="border-top:none;padding-top:4px"><button class="wb-btn '+(conn?'':'primary')+'" id="svc-act-'+s.id+'" style="flex:1">'+(conn?'Manage':'Connect')+'</button></div>'+
      '</div>';
    }

    function permsState(s){ var r=rowFor(s.id); var saved=(r&&r.config&&r.config.permissions)||null; return s.perms.map(function(p,i){ return [p, saved?!!saved[i]:i<2]; }); }

    function connect(s){
      if(!db){ WB.toast('Sign in to connect services','err'); return; }
      var perms=permsState(s);
      WB.drawer.open({ title:'Connect '+WB.esc(s.name), body:
        '<div style="display:flex;align-items:center;gap:12px;margin-bottom:8px"><div class="svc-emoji">'+s.emoji+'</div><div><div style="font-weight:600">'+WB.esc(s.name)+'</div><div class="sub" style="font-size:11.5px;color:var(--hx-text-dim)">'+WB.esc(s.cat)+'</div></div></div>'+
        '<p class="desc" style="color:var(--hx-text-mid)">'+WB.esc(s.desc)+'</p>'+
        '<div class="dr-section">Setup</div>'+
        '<div class="wb-field"><label>Display name</label><input id="svc-name" value="'+WB.esc(s.name)+'"></div>'+
        '<div class="wb-field"><label>'+(s.id==='webhook'?'Endpoint URL':'API key / token')+'</label><input id="svc-key" placeholder="'+(s.id==='webhook'?'https://…':'Paste your '+WB.esc(s.name)+' key')+'" '+(s.id==='webhook'?'':'type="password"')+'></div>'+
        '<div class="dr-section">Permissions</div>'+
        perms.map(function(p,i){return '<div class="perm-row"><div style="flex:1"><div class="pt">'+WB.esc(p[0])+'</div></div><button class="wb-switch '+(p[1]?'on':'')+'" data-i="'+i+'"></button></div>';}).join(''),
        foot:'<button class="wb-btn primary" id="svc-connect" style="flex:1">Connect '+WB.esc(s.name)+'</button><button class="wb-btn" id="svc-cancel">Cancel</button>',
        onMount:function(){
          var p=perms.map(function(x){return x.slice();});
          document.querySelectorAll('.perm-row .wb-switch').forEach(function(sw){sw.onclick=function(){var i=+sw.dataset.i;p[i][1]=!p[i][1];sw.classList.toggle('on',p[i][1]);};});
          $('svc-cancel').onclick=WB.drawer.close;
          $('svc-connect').onclick=function(){
            var key=$('svc-key').value.trim(); if(!key){WB.toast((s.id==='webhook'?'An endpoint URL':'An API key')+' is required','err');return;}
            var btn=$('svc-connect'); btn.disabled=true; btn.textContent='Connecting…';
            db.insert({ provider:s.id, status:'connected', display_name:$('svc-name').value.trim()||s.name, config:{ permissions:p.map(function(x){return x[1];}), has_secret:true }, connected_at:new Date().toISOString() })
              .then(function(r){ if(r.error)throw r.error; WB.toast(s.name+' connected','ok'); WB.drawer.close(); load(); })
              .catch(function(e){ btn.disabled=false; btn.textContent='Connect '+s.name; WB.toast(e.message||'Connection failed','err'); });
          };
        } });
    }

    function openDetail(s){
      var conn=isConnected(s.id), row=rowFor(s.id);
      if(!conn){ connect(s); return; }
      var perms=permsState(s);
      WB.drawer.open({ title:'<span style="display:inline-flex;align-items:center;gap:10px"><span class="svc-emoji" style="width:30px;height:30px;font-size:16px">'+s.emoji+'</span>'+WB.esc(s.name)+'</span>', body:
        '<div class="wb-kv"><span class="k">Status</span><span class="v"><span class="wb-pill connected"><span class="d"></span>Connected</span></span></div>'+
        '<div class="wb-kv"><span class="k">Display name</span><span class="v">'+WB.esc(row.display_name||s.name)+'</span></div>'+
        '<div class="wb-kv"><span class="k">Category</span><span class="v">'+WB.esc(s.cat)+'</span></div>'+
        '<div class="wb-kv"><span class="k">Connected</span><span class="v">'+WB.relTime(row.connected_at||row.created_at)+'</span></div>'+
        '<p class="desc" style="color:var(--hx-text-mid);margin-top:14px">'+WB.esc(s.desc)+'</p>'+
        '<div class="dr-section">Permissions</div>'+
        perms.map(function(p,i){return '<div class="perm-row"><div style="flex:1"><div class="pt">'+WB.esc(p[0])+'</div></div><button class="wb-switch '+(p[1]?'on':'')+'" data-i="'+i+'"></button></div>';}).join(''),
        foot:'<button class="wb-btn" id="svc-save" style="flex:1">Save permissions</button><button class="wb-btn danger" id="svc-disc">Disconnect</button>',
        onMount:function(){
          var p=perms.map(function(x){return x.slice();});
          document.querySelectorAll('.perm-row .wb-switch').forEach(function(sw){sw.onclick=function(){var i=+sw.dataset.i;p[i][1]=!p[i][1];sw.classList.toggle('on',p[i][1]);};});
          $('svc-save').onclick=function(){ db.update(row.id,{config:Object.assign({},row.config,{permissions:p.map(function(x){return x[1];})})}).then(function(r){if(r.error)throw r.error;WB.toast('Permissions saved','ok');WB.drawer.close();load();}).catch(function(e){WB.toast(e.message,'err');}); };
          $('svc-disc').onclick=function(e){ WB.arm(e.currentTarget,'Confirm disconnect',function(){ db.update(row.id,{status:'revoked',revoked_at:new Date().toISOString()}).then(function(r){if(r.error)throw r.error;WB.toast(s.name+' disconnected','info');WB.drawer.close();load();}).catch(function(er){WB.toast(er.message,'err');}); }); };
        } });
    }

    function load(){
      if(!db){ ST.loading=false; ST.error='You need to be signed in.'; render(); return; }
      ST.loading=true; render();
      db.list('id,provider,status,display_name,config,connected_at,revoked_at,created_at',{col:'created_at',asc:false}).then(function(r){
        if(r.error) throw r.error;
        ST.rows=r.data||[]; ST.loading=false; ST.error=null; metrics(); cats(); render();
      }).catch(function(e){ ST.loading=false; ST.error=e.message||'Load failed'; render(); });
    }

    var qt; $('svc-q').oninput=function(e){ST.q=e.target.value.trim();clearTimeout(qt);qt=setTimeout(render,140);};
    render();
    WB.ready(function(s,u){ sb=s; owner=u?u.id:null; db=(s&&u)?WB.tbl(s,'integrations',owner):null; load(); });
  })();
  </script>
</body>
</html>
