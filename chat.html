<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Chat — HelveX</title>
  <meta name="description" content="HelveX chat — your real AI workspace." />
  <link rel="icon" type="image/png" href="/helvex-logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://yjmpallrtpeinpdilptj.supabase.co" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/platform.css" />
  <style>
    /* ─── Per-model theme tokens ─────────────────────────────────────
       Each Helix model paints its own accent through --hx-mc-* vars.
       Body sets data-model="ether|nexus|prometheus" and these cascade
       through the chat: title accent stripe, user bubble tint, send
       button gradient, composer focus ring, tools popover highlight,
       and everything in between. Transitions are global so the swap
       feels like a single coordinated reshape. */
    body { --hx-mc:      var(--hx-yellow);
           --hx-mc-deep: var(--hx-yellow-deep);
           --hx-mc-soft: var(--hx-yellow-soft);
           --hx-mc-glow: rgba(201, 162, 39, 0.32); }
    body[data-model="ether"] { --hx-mc: var(--hx-yellow); --hx-mc-deep: var(--hx-yellow-deep); --hx-mc-soft: var(--hx-yellow-soft); --hx-mc-glow: rgba(201, 162, 39, 0.32); }
    body[data-model="nexus"] {
      --hx-mc:      #C2410C;   /* coral-red */
      --hx-mc-deep: #7C2D12;
      --hx-mc-soft: rgba(194, 65, 12, 0.13);
      --hx-mc-glow: rgba(194, 65, 12, 0.30);
    }
    body[data-model="prometheus"] {
      --hx-mc:      #18181B;   /* graphite */
      --hx-mc-deep: #09090B;
      --hx-mc-soft: rgba(24, 24, 27, 0.07);
      --hx-mc-glow: rgba(204, 16, 22, 0.32);  /* flame ember halo */
    }

    /* Smooth transitions on the elements that swap accent */
    .hx-chat-title::before,
    .hx-chat-balance::before,
    .hx-chat-rail-title::before,
    .hx-chat-item::before,
    .hx-msg.is-assistant .hx-msg-meta::before,
    .hx-chat-blank h2::after,
    .hx-chat-blank-mark::after,
    .hx-chat-blank-mark::before,
    .hx-chat-pane::before,
    .hx-chat-send,
    .hx-chat-input-row:focus-within,
    .hx-chat-blank-chip:hover,
    .hx-md-list.hx-md-list-num > li::before,
    .hx-md-h2,
    .hx-md-quote {
      transition: background 0.5s cubic-bezier(0.4, 0, 0.2, 1),
                  border-color 0.5s cubic-bezier(0.4, 0, 0.2, 1),
                  box-shadow 0.5s cubic-bezier(0.4, 0, 0.2, 1),
                  color 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Override the hardcoded yellow accents to use --hx-mc when on a
       non-ether model. We do this with selectors so only the right
       elements re-color. */
    body[data-model="nexus"] .hx-chat-title::before,
    body[data-model="prometheus"] .hx-chat-title::before {
      background: linear-gradient(180deg, transparent 0%, var(--hx-mc) 50%, transparent 100%);
    }
    body[data-model="nexus"] .hx-chat-balance::before,
    body[data-model="prometheus"] .hx-chat-balance::before {
      background: var(--hx-mc);
      box-shadow: 0 0 0 2px var(--hx-mc-soft), 0 0 8px var(--hx-mc-glow);
    }
    body[data-model="nexus"] .hx-chat-rail-title::before,
    body[data-model="prometheus"] .hx-chat-rail-title::before {
      background: var(--hx-mc);
      box-shadow: 0 0 0 3px var(--hx-mc-soft);
    }
    body[data-model="nexus"] .hx-chat-item::before,
    body[data-model="prometheus"] .hx-chat-item::before {
      background: linear-gradient(180deg, transparent 0%, var(--hx-mc) 50%, transparent 100%);
      box-shadow: 0 0 6px var(--hx-mc-glow);
    }
    body[data-model="nexus"] .hx-chat-item.is-active,
    body[data-model="prometheus"] .hx-chat-item.is-active {
      background: linear-gradient(180deg, var(--hx-mc-soft) 0%, var(--hx-bg-2) 100%);
    }
    body[data-model="nexus"] .hx-msg.is-assistant .hx-msg-meta::before,
    body[data-model="prometheus"] .hx-msg.is-assistant .hx-msg-meta::before {
      background: var(--hx-mc);
      box-shadow: 0 0 0 3px var(--hx-mc-soft), 0 0 8px var(--hx-mc-glow);
    }
    body[data-model="nexus"] .hx-chat-blank h2::after,
    body[data-model="prometheus"] .hx-chat-blank h2::after {
      color: var(--hx-mc);
    }
    body[data-model="nexus"] .hx-chat-blank-mark::after,
    body[data-model="prometheus"] .hx-chat-blank-mark::after {
      background: var(--hx-mc);
      box-shadow: 0 0 0 3px var(--hx-mc-soft), 0 0 14px var(--hx-mc-glow);
    }
    body[data-model="nexus"] .hx-chat-pane::before,
    body[data-model="prometheus"] .hx-chat-pane::before {
      background: radial-gradient(ellipse at center top,
        color-mix(in srgb, var(--hx-mc) 10%, transparent) 0%, transparent 70%);
    }
    body[data-model="nexus"] .hx-md-list.hx-md-list-num > li::before,
    body[data-model="prometheus"] .hx-md-list.hx-md-list-num > li::before {
      color: var(--hx-mc);
    }
    body[data-model="nexus"] .hx-md-quote,
    body[data-model="prometheus"] .hx-md-quote {
      border-left-color: var(--hx-mc);
      background: linear-gradient(90deg, var(--hx-mc-soft) 0%, transparent 60%);
    }
    /* Send button picks up a subtle model-themed ring on hover */
    body[data-model="nexus"] .hx-chat-send:hover:not(:disabled),
    body[data-model="prometheus"] .hx-chat-send:hover:not(:disabled) {
      box-shadow:
        inset 0 1px 0 color-mix(in srgb, #fff 22%, transparent),
        0 2px 4px rgba(0,0,0,0.12),
        0 10px 22px -8px rgba(0,0,0,0.28),
        0 0 0 4px var(--hx-mc-soft);
    }
    /* Composer focus ring takes the model tint */
    body[data-model="nexus"] .hx-chat-input-row:focus-within,
    body[data-model="prometheus"] .hx-chat-input-row:focus-within {
      border-color: color-mix(in srgb, var(--hx-mc) 70%, var(--hx-line));
      box-shadow:
        inset 0 1px 0 color-mix(in srgb, #fff 55%, transparent),
        0 0 0 4px color-mix(in srgb, var(--hx-mc) 8%, transparent),
        0 12px 36px -14px var(--hx-mc-glow);
    }

    /* ─── CINEMATIC MORPH OVERLAY ─────────────────────────────────────
       11 layered choreographies fire over 2.4s when the model swaps.
       Stages: anticipation → impact → reveal → decay → finale.
       Every animation uses only transform / opacity / filter so the
       whole thing stays on the GPU compositor. */
    .hx-morph {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 80;
      opacity: 0;
      transition: opacity 0.2s ease;
      perspective: 1200px;
    }
    .hx-morph.is-playing { opacity: 1; }

    /* L0 — Camera shake on the BODY for 360ms during the impact frame.
       Five micro-translations on a tight cubic; subtle enough to feel
       like a punch landing, not a screen glitch. */
    body.hx-screen-shake { animation: hx-shake 0.36s cubic-bezier(0.36, 0.07, 0.19, 0.97) both; }
    @keyframes hx-shake {
      0%, 100% { transform: translate3d(0, 0, 0); }
      15%      { transform: translate3d(-2px, 1px, 0); }
      30%      { transform: translate3d(2px, -1px, 0); }
      45%      { transform: translate3d(-1px, 2px, 0); }
      60%      { transform: translate3d(1px, -2px, 0); }
      80%      { transform: translate3d(-1px, 1px, 0); }
    }

    /* L0.5 — Aurora wash: a slow-rotating conic gradient washes the
       whole screen at very low alpha so the chat feels touched by the
       new model's spectrum, not just spot-lit. */
    .hx-morph-aurora {
      position: absolute; inset: -30%;
      background: conic-gradient(from 0deg,
        transparent 0deg,
        color-mix(in srgb, var(--hx-mc) 8%, transparent) 30deg,
        color-mix(in srgb, var(--hx-mc) 22%, transparent) 90deg,
        transparent 120deg,
        color-mix(in srgb, var(--hx-mc) 18%, transparent) 200deg,
        transparent 250deg,
        color-mix(in srgb, var(--hx-mc) 14%, transparent) 320deg,
        transparent 360deg);
      filter: blur(60px) saturate(140%);
      opacity: 0;
      transform: rotate(0deg) scale(1.2);
    }
    .hx-morph.is-playing .hx-morph-aurora {
      animation: hx-aurora 2.2s cubic-bezier(0.4, 0, 0.2, 1) both;
    }
    @keyframes hx-aurora {
      0%   { opacity: 0;    transform: rotate(0deg)   scale(1.4); }
      30%  { opacity: 0.55; transform: rotate(40deg)  scale(1.0); }
      70%  { opacity: 0.45; transform: rotate(110deg) scale(1.0); }
      100% { opacity: 0;    transform: rotate(160deg) scale(1.1); }
    }

    /* L0.7 — Anticipation charge: a small dot pulses at center BEFORE
       the burst, like energy gathering. */
    .hx-morph-charge {
      position: absolute; top: 50%; left: 50%;
      width: 16px; height: 16px;
      margin: -8px 0 0 -8px;
      border-radius: 50%;
      background: var(--hx-mc);
      box-shadow:
        0 0 24px var(--hx-mc-glow),
        0 0 60px var(--hx-mc-glow);
      transform: scale(0); opacity: 0;
    }
    .hx-morph.is-playing .hx-morph-charge {
      animation: hx-charge 0.32s cubic-bezier(0.4, 0, 1, 1) both;
    }
    @keyframes hx-charge {
      0%   { transform: scale(0);   opacity: 0; }
      40%  { transform: scale(1.4); opacity: 1; }
      100% { transform: scale(0.2); opacity: 0; }
    }

    /* L1 — vignette closes in then opens out, focuses attention */
    .hx-morph-vignette {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at center,
        transparent 35%,
        color-mix(in srgb, var(--hx-mc-deep) 14%, transparent) 75%,
        color-mix(in srgb, var(--hx-mc-deep) 28%, transparent) 100%);
      opacity: 0;
    }
    .hx-morph.is-playing .hx-morph-vignette {
      animation: hx-vignette 1.4s cubic-bezier(0.4, 0, 0.2, 1) both;
    }
    @keyframes hx-vignette {
      0%   { opacity: 0; transform: scale(1.6); }
      20%  { opacity: 1; transform: scale(1); }
      70%  { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(0.9); }
    }

    /* L2 — short bright flash at the impact moment (post-charge) */
    .hx-morph-flash {
      position: absolute; inset: 0;
      background: radial-gradient(circle at center,
        color-mix(in srgb, var(--hx-mc) 35%, transparent) 0%,
        color-mix(in srgb, var(--hx-mc) 12%, transparent) 30%,
        transparent 55%);
      opacity: 0;
      mix-blend-mode: screen;
    }
    .hx-morph.is-playing .hx-morph-flash {
      animation: hx-flash 0.5s cubic-bezier(0, 0, 0.2, 1) 0.26s both;
    }
    @keyframes hx-flash {
      0%   { opacity: 0; }
      10%  { opacity: 1; }
      100% { opacity: 0; }
    }

    /* L3 — 3 concentric expanding rings, staggered timing */
    .hx-morph-rings {
      position: absolute; top: 50%; left: 50%;
      width: 0; height: 0;
    }
    .hx-morph-rings span {
      position: absolute; top: 50%; left: 50%;
      width: 220px; height: 220px; margin: -110px 0 0 -110px;
      border-radius: 50%;
      border: 2px solid var(--hx-mc);
      box-shadow: 0 0 32px var(--hx-mc-glow);
      transform: scale(0); opacity: 0;
    }
    .hx-morph.is-playing .hx-morph-rings span:nth-child(1) { animation: hx-ring 1.1s cubic-bezier(0, 0.55, 0.25, 1) 0.30s both; }
    .hx-morph.is-playing .hx-morph-rings span:nth-child(2) { animation: hx-ring 1.2s cubic-bezier(0, 0.55, 0.25, 1) 0.42s both; }
    .hx-morph.is-playing .hx-morph-rings span:nth-child(3) { animation: hx-ring 1.3s cubic-bezier(0, 0.55, 0.25, 1) 0.56s both; }
    .hx-morph.is-playing .hx-morph-rings span:nth-child(4) { animation: hx-ring-finale 0.9s cubic-bezier(0.16, 0.84, 0.44, 1) 1.6s both; }
    @keyframes hx-ring-finale {
      0%   { transform: scale(0);   opacity: 0; border-width: 2px; }
      18%  { opacity: 0.6; }
      100% { transform: scale(14);  opacity: 0; border-width: 0; }
    }
    @keyframes hx-ring {
      0%   { transform: scale(0);   opacity: 0;    border-width: 3px; }
      15%  { opacity: 0.9; }
      100% { transform: scale(8);   opacity: 0;    border-width: 0.5px; }
    }

    /* L4 — radial particles: 14 dots fly out in a starburst */
    .hx-morph-particles {
      position: absolute; top: 50%; left: 50%;
      width: 0; height: 0;
    }
    .hx-morph-particles i {
      position: absolute; top: -3px; left: -3px;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--hx-mc);
      /* Multi-layer box-shadow creates a comet-trail effect */
      box-shadow:
        0 0 16px var(--hx-mc-glow),
        0 8px 6px -2px color-mix(in srgb, var(--hx-mc) 70%, transparent),
        0 18px 10px -4px color-mix(in srgb, var(--hx-mc) 40%, transparent),
        0 32px 14px -6px color-mix(in srgb, var(--hx-mc) 18%, transparent);
      transform-origin: 3px 3px;
      transform: rotate(calc(var(--p) * 20deg)) translateY(0) scale(0);
      opacity: 0;
    }
    .hx-morph.is-playing .hx-morph-particles i {
      animation: hx-particle 1.4s cubic-bezier(0.18, 0.89, 0.32, 1.28) 0.30s both;
    }
    .hx-morph.is-playing .hx-morph-particles i:nth-child(2n)  { animation-delay: 0.36s; animation-duration: 1.5s; }
    .hx-morph.is-playing .hx-morph-particles i:nth-child(3n)  { animation-delay: 0.42s; animation-duration: 1.6s; }
    .hx-morph.is-playing .hx-morph-particles i:nth-child(5n)  { animation-delay: 0.32s; animation-duration: 1.45s; }
    .hx-morph.is-playing .hx-morph-particles i:nth-child(7n)  { animation-delay: 0.48s; animation-duration: 1.7s; }
    @keyframes hx-particle {
      0%   { transform: rotate(calc(var(--p) * 20deg)) translateY(0)      scale(0)   rotate(0); opacity: 0; }
      12%  { transform: rotate(calc(var(--p) * 20deg)) translateY(-50px)  scale(1.4) rotate(0); opacity: 1; }
      100% { transform: rotate(calc(var(--p) * 20deg)) translateY(-680px) scale(0.1) rotate(0); opacity: 0; }
    }

    /* L5 — diagonal scan beam sweeps once across the screen */
    .hx-morph-beam {
      position: absolute; top: 0; bottom: 0; left: -40%;
      width: 36%; transform: skewX(-22deg);
      background: linear-gradient(90deg,
        transparent 0%,
        color-mix(in srgb, var(--hx-mc) 14%, transparent) 40%,
        color-mix(in srgb, var(--hx-mc) 22%, transparent) 50%,
        color-mix(in srgb, var(--hx-mc) 14%, transparent) 60%,
        transparent 100%);
      opacity: 0;
      filter: blur(8px);
    }
    .hx-morph.is-playing .hx-morph-beam {
      animation: hx-beam 1.1s cubic-bezier(0.4, 0, 0.1, 1) 0.45s both;
    }
    @keyframes hx-beam {
      0%   { left: -40%; opacity: 0; }
      20%  { opacity: 1; }
      100% { left: 130%; opacity: 0; }
    }

    /* L5.5 — Anamorphic lens flare: a horizontal cinematic streak that
       appears under the logo as it lands, like J.J. Abrams. */
    .hx-morph-flare {
      position: absolute; top: 50%; left: 50%;
      width: 80%; height: 8px;
      transform: translate(-50%, -50%) scaleX(0);
      background: linear-gradient(90deg,
        transparent 0%,
        color-mix(in srgb, var(--hx-mc) 60%, transparent) 20%,
        var(--hx-mc) 50%,
        color-mix(in srgb, var(--hx-mc) 60%, transparent) 80%,
        transparent 100%);
      filter: blur(6px);
      opacity: 0;
      mix-blend-mode: screen;
    }
    .hx-morph.is-playing .hx-morph-flare {
      animation: hx-flare 1s cubic-bezier(0.16, 0.84, 0.44, 1) 0.42s both;
    }
    @keyframes hx-flare {
      0%   { transform: translate(-50%, -50%) scaleX(0)   scaleY(1);   opacity: 0; }
      30%  { transform: translate(-50%, -50%) scaleX(1.1) scaleY(1);   opacity: 1; }
      60%  { transform: translate(-50%, -50%) scaleX(1)   scaleY(0.7); opacity: 0.8; }
      100% { transform: translate(-50%, -50%) scaleX(1.2) scaleY(0.2); opacity: 0; }
    }

    /* L6 — the model logo lands in 3D space with chromatic aberration */
    .hx-morph-mark {
      position: absolute; top: 50%; left: 50%;
      width: 260px; height: 260px;
      transform: translate(-50%, -50%) scale(0.2) rotateY(-90deg);
      opacity: 0;
      color: var(--hx-mc);
      display: flex; align-items: center; justify-content: center;
      filter:
        drop-shadow(0 0 44px var(--hx-mc-glow))
        drop-shadow(0 0 20px var(--hx-mc-glow))
        drop-shadow(2px 0 0 rgba(255, 60, 60, 0.5))
        drop-shadow(-2px 0 0 rgba(60, 100, 255, 0.5));
      transform-style: preserve-3d;
    }
    .hx-morph-mark svg { width: 100%; height: 100%; }
    .hx-morph.is-playing .hx-morph-mark {
      animation: hx-mark 1.8s cubic-bezier(0.16, 0.84, 0.44, 1) 0.32s both;
    }
    .hx-morph.is-prometheus .hx-morph-mark {
      animation-name: hx-mark-flame;
      animation-duration: 2s;
    }
    .hx-morph.is-ether .hx-morph-mark svg { animation: hx-mark-spin 1.7s cubic-bezier(0.4, 0, 0.2, 1) 0.32s both; }
    @keyframes hx-mark-spin { to { transform: rotate(720deg); } }
    @keyframes hx-mark {
      0%   { transform: translate(-50%, -50%) scale(0.2)  rotateY(-90deg) rotate(-18deg); opacity: 0; filter: blur(12px) drop-shadow(0 0 0 transparent); }
      10%  { transform: translate(-50%, -50%) scale(0.9)  rotateY(-20deg) rotate(-6deg);  opacity: 0.9; filter: blur(2px) drop-shadow(0 0 20px var(--hx-mc-glow)) drop-shadow(3px 0 0 rgba(255,60,60,0.6)) drop-shadow(-3px 0 0 rgba(60,100,255,0.6)); }
      22%  { transform: translate(-50%, -50%) scale(1.25) rotateY(8deg)   rotate(3deg);   opacity: 1;   filter: blur(0)   drop-shadow(0 0 50px var(--hx-mc-glow)) drop-shadow(1px 0 0 rgba(255,60,60,0.3)) drop-shadow(-1px 0 0 rgba(60,100,255,0.3)); }
      40%  { transform: translate(-50%, -50%) scale(1)    rotateY(0)      rotate(0);      opacity: 1;   filter: blur(0)   drop-shadow(0 0 36px var(--hx-mc-glow)); }
      72%  { transform: translate(-50%, -50%) scale(1.04) rotateY(0)      rotate(0);      opacity: 0.95; }
      100% { transform: translate(-50%, -58%) scale(1.5)  rotateY(0)      rotate(0);      opacity: 0;   filter: blur(3px) drop-shadow(0 0 70px var(--hx-mc-glow)); }
    }
    @keyframes hx-mark-flame {
      0%   { transform: translate(-50%, -42%) scale(0.15) skewX(-8deg);  opacity: 0; filter: blur(14px); }
      8%   { transform: translate(-50%, -48%) scale(0.7)  skewX(4deg);   opacity: 0.6; filter: blur(4px); }
      18%  { transform: translate(-50%, -50%) scale(1.2)  skewX(3deg);   opacity: 1; filter: blur(0) drop-shadow(0 0 50px var(--hx-mc-glow)); }
      32%  { transform: translate(-50%, -50%) scale(0.94) skewX(-3deg);  opacity: 1; }
      48%  { transform: translate(-50%, -50%) scale(1.08) skewX(2deg);   opacity: 1; }
      64%  { transform: translate(-50%, -50%) scale(0.97) skewX(-1deg);  opacity: 1; }
      82%  { transform: translate(-50%, -54%) scale(1.12) skewX(1deg);   opacity: 0.7; }
      100% { transform: translate(-50%, -64%) scale(1.55) skewX(0deg);   opacity: 0; filter: blur(3px) drop-shadow(0 0 80px var(--hx-mc-glow)); }
    }

    /* L7 — model name reveals under the logo as a thin caps line */
    .hx-morph-name {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, 100px);
      font-family: 'Instrument Serif', Georgia, serif;
      font-style: italic;
      font-size: 32px;
      letter-spacing: -0.012em;
      color: var(--hx-text);
      opacity: 0;
      white-space: nowrap;
    }
    .hx-morph-name span {
      display: inline-block;
      padding: 0 4px;
    }
    .hx-morph.is-playing .hx-morph-name {
      animation: hx-name 1.6s cubic-bezier(0.16, 0.84, 0.44, 1) 0.7s both;
    }
    @keyframes hx-name {
      0%   { transform: translate(-50%, 110px); opacity: 0; letter-spacing: 0.5em; filter: blur(8px); }
      30%  { transform: translate(-50%, 100px); opacity: 1; letter-spacing: -0.012em; filter: blur(0); }
      70%  { transform: translate(-50%, 100px); opacity: 1; }
      100% { transform: translate(-50%, 86px);  opacity: 0; filter: blur(2px); }
    }

    /* L8 — Finale shockwave: one big slow ring expanding outward AFTER
       the logo dissipates, like the aftermath of a detonation. */
    .hx-morph-finale {
      position: absolute; top: 50%; left: 50%;
      width: 60px; height: 60px;
      margin: -30px 0 0 -30px;
      border-radius: 50%;
      border: 2px solid var(--hx-mc);
      box-shadow:
        0 0 40px var(--hx-mc-glow),
        inset 0 0 40px var(--hx-mc-glow);
      transform: scale(0); opacity: 0;
    }
    .hx-morph.is-playing .hx-morph-finale {
      animation: hx-finale 1.4s cubic-bezier(0.22, 1, 0.36, 1) 1.4s both;
    }
    @keyframes hx-finale {
      0%   { transform: scale(0);  opacity: 0;   border-width: 4px; }
      20%  { opacity: 1; }
      100% { transform: scale(25); opacity: 0;   border-width: 0; }
    }

    /* The chat pane gets a sympathetic pulse: a soft glow blooms around
       the message area while the morph plays so the user feels the whole
       surface 're-skin' itself, not just the overlay. */
    .hx-chat-pane.is-morphing {
      animation: hx-pane-pulse 1.8s cubic-bezier(0.4, 0, 0.2, 1) both;
    }
    @keyframes hx-pane-pulse {
      0%, 100% { box-shadow: inset 0 0 0   0 transparent; }
      25%      { box-shadow: inset 0 0 160px 0 var(--hx-mc-soft); }
      50%      { box-shadow: inset 0 0 120px 0 var(--hx-mc-soft); }
      80%      { box-shadow: inset 0 0 60px  0 var(--hx-mc-soft); }
    }

    @media (prefers-reduced-motion: reduce) {
      .hx-morph.is-playing > * { animation: none !important; opacity: 0 !important; }
      .hx-chat-pane.is-morphing { animation: none !important; }
    }

    /* The chat workspace replaces the standard .hx-main scroll with its
       own column-flex layout so the composer stays pinned. */
    body[data-active="chat"] .hx-main {
      padding: 0;
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      height: calc(100vh - var(--hx-topbar-h));
      min-height: 0;
    }

    /* Left rail — conversation list */
    .hx-chat-rail {
      border-right: 1px solid var(--hx-line);
      background: linear-gradient(180deg, var(--hx-surface) 0%, var(--hx-surface-2, var(--hx-surface)) 100%);
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
      position: relative;
    }

    /* Backdrop element exists in DOM at all times for JS simplicity, but
       must never be a grid item. Take it out of normal flow so .hx-main
       stays a clean 2-column grid on desktop. */
    .hx-chat-backdrop {
      position: fixed;
      top: var(--hx-topbar-h);
      left: 0; right: 0; bottom: 0;
      background: rgba(20, 18, 12, 0.35);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
      z-index: 65;
      opacity: 0;
      pointer-events: none;
      display: none;
      transition: opacity 0.22s ease;
    }

    /* Mobile: rail becomes a slide-in drawer. Backdrop dims the chat. */
    @media (max-width: 900px) {
      body[data-active="chat"] .hx-main { grid-template-columns: 1fr; }
      .hx-chat-rail {
        position: fixed;
        top: var(--hx-topbar-h);
        left: 0;
        bottom: 0;
        width: min(86%, 320px);
        z-index: 70;
        border-right: 1px solid var(--hx-line);
        box-shadow: 0 18px 38px -12px rgba(20,18,12,0.30), 0 4px 10px rgba(20,18,12,0.10);
        transform: translateX(-100%);
        transition: transform 0.28s cubic-bezier(0.2, 0.7, 0.2, 1);
      }
      .hx-chat-rail.is-open { transform: translateX(0); }
      .hx-chat-rail::after { display: none; }
      .hx-chat-backdrop { display: block; }
      .hx-chat-backdrop.is-visible { opacity: 1; pointer-events: auto; }
    }

    /* Mobile-only drawer toggle pill in the toolbar */
    .hx-chat-drawer-toggle {
      display: none;
      width: 34px; height: 34px;
      align-items: center; justify-content: center;
      background: var(--hx-surface);
      border: 1px solid var(--hx-line);
      border-radius: 10px;
      color: var(--hx-text);
      cursor: pointer;
      padding: 0;
      flex-shrink: 0;
      box-shadow: var(--hx-shadow-xs);
      transition: background 0.14s ease, border-color 0.14s ease, transform 0.14s ease;
    }
    .hx-chat-drawer-toggle:hover { background: var(--hx-bg-2); border-color: var(--hx-line-strong); }
    .hx-chat-drawer-toggle:active { transform: scale(0.96); }
    .hx-chat-drawer-toggle svg { width: 16px; height: 16px; }
    @media (max-width: 900px) {
      .hx-chat-drawer-toggle { display: inline-flex; }
    }
    .hx-chat-rail::after {
      content: '';
      position: absolute; top: 0; right: -1px; bottom: 0; width: 1px;
      background: linear-gradient(180deg, transparent 0%, var(--hx-line) 18%, var(--hx-line) 82%, transparent 100%);
      pointer-events: none;
    }
    .hx-chat-rail-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 18px 16px 14px;
      border-bottom: 1px solid var(--hx-line-soft, var(--hx-line));
    }
    .hx-chat-rail-title {
      font-size: 10.5px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--hx-text-dim);
      margin: 0;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .hx-chat-rail-title::before {
      content: '';
      width: 4px; height: 4px; border-radius: 50%;
      background: var(--hx-yellow, var(--hx-text));
      box-shadow: 0 0 0 3px var(--hx-yellow-soft, transparent);
    }
    .hx-chat-new {
      width: 28px; height: 28px;
      display: inline-flex; align-items: center; justify-content: center;
      background: var(--hx-text); color: var(--hx-bg);
      border: 1px solid var(--hx-text);
      border-radius: var(--hx-r-sm);
      cursor: pointer;
      box-shadow: var(--hx-shadow-xs);
      transition: transform 0.14s ease, box-shadow 0.14s ease, background 0.14s ease;
    }
    .hx-chat-new:hover {
      background: var(--hx-text-mid);
      border-color: var(--hx-text-mid);
      transform: translateY(-1px);
      box-shadow: var(--hx-shadow-sm);
    }
    .hx-chat-new:active { transform: translateY(0); }
    .hx-chat-new svg { width: 13px; height: 13px; }

    .hx-chat-list {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 8px 8px 14px;
    }
    .hx-chat-list::-webkit-scrollbar { width: 8px; }
    .hx-chat-list::-webkit-scrollbar-thumb { background: transparent; border-radius: 8px; }
    .hx-chat-list:hover::-webkit-scrollbar-thumb { background: var(--hx-line-strong); }

    .hx-chat-item {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 3px;
      padding: 10px 12px 10px 14px;
      border-radius: var(--hx-r);
      cursor: pointer;
      transition: background 0.14s ease, border-color 0.14s ease, transform 0.14s ease;
      border: 1px solid transparent;
    }
    .hx-chat-item::before {
      content: '';
      position: absolute;
      left: 4px; top: 50%;
      transform: translateY(-50%) scaleY(0.4);
      width: 2px; height: 56%;
      background: linear-gradient(180deg,
        color-mix(in srgb, var(--hx-yellow, var(--hx-text)) 0%, transparent) 0%,
        var(--hx-yellow, var(--hx-text)) 50%,
        color-mix(in srgb, var(--hx-yellow, var(--hx-text)) 0%, transparent) 100%);
      border-radius: 2px;
      opacity: 0;
      transition: opacity 0.16s ease, transform 0.18s cubic-bezier(0.2, 0.7, 0.3, 1);
      box-shadow: 0 0 6px color-mix(in srgb, var(--hx-yellow, var(--hx-text)) 50%, transparent);
    }
    .hx-chat-item:hover {
      background: var(--hx-bg-2);
    }
    .hx-chat-item.is-active {
      background: linear-gradient(180deg, var(--hx-bg-2) 0%, color-mix(in srgb, var(--hx-bg-2) 70%, var(--hx-surface)) 100%);
      border-color: var(--hx-line);
      box-shadow:
        inset 0 1px 0 color-mix(in srgb, #fff 50%, transparent),
        var(--hx-shadow-xs);
    }
    .hx-chat-item.is-active::before {
      opacity: 1;
      transform: translateY(-50%) scaleY(1);
    }
    .hx-chat-item.is-active .hx-chat-item-title { font-weight: 600; }
    .hx-chat-item-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--hx-text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: -0.005em;
    }
    .hx-chat-item-meta {
      font-size: 10.5px;
      color: var(--hx-text-dim);
      display: flex;
      align-items: center;
      gap: 8px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 500;
    }
    .hx-chat-item-meta .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--hx-text-faint); }

    .hx-chat-empty-list {
      padding: 28px 18px;
      text-align: center;
      color: var(--hx-text-dim);
      font-size: 12.5px;
      line-height: 1.55;
    }

    /* Right pane — thread + composer */
    .hx-chat-pane {
      display: flex;
      flex-direction: column;
      min-height: 0;
      background: var(--hx-bg);
      position: relative;
    }
    .hx-chat-pane::before {
      content: '';
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: min(620px, 80%);
      height: 320px;
      background: radial-gradient(ellipse at center top,
        color-mix(in srgb, var(--hx-yellow, var(--hx-text)) 8%, transparent) 0%,
        transparent 70%);
      pointer-events: none;
      opacity: 0.55;
      z-index: 0;
    }
    .hx-chat-pane > * { position: relative; z-index: 1; }
    .hx-chat-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 22px;
      border-bottom: 1px solid var(--hx-line-soft, var(--hx-line));
      background:
        linear-gradient(180deg,
          color-mix(in srgb, var(--hx-surface) 96%, transparent) 0%,
          color-mix(in srgb, var(--hx-surface) 82%, transparent) 100%);
      backdrop-filter: saturate(160%) blur(12px);
      -webkit-backdrop-filter: saturate(160%) blur(12px);
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 4;
    }
    .hx-chat-toolbar::after {
      content: '';
      position: absolute; left: 0; right: 0; bottom: -1px; height: 1px;
      background: linear-gradient(90deg, transparent 0%, var(--hx-line) 14%, var(--hx-line) 86%, transparent 100%);
      pointer-events: none;
    }
    .hx-chat-title {
      font-family: 'Instrument Serif', Georgia, serif;
      font-style: italic;
      font-size: 23px;
      letter-spacing: -0.018em;
      font-weight: 400;
      color: var(--hx-text);
      margin: 0 auto 0 0;
      max-width: 52%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding-left: 4px;
      line-height: 1.1;
      position: relative;
    }
    .hx-chat-title::before {
      content: '';
      position: absolute;
      left: -8px; top: 50%;
      transform: translateY(-50%);
      width: 2px; height: 60%;
      background: linear-gradient(180deg, transparent 0%, var(--hx-yellow, var(--hx-text)) 50%, transparent 100%);
      opacity: 0.7;
    }
    .hx-chat-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      height: 30px;
      padding: 0 4px 0 10px;
      background: var(--hx-bg-2);
      border: 1px solid var(--hx-line);
      border-radius: 999px;
      color: var(--hx-text);
      font-size: 12.5px;
      font-family: inherit;
      cursor: pointer;
      transition: border-color 0.14s ease, background 0.14s ease, box-shadow 0.14s ease;
    }
    .hx-chat-pill:hover {
      border-color: var(--hx-line-strong);
      background: var(--hx-surface);
      box-shadow: var(--hx-shadow-xs);
    }
    .hx-chat-pill > span:first-child {
      color: var(--hx-text-dim) !important;
      font-size: 10px !important;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      padding-right: 8px;
      border-right: 1px solid var(--hx-line);
      margin-right: 4px;
      line-height: 1;
    }
    .hx-chat-pill svg { width: 10px; height: 10px; opacity: 0.55; margin-right: 6px; }
    .hx-chat-pill select {
      border: none; background: transparent; font-size: 12.5px; font-family: inherit;
      color: var(--hx-text); padding: 0; outline: none; cursor: pointer;
      font-weight: 500;
    }
    /* Trash pill (no select inside) — match capsule shape */
    button.hx-chat-pill {
      padding: 0 12px;
      gap: 6px;
      color: var(--hx-text-mid);
      font-weight: 500;
    }
    button.hx-chat-pill:hover { color: var(--hx-red); border-color: rgba(220,38,38,0.3); background: var(--hx-red-soft); }
    button.hx-chat-pill svg { width: 12px; height: 12px; margin-right: 0; opacity: 0.75; }

    /* Premium credit balance — small mono badge with halo on the gold dot */
    .hx-chat-balance {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      height: 30px;
      padding: 0 13px;
      background: linear-gradient(180deg, var(--hx-bg-2) 0%, color-mix(in srgb, var(--hx-bg-2) 70%, var(--hx-surface)) 100%);
      border: 1px solid var(--hx-line);
      border-radius: 999px;
      font-family: var(--hx-mono);
      font-size: 11px;
      color: var(--hx-text);
      font-weight: 600;
      letter-spacing: 0.03em;
      box-shadow: inset 0 1px 0 color-mix(in srgb, #fff 70%, transparent), var(--hx-shadow-xs);
    }
    .hx-chat-balance::before {
      content: '';
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--hx-yellow, var(--hx-text));
      box-shadow:
        0 0 0 2px var(--hx-yellow-soft, transparent),
        0 0 8px color-mix(in srgb, var(--hx-yellow, var(--hx-text)) 60%, transparent);
      animation: hx-balance-pulse 2.8s ease-in-out infinite;
    }
    @keyframes hx-balance-pulse {
      0%, 100% { box-shadow: 0 0 0 2px var(--hx-yellow-soft, transparent), 0 0 6px color-mix(in srgb, var(--hx-yellow, var(--hx-text)) 50%, transparent); }
      50%      { box-shadow: 0 0 0 3px var(--hx-yellow-soft, transparent), 0 0 12px color-mix(in srgb, var(--hx-yellow, var(--hx-text)) 75%, transparent); }
    }
    .hx-chat-balance.is-empty { color: var(--hx-text-faint); }
    .hx-chat-balance.is-empty::before { animation: none; box-shadow: none; opacity: 0.4; }

    /* Thread */
    .hx-chat-thread {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 36px 0 28px;
      scroll-behavior: smooth;
    }
    .hx-chat-thread::-webkit-scrollbar { width: 10px; }
    .hx-chat-thread::-webkit-scrollbar-thumb { background: transparent; border: 3px solid transparent; background-clip: padding-box; border-radius: 8px; }
    .hx-chat-thread:hover::-webkit-scrollbar-thumb { background: var(--hx-line-strong); background-clip: padding-box; }
    .hx-chat-thread-inner {
      max-width: 740px;
      margin: 0 auto;
      padding: 0 28px;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }
    .hx-msg { display: flex; flex-direction: column; gap: 6px; }
    /* Avatars are intentionally not rendered. Premium chats keep the
       speaker identity to a single faint label and let the prose breathe. */
    .hx-msg-avatar { display: none; }
    .hx-msg-body { min-width: 0; width: 100%; }
    .hx-msg-meta {
      font-size: 10px; color: var(--hx-text-faint);
      letter-spacing: 0.22em; text-transform: uppercase;
      margin-bottom: 10px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }
    .hx-msg.is-assistant .hx-msg-meta {
      color: var(--hx-text);
    }
    .hx-msg.is-assistant .hx-msg-meta::before {
      content: '';
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--hx-yellow, var(--hx-text));
      box-shadow:
        0 0 0 3px var(--hx-yellow-soft, transparent),
        0 0 8px color-mix(in srgb, var(--hx-yellow, var(--hx-text)) 55%, transparent);
    }
    .hx-msg.is-assistant .hx-msg-meta::after {
      content: '';
      flex: 0 0 56px;
      height: 1px;
      background: linear-gradient(90deg, var(--hx-line-strong) 0%, transparent 100%);
    }
    .hx-msg-meta strong { font-weight: 700; color: inherit; letter-spacing: 0.24em; }
    .hx-msg-content {
      font-size: 15.5px; line-height: 1.75; color: var(--hx-text);
      white-space: pre-wrap; word-wrap: break-word;
      letter-spacing: -0.004em;
    }
    .hx-msg.is-assistant .hx-msg-content::first-letter {
      font-family: 'Instrument Serif', Georgia, serif;
      font-style: italic;
      font-size: 1.18em;
      letter-spacing: -0.01em;
    }
    /* Inline markdown bits inside assistant prose */
    .hx-md-inline {
      font-family: var(--hx-mono);
      font-size: 0.88em;
      background: var(--hx-bg-2);
      border: 1px solid var(--hx-line);
      padding: 1px 6px;
      border-radius: 5px;
      color: var(--hx-yellow-deep);
    }
    .hx-md-link {
      color: var(--hx-text);
      border-bottom: 1px solid color-mix(in srgb, var(--hx-text) 30%, transparent);
      transition: border-color 0.14s ease;
    }
    .hx-md-link:hover { border-color: var(--hx-text); }

    /* Headings inside the chat — editorial hierarchy.
       H1/H2 use the Instrument Serif italic so longform plans + reports
       read like a New Yorker piece, not a corporate doc. H3/H4 stay in
       the Inter family with refined weight/letter-spacing. */
    .hx-md-h { margin: 22px 0 8px; line-height: 1.2; color: var(--hx-text); letter-spacing: -0.012em; }
    .hx-md-h:first-child { margin-top: 4px; }
    .hx-md-h1 {
      font-family: 'Instrument Serif', Georgia, serif;
      font-style: italic;
      font-weight: 400;
      font-size: 30px;
      letter-spacing: -0.022em;
    }
    .hx-md-h2 {
      font-family: 'Instrument Serif', Georgia, serif;
      font-style: italic;
      font-weight: 400;
      font-size: 23px;
      letter-spacing: -0.018em;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--hx-line-soft, var(--hx-line));
    }
    .hx-md-h3 {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.005em;
      text-transform: none;
    }
    .hx-md-h4 {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--hx-text-dim);
    }

    /* Horizontal rule — fade hairline */
    .hx-md-hr {
      border: 0;
      height: 1px;
      margin: 18px 0;
      background: linear-gradient(90deg, transparent 0%, var(--hx-line) 18%, var(--hx-line) 82%, transparent 100%);
    }

    /* Lists — refined spacing + custom markers */
    .hx-md-list {
      list-style: none;
      padding: 0;
      margin: 10px 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .hx-md-list > li {
      position: relative;
      padding-left: 22px;
      line-height: 1.6;
      color: var(--hx-text);
    }
    .hx-md-list > li::before {
      content: '';
      position: absolute;
      left: 8px; top: 0.62em;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--hx-text-mid);
    }
    .hx-md-list.hx-md-list-num {
      counter-reset: hxlist;
    }
    .hx-md-list.hx-md-list-num > li {
      padding-left: 28px;
      counter-increment: hxlist;
    }
    .hx-md-list.hx-md-list-num > li::before {
      content: counter(hxlist) ".";
      background: transparent;
      width: auto; height: auto;
      left: 4px; top: 0;
      font-family: var(--hx-mono);
      font-size: 12px;
      font-weight: 600;
      color: var(--hx-yellow-deep);
      border-radius: 0;
    }

    /* Premium tool-use card — replaces raw 'Running code…' italic text.
       Shows as a calm pill with icon + label + spinner (running) or check
       (done). Matches Claude.ai's tool-use visual: subtle surface, gold
       accent on the icon while running, emerald accent when complete. */
    .hx-tool-card {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px 8px 10px;
      margin: 12px 0;
      background: linear-gradient(180deg, var(--hx-surface) 0%, var(--hx-bg-2) 100%);
      border: 1px solid var(--hx-line);
      border-radius: 999px;
      font-size: 12.5px;
      font-weight: 500;
      color: var(--hx-text);
      box-shadow:
        inset 0 1px 0 color-mix(in srgb, #fff 55%, transparent),
        var(--hx-shadow-xs);
      position: relative;
      max-width: 100%;
    }
    .hx-tool-card.is-running {
      border-color: color-mix(in srgb, var(--hx-yellow) 35%, var(--hx-line));
      box-shadow:
        inset 0 1px 0 color-mix(in srgb, #fff 55%, transparent),
        0 0 0 3px color-mix(in srgb, var(--hx-yellow) 10%, transparent),
        var(--hx-shadow-xs);
    }
    .hx-tool-card.is-done {
      border-color: color-mix(in srgb, var(--hx-emerald) 25%, var(--hx-line));
      color: var(--hx-text-mid);
    }
    .hx-tool-card-ico {
      width: 22px; height: 22px;
      display: inline-flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      background: var(--hx-bg-2);
      border: 1px solid var(--hx-line);
      border-radius: 8px;
      color: var(--hx-text-mid);
    }
    .hx-tool-card.is-running .hx-tool-card-ico {
      background: var(--hx-yellow-soft);
      border-color: color-mix(in srgb, var(--hx-yellow) 35%, var(--hx-line));
      color: var(--hx-yellow-deep);
      animation: hx-tool-icon-pulse 1.8s ease-in-out infinite;
    }
    .hx-tool-card.is-done .hx-tool-card-ico {
      background: var(--hx-emerald-soft);
      border-color: color-mix(in srgb, var(--hx-emerald) 35%, var(--hx-line));
      color: var(--hx-emerald);
    }
    .hx-tool-card-ico svg { width: 12px; height: 12px; }
    @keyframes hx-tool-icon-pulse {
      0%, 100% { transform: scale(1);    opacity: 1; }
      50%      { transform: scale(1.08); opacity: 0.85; }
    }
    .hx-tool-card-label {
      flex: 1;
      letter-spacing: -0.005em;
      line-height: 1.3;
    }
    .hx-tool-card-spinner {
      width: 14px; height: 14px;
      flex-shrink: 0;
      border-radius: 50%;
      border: 2px solid color-mix(in srgb, var(--hx-yellow) 22%, var(--hx-line));
      border-top-color: var(--hx-yellow-deep);
      animation: hx-tool-spin 0.9s linear infinite;
    }
    @keyframes hx-tool-spin {
      to { transform: rotate(360deg); }
    }
    .hx-tool-card-check {
      width: 14px; height: 14px;
      color: var(--hx-emerald);
      flex-shrink: 0;
      animation: hx-tool-check-in 0.32s cubic-bezier(0.2, 0.7, 0.2, 1) both;
    }
    @keyframes hx-tool-check-in {
      from { transform: scale(0.5); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    /* Blockquote — editorial pull-quote */
    .hx-md-quote {
      margin: 14px 0;
      padding: 8px 16px;
      border-left: 3px solid var(--hx-yellow-deep);
      background: linear-gradient(90deg, var(--hx-yellow-soft) 0%, transparent 60%);
      color: var(--hx-text-mid);
      font-style: italic;
      border-radius: 0 8px 8px 0;
    }

    /* Code block — premium card with header, body, and optional live preview */
    .hx-code-block {
      margin: 12px 0;
      border-radius: 12px;
      background: var(--hx-bg-2);
      border: 1px solid var(--hx-line);
      overflow: hidden;
      box-shadow: var(--hx-shadow-xs);
      white-space: normal;
    }
    .hx-code-head {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px 7px 14px;
      background: linear-gradient(180deg, var(--hx-bg-2) 0%, var(--hx-surface-3) 100%);
      border-bottom: 1px solid var(--hx-line);
    }
    .hx-code-lang {
      font-family: var(--hx-mono);
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--hx-text-dim);
    }
    .hx-code-streaming {
      font-family: var(--hx-mono);
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--hx-yellow-deep);
      padding: 1px 6px;
      background: var(--hx-yellow-soft);
      border-radius: 4px;
      border: 1px solid color-mix(in srgb, var(--hx-yellow) 30%, var(--hx-line));
    }
    .hx-code-actions {
      margin-left: auto;
      display: inline-flex;
      gap: 4px;
    }
    .hx-code-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 8px;
      font-size: 11.5px;
      font-weight: 500;
      color: var(--hx-text-mid);
      background: transparent;
      border: 1px solid transparent;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.14s ease, color 0.14s ease, border-color 0.14s ease;
    }
    .hx-code-btn:hover {
      background: var(--hx-surface);
      color: var(--hx-text);
      border-color: var(--hx-line);
    }
    .hx-code-btn svg { width: 11px; height: 11px; }
    .hx-code-btn.is-active {
      background: var(--hx-yellow-soft);
      color: var(--hx-yellow-deep);
      border-color: color-mix(in srgb, var(--hx-yellow) 30%, var(--hx-line));
    }
    .hx-code-body {
      margin: 0;
      padding: 14px 16px;
      overflow-x: auto;
      background: var(--hx-bg-2);
      font-family: var(--hx-mono);
      font-size: 12.5px;
      line-height: 1.6;
      color: var(--hx-text);
      max-height: 480px;
    }
    .hx-code-body code { font-family: inherit; font-size: inherit; }

    /* Live preview iframe for HTML / SVG code blocks */
    .hx-code-preview {
      border-top: 1px solid var(--hx-line);
      background: #fff;
    }
    .hx-code-preview-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 7px 14px;
      background: var(--hx-surface-3);
      font-family: var(--hx-mono);
      font-size: 10.5px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--hx-text-dim);
      border-bottom: 1px solid var(--hx-line);
    }
    .hx-code-preview-sandbox {
      font-size: 9.5px;
      letter-spacing: 0.14em;
      color: var(--hx-emerald);
    }
    .hx-code-preview iframe {
      display: block;
      width: 100%;
      min-height: 320px;
      max-height: 640px;
      border: 0;
      background: #fff;
    }
    /* User turns sit in a refined ivory-tinted chip; assistant turns are flush editorial prose. */
    .hx-msg.is-user { align-items: flex-end; }
    .hx-msg.is-user .hx-msg-content {
      background: linear-gradient(180deg,
        color-mix(in srgb, var(--hx-yellow-soft, var(--hx-bg-2)) 40%, var(--hx-surface)) 0%,
        color-mix(in srgb, var(--hx-yellow-soft, var(--hx-bg-2)) 22%, var(--hx-bg-2)) 100%);
      border: 1px solid color-mix(in srgb, var(--hx-yellow, var(--hx-line)) 14%, var(--hx-line));
      border-radius: 18px;
      border-bottom-right-radius: 5px;
      padding: 13px 17px;
      font-size: 14.5px; line-height: 1.62;
      max-width: 78%;
      box-shadow:
        inset 0 1px 0 color-mix(in srgb, #fff 65%, transparent),
        0 1px 2px rgba(0,0,0,0.04),
        0 8px 20px -8px rgba(0,0,0,0.10),
        0 0 0 1px color-mix(in srgb, var(--hx-yellow, transparent) 6%, transparent);
    }
    .hx-msg.is-user .hx-msg-meta {
      letter-spacing: 0.24em;
      color: var(--hx-text-faint);
    }
    /* Subtle entrance animation for arriving messages */
    .hx-msg {
      animation: hx-msg-in 0.42s cubic-bezier(0.2, 0.7, 0.2, 1) both;
    }
    @keyframes hx-msg-in {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .hx-msg-actions {
      display: flex; align-items: center; gap: 4px;
      margin-top: 8px;
      opacity: 0;
      transition: opacity 0.12s;
    }
    .hx-msg:hover .hx-msg-actions { opacity: 1; }
    .hx-msg-act {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 8px;
      font-size: 11.5px; font-weight: 500;
      color: var(--hx-text-mid);
      background: transparent; border: 1px solid transparent;
      border-radius: 4px;
      cursor: pointer; font-family: inherit;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
    }
    .hx-msg-act:hover { background: var(--hx-bg-2); color: var(--hx-text); border-color: var(--hx-line); }
    .hx-msg-act svg { width: 11px; height: 11px; }

    /* Premium speaker / TTS button — sits to the left of Copy/Regenerate */
    .hx-msg-speak {
      position: relative;
    }
    .hx-msg-speak-ico {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 12px; height: 12px;
    }
    .hx-msg-speak-ico svg { width: 12px; height: 12px; }
    .hx-msg-speak .hx-msg-speak-pause,
    .hx-msg-speak .hx-msg-speak-load { display: none; }
    .hx-msg-speak.is-loading .hx-msg-speak-play  { display: none; }
    .hx-msg-speak.is-loading .hx-msg-speak-load  { display: inline-flex; }
    .hx-msg-speak.is-playing .hx-msg-speak-play  { display: none; }
    .hx-msg-speak.is-playing .hx-msg-speak-pause { display: inline-flex; }

    .hx-msg-speak.is-playing {
      background: var(--hx-yellow-soft);
      color: var(--hx-yellow-deep);
      border-color: color-mix(in srgb, var(--hx-yellow) 35%, var(--hx-line));
    }
    .hx-msg-speak.is-loading {
      color: var(--hx-text-mid);
    }
    /* Make the actions row stay visible while a message is playing,
       even if the user isn't hovering. */
    .hx-msg-actions:has(.hx-msg-speak.is-playing),
    .hx-msg-actions:has(.hx-msg-speak.is-loading) { opacity: 1; }

    /* Three-dot loading indicator */
    .hx-msg-speak-load span {
      width: 3px; height: 3px;
      border-radius: 50%;
      background: currentColor;
      display: inline-block;
      margin: 0 1px;
      animation: hx-speak-load 1.1s ease-in-out infinite;
    }
    .hx-msg-speak-load span:nth-child(2) { animation-delay: 0.15s; }
    .hx-msg-speak-load span:nth-child(3) { animation-delay: 0.30s; }
    @keyframes hx-speak-load {
      0%, 70%, 100% { transform: scale(0.55); opacity: 0.45; }
      35%           { transform: scale(1);    opacity: 1; }
    }
    /* Subtle pulsing ring while playing — feels like a living voice. */
    .hx-msg-speak.is-playing::after {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 6px;
      border: 1px solid color-mix(in srgb, var(--hx-yellow) 45%, transparent);
      pointer-events: none;
      animation: hx-speak-ring 1.8s ease-out infinite;
    }
    @keyframes hx-speak-ring {
      0%   { opacity: 0.9; transform: scale(1); }
      100% { opacity: 0;   transform: scale(1.18); }
    }

    .hx-msg-error .hx-msg-content {
      color: var(--hx-red);
      background: var(--hx-red-soft);
      border: 1px solid rgba(220, 38, 38, 0.22);
      border-radius: var(--hx-r-sm);
      padding: 10px 12px;
      font-size: 13px;
    }

    /* Thinking indicator — minimalist: just the model's logo doing its
       signature animation. No pill, no label, no dots. The logo IS the
       state. Per-model accent via .is-ether / .is-nexus / .is-prometheus. */
    .hx-thinking-solo {
      display: inline-block;
      width: 32px; height: 32px;
      color: var(--hx-yellow-deep);
      animation: hx-solo-fade-in 0.28s cubic-bezier(0.2, 0.7, 0.2, 1) both;
    }
    .hx-thinking-solo svg { width: 100%; height: 100%; }
    @keyframes hx-solo-fade-in {
      from { opacity: 0; transform: scale(0.6); }
      to   { opacity: 1; transform: scale(1); }
    }
    .hx-thinking-solo.is-ether {
      color: var(--hx-yellow-deep);
      filter: drop-shadow(0 0 10px var(--hx-yellow-soft));
    }
    .hx-thinking-solo.is-ether svg {
      animation: hx-solo-ether 2.4s linear infinite;
    }
    @keyframes hx-solo-ether {
      to { transform: rotate(360deg); }
    }
    .hx-thinking-solo.is-nexus {
      color: var(--hx-red);
      filter: drop-shadow(0 0 10px var(--hx-red-soft));
    }
    .hx-thinking-solo.is-nexus svg {
      animation: hx-solo-nexus 1.8s ease-in-out infinite;
    }
    @keyframes hx-solo-nexus {
      0%, 100% { transform: scale(0.92); opacity: 0.85; }
      50%      { transform: scale(1.08); opacity: 1; }
    }
    .hx-thinking-solo.is-prometheus {
      color: var(--hx-text);
      filter: drop-shadow(0 0 12px var(--hx-mc-glow));
      transform-origin: 16px 26px;
    }
    .hx-thinking-solo.is-prometheus svg {
      animation: hx-solo-prometheus 1.3s ease-in-out infinite;
      transform-origin: 12px 20px;
    }
    @keyframes hx-solo-prometheus {
      0%, 100% { transform: scale(1)   skewX(0deg);  }
      25%      { transform: scale(1.06) skewX(-1.5deg); }
      50%      { transform: scale(0.95) skewX(1deg); }
      75%      { transform: scale(1.05) skewX(-0.5deg); }
    }

    /* Old pill — kept around in case anyone still mounts .hx-thinking, but
       we don't render it anymore in this build. */
    .hx-thinking {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 4px 12px 4px 8px;
      background: linear-gradient(180deg, var(--hx-surface) 0%, var(--hx-bg-2) 100%);
      border: 1px solid var(--hx-line);
      border-radius: 999px;
      color: var(--hx-text-mid);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.02em;
      box-shadow: var(--hx-shadow-xs);
    }
    /* Model-aware mark — each Helix model shows its own logo in the
       thinking pill. Color + animation are themed per model. */
    .hx-thinking-mark {
      width: 22px; height: 22px;
      display: inline-flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      border-radius: 8px;
      background: var(--hx-bg-2);
      border: 1px solid var(--hx-line);
    }
    .hx-thinking-mark svg { width: 14px; height: 14px; }
    /* Ether — atom orbits, gold accent, slow rotation */
    .hx-thinking.is-ether {
      border-color: color-mix(in srgb, var(--hx-yellow) 35%, var(--hx-line));
    }
    .hx-thinking.is-ether .hx-thinking-mark {
      background: var(--hx-yellow-soft);
      border-color: color-mix(in srgb, var(--hx-yellow) 35%, var(--hx-line));
      color: var(--hx-yellow-deep);
      box-shadow: 0 0 12px color-mix(in srgb, var(--hx-yellow) 25%, transparent);
    }
    .hx-thinking.is-ether .hx-thinking-mark svg {
      animation: hx-mark-rotate 3.2s linear infinite;
    }
    @keyframes hx-mark-rotate {
      to { transform: rotate(360deg); }
    }
    /* Nexus — reasoning burst, coral/red accent, breathing pulse */
    .hx-thinking.is-nexus {
      border-color: color-mix(in srgb, var(--hx-red) 28%, var(--hx-line));
    }
    .hx-thinking.is-nexus .hx-thinking-mark {
      background: var(--hx-red-soft);
      border-color: color-mix(in srgb, var(--hx-red) 30%, var(--hx-line));
      color: var(--hx-red);
      box-shadow: 0 0 12px color-mix(in srgb, var(--hx-red) 20%, transparent);
    }
    .hx-thinking.is-nexus .hx-thinking-mark svg {
      animation: hx-mark-burst 2.2s ease-in-out infinite;
    }
    @keyframes hx-mark-burst {
      0%, 100% { transform: scale(0.92); }
      50%      { transform: scale(1.08); }
    }
    /* Prometheus — flame, graphite accent, flickering ascent */
    .hx-thinking.is-prometheus {
      border-color: color-mix(in srgb, var(--hx-text) 25%, var(--hx-line));
    }
    .hx-thinking.is-prometheus .hx-thinking-mark {
      background: linear-gradient(180deg, var(--hx-bg-2) 0%, color-mix(in srgb, var(--hx-text) 8%, var(--hx-bg-2)) 100%);
      border-color: color-mix(in srgb, var(--hx-text) 30%, var(--hx-line));
      color: var(--hx-text);
      box-shadow:
        inset 0 1px 0 color-mix(in srgb, #fff 35%, transparent),
        0 0 14px color-mix(in srgb, var(--hx-text) 18%, transparent);
    }
    .hx-thinking.is-prometheus .hx-thinking-mark svg {
      animation: hx-mark-flicker 1.5s ease-in-out infinite;
      transform-origin: 12px 20px;
    }
    @keyframes hx-mark-flicker {
      0%, 100% { transform: scale(1)   skewX(0deg);  opacity: 1; }
      25%      { transform: scale(1.05) skewX(-1.5deg); opacity: 0.9; }
      50%      { transform: scale(0.96) skewX(1deg);    opacity: 1; }
      75%      { transform: scale(1.04) skewX(-0.5deg); opacity: 0.95; }
    }
    .hx-thinking-text {
      font-family: 'Instrument Serif', Georgia, serif;
      font-style: italic;
      font-size: 14px;
      letter-spacing: -0.005em;
      color: var(--hx-text);
    }
    /* Typing indicator — small dots inline with the thinking pill */
    .hx-typing {
      display: inline-flex; gap: 3px; align-items: center;
    }
    .hx-typing span {
      width: 4px; height: 4px; border-radius: 50%;
      background: var(--hx-text-dim);
      animation: hx-typing-bounce 1.2s infinite;
    }
    .hx-typing span:nth-child(2) { animation-delay: 0.15s; }
    .hx-typing span:nth-child(3) { animation-delay: 0.30s; }
    @keyframes hx-typing-bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.3; }
      30%           { transform: translateY(-3px); opacity: 1; }
    }

    /* Empty state — editorial welcome */
    .hx-chat-blank {
      flex: 1; min-height: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 56px 24px;
      text-align: center;
      color: var(--hx-text-mid);
      gap: 14px;
    }
    .hx-chat-blank-eyebrow {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--hx-text-dim);
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }
    .hx-chat-blank-eyebrow::before,
    .hx-chat-blank-eyebrow::after {
      content: '';
      width: 22px; height: 1px;
      background: linear-gradient(90deg, transparent 0%, var(--hx-line-strong) 100%);
    }
    .hx-chat-blank-eyebrow::after {
      background: linear-gradient(90deg, var(--hx-line-strong) 0%, transparent 100%);
    }
    .hx-chat-blank h2 {
      font-family: 'Instrument Serif', Georgia, serif;
      font-style: italic; font-size: 56px;
      letter-spacing: -0.028em;
      color: var(--hx-text);
      margin: 0;
      line-height: 0.96;
    }
    .hx-chat-blank h2::after {
      content: '.';
      color: var(--hx-yellow, var(--hx-text));
      margin-left: 2px;
    }
    .hx-chat-blank p {
      font-size: 14px;
      max-width: 440px;
      line-height: 1.65;
      margin: 0;
      color: var(--hx-text-mid);
    }
    .hx-chat-blank p strong { color: var(--hx-text); font-weight: 600; }

    /* Premium suggestion chips — appear under the empty-state hero so
       new users have a clear, opinionated way to start. ChatGPT/Anthropic
       style: rounded surface, subtle hover lift, leading icon. */
    .hx-chat-blank-chips {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 8px;
      width: 100%;
      max-width: 520px;
      margin-top: 14px;
    }
    .hx-chat-blank-chip {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: linear-gradient(180deg, var(--hx-surface) 0%, var(--hx-bg-2) 100%);
      border: 1px solid var(--hx-line);
      border-radius: 12px;
      color: var(--hx-text-mid);
      font: inherit;
      font-size: 13px;
      font-weight: 500;
      text-align: left;
      cursor: pointer;
      transition: border-color 0.16s ease, box-shadow 0.18s ease, transform 0.14s ease, color 0.14s ease;
      box-shadow: var(--hx-shadow-xs);
    }
    .hx-chat-blank-chip:hover {
      border-color: var(--hx-line-strong);
      color: var(--hx-text);
      transform: translateY(-1px);
      box-shadow: var(--hx-shadow-sm);
    }
    .hx-chat-blank-chip svg {
      width: 14px; height: 14px;
      flex-shrink: 0;
      color: var(--hx-yellow-deep);
    }
    .hx-chat-blank-chip span { flex: 1; min-width: 0; }
    .hx-chat-blank-mark {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 1px solid var(--hx-line);
      display: inline-flex; align-items: center; justify-content: center;
      background: linear-gradient(180deg, var(--hx-surface) 0%, var(--hx-bg-2) 100%);
      color: var(--hx-yellow, var(--hx-text));
      box-shadow:
        inset 0 1px 0 color-mix(in srgb, #fff 60%, transparent),
        0 4px 14px -4px color-mix(in srgb, var(--hx-yellow, #000) 30%, transparent),
        var(--hx-shadow-xs);
      position: relative;
    }
    .hx-chat-blank-mark::before {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 1px solid color-mix(in srgb, var(--hx-yellow, var(--hx-line)) 25%, transparent);
      animation: hx-mark-ring 3.4s ease-out infinite;
    }
    @keyframes hx-mark-ring {
      0%   { transform: scale(0.92); opacity: 0; }
      40%  { opacity: 0.6; }
      100% { transform: scale(1.4);  opacity: 0; }
    }
    .hx-chat-blank-mark::after {
      content: '';
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--hx-yellow, var(--hx-text));
      box-shadow:
        0 0 0 3px var(--hx-yellow-soft, transparent),
        0 0 14px color-mix(in srgb, var(--hx-yellow, var(--hx-text)) 80%, transparent);
    }

    /* Composer */
    .hx-chat-compose {
      border-top: 1px solid var(--hx-line-soft, var(--hx-line));
      background: linear-gradient(180deg, color-mix(in srgb, var(--hx-surface) 70%, transparent) 0%, var(--hx-surface) 30%);
      padding: 16px 24px 20px;
      position: relative;
    }
    .hx-chat-compose::before {
      content: '';
      position: absolute; left: 0; right: 0; top: -24px; height: 24px;
      background: linear-gradient(180deg, transparent 0%, var(--hx-bg) 100%);
      pointer-events: none;
    }
    .hx-chat-compose-inner {
      max-width: 760px; margin: 0 auto;
      display: flex; flex-direction: column; gap: 10px;
    }
    .hx-chat-input-row {
      display: flex; flex-direction: column; gap: 6px;
      background: linear-gradient(180deg, var(--hx-surface) 0%, color-mix(in srgb, var(--hx-surface) 94%, var(--hx-bg-2)) 100%);
      border: 1px solid var(--hx-line);
      border-radius: 22px;
      padding: 14px 16px 8px;
      transition: border-color 0.16s ease, box-shadow 0.18s ease, transform 0.16s ease;
      box-shadow:
        inset 0 1px 0 color-mix(in srgb, #fff 55%, transparent),
        0 1px 2px rgba(20,18,12,0.04),
        0 12px 32px -16px rgba(20,18,12,0.10);
    }
    .hx-chat-input-row:hover { border-color: var(--hx-line-strong); }
    .hx-chat-input-row:focus-within {
      border-color: color-mix(in srgb, var(--hx-text) 70%, var(--hx-line));
      box-shadow:
        inset 0 1px 0 color-mix(in srgb, #fff 55%, transparent),
        0 0 0 4px color-mix(in srgb, var(--hx-text) 5%, transparent),
        0 12px 36px -14px rgba(20,18,12,0.14);
    }
    /* Inline keyboard hint INSIDE the composer card (Claude.ai pattern) */
    .hx-chat-inline-hint {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      padding: 2px 4px 0;
      font-size: 10.5px;
      letter-spacing: 0.01em;
      color: var(--hx-text-faint);
      user-select: none;
      pointer-events: none;
      transition: opacity 0.18s ease;
    }
    .hx-chat-input-row:not(:focus-within) .hx-chat-inline-hint { opacity: 0.55; }
    .hx-chat-inline-hint .hx-kbd {
      display: inline-flex;
      align-items: center;
      padding: 1px 5px;
      font-family: var(--hx-mono);
      font-size: 9.5px;
      font-weight: 600;
      background: var(--hx-bg-2);
      border: 1px solid var(--hx-line);
      border-radius: 4px;
      color: var(--hx-text-mid);
      margin: 0 2px;
      line-height: 1.4;
    }
    .hx-chat-inline-hint .hx-kbd-plus {
      font-family: var(--hx-mono);
      font-size: 9.5px;
      color: var(--hx-text-faint);
      margin: 0 1px;
    }
    .hx-chat-inline-hint-sep { color: var(--hx-text-faint); opacity: 0.6; }
    @media (max-width: 700px) {
      .hx-chat-inline-hint { display: none; }
    }
    .hx-chat-input-row.is-drag-over {
      border-color: var(--hx-yellow, var(--hx-text));
      box-shadow: 0 0 0 4px var(--hx-yellow-soft, rgba(0,0,0,0.08));
      background: var(--hx-bg-2);
    }

    /* Attachment chips bar (above the textarea, only visible when populated) */
    .hx-chat-attach-bar {
      display: flex; flex-wrap: wrap; gap: 6px;
      margin: 0;
    }
    .hx-chat-attach-bar:empty { display: none; }
    .hx-attach-chip {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--hx-bg-2);
      border: 1px solid var(--hx-line);
      border-radius: var(--hx-r-sm);
      padding: 5px 8px 5px 5px;
      font-size: 12.5px; color: var(--hx-text-mid);
      max-width: 240px;
      position: relative;
    }
    .hx-attach-chip-thumb {
      width: 28px; height: 28px;
      border-radius: 4px;
      background: var(--hx-surface);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
      border: 1px solid var(--hx-line);
    }
    .hx-attach-chip-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .hx-attach-chip-thumb svg { width: 14px; height: 14px; color: var(--hx-text-dim); }
    .hx-attach-chip-name {
      font-weight: 500; color: var(--hx-text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: 150px;
    }
    .hx-attach-chip-meta { color: var(--hx-text-faint); font-size: 11px; }
    .hx-attach-chip-x {
      width: 18px; height: 18px;
      display: inline-flex; align-items: center; justify-content: center;
      background: transparent; border: none; cursor: pointer;
      color: var(--hx-text-dim);
      border-radius: 3px;
      transition: background 0.12s, color 0.12s;
      padding: 0;
    }
    .hx-attach-chip-x:hover { background: var(--hx-line); color: var(--hx-text); }
    .hx-attach-chip-x svg { width: 11px; height: 11px; }
    .hx-attach-chip.is-uploading {
      position: relative;
      overflow: hidden;
    }
    .hx-attach-chip.is-uploading::after {
      content: ''; position: absolute; left: 0; bottom: 0; height: 2px;
      width: 100%;
      background: linear-gradient(90deg, transparent, var(--hx-text), transparent);
      background-size: 200% 100%;
      animation: hx-attach-progress 1.2s linear infinite;
    }
    @keyframes hx-attach-progress {
      0%   { background-position: 100% 0; }
      100% { background-position: -100% 0; }
    }
    .hx-attach-chip.is-error {
      border-color: rgba(220, 38, 38, 0.3);
      background: var(--hx-red-soft);
      color: var(--hx-red);
    }

    /* Bottom row of the composer: attach + textarea + mic + send */
    .hx-chat-input-bar {
      display: flex; align-items: flex-end; gap: 6px;
    }
    .hx-chat-textarea {
      flex: 1;
      border: none; outline: none;
      background: transparent;
      resize: none;
      font: inherit; font-size: 15px; line-height: 1.55;
      color: var(--hx-text);
      max-height: 240px; min-height: 28px;
      padding: 8px 4px;
      letter-spacing: -0.005em;
    }
    .hx-chat-textarea::placeholder {
      color: var(--hx-text-faint);
      font-style: normal;
    }

    /* Round icon buttons inside the composer (attach + mic) */
    .hx-chat-tool-btn {
      width: 32px; height: 32px;
      flex-shrink: 0;
      display: inline-flex; align-items: center; justify-content: center;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 8px;
      color: var(--hx-text-mid);
      cursor: pointer;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
      padding: 0;
    }
    .hx-chat-tool-btn:hover { background: var(--hx-bg-2); color: var(--hx-text); border-color: var(--hx-line); }
    .hx-chat-tool-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .hx-chat-tool-btn svg { width: 16px; height: 16px; }
    .hx-chat-tool-btn.is-active {
      background: var(--hx-text); color: var(--hx-bg); border-color: var(--hx-text);
    }
    /* Agent mode button — premium pill that announces the highest-level
       capability of the chat. When on, Helix plans and executes
       autonomously, calling web_search + code_execution as needed. */
    .hx-chat-agent-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 32px;
      padding: 0 10px;
      background: linear-gradient(180deg, var(--hx-surface) 0%, var(--hx-bg-2) 100%);
      border: 1px solid var(--hx-line);
      border-radius: 999px;
      color: var(--hx-text-mid);
      cursor: pointer;
      font: inherit;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: -0.005em;
      flex-shrink: 0;
      transition: background 0.16s ease, border-color 0.16s ease, color 0.16s ease, box-shadow 0.18s ease, transform 0.14s ease;
      box-shadow: var(--hx-shadow-xs);
      position: relative;
    }
    .hx-chat-agent-btn:hover {
      border-color: var(--hx-line-strong);
      color: var(--hx-text);
      box-shadow: var(--hx-shadow-sm);
    }
    .hx-chat-agent-btn:active { transform: scale(0.97); }
    .hx-chat-agent-btn svg { width: 14px; height: 14px; flex-shrink: 0; }
    .hx-chat-agent-label { font-weight: 600; }
    .hx-chat-agent-btn[aria-pressed="true"] {
      background: linear-gradient(135deg,
        color-mix(in srgb, var(--hx-yellow) 22%, var(--hx-surface)) 0%,
        color-mix(in srgb, var(--hx-yellow-soft) 90%, var(--hx-surface)) 100%);
      color: var(--hx-yellow-deep);
      border-color: color-mix(in srgb, var(--hx-yellow) 50%, var(--hx-line));
      box-shadow:
        inset 0 1px 0 color-mix(in srgb, #fff 55%, transparent),
        0 0 0 3px color-mix(in srgb, var(--hx-yellow) 14%, transparent),
        0 4px 14px -6px color-mix(in srgb, var(--hx-yellow) 50%, transparent);
    }
    .hx-chat-agent-btn[aria-pressed="true"] svg {
      animation: hx-agent-spark 2.4s ease-in-out infinite;
    }
    @keyframes hx-agent-spark {
      0%, 100% { transform: rotate(0deg) scale(1); }
      50%      { transform: rotate(10deg) scale(1.08); }
    }
    @media (max-width: 700px) {
      .hx-chat-agent-label { display: none; }
      .hx-chat-agent-btn { padding: 0; width: 32px; justify-content: center; }
    }

    /* Agent badge in the toolbar — visible while Agent mode is active so
       the user always knows they're talking to an autonomous Helix. */
    .hx-chat-agent-toolbar-badge {
      display: none;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      font-family: var(--hx-mono);
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--hx-yellow-deep);
      background: var(--hx-yellow-soft);
      border: 1px solid color-mix(in srgb, var(--hx-yellow) 35%, var(--hx-line));
      border-radius: 999px;
      box-shadow: inset 0 1px 0 color-mix(in srgb, #fff 50%, transparent);
    }
    .hx-chat-agent-toolbar-badge.is-on { display: inline-flex; }
    .hx-chat-agent-toolbar-badge::before {
      content: '';
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--hx-yellow-deep);
      box-shadow: 0 0 8px color-mix(in srgb, var(--hx-yellow) 60%, transparent);
      animation: hx-agent-dot 1.6s ease-in-out infinite;
    }
    @keyframes hx-agent-dot {
      0%, 100% { opacity: 0.6; }
      50%      { opacity: 1; }
    }

    /* Markdown task list rendering — Helix uses "- [ ]" / "- [x]" to
       show its plan and execution progress. We render those as visual
       checkboxes that tick in real time as the model streams. */
    .hx-md-checklist {
      list-style: none;
      padding: 6px 0;
      margin: 10px 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .hx-md-check-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 6px 10px;
      border-radius: 8px;
      transition: background 0.18s ease;
    }
    .hx-md-check-item.is-done {
      background: color-mix(in srgb, var(--hx-yellow-soft) 50%, transparent);
    }
    .hx-md-check-box {
      width: 16px; height: 16px;
      border-radius: 5px;
      border: 1.5px solid var(--hx-line-strong);
      flex-shrink: 0;
      margin-top: 3px;
      position: relative;
      transition: background 0.18s ease, border-color 0.18s ease;
    }
    .hx-md-check-item.is-done .hx-md-check-box {
      background: var(--hx-yellow-deep);
      border-color: var(--hx-yellow-deep);
    }
    .hx-md-check-item.is-done .hx-md-check-box::after {
      content: '';
      position: absolute;
      left: 3px; top: 6px;
      width: 7px; height: 3px;
      border-left: 1.5px solid #fff;
      border-bottom: 1.5px solid #fff;
      transform: rotate(-45deg);
    }
    .hx-md-check-label {
      flex: 1;
      color: var(--hx-text);
      line-height: 1.5;
    }
    .hx-md-check-item.is-done .hx-md-check-label {
      color: var(--hx-text-mid);
      text-decoration: line-through;
      text-decoration-color: color-mix(in srgb, var(--hx-text-mid) 40%, transparent);
      text-decoration-thickness: 1px;
    }

    /* Consolidated Tools popover — declutters the composer by hiding
       web_search + code_execution behind a single elegant menu. */
    .hx-chat-tools-wrap { position: relative; flex-shrink: 0; }
    #hx-c-tools-btn { position: relative; }
    #hx-c-tools-btn[aria-expanded="true"] {
      background: var(--hx-bg-2);
      color: var(--hx-text);
      border-color: var(--hx-line);
    }
    #hx-c-tools-btn.has-active {
      color: var(--hx-yellow-deep);
    }
    .hx-chat-tools-count {
      position: absolute;
      top: -2px; right: -2px;
      min-width: 14px; height: 14px;
      padding: 0 4px;
      border-radius: 7px;
      background: var(--hx-yellow);
      color: var(--hx-bg);
      font: 700 9px/14px var(--hx-mono);
      text-align: center;
      box-shadow: 0 0 0 2px var(--hx-surface);
    }
    .hx-chat-tools-menu {
      position: absolute;
      bottom: calc(100% + 10px);
      left: -8px;
      min-width: 280px;
      padding: 6px;
      background: var(--hx-surface);
      border: 1px solid var(--hx-line);
      border-radius: 14px;
      box-shadow:
        inset 0 1px 0 color-mix(in srgb, #fff 55%, transparent),
        0 18px 38px -12px rgba(20,18,12,0.18),
        0 4px 10px rgba(20,18,12,0.05);
      z-index: 20;
      animation: hx-tools-in 0.18s cubic-bezier(0.2, 0.7, 0.2, 1) both;
    }
    .hx-chat-tools-menu[hidden] { display: none; }
    @keyframes hx-tools-in {
      from { opacity: 0; transform: translateY(6px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .hx-chat-tools-item {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 10px 12px;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 10px;
      cursor: pointer;
      font: inherit;
      color: var(--hx-text);
      text-align: left;
      transition: background 0.14s ease, border-color 0.14s ease;
    }
    .hx-chat-tools-item:hover { background: var(--hx-bg-2); }
    .hx-chat-tools-item[aria-checked="true"] {
      background: linear-gradient(180deg, var(--hx-yellow-soft) 0%, transparent 100%);
      border-color: color-mix(in srgb, var(--hx-yellow) 22%, var(--hx-line));
    }
    .hx-chat-tools-ico {
      width: 32px; height: 32px;
      display: inline-flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      background: var(--hx-bg-2);
      border: 1px solid var(--hx-line);
      border-radius: 9px;
      color: var(--hx-text-mid);
    }
    .hx-chat-tools-item[aria-checked="true"] .hx-chat-tools-ico {
      background: var(--hx-yellow-soft);
      color: var(--hx-yellow-deep);
      border-color: color-mix(in srgb, var(--hx-yellow) 35%, var(--hx-line));
    }
    .hx-chat-tools-ico svg { width: 15px; height: 15px; }
    .hx-chat-tools-body { display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 0; }
    .hx-chat-tools-title { font-size: 13px; font-weight: 600; color: var(--hx-text); }
    .hx-chat-tools-desc  { font-size: 11.5px; color: var(--hx-text-dim); }
    .hx-chat-tools-check {
      width: 14px; height: 14px;
      border-radius: 50%;
      border: 1.5px solid var(--hx-line);
      flex-shrink: 0;
      position: relative;
      transition: border-color 0.14s ease, background 0.14s ease;
    }
    .hx-chat-tools-item[aria-checked="true"] .hx-chat-tools-check {
      background: var(--hx-yellow-deep);
      border-color: var(--hx-yellow-deep);
    }
    .hx-chat-tools-item[aria-checked="true"] .hx-chat-tools-check::after {
      content: '';
      position: absolute;
      left: 3px; top: 5px;
      width: 6px; height: 3px;
      border-left: 1.5px solid #fff;
      border-bottom: 1.5px solid #fff;
      transform: rotate(-45deg);
    }
    .hx-chat-tool-btn.is-active::before {
      content: ''; position: absolute; width: 32px; height: 32px;
      border-radius: 8px;
      box-shadow: 0 0 0 0 rgba(0,0,0,0.0);
      animation: hx-mic-pulse 1.6s ease-out infinite;
      pointer-events: none;
    }
    @keyframes hx-mic-pulse {
      0%   { box-shadow: 0 0 0 0 rgba(0,0,0,0.4); }
      100% { box-shadow: 0 0 0 8px rgba(0,0,0,0.0); }
    }

    /* Attachments rendered inside a message bubble */
    .hx-msg-attachments {
      display: flex; flex-wrap: wrap; gap: 8px;
      margin-bottom: 8px;
    }
    .hx-msg-attach-img {
      max-width: min(320px, 100%);
      max-height: 240px;
      border-radius: var(--hx-r-sm);
      border: 1px solid var(--hx-line);
      background: var(--hx-bg-2);
      cursor: zoom-in;
      display: block;
    }
    .hx-msg-attach-file {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 10px;
      background: var(--hx-bg-2);
      border: 1px solid var(--hx-line);
      border-radius: var(--hx-r-sm);
      font-size: 13px;
      color: var(--hx-text);
      text-decoration: none;
      max-width: 280px;
    }
    .hx-msg-attach-file:hover { background: var(--hx-surface); }
    .hx-msg-attach-file svg { width: 14px; height: 14px; color: var(--hx-text-mid); flex-shrink: 0; }
    .hx-msg-attach-file .hx-msg-attach-name {
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .hx-msg-attach-file .hx-msg-attach-meta { color: var(--hx-text-dim); font-size: 11.5px; }
    .hx-chat-send {
      width: 36px; height: 36px;
      display: inline-flex; align-items: center; justify-content: center;
      background: linear-gradient(180deg,
        color-mix(in srgb, var(--hx-text) 100%, transparent) 0%,
        color-mix(in srgb, var(--hx-text) 88%, transparent) 100%);
      color: var(--hx-bg);
      border: 1px solid var(--hx-text);
      border-radius: 11px;
      cursor: pointer; flex-shrink: 0;
      transition: transform 0.14s ease, box-shadow 0.18s ease, background 0.14s ease, opacity 0.14s ease;
      box-shadow:
        inset 0 1px 0 color-mix(in srgb, #fff 18%, transparent),
        0 1px 2px rgba(0,0,0,0.10),
        0 6px 14px -6px rgba(0,0,0,0.20);
      position: relative;
    }
    .hx-chat-send:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow:
        inset 0 1px 0 color-mix(in srgb, #fff 22%, transparent),
        0 2px 4px rgba(0,0,0,0.12),
        0 10px 22px -8px rgba(0,0,0,0.28),
        0 0 0 4px color-mix(in srgb, var(--hx-text) 8%, transparent);
    }
    .hx-chat-send:active:not(:disabled) { transform: translateY(0); }
    .hx-chat-send:disabled { opacity: 0.32; cursor: not-allowed; box-shadow: none; }
    .hx-chat-send svg { width: 15px; height: 15px; }

    .hx-chat-foot {
      display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
      font-size: 11px; color: var(--hx-text-dim);
      padding: 2px 6px 0;
      letter-spacing: 0.02em;
    }
    .hx-chat-foot .hx-mono { font-size: 11px; }
    .hx-chat-foot a { color: var(--hx-text); border-bottom: 1px solid transparent; padding-bottom: 1px; }
