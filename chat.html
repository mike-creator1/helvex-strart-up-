<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat — HelveX</title>
  <meta name="description" content="HelveX chat — your real AI workspace." />
  <link rel="icon" type="image/png" href="/helvex-logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://yjmpallrtpeinpdilptj.supabase.co" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/platform.css" />
  <style>
    /* The chat workspace replaces the standard .hx-main scroll with its
       own column-flex layout so the composer stays pinned. */
    body[data-active="chat"] .hx-main {
      padding: 0;
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      height: calc(100vh - var(--hx-topbar-h));
      min-height: 0;
    }
    @media (max-width: 900px) {
      body[data-active="chat"] .hx-main { grid-template-columns: 1fr; }
      .hx-chat-rail { display: none; }
    }

    /* Left rail — conversation list */
    .hx-chat-rail {
      border-right: 1px solid var(--hx-line);
      background: linear-gradient(180deg, var(--hx-surface) 0%, var(--hx-surface-2, var(--hx-surface)) 100%);
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
      position: relative;
    }
    .hx-chat-rail::after {
      content: '';
      position: absolute; top: 0; right: -1px; bottom: 0; width: 1px;
      background: linear-gradient(180deg, transparent 0%, var(--hx-line) 18%, var(--hx-line) 82%, transparent 100%);
      pointer-events: none;
    }
    .hx-chat-rail-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 18px 16px 14px;
      border-bottom: 1px solid var(--hx-line-soft, var(--hx-line));
    }
    .hx-chat-rail-title {
      font-size: 10.5px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--hx-text-dim);
      margin: 0;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .hx-chat-rail-title::before {
      content: '';
      width: 4px; height: 4px; border-radius: 50%;
      background: var(--hx-yellow, var(--hx-text));
      box-shadow: 0 0 0 3px var(--hx-yellow-soft, transparent);
    }
    .hx-chat-new {
      width: 28px; height: 28px;
      display: inline-flex; align-items: center; justify-content: center;
      background: var(--hx-text); color: var(--hx-bg);
      border: 1px solid var(--hx-text);
      border-radius: var(--hx-r-sm);
      cursor: pointer;
      box-shadow: var(--hx-shadow-xs);
      transition: transform 0.14s ease, box-shadow 0.14s ease, background 0.14s ease;
    }
    .hx-chat-new:hover {
      background: var(--hx-text-mid);
      border-color: var(--hx-text-mid);
      transform: translateY(-1px);
      box-shadow: var(--hx-shadow-sm);
    }
    .hx-chat-new:active { transform: translateY(0); }
    .hx-chat-new svg { width: 13px; height: 13px; }

    .hx-chat-list {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 8px 8px 14px;
    }
    .hx-chat-list::-webkit-scrollbar { width: 8px; }
    .hx-chat-list::-webkit-scrollbar-thumb { background: transparent; border-radius: 8px; }
    .hx-chat-list:hover::-webkit-scrollbar-thumb { background: var(--hx-line-strong); }

    .hx-chat-item {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 3px;
      padding: 10px 12px 10px 14px;
      border-radius: var(--hx-r);
      cursor: pointer;
      transition: background 0.14s ease, border-color 0.14s ease, transform 0.14s ease;
      border: 1px solid transparent;
    }
    .hx-chat-item::before {
      content: '';
      position: absolute;
      left: 4px; top: 50%;
      transform: translateY(-50%) scaleY(0.4);
      width: 2px; height: 56%;
      background: linear-gradient(180deg,
        color-mix(in srgb, var(--hx-yellow, var(--hx-text)) 0%, transparent) 0%,
        var(--hx-yellow, var(--hx-text)) 50%,
        color-mix(in srgb, var(--hx-yellow, var(--hx-text)) 0%, transparent) 100%);
      border-radius: 2px;
      opacity: 0;
      transition: opacity 0.16s ease, transform 0.18s cubic-bezier(0.2, 0.7, 0.3, 1);
      box-shadow: 0 0 6px color-mix(in srgb, var(--hx-yellow, var(--hx-text)) 50%, transparent);
    }
    .hx-chat-item:hover {
      background: var(--hx-bg-2);
    }
    .hx-chat-item.is-active {
      background: linear-gradient(180deg, var(--hx-bg-2) 0%, color-mix(in srgb, var(--hx-bg-2) 70%, var(--hx-surface)) 100%);
      border-color: var(--hx-line);
      box-shadow:
        inset 0 1px 0 color-mix(in srgb, #fff 50%, transparent),
        var(--hx-shadow-xs);
    }
    .hx-chat-item.is-active::before {
      opacity: 1;
      transform: translateY(-50%) scaleY(1);
    }
    .hx-chat-item.is-active .hx-chat-item-title { font-weight: 600; }
    .hx-chat-item-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--hx-text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: -0.005em;
    }
    .hx-chat-item-meta {
      font-size: 10.5px;
      color: var(--hx-text-dim);
      display: flex;
      align-items: center;
      gap: 8px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 500;
    }
    .hx-chat-item-meta .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--hx-text-faint); }

    .hx-chat-empty-list {
      padding: 28px 18px;
      text-align: center;
      color: var(--hx-text-dim);
      font-size: 12.5px;
      line-height: 1.55;
    }

    /* Right pane — thread + composer */
    .hx-chat-pane {
      display: flex;
      flex-direction: column;
      min-height: 0;
      background: var(--hx-bg);
      position: relative;
    }
    .hx-chat-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 22px;
      border-bottom: 1px solid var(--hx-line-soft, var(--hx-line));
      background: linear-gradient(180deg, var(--hx-surface) 0%, color-mix(in srgb, var(--hx-surface) 92%, transparent) 100%);
      backdrop-filter: saturate(140%);
      flex-wrap: wrap;
      position: relative;
      z-index: 2;
    }
    .hx-chat-toolbar::after {
      content: '';
      position: absolute; left: 0; right: 0; bottom: -1px; height: 1px;
      background: linear-gradient(90deg, transparent 0%, var(--hx-line) 14%, var(--hx-line) 86%, transparent 100%);
      pointer-events: none;
    }
    .hx-chat-title {
      font-family: 'Instrument Serif', Georgia, serif;
      font-style: italic;
      font-size: 23px;
      letter-spacing: -0.018em;
      font-weight: 400;
      color: var(--hx-text);
      margin: 0 auto 0 0;
      max-width: 52%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding-left: 4px;
      line-height: 1.1;
      position: relative;
    }
    .hx-chat-title::before {
      content: '';
      position: absolute;
      left: -8px; top: 50%;
      transform: translateY(-50%);
      width: 2px; height: 60%;
      background: linear-gradient(180deg, transparent 0%, var(--hx-yellow, var(--hx-text)) 50%, transparent 100%);
      opacity: 0.7;
    }
    .hx-chat-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      height: 30px;
      padding: 0 4px 0 10px;
      background: var(--hx-bg-2);
      border: 1px solid var(--hx-line);
      border-radius: 999px;
      color: var(--hx-text);
      font-size: 12.5px;
      font-family: inherit;
      cursor: pointer;
      transition: border-color 0.14s ease, background 0.14s ease, box-shadow 0.14s ease;
    }
    .hx-chat-pill:hover {
      border-color: var(--hx-line-strong);
      background: var(--hx-surface);
      box-shadow: var(--hx-shadow-xs);
    }
    .hx-chat-pill > span:first-child {
      color: var(--hx-text-dim) !important;
      font-size: 10px !important;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      padding-right: 8px;
      border-right: 1px solid var(--hx-line);
      margin-right: 4px;
      line-height: 1;
    }
    .hx-chat-pill svg { width: 10px; height: 10px; opacity: 0.55; margin-right: 6px; }
    .hx-chat-pill select {
      border: none; background: transparent; font-size: 12.5px; font-family: inherit;
      color: var(--hx-text); padding: 0; outline: none; cursor: pointer;
      font-weight: 500;
    }
    /* Trash pill (no select inside) — match capsule shape */
    button.hx-chat-pill {
      padding: 0 12px;
      gap: 6px;
      color: var(--hx-text-mid);
      font-weight: 500;
    }
    button.hx-chat-pill:hover { color: var(--hx-red); border-color: rgba(220,38,38,0.3); background: var(--hx-red-soft); }
    button.hx-chat-pill svg { width: 12px; height: 12px; margin-right: 0; opacity: 0.75; }

    /* Premium credit balance — small mono badge with halo on the gold dot */
    .hx-chat-balance {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      height: 30px;
      padding: 0 13px;
      background: linear-gradient(180deg, var(--hx-bg-2) 0%, color-mix(in srgb, var(--hx-bg-2) 70%, var(--hx-surface)) 100%);
      border: 1px solid var(--hx-line);
      border-radius: 999px;
      font-family: var(--hx-mono);
      font-size: 11px;
      color: var(--hx-text);
      font-weight: 600;
      letter-spacing: 0.03em;
      box-shadow: inset 0 1px 0 color-mix(in srgb, #fff 70%, transparent), var(--hx-shadow-xs);
    }
    .hx-chat-balance::before {
      content: '';
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--hx-yellow, var(--hx-text));
      box-shadow:
        0 0 0 2px var(--hx-yellow-soft, transparent),
        0 0 8px color-mix(in srgb, var(--hx-yellow, var(--hx-text)) 60%, transparent);
      animation: hx-balance-pulse 2.8s ease-in-out infinite;
    }
    @keyframes hx-balance-pulse {
      0%, 100% { box-shadow: 0 0 0 2px var(--hx-yellow-soft, transparent), 0 0 6px color-mix(in srgb, var(--hx-yellow, var(--hx-text)) 50%, transparent); }
      50%      { box-shadow: 0 0 0 3px var(--hx-yellow-soft, transparent), 0 0 12px color-mix(in srgb, var(--hx-yellow, var(--hx-text)) 75%, transparent); }
    }
    .hx-chat-balance.is-empty { color: var(--hx-text-faint); }
    .hx-chat-balance.is-empty::before { animation: none; box-shadow: none; opacity: 0.4; }

    /* Thread */
    .hx-chat-thread {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 36px 0 28px;
      scroll-behavior: smooth;
    }
    .hx-chat-thread::-webkit-scrollbar { width: 10px; }
    .hx-chat-thread::-webkit-scrollbar-thumb { background: transparent; border: 3px solid transparent; background-clip: padding-box; border-radius: 8px; }
    .hx-chat-thread:hover::-webkit-scrollbar-thumb { background: var(--hx-line-strong); background-clip: padding-box; }
    .hx-chat-thread-inner {
      max-width: 740px;
      margin: 0 auto;
      padding: 0 28px;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }
    .hx-msg { display: flex; flex-direction: column; gap: 6px; }
    /* Avatars are intentionally not rendered. Premium chats keep the
       speaker identity to a single faint label and let the prose breathe. */
    .hx-msg-avatar { display: none; }
    .hx-msg-body { min-width: 0; width: 100%; }
    .hx-msg-meta {
      font-size: 10px; color: var(--hx-text-faint);
      letter-spacing: 0.22em; text-transform: uppercase;
      margin-bottom: 10px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }
    .hx-msg.is-assistant .hx-msg-meta {
      color: var(--hx-text);
    }
    .hx-msg.is-assistant .hx-msg-meta::before {
      content: '';
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--hx-yellow, var(--hx-text));
      box-shadow:
        0 0 0 3px var(--hx-yellow-soft, transparent),
        0 0 8px color-mix(in srgb, var(--hx-yellow, var(--hx-text)) 55%, transparent);
    }
    .hx-msg.is-assistant .hx-msg-meta::after {
      content: '';
      flex: 0 0 56px;
      height: 1px;
      background: linear-gradient(90deg, var(--hx-line-strong) 0%, transparent 100%);
    }
    .hx-msg-meta strong { font-weight: 700; color: inherit; letter-spacing: 0.24em; }
    .hx-msg-content {
      font-size: 15px; line-height: 1.72; color: var(--hx-text);
      white-space: pre-wrap; word-wrap: break-word;
      letter-spacing: -0.003em;
    }
    /* User turns sit in a refined chip; assistant turns are flush editorial prose. */
    .hx-msg.is-user { align-items: flex-end; }
    .hx-msg.is-user .hx-msg-content {
      background: linear-gradient(180deg,
        color-mix(in srgb, var(--hx-bg-2) 60%, var(--hx-surface)) 0%,
        var(--hx-bg-2) 100%);
      border: 1px solid var(--hx-line);
      border-radius: 16px;
      border-bottom-right-radius: 5px;
      padding: 12px 16px;
      font-size: 14px; line-height: 1.62;
      max-width: 78%;
      box-shadow:
        inset 0 1px 0 color-mix(in srgb, #fff 60%, transparent),
        0 1px 2px rgba(0,0,0,0.04),
        0 6px 16px -6px rgba(0,0,0,0.08);
    }
    .hx-msg.is-user .hx-msg-meta {
      letter-spacing: 0.24em;
      color: var(--hx-text-faint);
    }
    .hx-msg-actions {
      display: flex; align-items: center; gap: 4px;
      margin-top: 8px;
      opacity: 0;
      transition: opacity 0.12s;
    }
    .hx-msg:hover .hx-msg-actions { opacity: 1; }
    .hx-msg-act {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 8px;
      font-size: 11.5px; font-weight: 500;
      color: var(--hx-text-mid);
      background: transparent; border: 1px solid transparent;
      border-radius: 4px;
      cursor: pointer; font-family: inherit;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
    }
    .hx-msg-act:hover { background: var(--hx-bg-2); color: var(--hx-text); border-color: var(--hx-line); }
    .hx-msg-act svg { width: 11px; height: 11px; }

    .hx-msg-error .hx-msg-content {
      color: var(--hx-red);
      background: var(--hx-red-soft);
      border: 1px solid rgba(220, 38, 38, 0.22);
      border-radius: var(--hx-r-sm);
      padding: 10px 12px;
      font-size: 13px;
    }

    /* Typing indicator */
    .hx-typing {
      display: inline-flex; gap: 4px; align-items: center;
      padding: 6px 0;
    }
    .hx-typing span {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--hx-text-faint);
      animation: hx-typing-bounce 1.2s infinite;
    }
    .hx-typing span:nth-child(2) { animation-delay: 0.15s; }
    .hx-typing span:nth-child(3) { animation-delay: 0.30s; }
    @keyframes hx-typing-bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.3; }
      30%           { transform: translateY(-4px); opacity: 1; }
    }

    /* Empty state — editorial welcome */
    .hx-chat-blank {
      flex: 1; min-height: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 56px 24px;
      text-align: center;
      color: var(--hx-text-mid);
      gap: 14px;
    }
    .hx-chat-blank-eyebrow {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--hx-text-dim);
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }
    .hx-chat-blank-eyebrow::before,
    .hx-chat-blank-eyebrow::after {
      content: '';
      width: 22px; height: 1px;
      background: linear-gradient(90deg, transparent 0%, var(--hx-line-strong) 100%);
    }
    .hx-chat-blank-eyebrow::after {
      background: linear-gradient(90deg, var(--hx-line-strong) 0%, transparent 100%);
    }
    .hx-chat-blank h2 {
      font-family: 'Instrument Serif', Georgia, serif;
      font-style: italic; font-size: 56px;
      letter-spacing: -0.028em;
      color: var(--hx-text);
      margin: 0;
      line-height: 0.96;
    }
    .hx-chat-blank h2::after {
      content: '.';
      color: var(--hx-yellow, var(--hx-text));
      margin-left: 2px;
    }
    .hx-chat-blank p {
      font-size: 14px;
      max-width: 440px;
      line-height: 1.65;
      margin: 0;
      color: var(--hx-text-mid);
    }
    .hx-chat-blank p strong { color: var(--hx-text); font-weight: 600; }
    .hx-chat-blank-mark {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 1px solid var(--hx-line);
      display: inline-flex; align-items: center; justify-content: center;
      background: linear-gradient(180deg, var(--hx-surface) 0%, var(--hx-bg-2) 100%);
      color: var(--hx-yellow, var(--hx-text));
      box-shadow:
        inset 0 1px 0 color-mix(in srgb, #fff 50%, transparent),
        var(--hx-shadow-xs);
      position: relative;
    }
    .hx-chat-blank-mark::after {
      content: '';
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--hx-yellow, var(--hx-text));
      box-shadow:
        0 0 0 3px var(--hx-yellow-soft, transparent),
        0 0 10px color-mix(in srgb, var(--hx-yellow, var(--hx-text)) 70%, transparent);
    }

    /* Composer */
    .hx-chat-compose {
      border-top: 1px solid var(--hx-line-soft, var(--hx-line));
      background: linear-gradient(180deg, color-mix(in srgb, var(--hx-surface) 70%, transparent) 0%, var(--hx-surface) 30%);
      padding: 16px 24px 20px;
      position: relative;
    }
    .hx-chat-compose::before {
      content: '';
      position: absolute; left: 0; right: 0; top: -24px; height: 24px;
      background: linear-gradient(180deg, transparent 0%, var(--hx-bg) 100%);
      pointer-events: none;
    }
    .hx-chat-compose-inner {
      max-width: 760px; margin: 0 auto;
      display: flex; flex-direction: column; gap: 10px;
    }
    .hx-chat-input-row {
      display: flex; flex-direction: column; gap: 8px;
      background: linear-gradient(180deg, var(--hx-surface) 0%, color-mix(in srgb, var(--hx-surface) 92%, var(--hx-bg-2)) 100%);
      border: 1px solid var(--hx-line);
      border-radius: 18px;
      padding: 11px 13px;
      transition: border-color 0.16s ease, box-shadow 0.18s ease, transform 0.16s ease;
      box-shadow:
        inset 0 1px 0 color-mix(in srgb, #fff 55%, transparent),
        var(--hx-shadow-xs);
    }
    .hx-chat-input-row:hover { border-color: var(--hx-line-strong); }
    .hx-chat-input-row:focus-within {
      border-color: var(--hx-text);
      box-shadow:
        inset 0 1px 0 color-mix(in srgb, #fff 55%, transparent),
        0 0 0 4px color-mix(in srgb, var(--hx-text) 7%, transparent),
        var(--hx-shadow-sm);
    }
    .hx-chat-input-row.is-drag-over {
      border-color: var(--hx-yellow, var(--hx-text));
      box-shadow: 0 0 0 4px var(--hx-yellow-soft, rgba(0,0,0,0.08));
      background: var(--hx-bg-2);
    }

    /* Attachment chips bar (above the textarea, only visible when populated) */
    .hx-chat-attach-bar {
      display: flex; flex-wrap: wrap; gap: 6px;
      margin: 0;
    }
    .hx-chat-attach-bar:empty { display: none; }
    .hx-attach-chip {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--hx-bg-2);
      border: 1px solid var(--hx-line);
      border-radius: var(--hx-r-sm);
      padding: 5px 8px 5px 5px;
      font-size: 12.5px; color: var(--hx-text-mid);
      max-width: 240px;
      position: relative;
    }
    .hx-attach-chip-thumb {
      width: 28px; height: 28px;
      border-radius: 4px;
      background: var(--hx-surface);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
      border: 1px solid var(--hx-line);
    }
    .hx-attach-chip-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .hx-attach-chip-thumb svg { width: 14px; height: 14px; color: var(--hx-text-dim); }
    .hx-attach-chip-name {
      font-weight: 500; color: var(--hx-text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: 150px;
    }
    .hx-attach-chip-meta { color: var(--hx-text-faint); font-size: 11px; }
    .hx-attach-chip-x {
      width: 18px; height: 18px;
      display: inline-flex; align-items: center; justify-content: center;
      background: transparent; border: none; cursor: pointer;
      color: var(--hx-text-dim);
      border-radius: 3px;
      transition: background 0.12s, color 0.12s;
      padding: 0;
    }
    .hx-attach-chip-x:hover { background: var(--hx-line); color: var(--hx-text); }
    .hx-attach-chip-x svg { width: 11px; height: 11px; }
    .hx-attach-chip.is-uploading {
      position: relative;
      overflow: hidden;
    }
    .hx-attach-chip.is-uploading::after {
      content: ''; position: absolute; left: 0; bottom: 0; height: 2px;
      width: 100%;
      background: linear-gradient(90deg, transparent, var(--hx-text), transparent);
      background-size: 200% 100%;
      animation: hx-attach-progress 1.2s linear infinite;
    }
    @keyframes hx-attach-progress {
      0%   { background-position: 100% 0; }
      100% { background-position: -100% 0; }
    }
    .hx-attach-chip.is-error {
      border-color: rgba(220, 38, 38, 0.3);
      background: var(--hx-red-soft);
      color: var(--hx-red);
    }

    /* Bottom row of the composer: attach + textarea + mic + send */
    .hx-chat-input-bar {
      display: flex; align-items: flex-end; gap: 6px;
    }
    .hx-chat-textarea {
      flex: 1;
      border: none; outline: none;
      background: transparent;
      resize: none;
      font: inherit; font-size: 14px; line-height: 1.55;
      color: var(--hx-text);
      max-height: 200px; min-height: 22px;
      padding: 6px 0;
    }
    .hx-chat-textarea::placeholder { color: var(--hx-text-faint); }

    /* Round icon buttons inside the composer (attach + mic) */
    .hx-chat-tool-btn {
      width: 32px; height: 32px;
      flex-shrink: 0;
      display: inline-flex; align-items: center; justify-content: center;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 8px;
      color: var(--hx-text-mid);
      cursor: pointer;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
      padding: 0;
    }
    .hx-chat-tool-btn:hover { background: var(--hx-bg-2); color: var(--hx-text); border-color: var(--hx-line); }
    .hx-chat-tool-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .hx-chat-tool-btn svg { width: 16px; height: 16px; }
    .hx-chat-tool-btn.is-active {
      background: var(--hx-text); color: var(--hx-bg); border-color: var(--hx-text);
    }
    .hx-chat-tool-btn.is-active::before {
      content: ''; position: absolute; width: 32px; height: 32px;
      border-radius: 8px;
      box-shadow: 0 0 0 0 rgba(0,0,0,0.0);
      animation: hx-mic-pulse 1.6s ease-out infinite;
      pointer-events: none;
    }
    @keyframes hx-mic-pulse {
      0%   { box-shadow: 0 0 0 0 rgba(0,0,0,0.4); }
      100% { box-shadow: 0 0 0 8px rgba(0,0,0,0.0); }
    }

    /* Attachments rendered inside a message bubble */
    .hx-msg-attachments {
      display: flex; flex-wrap: wrap; gap: 8px;
      margin-bottom: 8px;
    }
    .hx-msg-attach-img {
      max-width: min(320px, 100%);
      max-height: 240px;
      border-radius: var(--hx-r-sm);
      border: 1px solid var(--hx-line);
      background: var(--hx-bg-2);
      cursor: zoom-in;
      display: block;
    }
    .hx-msg-attach-file {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 10px;
      background: var(--hx-bg-2);
      border: 1px solid var(--hx-line);
      border-radius: var(--hx-r-sm);
      font-size: 13px;
      color: var(--hx-text);
      text-decoration: none;
      max-width: 280px;
    }
    .hx-msg-attach-file:hover { background: var(--hx-surface); }
    .hx-msg-attach-file svg { width: 14px; height: 14px; color: var(--hx-text-mid); flex-shrink: 0; }
    .hx-msg-attach-file .hx-msg-attach-name {
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .hx-msg-attach-file .hx-msg-attach-meta { color: var(--hx-text-dim); font-size: 11.5px; }
    .hx-chat-send {
      width: 36px; height: 36px;
      display: inline-flex; align-items: center; justify-content: center;
      background: linear-gradient(180deg,
        color-mix(in srgb, var(--hx-text) 100%, transparent) 0%,
        color-mix(in srgb, var(--hx-text) 88%, transparent) 100%);
      color: var(--hx-bg);
      border: 1px solid var(--hx-text);
      border-radius: 11px;
      cursor: pointer; flex-shrink: 0;
      transition: transform 0.14s ease, box-shadow 0.18s ease, background 0.14s ease, opacity 0.14s ease;
      box-shadow:
        inset 0 1px 0 color-mix(in srgb, #fff 18%, transparent),
        0 1px 2px rgba(0,0,0,0.10),
        0 6px 14px -6px rgba(0,0,0,0.20);
      position: relative;
    }
    .hx-chat-send:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow:
        inset 0 1px 0 color-mix(in srgb, #fff 22%, transparent),
        0 2px 4px rgba(0,0,0,0.12),
        0 10px 22px -8px rgba(0,0,0,0.28),
        0 0 0 4px color-mix(in srgb, var(--hx-text) 8%, transparent);
    }
    .hx-chat-send:active:not(:disabled) { transform: translateY(0); }
    .hx-chat-send:disabled { opacity: 0.32; cursor: not-allowed; box-shadow: none; }
    .hx-chat-send svg { width: 15px; height: 15px; }

    .hx-chat-foot {
      display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
      font-size: 11px; color: var(--hx-text-dim);
      padding: 2px 6px 0;
      letter-spacing: 0.02em;
    }
    .hx-chat-foot .hx-mono { font-size: 11px; }
    .hx-chat-foot a { color: var(--hx-text); border-bottom: 1px solid transparent; padding-bottom: 1px; }
    .hx-chat-foot a:hover { border-color: var(--hx-text); }
    .hx-chat-foot .hx-kbd {
      display: inline-flex; align-items: center;
      padding: 1.5px 7px;
      font-family: var(--hx-mono);
      font-size: 10px;
      font-weight: 600;
      background: linear-gradient(180deg, var(--hx-surface) 0%, var(--hx-bg-2) 100%);
      border: 1px solid var(--hx-line);
      border-radius: 5px;
      color: var(--hx-text-mid);
      margin: 0 1px;
      line-height: 1.5;
      box-shadow:
        inset 0 1px 0 color-mix(in srgb, #fff 50%, transparent),
        0 1px 0 var(--hx-line);
    }

    /* Voice input — listening pill + transient error banner */
    .hx-voice-status {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 11.5px; color: var(--hx-red);
      padding: 2px 10px;
      background: var(--hx-red-soft);
      border-radius: 999px;
      border: 1px solid rgba(220, 38, 38, 0.22);
    }
    .hx-voice-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--hx-red);
      animation: hx-voice-pulse 1.2s ease-out infinite;
    }
    @keyframes hx-voice-pulse {
      0%, 100% { opacity: 0.55; transform: scale(1); }
      50%      { opacity: 1;    transform: scale(1.25); }
    }
    .hx-voice-error {
      font-size: 11.5px;
      color: var(--hx-red);
      background: var(--hx-red-soft);
      border: 1px solid rgba(220, 38, 38, 0.22);
      border-radius: var(--hx-r-md, 6px);
      padding: 4px 10px;
      max-width: 520px;
      line-height: 1.45;
      transition: opacity 0.25s ease-out;
      word-wrap: break-word;
      overflow-wrap: anywhere;
    }
    /* Mic active state — solid red ring, not the same neutral pulse the
       other tool buttons use. Makes it obvious the mic is hot. */
    .hx-chat-tool-btn.is-recording {
      background: var(--hx-red); color: #FFF;
      border-color: var(--hx-red);
      box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.55);
      animation: hx-mic-recording 1.4s ease-out infinite;
    }
    @keyframes hx-mic-recording {
      0%   { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.55); }
      70%  { box-shadow: 0 0 0 10px rgba(220, 38, 38, 0);  }
      100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0);     }
    }

    /* Mobile thread tweaks */
    @media (max-width: 700px) {
      .hx-chat-thread { padding: 24px 0 20px; }
      .hx-chat-thread-inner { padding: 0 18px; gap: 26px; }
      .hx-chat-compose { padding: 12px 16px 16px; }
      .hx-chat-compose-inner { padding: 0; }
      .hx-chat-toolbar { padding: 12px 14px; gap: 6px; }
      .hx-chat-title { font-size: 21px; max-width: 100%; padding-left: 6px; }
      .hx-chat-title::before { left: -2px; height: 70%; }
      .hx-chat-pill { height: 28px; font-size: 12px; }
      .hx-chat-pill > span:first-child { font-size: 9.5px !important; }
      .hx-chat-balance { height: 28px; font-size: 10.5px; padding: 0 11px; }
      .hx-chat-blank { padding: 40px 20px; gap: 14px; }
      .hx-chat-blank h2 { font-size: 44px; }
      .hx-chat-blank p { font-size: 13px; }
      .hx-msg.is-user .hx-msg-content { max-width: 88%; }
      .hx-chat-foot { font-size: 10.5px; gap: 10px; }
      .hx-chat-send { width: 34px; height: 34px; }
    }
  </style>
</head>
<body data-active="chat">

  <div class="hx-app">
    <aside class="hx-sidebar"></aside>
    <div>
      <div class="hx-topbar"></div>
      <main class="hx-main">

              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>

          </div>
        </aside>

        <!-- Main chat pane -->
        <section class="hx-chat-pane">
          <div class="hx-chat-toolbar">
            <p class="hx-chat-title" id="hx-c-title">New chat</p>
            <label class="hx-chat-pill" title="Model">
              <span style="color:var(--hx-text-dim);font-size:11.5px;">Model</span>
              <select id="hx-c-model">

            </label>
            <label class="hx-chat-pill" title="Project">
              <span style="color:var(--hx-text-dim);font-size:11.5px;">Project</span>
              <select id="hx-c-project">
                <option value="">None</option>
              </select>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
            </label>
            <button class="hx-chat-pill" type="button" id="hx-c-clear" title="Delete this conversation">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
              Delete
            </button>
            <span class="hx-chat-balance" id="hx-c-balance" title="Available credits">—</span>

          <div class="hx-chat-thread" id="hx-c-thread">

              <span class="hx-chat-blank-mark" aria-hidden="true"></span>
              <span class="hx-chat-blank-eyebrow">HelveX &middot; Helix</span>
              <h2>Helix</h2>
              <p>Your private workspace assistant. Begin a conversation when you are ready &mdash; every reply is saved to your project.</p>
            </div>

          <div class="hx-chat-compose">
            <div class="hx-chat-compose-inner">
              <div class="hx-chat-input-row" id="hx-c-input-row">
                <div class="hx-chat-attach-bar" id="hx-c-attach-bar"></div>
                <div class="hx-chat-input-bar">
                  <button
                    class="hx-chat-tool-btn"
                    id="hx-c-attach"
                    type="button"
                    aria-label="Attach files"
                    title="Attach an image or document">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
                  </button>
                  <input
                    type="file"
                    id="hx-c-file"
                    multiple
                    accept="image/png,image/jpeg,image/gif,image/webp,image/heic,application/pdf,text/plain,text/markdown,text/csv"
                    style="display:none;" />
                  <textarea
                    id="hx-c-input"
                    class="hx-chat-textarea"
                    placeholder="Ask anything…"
                    rows="1"
                    autocomplete="off"
                    spellcheck="true"></textarea>
                  <button
                    class="hx-chat-tool-btn"

                    type="button"
                    aria-label="Voice input"
                    title="Voice input">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
                  </button>

                  </button>
