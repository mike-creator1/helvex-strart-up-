              thumb = '<span class="hx-attach-chip-thumb"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></span>';
            }
            var status = a.status === 'uploading' ? ' is-uploading'
                       : a.status === 'error'     ? ' is-error'
                       : '';
            html += '<span class="hx-attach-chip' + status + '" data-id="' + escape(a.id) + '">' +
              thumb +
              '<span class="hx-attach-chip-name">' + escape(a.name || 'file') + '</span>' +
              '<span class="hx-attach-chip-meta">' + escape(fmtBytes(a.size)) + '</span>' +
              '<button class="hx-attach-chip-x" type="button" data-rm="' + escape(a.id) + '" aria-label="Remove">' +
                '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>' +
              '</button>' +
            '</span>';
          });
          attachBar.innerHTML = html;
          attachBar.querySelectorAll('button[data-rm]').forEach(function (b) {
            b.addEventListener('click', function () { removeAttachment(b.getAttribute('data-rm')); });
          });
        }

        function removeAttachment(id) {
          var idx = state.attachments.findIndex(function (a) { return a.id === id; });
          if (idx < 0) return;
          var a = state.attachments[idx];
          if (a._objectURL) { try { URL.revokeObjectURL(a._objectURL); } catch (e) {} }
          state.attachments.splice(idx, 1);
          renderAttachmentBar();
          refreshSendDisabled();
          // Best-effort delete from Storage if it had been uploaded.
          if (a.storage_path) {
            sb.storage.from('chat-uploads').remove([a.storage_path]).catch(function () {});
          }
        }

        function clearAttachments() {
          for (var i = 0; i < state.attachments.length; i++) {
            var a = state.attachments[i];
            if (a._objectURL) { try { URL.revokeObjectURL(a._objectURL); } catch (e) {} }
          }
          state.attachments = [];
          renderAttachmentBar();
        }

        async function handleFiles(fileList) {
          if (!fileList || !fileList.length) return;
          var u = (await sb.auth.getUser()).data.user;
          if (!u) return;

          // Make sure we have a conversation so storage paths are scoped to it.
          if (!state.conversation) await newConversation();

          for (var i = 0; i < fileList.length; i++) {
            if (state.attachments.length >= ATTACH_LIMITS.maxFiles) break;
            var f = fileList[i];
            if (!f) continue;
            if (!ATTACH_LIMITS.accepted.test(f.type || '')) continue;
            if (f.size > ATTACH_LIMITS.maxBytes) continue;

            var id = 'att-' + Date.now() + '-' + Math.random().toString(36).slice(2, 8);
            var item = {
              id:         id,
              file:       f,
              name:       f.name,
              size:       f.size,
              media_type: f.type,
              status:     'uploading',
              kind:       (f.type.indexOf('image/') === 0)         ? 'image'
                         : (f.type === 'application/pdf')          ? 'document'
                         : 'file',
              base64:     null,
              text_content: null,
              storage_path: null,
              _objectURL: f.type.indexOf('image/') === 0 ? URL.createObjectURL(f) : null,
            };
            state.attachments.push(item);
            renderAttachmentBar();
            refreshSendDisabled();

            // Upload + read in parallel.
            (function (it) {
              var convId = state.conversation.id;
              var safeName = (it.name || 'file').replace(/[^\w.\-]+/g, '_').slice(0, 80);
              var path = u.id + '/' + convId + '/' + Date.now() + '-' + safeName;

              var uploadP = sb.storage.from('chat-uploads').upload(path, it.file, {
                upsert: false, contentType: it.media_type,
              });
              // Anything text-based (including source code, JSON, YAML, SQL,
              // shell scripts) is read inline and prepended as text. Images
              // and PDFs are base64-encoded for the model's native vision.
              var isTextLike = /^text\//i.test(it.media_type) ||
                /^application\/(json|xml|yaml|x-yaml|sql|x-sh|x-python|javascript|typescript|x-typescript|toml|x-toml)$/i.test(it.media_type) ||
                /\.(md|markdown|csv|tsv|json|xml|yaml|yml|toml|sql|sh|py|js|ts|tsx|jsx|html|css|scss|less|go|rs|rb|java|kt|swift|c|cpp|h|hpp|cs|php|lua|r|env|conf|ini|log|txt)$/i.test(it.name || '');
              var inlineP = (it.kind === 'file' && isTextLike)
                  ? readFileAsText(it.file).then(function (t) { it.text_content = t.slice(0, 200_000); })
                  : readFileAsBase64(it.file).then(function (b) { it.base64 = b; });

              Promise.all([uploadP, inlineP]).then(function (results) {
                var up = results[0];
                if (up && up.error) {
                  it.status = 'error';
                  it.error  = up.error.message || 'upload failed';
                } else {
                  it.storage_path = path;
                  it.status = 'ready';
                }
                renderAttachmentBar();
                refreshSendDisabled();
              }).catch(function (err) {
                it.status = 'error';
                it.error  = (err && err.message) || 'upload failed';
                renderAttachmentBar();
                refreshSendDisabled();
              });
            })(item);
          }
        }

        // File picker + drag-drop on the composer
        attachBtn.addEventListener('click', function () { fileInput.click(); });
        fileInput.addEventListener('change', function (e) {
          handleFiles(e.target.files);
          fileInput.value = '';
        });
        ['dragenter','dragover'].forEach(function (ev) {
          inputRow.addEventListener(ev, function (e) {
            if (!e.dataTransfer || !e.dataTransfer.types || e.dataTransfer.types.indexOf('Files') < 0) return;
            e.preventDefault();
            inputRow.classList.add('is-drag-over');
          });
        });
        ['dragleave','dragend'].forEach(function (ev) {
          inputRow.addEventListener(ev, function () { inputRow.classList.remove('is-drag-over'); });
        });
        inputRow.addEventListener('drop', function (e) {
          if (!e.dataTransfer || !e.dataTransfer.files || !e.dataTransfer.files.length) return;
          e.preventDefault();
          inputRow.classList.remove('is-drag-over');
          handleFiles(e.dataTransfer.files);
        });

        // Paste images straight from the clipboard
        inputEl.addEventListener('paste', function (e) {
          if (!e.clipboardData || !e.clipboardData.files || !e.clipboardData.files.length) return;
          var imgs = [];
          for (var i = 0; i < e.clipboardData.files.length; i++) {
            var f = e.clipboardData.files[i];
            if (f && f.type && f.type.indexOf('image/') === 0) imgs.push(f);
          }
          if (imgs.length) { e.preventDefault(); handleFiles(imgs); }
        });

        micBtn.addEventListener('click', toggleVoice);

        // Agent mode — the highest-level toggle. When on:
        // - Prepends an agent system prompt (plan, execute, summarize)
        // - Force-enables web_search + code_execution server-side tools
        // - Shows a yellow "AGENT" badge in the toolbar so the user always
        //   knows they're talking to an autonomous Helix.
        var agentBtn = $('hx-c-agent');
        var agentBadge = document.createElement('span');
        agentBadge.className = 'hx-chat-agent-toolbar-badge';
        agentBadge.textContent = 'Agent';
        // Insert right after the chat title in the toolbar so it sits next to "New chat"
        var toolbarTitle = $('hx-c-title');
        if (toolbarTitle && toolbarTitle.parentNode) {
          toolbarTitle.parentNode.insertBefore(agentBadge, toolbarTitle.nextSibling);
        }
        if (agentBtn) {
          agentBtn.addEventListener('click', function () {
            state.agentEnabled = !state.agentEnabled;
            agentBtn.setAttribute('aria-pressed', state.agentEnabled ? 'true' : 'false');
            agentBadge.classList.toggle('is-on', state.agentEnabled);
          });
        }

        // Consolidated Tools popover — one elegant button that toggles
        // the web_search + code_execution menu. Keeps the composer clean
        // while exposing the model's superpowers behind a single tap.
        var toolsBtn   = $('hx-c-tools-btn');
        var toolsMenu  = $('hx-c-tools-menu');
        var toolsCount = $('hx-c-tools-count');
        var webItem    = $('hx-c-web');
        var codeItem   = $('hx-c-code');
        function refreshToolsUI() {
          var active = (state.webEnabled ? 1 : 0) + (state.codeEnabled ? 1 : 0);
          if (toolsCount) {
            toolsCount.textContent = String(active);
            toolsCount.hidden = active === 0;
          }
          if (toolsBtn) toolsBtn.classList.toggle('has-active', active > 0);
        }
        function openToolsMenu() {
          if (!toolsMenu || !toolsBtn) return;
          toolsMenu.hidden = false;
          toolsBtn.setAttribute('aria-expanded', 'true');
        }
        function closeToolsMenu() {
          if (!toolsMenu || !toolsBtn) return;
          toolsMenu.hidden = true;
          toolsBtn.setAttribute('aria-expanded', 'false');
        }
        if (toolsBtn) {
          toolsBtn.addEventListener('click', function (e) {
            e.stopPropagation();
            if (toolsBtn.getAttribute('aria-expanded') === 'true') closeToolsMenu();
            else openToolsMenu();
          });
        }
        if (webItem) {
          webItem.addEventListener('click', function () {
            state.webEnabled = !state.webEnabled;
            webItem.setAttribute('aria-checked', state.webEnabled ? 'true' : 'false');
            refreshToolsUI();
          });
        }
        if (codeItem) {
          codeItem.addEventListener('click', function () {
            state.codeEnabled = !state.codeEnabled;
            codeItem.setAttribute('aria-checked', state.codeEnabled ? 'true' : 'false');
            refreshToolsUI();
          });
        }
        // Tap anywhere else (or Esc) closes the menu
        document.addEventListener('click', function (e) {
          if (!toolsMenu || !toolsBtn) return;
          if (toolsBtn.contains(e.target) || toolsMenu.contains(e.target)) return;
          closeToolsMenu();
        });
        document.addEventListener('keydown', function (e) {
          if (e.key === 'Escape') closeToolsMenu();
        });
        refreshToolsUI();

        if (voiceDoneBtn) {
          voiceDoneBtn.addEventListener('click', function () {
            // Same as tapping the mic again while recording: stop & transcribe
            if (voiceState === 'recording') stopVoice();
          });
        }
        if (voiceCancelBtn) {
          voiceCancelBtn.addEventListener('click', function () {
            // Abort the recording without uploading for transcription
            if (voiceState !== 'recording' && voiceState !== 'starting') return;
            voiceCanceled = true;
            // Detach onstop handler so we don't trigger transcription
            try {
              if (mediaRecorder) mediaRecorder.onstop = function () {
                try { cleanupMicStream(); } catch (e) {}
                mediaRecorder = null;
                audioChunks = [];
                voiceCanceled = false;
                setVoiceState('idle');
              };
              if (mediaRecorder && voiceState === 'recording') mediaRecorder.stop();
              else { cleanupMicStream(); setVoiceState('idle'); }
            } catch (e) {
              cleanupMicStream();
              setVoiceState('idle');
            }
          });
        }

        inputEl.addEventListener('input', function () {
          refreshSendDisabled();
          autoSize(inputEl);
        });
        inputEl.addEventListener('keydown', function (e) {
          if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            send();
          }
        });
        sendBtn.addEventListener('click', function () { send(); });

        // ─── Boot ────────────────────────────────────────────
        // Order matters: loadProjects() resolves which project is active
        // (auto-picking the most recent if none was stored). refreshList()
        // then filters conversations by that active project.
        sb.auth.getUser().then(async function (res) {
          var u = res && res.data ? res.data.user : null; if (!u) return;
          state.owner = u.id;
          await loadProjects();
          await Promise.all([refreshList(), refreshBalance()]);

          // If the user arrived here from /workbench via "Use in chat",
          // a seed payload is waiting in sessionStorage. Spin up a fresh
          // conversation and pre-fill the composer with the artifact
          // wrapped in a short preamble. The user reviews and presses
          // Send when ready — we don't auto-send so they can edit.
          var seed = (window.HX && window.HX.workbench)
            ? window.HX.workbench.readSeed() : null;
          if (seed) {
            try {
              await newConversation();
              var input = $('hx-c-input');
              if (input && window.HX.workbench.composeSeedPrompt) {
                input.value = window.HX.workbench.composeSeedPrompt(seed);
                input.dispatchEvent(new Event('input', { bubbles: true }));
                input.focus();
                try { input.setSelectionRange(0, 0); } catch (_) {}
              }
              if (window.cxToast) window.cxToast('Loaded "' + (seed.title || 'artifact') + '" from your workbench.', 'info');
            } catch (e) {
              // Seed flow failure shouldn't break the chat page boot.
              if (window.cxToast) window.cxToast('Could not load artifact into chat. Try again from the workbench.', 'error');
            }
            return;
          }

          if (state.conversations.length) {
            await openConversation(state.conversations[0].id);
          } else {
            renderThread(); // shows the appropriate blank state
          }
        });

        window.addEventListener('beforeunload', function () {
          try { if (state.msgChannel) state.msgChannel.unsubscribe(); } catch (e) {}
        });
      });
    })();
  </script>
</body>
</html>
