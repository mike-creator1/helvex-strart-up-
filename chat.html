                <span id="hx-c-voice-err" class="hx-voice-error" style="display:none;" aria-live="polite"></span>
                <span class="hx-mono" id="hx-c-trace" style="display:none;">—</span>
                <span style="margin-left:auto;"><span class="hx-kbd">Enter</span> to send <span style="opacity:0.6;margin:0 4px;">&middot;</span> <span class="hx-kbd">Shift</span>+<span class="hx-kbd">Enter</span> for new line</span>
              </div>
            </div>
          </div>
        </section>

      </main>
    </div>
  </div>

  <script src="/platform.js"></script>
  <script src="/hx-workbench.js"></script>
  <script>
    /* HelveX Chat workspace.
       Real conversations + messages persisted to Supabase, real model
       calls through model-proxy, realtime subscription on messages so
       the assistant reply appears the moment the proxy commits the row. */
    (function () {
      function whenAuthReady(fn) {
        if (window.HX && window.HX.supabase) { fn(); return; }
        document.addEventListener('hx:auth-ready', fn, { once: true });
      }
      var $ = function (id) { return document.getElementById(id); };
      function escape(s) {
        return (s == null ? '' : String(s))
          .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      }
      function relTime(iso) {
        var d = new Date(iso); var diff = (Date.now() - d.getTime()) / 1000;
        if (diff < 60) return 'just now';
        if (diff < 3600) return Math.floor(diff/60) + 'm ago';
        if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
        return Math.floor(diff/86400) + 'd ago';
      }

      var PROJECT_URL = 'https://yjmpallrtpeinpdilptj.supabase.co';

      // ─── Workbench auto-capture toast ────────────────────────────
      // A tiny ephemeral chip in the bottom-right that confirms an
      // assistant reply just landed in /workbench. Clickable: jumps
      // straight to the saved artifact. Dismisses itself after 5s.
      function showWorkbenchToast(artifact) {
        if (!artifact) return;
        var prev = document.getElementById('hx-wb-toast');
        if (prev) prev.remove();
        var el = document.createElement('a');
        el.id = 'hx-wb-toast';
        el.href = '/workbench.html?open=' + encodeURIComponent(artifact.id);
        el.style.cssText =
          'position:fixed;right:18px;bottom:18px;z-index:9999;'
          + 'background:var(--hx-text,#0f0f10);color:#fff;'
          + 'padding:10px 14px;border-radius:10px;'
          + 'font:600 12.5px/1.3 Inter,system-ui,sans-serif;'
          + 'box-shadow:0 8px 24px rgba(0,0,0,0.18);'
          + 'text-decoration:none;display:flex;align-items:center;gap:10px;'
          + 'opacity:0;transform:translateY(8px);transition:opacity .18s, transform .18s;';
        var kindLabel = (artifact.kind || 'note').toUpperCase();
        var title = (artifact.title || '').slice(0, 42);
        el.innerHTML =
          '<span style="font-family:var(--hx-mono,monospace);font-size:10px;'
          + 'background:rgba(255,255,255,0.14);padding:2px 6px;border-radius:4px;'
          + 'letter-spacing:0.06em;">' + kindLabel + ' &rarr; WORKBENCH</span>'
          + '<span style="font-weight:500;opacity:0.95;">'
          + title.replace(/[&<>]/g, function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];})
          + '</span>';
        document.body.appendChild(el);
        requestAnimationFrame(function () {
          el.style.opacity = '1';
          el.style.transform = 'translateY(0)';
        });
        setTimeout(function () {
          el.style.opacity = '0';
          el.style.transform = 'translateY(8px)';
          setTimeout(function () { if (el.parentNode) el.remove(); }, 250);
        }, 5000);
      }

      // ─── Auto-capture hook ──────────────────────────────────────
      // Called from the realtime INSERT handler whenever a fresh row
      // lands in `messages`. Skips user turns, errors, and short
      // conversational chatter (heuristic in HX.workbench.shouldSave).
      // Idempotent at the DB layer via the unique index on
      // (owner_id, source_message_id).
      function maybeCaptureToWorkbench(msg) {
        if (!msg || msg.role !== 'assistant') return;
        if (!msg.content || msg.__error) return;
        if (!window.HX || !window.HX.workbench || !window.HX.workbench.autoCapture) return;
        if (!state.conversation) return;
        window.HX.workbench.autoCapture({
          supabase: sb,
          ownerId: state.owner,
          conversationId: state.conversation.id,
          conversationTitle: state.conversation.title || null,
          messageId: msg.id,
          model: state.conversation.model || null,
          text: msg.content,
        }).then(function (artifact) {
          if (artifact) showWorkbenchToast(artifact);
        }).catch(function () { /* silent — capture failures shouldn't surface */ });
      }

      // The system prompt that defines Helix's identity and tone for every
      // turn. Kept short, deliberately calm, and explicit about no emoji.
      var HELIX_SYSTEM = [
        'You are Helix, the resident assistant of the HelveX platform.',
        'Communicate in a calm, precise, and professional tone.',
        'Never use emojis, kaomoji, decorative symbols, or playful punctuation.',
        'Never include phrases like "Hi there!", "Sure!", or other filler greetings.',
        'Do not introduce yourself unless explicitly asked. When asked your name, you are Helix.',
        'Never identify with or name any underlying model or provider — you are Helix, built by HelveX.',
        'Match the language the user writes in. If the user writes in Greek, reply in Greek.',
        'Be concise and substantive. Skip preamble. Lead with the answer, then add context only if useful.'
      ].join(' ');

      var state = {
        owner: null,
        conversation: null,    // current conversation row
        conversations: [],     // sidebar list
        messages: [],          // current thread
        sending: false,        // request in flight, no first delta yet
        streaming: false,      // first delta received, actively streaming
        msgChannel: null,
        attachments: [],       // composer's pending attachments
      };

      // ─── Global active project (shared across pages via localStorage) ──
      // The project dropdown on this page persists the user's "working
      // project" so that new chats — and the Overview / Projects pages —
      // can all reflect the same context. Reading an existing conversation
      // still shows its own saved project_id; the active project only
      // governs NEW conversations and cross-page indicators.
      var ACTIVE_KEY = 'hx_active_project';
      function getActiveProject() {
        try { return JSON.parse(localStorage.getItem(ACTIVE_KEY) || 'null'); }
        catch (e) { return null; }
      }
      function setActiveProject(id, name) {
        try {
          if (id) localStorage.setItem(ACTIVE_KEY, JSON.stringify({ id: id, name: name || '' }));
          else    localStorage.removeItem(ACTIVE_KEY);
        } catch (e) {}
        // Same-tab listeners (other components on this page)
        try { document.dispatchEvent(new CustomEvent('hx:active-project-changed', { detail: getActiveProject() })); } catch (e) {}
      }

      // ─── Attachment / upload limits ──────────────────────────────
      var ATTACH_LIMITS = {
        maxFiles:   5,
        maxBytes:   10 * 1024 * 1024,           // 10 MB per file
        accepted:   /^(image\/(png|jpe?g|gif|webp|heic)|application\/pdf|text\/(plain|markdown|csv))$/i,
      };
      // Cache of signed URLs for storage paths so we don't re-sign on
      // every render of historical attachments.
      var signedUrlCache = Object.create(null);

      function fmtBytes(n) {
        if (!n && n !== 0) return '';
        if (n < 1024) return n + ' B';
        if (n < 1024 * 1024) return (n / 1024).toFixed(1) + ' KB';
        return (n / 1024 / 1024).toFixed(1) + ' MB';
      }

      function readFileAsBase64(file) {
        return new Promise(function (resolve, reject) {
          var r = new FileReader();
          r.onload  = function () {
            var s = String(r.result || '');
            var idx = s.indexOf(',');
            resolve(idx >= 0 ? s.slice(idx + 1) : s);
          };
          r.onerror = function () { reject(r.error || new Error('read failed')); };
          r.readAsDataURL(file);
        });
      }

      function readFileAsText(file) {
        return new Promise(function (resolve, reject) {
          var r = new FileReader();
          r.onload  = function () { resolve(String(r.result || '')); };
          r.onerror = function () { reject(r.error || new Error('read failed')); };
          r.readAsText(file);
        });
      }

      whenAuthReady(function () {
        var sb = window.HX.supabase;

        // ─── Auth + balance ───────────────────────────────────
        async function refreshBalance() {
          var el = $('hx-c-balance');
          var r = await sb.from('credits_balance').select('credits_total,credits_used').maybeSingle();
          if (r && r.data) {
            var avail = Math.max(0, (r.data.credits_total || 0) - (r.data.credits_used || 0));
            el.textContent = avail.toLocaleString() + ' cr';
            el.classList.toggle('is-empty', avail <= 0);
          }
        }

        // ─── Project picker ──────────────────────────────────
        async function loadProjects() {
          var r = await sb.from('projects').select('id,name,status').order('updated_at', { ascending: false });
          var sel = $('hx-c-project');
          while (sel.options.length > 1) sel.remove(1);
          var byId = {};
          var live = (r.data || []).filter(function (p) { return p.status !== 'archived'; });
          state.projectCount = live.length;
          live.forEach(function (p) {
            byId[p.id] = p.name;
            var opt = document.createElement('option');
            opt.value = p.id; opt.textContent = p.name;
            sel.appendChild(opt);
          });

          var active = getActiveProject();

          // If the user has projects but no active selection (or the
          // previously-selected one was archived/deleted), promote the
          // most-recently-updated live project. The chat experience is
          // project-scoped, so the dropdown should never sit on "None"
          // when real projects exist.
          if ((!active || !active.id || !byId[active.id]) && live.length > 0) {
            var pick = live[0];
            setActiveProject(pick.id, pick.name);
            active = getActiveProject();
          } else if (active && active.id && !byId[active.id]) {
            // No live projects at all and the active one was archived
            setActiveProject(null);
            active = null;
          }

          // Reflect the resolved active project in the dropdown so the
          // visible selection matches the stored state. openConversation()
          // may override this later to show the open chat's own project.
          sel.value = (active && active.id) || '';
        }

        // ─── Conversation list (scoped to the active project) ─
        async function refreshList() {
          var active = getActiveProject();
          var q = sb.from('conversations').select('id,title,model,updated_at,project_id')
            .is('archived_at', null).order('updated_at', { ascending: false }).limit(100);
          // Chat is project-scoped. When an active project is selected the
          // sidebar only shows that project's conversations. With no active
          // project we fall back to ALL conversations so users don't lose
          // access to legacy chats that pre-date the project system.
          if (active && active.id) q = q.eq('project_id', active.id);
          var r = await q;
          state.conversations = r.data || [];
          renderList();
        }

        function renderList() {
          var host = $('hx-c-list');
          if (!state.conversations.length) {
            var active = getActiveProject();
            var hasProjects = !!(state.projectCount && state.projectCount > 0);
            var msg;
            if (!active || !active.id) {
              msg = hasProjects
                ? 'Select a project above to see its chats.'
                : 'Create a project first to start chatting.';
            } else {
              msg = 'No chats in this project yet.';
            }
            host.innerHTML = '<div class="hx-chat-empty-list" id="hx-c-empty">' + msg + '</div>';
            return;
          }
          var html = '';
          state.conversations.forEach(function (c) {
            var active = state.conversation && state.conversation.id === c.id;
            html += '<div class="hx-chat-item' + (active ? ' is-active' : '') + '" data-id="' + escape(c.id) + '">' +
              '<span class="hx-chat-item-title">' + escape(c.title || 'Untitled') + '</span>' +
              '<span class="hx-chat-item-meta">' +
                '<span>' + escape(relTime(c.updated_at)) + '</span>' +
              '</span>' +
            '</div>';
          });
          host.innerHTML = html;
          host.querySelectorAll('.hx-chat-item').forEach(function (el) {
            el.addEventListener('click', function () { openConversation(el.getAttribute('data-id')); });
          });
        }

        // ─── Open/close conversation ─────────────────────────
        async function openConversation(id) {
          // Tear down previous realtime channel
          if (state.msgChannel) { try { state.msgChannel.unsubscribe(); } catch (e) {} state.msgChannel = null; }

          var conv = state.conversations.find(function (c) { return c.id === id; });
          if (!conv) {
            var r = await sb.from('conversations').select('*').eq('id', id).maybeSingle();
            conv = r.data;
          }
          if (!conv) return;
          state.conversation = conv;

          // Sync toolbar
          $('hx-c-title').textContent = conv.title || 'New chat';
          $('hx-c-model').value = conv.model || 'ether';
          $('hx-c-project').value = conv.project_id || '';

          // Load messages
          var m = await sb.from('messages').select('*').eq('conversation_id', id)
            .order('created_at', { ascending: true });
          state.messages = m.data || [];
          renderThread();

          // Realtime subscription — new messages stream in live. The dedup
          // walks back through state.messages to find the most recent
          // optimistic placeholder of the same role and swaps in the
          // canonical row, so both the optimistic user turn and the
          // optimistic streaming-assistant turn are replaced cleanly.
          state.msgChannel = sb.channel('hx-msg-' + id)
            .on('postgres_changes',
                { event: 'INSERT', schema: 'public', table: 'messages', filter: 'conversation_id=eq.' + id },
                function (payload) {
                  var newMsg = payload.new;
                  if (state.messages.find(function (x) { return x.id === newMsg.id; })) return;
                  for (var i = state.messages.length - 1; i >= 0; i--) {
                    var m = state.messages[i];
                    if (m.__optimistic && m.role === newMsg.role) {
                      state.messages[i] = newMsg;
                      // While streaming, suppress full re-renders — the
                      // streaming text node is already up to date and a
                      // re-render would briefly flash. The end-of-stream
                      // path explicitly calls renderThread once.
                      if (!state.streaming) renderThread();
                      maybeCaptureToWorkbench(newMsg);
                      return;
                    }
                  }
                  state.messages.push(newMsg);
                  if (!state.streaming) renderThread();
                  maybeCaptureToWorkbench(newMsg);
                })
            .subscribe();

          renderList();
        }

        function renderThread() {
          var thread = $('hx-c-thread');
          if (!state.conversation) {
            var active = getActiveProject();
            if (!active || !active.id) {
              // No project selected — guide the user to pick one (or create
              // their first project) before they can start chatting.
              var hasProjects = !!(state.projectCount && state.projectCount > 0);
              if (hasProjects) {
                thread.innerHTML =
                  '<div class="hx-chat-blank">' +
                    '<span class="hx-chat-blank-mark" aria-hidden="true"></span>' +
                    '<span class="hx-chat-blank-eyebrow">Choose a project</span>' +
                    '<h2>Pick a project</h2>' +
                    '<p>Use the <strong>Project</strong> selector above to choose what you are working on. Every chat is saved under the active project.</p>' +
                  '</div>';
              } else {
                thread.innerHTML =
                  '<div class="hx-chat-blank">' +
                    '<span class="hx-chat-blank-mark" aria-hidden="true"></span>' +
                    '<span class="hx-chat-blank-eyebrow">Get started</span>' +
                    '<h2>Create your first project</h2>' +
                    '<p>Chats live inside projects. Open <a href="/projects.html?new=1" style="text-decoration:underline;">Projects</a> to create one, then come back here.</p>' +
                  '</div>';
              }
              return;
            }
            thread.innerHTML =
              '<div class="hx-chat-blank">' +
                '<span class="hx-chat-blank-mark" aria-hidden="true"></span>' +
                '<span class="hx-chat-blank-eyebrow">HelveX &middot; Helix</span>' +
                '<h2>Helix</h2>' +
                '<p>Working on <strong>' + escape(active.name || 'Unnamed project') + '</strong>. Send your first message below.</p>' +
              '</div>';
            return;
          }
          if (!state.messages.length && !state.sending) {
            thread.innerHTML =
              '<div class="hx-chat-blank">' +
                '<span class="hx-chat-blank-mark" aria-hidden="true"></span>' +
                '<span class="hx-chat-blank-eyebrow">New chat</span>' +
                '<h2>' + escape(state.conversation.title || 'New chat') + '</h2>' +
                '<p>Send your first message below to begin the conversation.</p>' +
              '</div>';
            return;
          }
          var html = '<div class="hx-chat-thread-inner">';
          state.messages.forEach(function (m) {
            html += renderMessage(m);
          });
          if (state.sending) {
            html += '<div class="hx-msg is-assistant">' +
              '<div class="hx-msg-body">' +
                '<div class="hx-msg-meta"><strong>Helix</strong></div>' +
                '<div class="hx-typing"><span></span><span></span><span></span></div>' +
              '</div>' +
            '</div>';
          }
          html += '</div>';
          thread.innerHTML = html;
          // Wire copy/regenerate actions
          thread.querySelectorAll('button[data-act]').forEach(function (b) {
            b.addEventListener('click', function () {
              var act = b.getAttribute('data-act');
              var idx = parseInt(b.getAttribute('data-idx'), 10);
              var msg = state.messages[idx];
              if (!msg) return;
              if (act === 'copy') {
                navigator.clipboard && navigator.clipboard.writeText(msg.content || '').then(function () {
                  var l = b.textContent; b.innerHTML = 'Copied'; setTimeout(function () { b.innerHTML = l; }, 1200);
                });
              }
              if (act === 'regenerate') regenerate(idx);
            });
          });
          // Lazy-load signed URLs for any attachment thumbnails / file links
          hydrateAttachmentLinks(thread);
          // Scroll to bottom
          thread.scrollTop = thread.scrollHeight;
        }

        function renderAttachmentsForMsg(atts) {
          if (!atts || !atts.length) return '';
          var html = '<div class="hx-msg-attachments">';
          for (var i = 0; i < atts.length; i++) {
            var a = atts[i] || {};
            var kind = a.kind || (a.media_type && a.media_type.indexOf('image/') === 0 ? 'image' : 'file');
            if (kind === 'image') {
              var src = a._objectURL || (a.storage_path && signedUrlCache[a.storage_path]) || '';
              html += '<img class="hx-msg-attach-img" alt="' + escape(a.name || 'image') + '"' +
                (src ? ' src="' + escape(src) + '"' : '') +
                (a.storage_path ? ' data-storage-path="' + escape(a.storage_path) + '"' : '') +
                ' loading="lazy">';
            } else {
              var icon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>';
              html += '<a class="hx-msg-attach-file"' +
                (a.storage_path ? ' data-storage-path="' + escape(a.storage_path) + '"' : '') +
                ' target="_blank" rel="noopener">' +
                icon +
                '<span class="hx-msg-attach-name">' + escape(a.name || 'file') + '</span>' +
                '<span class="hx-msg-attach-meta">' + escape(fmtBytes(a.size)) + '</span>' +
              '</a>';
            }
          }
          html += '</div>';
          return html;
        }

        function renderMessage(m) {
          var i = state.messages.indexOf(m);
          var isAssist = m.role === 'assistant';
          var meta = isAssist ? '<strong>Helix</strong>' : '';
          var atts = Array.isArray(m.attachments) ? m.attachments : [];

          var actions = '';
          if (isAssist && m.content && !m.__error && !m.__streaming) {
            actions = '<div class="hx-msg-actions">' +
              '<button class="hx-msg-act" type="button" data-act="copy" data-idx="' + i + '">' +
                '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>' +
                'Copy' +
              '</button>' +
              '<button class="hx-msg-act" type="button" data-act="regenerate" data-idx="' + i + '">' +
                '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>' +
                'Regenerate' +
              '</button>' +
            '</div>';
          }

          var contentHtml = '';
          if (m.content) contentHtml = '<div class="hx-msg-content">' + escape(m.content) + '</div>';
          else if (!atts.length) contentHtml = '<div class="hx-msg-content"></div>';

          return '<div class="hx-msg ' + (isAssist ? 'is-assistant' : 'is-user') + (m.__error ? ' hx-msg-error' : '') + '" data-msg-key="' + escape(m.id) + '">' +
            '<div class="hx-msg-body">' +
              (meta ? '<div class="hx-msg-meta">' + meta + '</div>' : '') +
              renderAttachmentsForMsg(atts) +
              contentHtml +
              actions +
            '</div>' +
          '</div>';
        }

        // After a renderThread call, walk image/file attachments that need a
        // signed URL and resolve them lazily. The DOM elements were rendered
        // with data-storage-path; we set src/href once we have the URL.
        function hydrateAttachmentLinks(root) {
          var imgs  = root.querySelectorAll('img.hx-msg-attach-img[data-storage-path]');
          var files = root.querySelectorAll('a.hx-msg-attach-file[data-storage-path]');
          var paths = {};
          imgs.forEach(function (n)  { var p = n.getAttribute('data-storage-path'); if (p) paths[p] = true; });
          files.forEach(function (n) { var p = n.getAttribute('data-storage-path'); if (p) paths[p] = true; });
          Object.keys(paths).forEach(function (p) {
            if (signedUrlCache[p]) {
              applyUrl(root, p, signedUrlCache[p]);
              return;
            }
            sb.storage.from('chat-uploads').createSignedUrl(p, 3600).then(function (r) {
              if (r && r.data && r.data.signedUrl) {
                signedUrlCache[p] = r.data.signedUrl;
                applyUrl(root, p, r.data.signedUrl);
              }
            }).catch(function () {});
          });
        }
        function applyUrl(root, path, url) {
          root.querySelectorAll('img.hx-msg-attach-img[data-storage-path="' + path + '"]').forEach(function (n) {
            if (!n.getAttribute('src')) n.setAttribute('src', url);
          });
          root.querySelectorAll('a.hx-msg-attach-file[data-storage-path="' + path + '"]').forEach(function (n) {
            n.setAttribute('href', url);
          });
        }

        // ─── New conversation ────────────────────────────────
        async function newConversation() {
          var u = (await sb.auth.getUser()).data.user; if (!u) return;
          var active = getActiveProject();
          // Guard: a chat must always live inside a project once the user
          // has projects available. If they have none, route them to create
          // one first. If they have projects but none is selected, surface
          // the dropdown.
          if (!active || !active.id) {
            if (state.projectCount && state.projectCount > 0) {
              $('hx-c-project').focus();
              renderThread();
              return;
            } else {
              if (window.cxToast) window.cxToast('Create a project to start a new chat.', 'info');
              window.location.href = '/projects.html?new=1';
              return;
            }
          }
          var model = $('hx-c-model').value || 'ether';
          var proj  = active.id;
          var ins = await sb.from('conversations').insert({
            owner_id: u.id, project_id: proj, model: model, title: 'New chat'
          }).select().maybeSingle();
          if (ins.error) { if (window.cxToast) window.cxToast(ins.error.message, 'error'); return; }
          await sb.rpc('log_event', { p_kind: 'chat.conversation_created', p_payload: { id: ins.data.id, model: model } });
          await refreshList();
          await openConversation(ins.data.id);
          $('hx-c-input').focus();
        }

        // ─── Send message (SSE streaming) ────────────────────
        async function send(retryFromIdx) {
          if (state.sending || state.streaming) return;
          // Stop any active voice recording so it can't keep dictating
          // into a new turn after the user has hit send.
          if (typeof voiceState !== 'undefined' && voiceState !== 'idle') stopVoice();
          var text = $('hx-c-input').value.trim();

          // Regenerate path: replay the last user message
          if (typeof retryFromIdx === 'number') {
            var lastUser = null;
            for (var i = retryFromIdx - 1; i >= 0; i--) {
              if (state.messages[i].role === 'user') { lastUser = state.messages[i]; break; }
            }
            if (!lastUser) return;
            text = lastUser.content;
          }

          // Capture and freeze the current attachments — anything in the
          // composer right now belongs to THIS turn.
          var readyAttachs = state.attachments.filter(function (a) { return a.status === 'ready'; });

          if (!text && !readyAttachs.length) return;

          if (!state.conversation) await newConversation();

          // Build the content for the current user turn. Single string when
          // there's just text, or an array of content blocks when we have
          // images / pdfs / inlined text files.
          var currentContent = text;
          if (readyAttachs.length) {
            var blocks = [];
            // Text-file contents inlined first so the model has them as
            // context before images/docs.
            readyAttachs.forEach(function (a) {
              if (a.kind === 'file' && typeof a.text_content === 'string') {
                blocks.push({ type: 'text', text: 'File: ' + a.name + '\n---\n' + a.text_content });
              }
            });
            // Images
            readyAttachs.forEach(function (a) {
              if (a.kind === 'image' && a.base64) {
                blocks.push({
                  type: 'image',
                  source: { type: 'base64', media_type: a.media_type, data: a.base64 },
                });
              }
            });
            // PDFs
            readyAttachs.forEach(function (a) {
              if (a.kind === 'document' && a.base64) {
                blocks.push({
                  type: 'document',
                  source: { type: 'base64', media_type: a.media_type, data: a.base64 },
                });
              }
            });
            blocks.push({ type: 'text', text: text || 'Please describe these attachments.' });
            currentContent = blocks;
          }

          // Mirror copy of attachments for persistence + UI render of the
          // optimistic bubble (keeps the in-memory _objectURL alive).
          var persistAttachs = readyAttachs.map(function (a) {
            return {
              kind:         a.kind,
              name:         a.name,
              media_type:   a.media_type,
              size:         a.size,
              storage_path: a.storage_path,
            };
          });
          var displayAttachs = readyAttachs.map(function (a) {
            return {
              kind:         a.kind,
              name:         a.name,
              media_type:   a.media_type,
              size:         a.size,
              storage_path: a.storage_path,
              _objectURL:   a._objectURL,    // for immediate thumbnail
            };
          });

          // Composer reset (chips disappear immediately on send)
          $('hx-c-input').value = '';
          autoSize($('hx-c-input'));
          // Don't revoke object URLs yet — the optimistic message still uses
          // them for the thumbnail. They'll be GC'd on page unload.
          state.attachments = [];
          renderAttachmentBar();
          refreshSendDisabled();

          // Optimistic user message + typing indicator
          var userOptId = 'opt-u-' + Date.now();
          state.messages.push({
            id: userOptId, role: 'user',
            content: text,
            attachments: displayAttachs,
            created_at: new Date().toISOString(), __optimistic: true,
          });
          state.sending = true;
          renderThread();

          // Build the array we send to the model. Past turns are sent as
          // their plain text content (history attachments are stored but
          // not re-uploaded into the model context this round).
          var send_msgs = state.messages
            .filter(function (m) { return !m.__optimistic ? true : (m.role === 'user'); })
            .map(function (m) {
              if (m.id === userOptId) return { role: m.role, content: currentContent };
              return { role: m.role, content: m.content || '' };
            });

          var t0 = Date.now();
          var traceCell = $('hx-c-trace');
          traceCell.textContent = '…';

          // Streaming state — locals so retries don't collide with class state
          var streamId       = null;
          var streamNode     = null;
          var assistantText  = '';
          var thread         = $('hx-c-thread');

          function ensureStreamMessage() {
            if (streamId) return;
            streamId = 'opt-a-' + Date.now();
            state.messages.push({
              id: streamId, role: 'assistant', content: '',
              created_at: new Date().toISOString(),
              __optimistic: true, __streaming: true,
            });
            state.sending  = false;
            state.streaming = true;
            renderThread();
            streamNode = thread.querySelector(
              '[data-msg-key="' + streamId + '"] .hx-msg-content',
            );
          }

          function appendDelta(t) {
            if (!t) return;
            ensureStreamMessage();
            if (streamNode) streamNode.appendChild(document.createTextNode(t));
            assistantText += t;
            // Keep the model in sync so any incidental re-render still
            // shows what the user has been reading.
            var s = state.messages.find(function (m) { return m.id === streamId; });
            if (s) s.content = assistantText;
            // Auto-scroll only if the user hasn't scrolled up to read.
            var nearBottom = (thread.scrollHeight - thread.scrollTop - thread.clientHeight) < 80;
            if (nearBottom) thread.scrollTop = thread.scrollHeight;
          }

          function finalizeError(msg) {
            // Replace the typing indicator with an inline error bubble
            state.sending  = false;
            state.streaming = false;
            // If a streaming bubble was already created, mark it as error.
            var existing = streamId ? state.messages.find(function (m) { return m.id === streamId; }) : null;
            if (existing) {
              existing.content = msg;
              existing.__error = true;
              existing.__streaming = false;
              existing.__optimistic = false;
            } else {
              state.messages.push({
                id: 'err-' + Date.now(), role: 'assistant', content: msg,
                __error: true, created_at: new Date().toISOString(),
              });
            }
            renderThread();
          }

          try {
            var sess = (await sb.auth.getSession()).data.session;
            if (!sess || !sess.access_token) throw new Error('Not signed in.');

            var resp = await fetch(PROJECT_URL + '/functions/v1/model-proxy', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Accept':       'text/event-stream',
                'Authorization': 'Bearer ' + sess.access_token,
              },
              body: JSON.stringify({
                model:           $('hx-c-model').value || 'ether',
                conversation_id: state.conversation.id,
                system:          HELIX_SYSTEM,
                messages:        send_msgs,
                user_attachments: persistAttachs,
                max_tokens:      2048,
                stream:          true,
              }),
            });

            var ct = (resp.headers.get('content-type') || '').toLowerCase();

            if (!resp.ok) {
              var errBody = null;
              try { errBody = await resp.json(); } catch (e) { /* ignore */ }
              var emsg = (errBody && (errBody.hint || errBody.message || errBody.error)) || ('HTTP ' + resp.status);
              finalizeError(emsg);
              return;
            }

            // Fallback: server didn't actually stream. Read the full JSON
            // and let realtime deliver canonical rows in a moment.
            if (ct.indexOf('text/event-stream') !== 0 || !resp.body) {
              await resp.json().catch(function () { return null; });
              state.sending  = false;
              state.streaming = false;
              setTimeout(function () { renderThread(); refreshBalance(); refreshList(); }, 600);
              return;
            }

            // Stream — read SSE from the body
            var reader  = resp.body.getReader();
            var decoder = new TextDecoder();
            var buf = '';

            while (true) {
              var chunk = await reader.read();
              if (chunk.done) break;
              buf += decoder.decode(chunk.value, { stream: true });
              var events = buf.split('\n\n');
              buf = events.pop() || '';
              for (var ei = 0; ei < events.length; ei++) {
                var evt = events[ei];
                if (!evt) continue;
                var evname = '';
                var dataStr = '';
                var lines = evt.split('\n');
                for (var li = 0; li < lines.length; li++) {
                  var line = lines[li];
                  if (line.indexOf('event:') === 0) evname = line.slice(6).trim();
                  else if (line.indexOf('data:') === 0) dataStr += line.slice(5).trim();
                }
                if (!dataStr) continue;
                var obj = null;
                try { obj = JSON.parse(dataStr); } catch (e) { continue; }
                if (evname === 'content_block_delta' && obj.delta && obj.delta.type === 'text_delta') {
                  appendDelta(obj.delta.text || '');
                } else if (evname === 'helvex_done') {
                  if (obj.trace_id) traceCell.textContent = obj.trace_id;
                } else if (evname === 'error' && obj.error && obj.error.message) {
                  finalizeError(obj.error.message);
                }
              }
            }

            // Stream complete — commit final state.
            if (streamId) {
              var s = state.messages.find(function (m) { return m.id === streamId; });
              if (s) { s.content = assistantText; s.__streaming = false; }
            } else if (assistantText) {
              // No deltas were ever observed but a final blob came through —
              // unlikely, but cover it.
              ensureStreamMessage();
              if (streamNode) streamNode.textContent = assistantText;
            }

            state.streaming = false;
            state.sending   = false;

            // Realtime will deliver the canonical row from chat_record_pair
            // and dedup will replace the optimistic streaming message. Re-
            // render once afterwards so the action buttons attach.
            setTimeout(function () { renderThread(); refreshBalance(); refreshList(); }, 350);
          } catch (err) {
            finalizeError((err && err.message) || 'Send failed.');
          }
        }

        function regenerate(assistantIdx) {
          send(assistantIdx);
        }

        // ─── Delete current conversation ─────────────────────
        async function deleteCurrent() {
          if (!state.conversation) return;
          var btn = $('hx-c-clear');
          if (btn && btn.dataset.armed !== '1') {
            btn.dataset.armed = '1';
            btn.dataset.original = btn.textContent;
            btn.textContent = 'Click again to confirm';
            btn.classList.add('armed');
            setTimeout(function () {
              if (btn.dataset.armed === '1') {
                btn.dataset.armed = '';
                btn.textContent = btn.dataset.original || 'Delete';
                btn.classList.remove('armed');
              }
            }, 3000);
            return;
          }
          if (btn) { btn.dataset.armed = ''; btn.classList.remove('armed'); btn.textContent = btn.dataset.original || 'Delete'; }
          var id = state.conversation.id;
          await sb.from('conversations').update({ archived_at: new Date().toISOString() }).eq('id', id);
          await sb.rpc('log_event', { p_kind: 'chat.conversation_archived', p_payload: { id: id } });
          if (state.msgChannel) { try { state.msgChannel.unsubscribe(); } catch (e) {} state.msgChannel = null; }
          state.conversation = null;
          state.messages = [];
          renderThread();
          await refreshList();
        }

        // ─── Toolbar interactions ────────────────────────────
        $('hx-c-new').addEventListener('click', newConversation);
        $('hx-c-clear').addEventListener('click', deleteCurrent);

        $('hx-c-model').addEventListener('change', async function () {
          if (!state.conversation) return;
          var model = $('hx-c-model').value;
          await sb.from('conversations').update({ model: model }).eq('id', state.conversation.id);
          state.conversation.model = model;
        });
        // Project switch = full chat-context refresh. Closes the current
        // conversation, persists the new active project, reloads the
        // sidebar filtered to the new project's conversations, and opens
        // the most recent (or shows the empty state if none exist).
        async function switchActiveProject(projId, projName) {
          setActiveProject(projId, projName);
          // Tear down current conversation + realtime channel
          if (state.msgChannel) { try { state.msgChannel.unsubscribe(); } catch (e) {} state.msgChannel = null; }
          state.conversation = null;
          state.messages = [];
          $('hx-c-title').textContent = 'New chat';
          // Reload the sidebar against the new project
          await refreshList();
          // Open the most recent chat in this project (if any)
          if (state.conversations.length) {
            await openConversation(state.conversations[0].id);
          } else {
            renderThread();
          }
        }

        $('hx-c-project').addEventListener('change', async function () {
          var sel  = $('hx-c-project');
          var proj = sel.value || null;
          var name = (proj && sel.options[sel.selectedIndex]) ? sel.options[sel.selectedIndex].textContent : '';
          await switchActiveProject(proj, name);
        });

        // If another tab changes the active project, mirror the whole
        // context swap so all workspace tabs stay in sync.
        window.addEventListener('storage', async function (e) {
          if (e.key !== ACTIVE_KEY) return;
          var active = getActiveProject();
          var sel = $('hx-c-project');
          var newId = (active && active.id) || '';
          if (sel.value === newId) return; // already in sync
          sel.value = newId;
          await switchActiveProject(newId || null, (active && active.name) || '');
        });

        // ─── Composer wiring ─────────────────────────────────
        function autoSize(el) {
          el.style.height = 'auto';
          el.style.height = Math.min(200, el.scrollHeight) + 'px';
        }
        var inputEl   = $('hx-c-input');
        var sendBtn   = $('hx-c-send');
        var attachBtn = $('hx-c-attach');
        var fileInput = $('hx-c-file');
        var micBtn    = $('hx-c-mic');
        var inputRow  = $('hx-c-input-row');
        var attachBar = $('hx-c-attach-bar');

        function refreshSendDisabled() {
          var hasText = !!inputEl.value.trim();
          var hasReady = state.attachments.some(function (a) { return a.status === 'ready'; });
          var hasUploading = state.attachments.some(function (a) { return a.status === 'uploading'; });
          var voiceBusy =
            (typeof voiceState !== 'undefined') &&
            (voiceState === 'recording' || voiceState === 'starting' || voiceState === 'transcribing');
          sendBtn.disabled = (!hasText && !hasReady) || hasUploading || state.sending || state.streaming || voiceBusy;
        }

        // ─── Voice input — MediaRecorder + backend transcription ───
        // Records audio with MediaRecorder, ships the blob to our
        // /functions/v1/transcribe Edge Function which forwards to
        // Whisper (Groq or OpenAI). The browser's built-in
        // SpeechRecognition is unusable in production because Chrome's
        // engine routes through Google STT and silently fails with
        // `network` errors on common hosts.
        var listeningEl  = $('hx-c-listening');
        var voiceErrEl   = $('hx-c-voice-err');
        var voiceErrTimer = null;

        var hasMediaRecorder = !!(window.MediaRecorder
                              && navigator.mediaDevices
                              && navigator.mediaDevices.getUserMedia);

        if (!hasMediaRecorder) {
          micBtn.disabled = true;
          micBtn.title    = 'Voice input is not supported in this browser.';
        } else if (!window.isSecureContext) {
          micBtn.disabled = true;
          micBtn.title    = 'Voice input requires a secure (HTTPS) page.';
        } else {
          micBtn.title    = 'Voice input — click to record';
        }

        var mediaRecorder = null;     // active MediaRecorder during a session
        var audioChunks   = [];       // collected Blobs from ondataavailable
        var micStream     = null;     // MediaStream for the open mic
        var voiceState    = 'idle';   // 'idle' | 'starting' | 'recording' | 'transcribing'
        var recordingMime = '';       // negotiated MIME type

        function setVoiceState(next) {
          voiceState = next;
          if (next === 'recording') {
            micBtn.classList.add('is-recording');
            micBtn.setAttribute('aria-pressed', 'true');
            if (listeningEl) {
              listeningEl.style.display = '';
              listeningEl.querySelector('span:last-child').textContent = 'Listening…';
            }
          } else if (next === 'transcribing') {
            micBtn.classList.remove('is-recording');
            micBtn.setAttribute('aria-pressed', 'false');
            if (listeningEl) {
              listeningEl.style.display = '';
              listeningEl.querySelector('span:last-child').textContent = 'Transcribing…';
            }
          } else {
            // idle / starting
            micBtn.classList.remove('is-recording');
            micBtn.setAttribute('aria-pressed', 'false');
            if (listeningEl) listeningEl.style.display = 'none';
          }
          refreshSendDisabled();
        }

        function showVoiceError(msg) {
          if (!voiceErrEl) { try { console.warn('[voice]', msg); } catch (e) {} return; }
          voiceErrEl.textContent = msg;
          voiceErrEl.style.display = '';
          voiceErrEl.style.opacity = '1';
          if (voiceErrTimer) clearTimeout(voiceErrTimer);
          voiceErrTimer = setTimeout(function () {
            voiceErrEl.style.opacity = '0';
            setTimeout(function () { voiceErrEl.style.display = 'none'; }, 250);
          }, 6000);
        }
        function clearVoiceError() {
          if (!voiceErrEl) return;
          if (voiceErrTimer) { clearTimeout(voiceErrTimer); voiceErrTimer = null; }
          voiceErrEl.style.display = 'none';
          voiceErrEl.textContent = '';
        }

        function pickRecordingMime() {
          var candidates = [
            'audio/webm;codecs=opus',
            'audio/webm',
            'audio/mp4',
            'audio/ogg;codecs=opus',
            'audio/ogg',
          ];
          if (!window.MediaRecorder || !MediaRecorder.isTypeSupported) return '';
          for (var i = 0; i < candidates.length; i++) {
            try { if (MediaRecorder.isTypeSupported(candidates[i])) return candidates[i]; }
            catch (e) { /* ignore */ }
          }
          return '';
        }

        function extForMime(m) {
          if (!m) return 'webm';
          if (m.indexOf('mp4') !== -1) return 'm4a';
          if (m.indexOf('ogg') !== -1) return 'ogg';
          return 'webm';
        }

        function cleanupMicStream() {
          if (micStream) {
            try { micStream.getTracks().forEach(function (t) { try { t.stop(); } catch (e) {} }); }
            catch (e) {}
            micStream = null;
          }
        }

        function insertTranscript(text) {
          if (!text) return;
          var t = String(text).trim();
          if (!t) return;
          var cur = inputEl.value;
          inputEl.value = (cur ? cur.replace(/\s+$/, '') + ' ' : '') + t;
          autoSize(inputEl);
          refreshSendDisabled();
          inputEl.focus();
          try { inputEl.selectionStart = inputEl.selectionEnd = inputEl.value.length; }
          catch (e) {}
        }

        async function startVoice() {
          if (!hasMediaRecorder)            return;
          if (voiceState !== 'idle')        return;
          clearVoiceError();
          setVoiceState('starting');

          // Real OS/browser permission prompt
          try {
            micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
          } catch (err) {
            setVoiceState('idle');
            var name = (err && err.name) || '';
            if (name === 'NotAllowedError' || name === 'PermissionDeniedError') {
              showVoiceError('Microphone permission was denied. Enable it for this site in your browser settings.');
            } else if (name === 'NotFoundError' || name === 'OverconstrainedError') {
              showVoiceError('No microphone was found on this device.');
            } else if (name === 'NotReadableError') {
              showVoiceError('The microphone is busy in another application.');
            } else if (name === 'SecurityError') {
              showVoiceError('Microphone access blocked by browser security policy.');
            } else {
              showVoiceError('Could not access the microphone: ' + (err && (err.message || name) || 'unknown error'));
            }
            return;
          }

          recordingMime = pickRecordingMime();
          audioChunks = [];

          try {
            mediaRecorder = recordingMime
              ? new MediaRecorder(micStream, { mimeType: recordingMime })
              : new MediaRecorder(micStream);
          } catch (err) {
            try { mediaRecorder = new MediaRecorder(micStream); recordingMime = ''; }
            catch (err2) {
              cleanupMicStream();
              setVoiceState('idle');
              showVoiceError('Recording is not supported by this browser.');
              return;
            }
          }

          mediaRecorder.ondataavailable = function (e) {
            if (e && e.data && e.data.size > 0) audioChunks.push(e.data);
          };
          mediaRecorder.onerror = function () {
            showVoiceError('Recording error.');
            try { mediaRecorder.stop(); } catch (e) {}
          };
          mediaRecorder.onstop = function () {
            // Build the blob, free the mic, fire transcription
            var blob;
            try {
              blob = new Blob(audioChunks, { type: recordingMime || 'audio/webm' });
            } catch (e) {
              blob = null;
            }
            audioChunks = [];
            cleanupMicStream();
            mediaRecorder = null;

            if (!blob || blob.size < 1024) {
              setVoiceState('idle');
              showVoiceError('Recording was too short.');
              return;
            }

            transcribeAudio(blob).catch(function (err) {
              setVoiceState('idle');
              showVoiceError(err && err.message ? err.message : 'Transcription failed.');
            });
          };

          try {
            mediaRecorder.start(250);     // collect chunks every 250ms
          } catch (err) {
            cleanupMicStream();
            mediaRecorder = null;
            setVoiceState('idle');
            showVoiceError('Could not start recording: ' + (err && err.message || 'unknown error'));
            return;
          }
          setVoiceState('recording');
        }

        async function transcribeAudio(blob) {
          setVoiceState('transcribing');
          var sess = (await sb.auth.getSession()).data.session;
          if (!sess || !sess.access_token) {
            setVoiceState('idle');
            throw new Error('Not signed in.');
          }

          var fd = new FormData();
          var ext = extForMime(recordingMime);
          fd.append('audio', blob, 'recording.' + ext);
          // Send the user's preferred language as a hint to Whisper.
          // navigator.language is e.g. "el-GR" or "en-US"; send the
          // 2-letter prefix.
          var lang = (navigator.language || '').slice(0, 2);
          if (lang) fd.append('language', lang);

          var resp;
          try {
            resp = await fetch(PROJECT_URL + '/functions/v1/transcribe', {
              method: 'POST',
              headers: { Authorization: 'Bearer ' + sess.access_token },
              body: fd,
            });
          } catch (err) {
            setVoiceState('idle');
            throw new Error('Network error during transcription.');
          }

          if (!resp.ok) {
            var errBody = null;
            try { errBody = await resp.json(); } catch (e) { /* ignore */ }
            setVoiceState('idle');
            // The Edge Function always emits a clean human-readable
            // `message` field; never display raw upstream JSON.
            var msg = (errBody && typeof errBody.message === 'string' && errBody.message)
                    || (errBody && typeof errBody.hint === 'string' && errBody.hint)
                    || ('Transcription failed (HTTP ' + resp.status + ').');
            // Long messages are clipped so the banner stays a single line.
            if (msg.length > 200) msg = msg.slice(0, 197) + '…';
            throw new Error(msg);
          }

          var data = await resp.json().catch(function () { return null; });
          var text = data && typeof data.text === 'string' ? data.text : '';
          setVoiceState('idle');
          if (!text.trim()) {
            showVoiceError("I didn't catch any speech. Try again.");
            return;
          }
          insertTranscript(text);
        }

        function stopVoice() {
          // Idempotent stop; transitions through transcribing on its own.
          if (voiceState === 'recording' && mediaRecorder) {
            try { mediaRecorder.stop(); } catch (e) {
              try { cleanupMicStream(); } catch (e2) {}
              mediaRecorder = null;
              setVoiceState('idle');
            }
          } else if (voiceState === 'starting') {
            // getUserMedia in flight — best we can do is mark intent;
            // the start() will see the state change and bail.
            cleanupMicStream();
            setVoiceState('idle');
          }
          // 'transcribing' has no cancel — the upload is in flight.
          // 'idle' is a no-op.
        }

        function toggleVoice() {
          if (voiceState === 'idle')      startVoice();
          else if (voiceState === 'recording' || voiceState === 'starting') stopVoice();
          // 'transcribing' clicks are ignored
        }

        // ─── Attachment management ───────────────────────────
        function renderAttachmentBar() {
          if (!state.attachments.length) { attachBar.innerHTML = ''; return; }
          var html = '';
          state.attachments.forEach(function (a) {
            var thumb;
            if (a.media_type && a.media_type.indexOf('image/') === 0 && a._objectURL) {
              thumb = '<span class="hx-attach-chip-thumb"><img src="' + a._objectURL + '" alt=""></span>';
            } else if (a.media_type === 'application/pdf') {
              thumb = '<span class="hx-attach-chip-thumb"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></span>';
            } else {
              thumb = '<span class="hx-attach-chip-thumb"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></span>';
            }
            var status = a.status === 'uploading' ? ' is-uploading'
                       : a.status === 'error'     ? ' is-error'
                       : '';
            html += '<span class="hx-attach-chip' + status + '" data-id="' + escape(a.id) + '">' +
              thumb +
              '<span class="hx-attach-chip-name">' + escape(a.name || 'file') + '</span>' +
              '<span class="hx-attach-chip-meta">' + escape(fmtBytes(a.size)) + '</span>' +
              '<button class="hx-attach-chip-x" type="button" data-rm="' + escape(a.id) + '" aria-label="Remove">' +
                '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>' +
              '</button>' +
            '</span>';
          });
          attachBar.innerHTML = html;
          attachBar.querySelectorAll('button[data-rm]').forEach(function (b) {
            b.addEventListener('click', function () { removeAttachment(b.getAttribute('data-rm')); });
          });
        }

        function removeAttachment(id) {
          var idx = state.attachments.findIndex(function (a) { return a.id === id; });
          if (idx < 0) return;
          var a = state.attachments[idx];
          if (a._objectURL) { try { URL.revokeObjectURL(a._objectURL); } catch (e) {} }
          state.attachments.splice(idx, 1);
          renderAttachmentBar();
          refreshSendDisabled();
          // Best-effort delete from Storage if it had been uploaded.
          if (a.storage_path) {
            sb.storage.from('chat-uploads').remove([a.storage_path]).catch(function () {});
          }
        }

        function clearAttachments() {
          for (var i = 0; i < state.attachments.length; i++) {
            var a = state.attachments[i];
            if (a._objectURL) { try { URL.revokeObjectURL(a._objectURL); } catch (e) {} }
          }
          state.attachments = [];
          renderAttachmentBar();
        }

        async function handleFiles(fileList) {
          if (!fileList || !fileList.length) return;
          var u = (await sb.auth.getUser()).data.user;
          if (!u) return;

          // Make sure we have a conversation so storage paths are scoped to it.
          if (!state.conversation) await newConversation();

          for (var i = 0; i < fileList.length; i++) {
            if (state.attachments.length >= ATTACH_LIMITS.maxFiles) break;
            var f = fileList[i];
            if (!f) continue;
            if (!ATTACH_LIMITS.accepted.test(f.type || '')) continue;
            if (f.size > ATTACH_LIMITS.maxBytes) continue;

            var id = 'att-' + Date.now() + '-' + Math.random().toString(36).slice(2, 8);
            var item = {
              id:         id,
              file:       f,
              name:       f.name,
              size:       f.size,
              media_type: f.type,
              status:     'uploading',
              kind:       (f.type.indexOf('image/') === 0)         ? 'image'
                         : (f.type === 'application/pdf')          ? 'document'
                         : 'file',
              base64:     null,
              text_content: null,
              storage_path: null,
              _objectURL: f.type.indexOf('image/') === 0 ? URL.createObjectURL(f) : null,
            };
            state.attachments.push(item);
            renderAttachmentBar();
            refreshSendDisabled();

            // Upload + read in parallel.
            (function (it) {
              var convId = state.conversation.id;
              var safeName = (it.name || 'file').replace(/[^\w.\-]+/g, '_').slice(0, 80);
              var path = u.id + '/' + convId + '/' + Date.now() + '-' + safeName;

              var uploadP = sb.storage.from('chat-uploads').upload(path, it.file, {
                upsert: false, contentType: it.media_type,
              });
              var inlineP = (it.kind === 'file' && /^text\//i.test(it.media_type))
                  ? readFileAsText(it.file).then(function (t) { it.text_content = t.slice(0, 200_000); })
                  : readFileAsBase64(it.file).then(function (b) { it.base64 = b; });

              Promise.all([uploadP, inlineP]).then(function (results) {
                var up = results[0];
                if (up && up.error) {
                  it.status = 'error';
                  it.error  = up.error.message || 'upload failed';
                } else {
                  it.storage_path = path;
                  it.status = 'ready';
                }
                renderAttachmentBar();
                refreshSendDisabled();
              }).catch(function (err) {
                it.status = 'error';
                it.error  = (err && err.message) || 'upload failed';
                renderAttachmentBar();
                refreshSendDisabled();
              });
            })(item);
          }
        }

        // File picker + drag-drop on the composer
        attachBtn.addEventListener('click', function () { fileInput.click(); });
        fileInput.addEventListener('change', function (e) {
          handleFiles(e.target.files);
          fileInput.value = '';
        });
        ['dragenter','dragover'].forEach(function (ev) {
          inputRow.addEventListener(ev, function (e) {
            if (!e.dataTransfer || !e.dataTransfer.types || e.dataTransfer.types.indexOf('Files') < 0) return;
            e.preventDefault();
            inputRow.classList.add('is-drag-over');
          });
        });
        ['dragleave','dragend'].forEach(function (ev) {
          inputRow.addEventListener(ev, function () { inputRow.classList.remove('is-drag-over'); });
        });
        inputRow.addEventListener('drop', function (e) {
          if (!e.dataTransfer || !e.dataTransfer.files || !e.dataTransfer.files.length) return;
          e.preventDefault();
          inputRow.classList.remove('is-drag-over');
          handleFiles(e.dataTransfer.files);
        });

        // Paste images straight from the clipboard
        inputEl.addEventListener('paste', function (e) {
          if (!e.clipboardData || !e.clipboardData.files || !e.clipboardData.files.length) return;
          var imgs = [];
          for (var i = 0; i < e.clipboardData.files.length; i++) {
            var f = e.clipboardData.files[i];
            if (f && f.type && f.type.indexOf('image/') === 0) imgs.push(f);
          }
          if (imgs.length) { e.preventDefault(); handleFiles(imgs); }
        });

        micBtn.addEventListener('click', toggleVoice);

        inputEl.addEventListener('input', function () {
          refreshSendDisabled();
          autoSize(inputEl);
        });
        inputEl.addEventListener('keydown', function (e) {
          if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            send();
          }
        });
        sendBtn.addEventListener('click', function () { send(); });

        // ─── Boot ────────────────────────────────────────────
        // Order matters: loadProjects() resolves which project is active
        // (auto-picking the most recent if none was stored). refreshList()
        // then filters conversations by that active project.
        sb.auth.getUser().then(async function (res) {
          var u = res && res.data ? res.data.user : null; if (!u) return;
          state.owner = u.id;
          await loadProjects();
          await Promise.all([refreshList(), refreshBalance()]);

          // If the user arrived here from /workbench via "Use in chat",
          // a seed payload is waiting in sessionStorage. Spin up a fresh
          // conversation and pre-fill the composer with the artifact
          // wrapped in a short preamble. The user reviews and presses
          // Send when ready — we don't auto-send so they can edit.
          var seed = (window.HX && window.HX.workbench)
            ? window.HX.workbench.readSeed() : null;
          if (seed) {
            try {
              await newConversation();
              var input = $('hx-c-input');
              if (input && window.HX.workbench.composeSeedPrompt) {
                input.value = window.HX.workbench.composeSeedPrompt(seed);
                input.dispatchEvent(new Event('input', { bubbles: true }));
                input.focus();
                try { input.setSelectionRange(0, 0); } catch (_) {}
              }
              if (window.cxToast) window.cxToast('Loaded "' + (seed.title || 'artifact') + '" from your workbench.', 'info');
            } catch (e) {
              // Seed flow failure shouldn't break the chat page boot.
              if (window.cxToast) window.cxToast('Could not load artifact into chat. Try again from the workbench.', 'error');
            }
            return;
          }

          if (state.conversations.length) {
            await openConversation(state.conversations[0].id);
          } else {
            renderThread(); // shows the appropriate blank state
          }
        });

        window.addEventListener('beforeunload', function () {
          try { if (state.msgChannel) state.msgChannel.unsubscribe(); } catch (e) {}
        });
      });
    })();
  </script>
</body>
</html>
