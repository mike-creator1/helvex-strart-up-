    .hx-chat-foot a:hover { border-color: var(--hx-text); }
    .hx-chat-foot .hx-kbd {
      display: inline-flex; align-items: center;
      padding: 1.5px 7px;
      font-family: var(--hx-mono);
      font-size: 10px;
      font-weight: 600;
      background: linear-gradient(180deg, var(--hx-surface) 0%, var(--hx-bg-2) 100%);
      border: 1px solid var(--hx-line);
      border-radius: 5px;
      color: var(--hx-text-mid);
      margin: 0 1px;
      line-height: 1.5;
      box-shadow:
        inset 0 1px 0 color-mix(in srgb, #fff 50%, transparent),
        0 1px 0 var(--hx-line);
    }

    /* Voice input — slim status pill (used for transcribing state) */
    .hx-voice-status {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 11.5px; color: var(--hx-red);
      padding: 2px 10px;
      background: var(--hx-red-soft);
      border-radius: 999px;
      border: 1px solid rgba(220, 38, 38, 0.22);
    }
    .hx-voice-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--hx-red);
      animation: hx-voice-pulse 1.2s ease-out infinite;
    }
    @keyframes hx-voice-pulse {
      0%, 100% { opacity: 0.55; transform: scale(1); }
      50%      { opacity: 1;    transform: scale(1.25); }
    }

    /* ─── Premium voice recording panel ────────────────────────
       Replaces the textarea row with a dramatic, editorial recording
       experience: live waveform bars, MM:SS timer, cancel + commit
       buttons, breathing red dot. Slides up from the bottom. */
    .hx-voice-panel[hidden] { display: none !important; }
    .hx-voice-panel {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 8px 8px 8px 14px;
      background: linear-gradient(180deg,
        color-mix(in srgb, var(--hx-red-soft) 35%, var(--hx-surface)) 0%,
        var(--hx-surface) 100%);
      border-radius: 14px;
      border: 1px solid color-mix(in srgb, var(--hx-red) 18%, var(--hx-line));
      box-shadow:
        inset 0 1px 0 color-mix(in srgb, #fff 55%, transparent),
        0 4px 14px -6px color-mix(in srgb, var(--hx-red) 35%, transparent);
      animation: hx-voice-panel-in 0.32s cubic-bezier(0.2, 0.7, 0.2, 1) both;
      position: relative;
      overflow: hidden;
    }
    .hx-voice-panel::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(circle at 50% 110%,
        color-mix(in srgb, var(--hx-red) 16%, transparent) 0%,
        transparent 60%);
      pointer-events: none;
      animation: hx-voice-glow 2.6s ease-in-out infinite;
    }
    @keyframes hx-voice-panel-in {
      from { opacity: 0; transform: translateY(8px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes hx-voice-glow {
      0%, 100% { opacity: 0.7; }
      50%      { opacity: 1; }
    }
    .hx-voice-panel-left {
      display: inline-flex; align-items: center; gap: 10px;
      flex-shrink: 0;
      position: relative; z-index: 1;
    }
    .hx-voice-rec-dot {
      width: 9px; height: 9px; border-radius: 50%;
      background: var(--hx-red);
      box-shadow:
        0 0 0 3px color-mix(in srgb, var(--hx-red) 18%, transparent),
        0 0 12px color-mix(in srgb, var(--hx-red) 60%, transparent);
      animation: hx-voice-rec-pulse 1.4s ease-out infinite;
    }
    @keyframes hx-voice-rec-pulse {
      0%, 100% { box-shadow: 0 0 0 3px color-mix(in srgb, var(--hx-red) 18%, transparent), 0 0 10px color-mix(in srgb, var(--hx-red) 50%, transparent); transform: scale(1); }
      50%      { box-shadow: 0 0 0 6px color-mix(in srgb, var(--hx-red) 8%,  transparent), 0 0 18px color-mix(in srgb, var(--hx-red) 75%, transparent); transform: scale(1.1); }
    }
    .hx-voice-panel-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.22em;
      color: var(--hx-red);
    }
    .hx-voice-timer {
      font-family: var(--hx-mono);
      font-size: 13px;
      font-weight: 600;
      color: var(--hx-text);
      letter-spacing: 0.04em;
      font-variant-numeric: tabular-nums;
      padding-left: 4px;
      border-left: 1px solid color-mix(in srgb, var(--hx-red) 22%, var(--hx-line));
      padding-left: 10px;
      margin-left: 2px;
    }
    .hx-voice-wave {
      display: flex;
      align-items: center;
      gap: 3px;
      flex: 1;
      height: 36px;
      justify-content: center;
      position: relative; z-index: 1;
    }
    .hx-voice-wave span {
      display: block;
      width: 3px;
      border-radius: 2px;
      background: linear-gradient(180deg, var(--hx-red) 0%, color-mix(in srgb, var(--hx-red) 60%, transparent) 100%);
      animation: hx-voice-bar 1s ease-in-out infinite;
      box-shadow: 0 0 6px color-mix(in srgb, var(--hx-red) 35%, transparent);
    }
    .hx-voice-wave span:nth-child(1)  { height: 30%; animation-delay: -0.92s; animation-duration: 0.94s; }
    .hx-voice-wave span:nth-child(2)  { height: 55%; animation-delay: -0.61s; animation-duration: 1.08s; }
    .hx-voice-wave span:nth-child(3)  { height: 80%; animation-delay: -0.33s; animation-duration: 0.86s; }
    .hx-voice-wave span:nth-child(4)  { height: 45%; animation-delay: -0.22s; animation-duration: 1.16s; }
    .hx-voice-wave span:nth-child(5)  { height: 70%; animation-delay: -0.77s; animation-duration: 0.92s; }
    .hx-voice-wave span:nth-child(6)  { height: 95%; animation-delay: -0.41s; animation-duration: 1.04s; }
    .hx-voice-wave span:nth-child(7)  { height: 60%; animation-delay: -0.15s; animation-duration: 0.88s; }
    .hx-voice-wave span:nth-child(8)  { height: 85%; animation-delay: -0.55s; animation-duration: 1.12s; }
    .hx-voice-wave span:nth-child(9)  { height: 40%; animation-delay: -0.83s; animation-duration: 0.96s; }
    .hx-voice-wave span:nth-child(10) { height: 75%; animation-delay: -0.28s; animation-duration: 1.06s; }
    .hx-voice-wave span:nth-child(11) { height: 50%; animation-delay: -0.69s; animation-duration: 0.84s; }
    .hx-voice-wave span:nth-child(12) { height: 88%; animation-delay: -0.46s; animation-duration: 1.14s; }
    .hx-voice-wave span:nth-child(13) { height: 35%; animation-delay: -0.07s; animation-duration: 0.94s; }
    .hx-voice-wave span:nth-child(14) { height: 65%; animation-delay: -0.74s; animation-duration: 1.02s; }
    .hx-voice-wave span:nth-child(15) { height: 48%; animation-delay: -0.36s; animation-duration: 0.90s; }
    @keyframes hx-voice-bar {
      0%, 100% { transform: scaleY(0.35); opacity: 0.55; }
      50%      { transform: scaleY(1);    opacity: 1; }
    }
    .hx-voice-panel-actions {
      display: inline-flex; align-items: center; gap: 6px;
      flex-shrink: 0;
      position: relative; z-index: 1;
    }
    .hx-voice-cancel,
    .hx-voice-done {
      width: 34px; height: 34px;
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: 11px;
      cursor: pointer;
      border: 1px solid var(--hx-line);
      background: var(--hx-surface);
      color: var(--hx-text-mid);
      transition: transform 0.14s ease, box-shadow 0.18s ease, background 0.14s ease, color 0.14s ease, border-color 0.14s ease;
      box-shadow: var(--hx-shadow-xs);
      padding: 0;
    }
    .hx-voice-cancel:hover {
      background: var(--hx-red-soft);
      color: var(--hx-red);
      border-color: color-mix(in srgb, var(--hx-red) 30%, var(--hx-line));
      transform: translateY(-1px);
    }
    .hx-voice-cancel svg { width: 15px; height: 15px; }
    .hx-voice-done {
      background: linear-gradient(180deg, var(--hx-red) 0%, color-mix(in srgb, var(--hx-red) 80%, #000) 100%);
      color: #fff;
      border-color: var(--hx-red);
      box-shadow:
        inset 0 1px 0 color-mix(in srgb, #fff 22%, transparent),
        0 1px 2px rgba(0,0,0,0.10),
        0 6px 18px -6px color-mix(in srgb, var(--hx-red) 60%, transparent);
    }
    .hx-voice-done:hover {
      transform: translateY(-1px);
      box-shadow:
        inset 0 1px 0 color-mix(in srgb, #fff 26%, transparent),
        0 2px 4px rgba(0,0,0,0.12),
        0 10px 26px -8px color-mix(in srgb, var(--hx-red) 75%, transparent);
    }
    .hx-voice-done svg { width: 16px; height: 16px; }
    /* While the voice panel is up, hide the normal input bar */
    .hx-chat-input-row.is-recording-mode .hx-chat-input-bar { display: none; }
    .hx-voice-error {
      font-size: 11.5px;
      color: var(--hx-red);
      background: var(--hx-red-soft);
      border: 1px solid rgba(220, 38, 38, 0.22);
      border-radius: var(--hx-r-md, 6px);
      padding: 4px 10px;
      max-width: 520px;
      line-height: 1.45;
      transition: opacity 0.25s ease-out;
      word-wrap: break-word;
      overflow-wrap: anywhere;
    }
    /* Mic active state — solid red ring, not the same neutral pulse the
       other tool buttons use. Makes it obvious the mic is hot. */
    .hx-chat-tool-btn.is-recording {
      background: var(--hx-red); color: #FFF;
      border-color: var(--hx-red);
      box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.55);
      animation: hx-mic-recording 1.4s ease-out infinite;
    }
    @keyframes hx-mic-recording {
      0%   { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.55); }
      70%  { box-shadow: 0 0 0 10px rgba(220, 38, 38, 0);  }
      100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0);     }
    }

    /* Mobile thread tweaks */
    @media (max-width: 700px) {
      .hx-chat-thread { padding: 24px 0 20px; }
      .hx-chat-thread-inner { padding: 0 18px; gap: 26px; }
      .hx-chat-compose { padding: 12px 16px 16px; }
      .hx-chat-compose-inner { padding: 0; }
      .hx-chat-toolbar { padding: 12px 14px; gap: 6px; }
      .hx-chat-title { font-size: 21px; max-width: 100%; padding-left: 6px; }
      .hx-chat-title::before { left: -2px; height: 70%; }
      .hx-chat-pill { height: 28px; font-size: 12px; }
      .hx-chat-pill > span:first-child { font-size: 9.5px !important; }
      .hx-chat-balance { height: 28px; font-size: 10.5px; padding: 0 11px; }
      .hx-chat-blank { padding: 40px 20px; gap: 14px; }
      .hx-chat-blank h2 { font-size: 44px; }
      .hx-chat-blank p { font-size: 13px; }
      .hx-msg.is-user .hx-msg-content { max-width: 88%; }
      .hx-chat-foot { font-size: 10.5px; gap: 10px; }
      .hx-chat-send { width: 34px; height: 34px; }
      .hx-voice-panel { padding: 6px 6px 6px 12px; gap: 10px; }
      .hx-voice-panel-label { display: none; }
      .hx-voice-wave { height: 30px; gap: 2px; }
      .hx-voice-wave span { width: 2.5px; }
      .hx-voice-wave span:nth-child(n+12) { display: none; }
      .hx-voice-cancel, .hx-voice-done { width: 32px; height: 32px; border-radius: 10px; }
    }
  </style>
</head>

  <script>
    /* HelveX Chat workspace.
       Real conversations + messages persisted to Supabase, real model
       calls through model-proxy, realtime subscription on messages so
       the assistant reply appears the moment the proxy commits the row. */
    (function () {
      function whenAuthReady(fn) {
        if (window.HX && window.HX.supabase) { fn(); return; }
        document.addEventListener('hx:auth-ready', fn, { once: true });
      }
      var $ = function (id) { return document.getElementById(id); };
      function escape(s) {
        return (s == null ? '' : String(s))
          .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      }

      // The three HelveX models each have a distinct mark on the marketing
      // site. The chat reuses those exact marks so the thinking indicator
      // always shows the active model's identity (atom orbits for Ether,
      // burst for Nexus, flame for Prometheus).
      function modelLogoSvg(model) {
        if (model === 'nexus') {
          return '<svg viewBox="0 0 24 24" fill="none" aria-hidden="true">' +
            '<g>' +
              '<circle cx="12" cy="12" r="9.5" stroke="currentColor" stroke-width="0.6" stroke-opacity=".30"/>' +
              '<line x1="12" y1="12" x2="12"  y2="3.5"  stroke="currentColor" stroke-width="1.1" stroke-opacity=".6"/>' +
              '<line x1="12" y1="12" x2="19.4" y2="7.5"  stroke="currentColor" stroke-width="1.1" stroke-opacity=".6"/>' +
              '<line x1="12" y1="12" x2="19.4" y2="16.5" stroke="currentColor" stroke-width="1.1" stroke-opacity=".6"/>' +
              '<line x1="12" y1="12" x2="12"  y2="20.5" stroke="currentColor" stroke-width="1.1" stroke-opacity=".6"/>' +
              '<line x1="12" y1="12" x2="4.6"  y2="16.5" stroke="currentColor" stroke-width="1.1" stroke-opacity=".6"/>' +
              '<line x1="12" y1="12" x2="4.6"  y2="7.5"  stroke="currentColor" stroke-width="1.1" stroke-opacity=".6"/>' +
              '<circle cx="12"   cy="3.5"  r="1.6" fill="currentColor"/>' +

          r.onload  = function () { resolve(String(r.result || '')); };
          r.onerror = function () { reject(r.error || new Error('read failed')); };
          r.readAsText(file);
        });
      }

      whenAuthReady(function () {
        var sb = window.HX.supabase;

        // ─── Auth + balance ───────────────────────────────────
        async function refreshBalance() {
          var el = $('hx-c-balance');
          var r = await sb.from('credits_balance').select('credits_total,credits_used').maybeSingle();
          if (r && r.data) {
            var avail = Math.max(0, (r.data.credits_total || 0) - (r.data.credits_used || 0));
            el.textContent = avail.toLocaleString() + ' cr';
            el.classList.toggle('is-empty', avail <= 0);
          }
        }

        // ─── Project picker ──────────────────────────────────
        async function loadProjects() {
          var r = await sb.from('projects').select('id,name,status').order('updated_at', { ascending: false });
          var sel = $('hx-c-project');
          while (sel.options.length > 1) sel.remove(1);
          var byId = {};
          var live = (r.data || []).filter(function (p) { return p.status !== 'archived'; });
          state.projectCount = live.length;
          live.forEach(function (p) {
            byId[p.id] = p.name;
            var opt = document.createElement('option');
            opt.value = p.id; opt.textContent = p.name;
            sel.appendChild(opt);
          });

          var active = getActiveProject();

          // If the user has projects but no active selection (or the
          // previously-selected one was archived/deleted), promote the
          // most-recently-updated live project. The chat experience is
          // project-scoped, so the dropdown should never sit on "None"
          // when real projects exist.
          if ((!active || !active.id || !byId[active.id]) && live.length > 0) {
            var pick = live[0];
            setActiveProject(pick.id, pick.name);
            active = getActiveProject();
          } else if (active && active.id && !byId[active.id]) {
            // No live projects at all and the active one was archived
            setActiveProject(null);
            active = null;
          }

          // Reflect the resolved active project in the dropdown so the
          // visible selection matches the stored state. openConversation()
          // may override this later to show the open chat's own project.
          sel.value = (active && active.id) || '';
        }

        // ─── Conversation list (scoped to the active project) ─
        async function refreshList() {
          var active = getActiveProject();
          var q = sb.from('conversations').select('id,title,model,updated_at,project_id')
            .is('archived_at', null).order('updated_at', { ascending: false }).limit(100);
          // Chat is project-scoped. When an active project is selected the
          // sidebar only shows that project's conversations. With no active
          // project we fall back to ALL conversations so users don't lose
          // access to legacy chats that pre-date the project system.
          if (active && active.id) q = q.eq('project_id', active.id);
          var r = await q;
          state.conversations = r.data || [];
          renderList();
        }

        function renderList() {
          var host = $('hx-c-list');
          if (!state.conversations.length) {
            var active = getActiveProject();
            var hasProjects = !!(state.projectCount && state.projectCount > 0);
            var msg;
            if (!active || !active.id) {
              msg = hasProjects
                ? 'Select a project above to see its chats.'
                : 'Create a project first to start chatting.';
            } else {
              msg = 'No chats in this project yet.';
            }
            host.innerHTML = '<div class="hx-chat-empty-list" id="hx-c-empty">' + msg + '</div>';
            return;
          }
          var html = '';
          state.conversations.forEach(function (c) {
            var active = state.conversation && state.conversation.id === c.id;
            html += '<div class="hx-chat-item' + (active ? ' is-active' : '') + '" data-id="' + escape(c.id) + '">' +
              '<span class="hx-chat-item-title">' + escape(c.title || 'Untitled') + '</span>' +
              '<span class="hx-chat-item-meta">' +
                '<span>' + escape(relTime(c.updated_at)) + '</span>' +
              '</span>' +
            '</div>';
          });
          host.innerHTML = html;
          host.querySelectorAll('.hx-chat-item').forEach(function (el) {
            el.addEventListener('click', function () { openConversation(el.getAttribute('data-id')); });
          });
        }

        // ─── Open/close conversation ─────────────────────────
        async function openConversation(id) {
          // Tear down previous realtime channel
          if (state.msgChannel) { try { state.msgChannel.unsubscribe(); } catch (e) {} state.msgChannel = null; }

          var conv = state.conversations.find(function (c) { return c.id === id; });
          if (!conv) {
            var r = await sb.from('conversations').select('*').eq('id', id).maybeSingle();
            conv = r.data;
          }
          if (!conv) return;
          state.conversation = conv;

          // Sync toolbar
          $('hx-c-title').textContent = conv.title || 'New chat';
          $('hx-c-model').value = conv.model || 'ether';
          $('hx-c-project').value = conv.project_id || '';

          // Load messages
          var m = await sb.from('messages').select('*').eq('conversation_id', id)
            .order('created_at', { ascending: true });
          state.messages = m.data || [];
          renderThread();

          // Realtime subscription — new messages stream in live. The dedup
          // walks back through state.messages to find the most recent
          // optimistic placeholder of the same role and swaps in the
          // canonical row, so both the optimistic user turn and the
          // optimistic streaming-assistant turn are replaced cleanly.
          state.msgChannel = sb.channel('hx-msg-' + id)
            .on('postgres_changes',
                { event: 'INSERT', schema: 'public', table: 'messages', filter: 'conversation_id=eq.' + id },
                function (payload) {
                  var newMsg = payload.new;
                  if (state.messages.find(function (x) { return x.id === newMsg.id; })) return;
                  for (var i = state.messages.length - 1; i >= 0; i--) {
                    var m = state.messages[i];
                    if (m.__optimistic && m.role === newMsg.role) {
                      state.messages[i] = newMsg;
                      // While streaming, suppress full re-renders — the
                      // streaming text node is already up to date and a
                      // re-render would briefly flash. The end-of-stream
                      // path explicitly calls renderThread once.
                      if (!state.streaming) renderThread();
                      maybeCaptureToWorkbench(newMsg);
                      return;
                    }
                  }
                  state.messages.push(newMsg);
                  if (!state.streaming) renderThread();
                  maybeCaptureToWorkbench(newMsg);
                })
            .subscribe();

          renderList();
        }

        function renderThread() {
          var thread = $('hx-c-thread');
          if (!state.conversation) {
            var active = getActiveProject();
            if (!active || !active.id) {
              // No project selected — guide the user to pick one (or create
              // their first project) before they can start chatting.
              var hasProjects = !!(state.projectCount && state.projectCount > 0);
              if (hasProjects) {
                thread.innerHTML =
                  '<div class="hx-chat-blank">' +
                    '<span class="hx-chat-blank-mark" aria-hidden="true"></span>' +
                    '<span class="hx-chat-blank-eyebrow">Choose a project</span>' +
                    '<h2>Pick a project</h2>' +
                    '<p>Use the <strong>Project</strong> selector above to choose what you are working on. Every chat is saved under the active project.</p>' +
                  '</div>';
              } else {
                thread.innerHTML =
                  '<div class="hx-chat-blank">' +
                    '<span class="hx-chat-blank-mark" aria-hidden="true"></span>' +
                    '<span class="hx-chat-blank-eyebrow">Get started</span>' +
                    '<h2>Create your first project</h2>' +
                    '<p>Chats live inside projects. Open <a href="/projects.html?new=1" style="text-decoration:underline;">Projects</a> to create one, then come back here.</p>' +
                  '</div>';
              }
              return;
            }
            thread.innerHTML =
              '<div class="hx-chat-blank">' +
                '<span class="hx-chat-blank-mark" aria-hidden="true"></span>' +
                '<span class="hx-chat-blank-eyebrow">HelveX &middot; Helix</span>' +
                '<h2>Helix</h2>' +
                '<p>Working on <strong>' + escape(active.name || 'Unnamed project') + '</strong>. Send your first message below.</p>' +
              '</div>';
            return;
          }
          if (!state.messages.length && !state.sending) {
            thread.innerHTML =
              '<div class="hx-chat-blank">' +
                '<span class="hx-chat-blank-mark" aria-hidden="true"></span>' +
                '<span class="hx-chat-blank-eyebrow">New chat</span>' +
                '<h2>' + escape(state.conversation.title || 'New chat') + '</h2>' +
                '<p>Type a question, or <strong>drop a PDF, image, contract, or code file</strong> and ask Helix to analyze it.</p>' +
                '<div class="hx-chat-blank-chips">' +
                  '<button type="button" class="hx-chat-blank-chip" data-prompt="Summarize the key points in plain language.">' +
                    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="15" y2="17"/></svg>' +
                    '<span>Summarize a document</span>' +
                  '</button>' +
                  '<button type="button" class="hx-chat-blank-chip" data-prompt="Help me draft a professional response to this.">' +
                    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>' +
                    '<span>Draft an email or message</span>' +
                  '</button>' +
                  '<button type="button" class="hx-chat-blank-chip" data-prompt="Walk me through this code or explain what it does.">' +
                    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>' +
                    '<span>Explain code</span>' +
                  '</button>' +
                  '<button type="button" class="hx-chat-blank-chip" data-prompt="Brainstorm 5 ideas for">' +
                    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>' +
                    '<span>Brainstorm ideas</span>' +
                  '</button>' +
                '</div>' +
              '</div>';
            // Wire chips to prefill the composer
            thread.querySelectorAll('.hx-chat-blank-chip').forEach(function (chip) {
              chip.addEventListener('click', function () {
                var prompt = chip.getAttribute('data-prompt') || '';
                if (!prompt) return;
                inputEl.value = prompt + (prompt.endsWith(' ') ? '' : ' ');
                autoSize(inputEl);
                refreshSendDisabled();
                inputEl.focus();
                try { inputEl.selectionStart = inputEl.selectionEnd = inputEl.value.length; } catch (e) {}
              });
            });
            return;
          }
          var html = '<div class="hx-chat-thread-inner">';
          state.messages.forEach(function (m) {
            html += renderMessage(m);
          });
          if (state.sending) {
            var activeModel = ($('hx-c-model') && $('hx-c-model').value) || 'ether';
            // Minimal thinking indicator: just the active model's logo
            // doing its signature animation. No pill, no labels, no dots.
            html += '<div class="hx-msg is-assistant hx-msg-thinking">' +
              '<div class="hx-msg-body">' +
                '<span class="hx-thinking-solo is-' + activeModel + '" aria-label="' + (state.agentEnabled ? 'Planning' : 'Thinking') + '">' +
                  modelLogoSvg(activeModel) +
                '</span>' +
              '</div>' +
            '</div>';
          }
          html += '</div>';
          thread.innerHTML = html;
          // Wire copy/regenerate actions
          thread.querySelectorAll('button[data-act]').forEach(function (b) {
            b.addEventListener('click', function () {
              var act = b.getAttribute('data-act');
              var idx = parseInt(b.getAttribute('data-idx'), 10);
              var msg = state.messages[idx];
              if (!msg) return;
              if (act === 'copy') {
                navigator.clipboard && navigator.clipboard.writeText(msg.content || '').then(function () {
                  var l = b.textContent; b.innerHTML = 'Copied'; setTimeout(function () { b.innerHTML = l; }, 1200);
                });
              }
              if (act === 'regenerate') regenerate(idx);
              if (act === 'speak') speakMessage(b, msg);
            });
          });
          // Wire code block buttons (copy + preview-toggle)
          thread.querySelectorAll('.hx-code-copy-btn').forEach(function (b) {
            b.addEventListener('click', function () {
              var code = decodeURIComponent(b.getAttribute('data-code') || '');
              if (navigator.clipboard) {
                navigator.clipboard.writeText(code).then(function () {
                  var prev = b.innerHTML;
                  b.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>Copied';
                  setTimeout(function () { b.innerHTML = prev; }, 1400);
                });
              }
            });
          });
          thread.querySelectorAll('.hx-code-preview-btn').forEach(function (b) {
            b.addEventListener('click', function () {
              var id   = b.getAttribute('data-code-id');
              var code = decodeURIComponent(b.getAttribute('data-code') || '');
              var panel = document.getElementById(id + '-preview');
              if (!panel) return;
              var iframe = panel.querySelector('iframe');
              var nowOpen = panel.hidden;
              panel.hidden = !nowOpen;
              b.classList.toggle('is-active', nowOpen);
              if (nowOpen && iframe) {
                // Inject the HTML — sandbox prevents access to parent.
                // Add a base style reset so previews render predictably.
                iframe.srcdoc = code;
              }
            });
          });
          // Lazy-load signed URLs for any attachment thumbnails / file links
          hydrateAttachmentLinks(thread);
          // Scroll to bottom
          thread.scrollTop = thread.scrollHeight;
        }

        function renderAttachmentsForMsg(atts) {
          if (!atts || !atts.length) return '';
          var html = '<div class="hx-msg-attachments">';
          for (var i = 0; i < atts.length; i++) {
            var a = atts[i] || {};
            var kind = a.kind || (a.media_type && a.media_type.indexOf('image/') === 0 ? 'image' : 'file');
            if (kind === 'image') {
              var src = a._objectURL || (a.storage_path && signedUrlCache[a.storage_path]) || '';
              html += '<img class="hx-msg-attach-img" alt="' + escape(a.name || 'image') + '"' +
                (src ? ' src="' + escape(src) + '"' : '') +
                (a.storage_path ? ' data-storage-path="' + escape(a.storage_path) + '"' : '') +
                ' loading="lazy">';
            } else {
              var icon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>';
              html += '<a class="hx-msg-attach-file"' +
                (a.storage_path ? ' data-storage-path="' + escape(a.storage_path) + '"' : '') +
                ' target="_blank" rel="noopener">' +
                icon +
                '<span class="hx-msg-attach-name">' + escape(a.name || 'file') + '</span>' +
                '<span class="hx-msg-attach-meta">' + escape(fmtBytes(a.size)) + '</span>' +
              '</a>';
            }
          }
          html += '</div>';
          return html;
        }

        function renderMessage(m) {
          var i = state.messages.indexOf(m);
          var isAssist = m.role === 'assistant';
          var meta = isAssist ? '<strong>Helix</strong>' : '';
          var atts = Array.isArray(m.attachments) ? m.attachments : [];

          var actions = '';
          if (isAssist && m.content && !m.__error && !m.__streaming) {
            actions = '<div class="hx-msg-actions">' +
              '<button class="hx-msg-act hx-msg-speak" type="button" data-act="speak" data-idx="' + i + '" aria-label="Listen">' +
                '<span class="hx-msg-speak-ico hx-msg-speak-play">' +
                  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>' +
                '</span>' +
                '<span class="hx-msg-speak-ico hx-msg-speak-pause">' +
                  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>' +
                '</span>' +
                '<span class="hx-msg-speak-ico hx-msg-speak-load"><span></span><span></span><span></span></span>' +
                '<span class="hx-msg-act-label">Listen</span>' +
              '</button>' +
              '<button class="hx-msg-act" type="button" data-act="copy" data-idx="' + i + '">' +
                '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>' +
                'Copy' +
              '</button>' +
              '<button class="hx-msg-act" type="button" data-act="regenerate" data-idx="' + i + '">' +
                '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>' +
                'Regenerate' +
              '</button>' +
            '</div>';
          }

          var contentHtml = '';
          if (m.content) contentHtml = '<div class="hx-msg-content">' + renderRichContent(m.content, isAssist) + '</div>';
          else if (!atts.length) contentHtml = '<div class="hx-msg-content"></div>';

          return '<div class="hx-msg ' + (isAssist ? 'is-assistant' : 'is-user') + (m.__error ? ' hx-msg-error' : '') + '" data-msg-key="' + escape(m.id) + '">' +
            '<div class="hx-msg-body">' +
              (meta ? '<div class="hx-msg-meta">' + meta + '</div>' : '') +
              renderAttachmentsForMsg(atts) +
              contentHtml +
              actions +
            '</div>' +
          '</div>';
        }

        // After a renderThread call, walk image/file attachments that need a
        // signed URL and resolve them lazily. The DOM elements were rendered
        // with data-storage-path; we set src/href once we have the URL.
        function hydrateAttachmentLinks(root) {
          var imgs  = root.querySelectorAll('img.hx-msg-attach-img[data-storage-path]');
          var files = root.querySelectorAll('a.hx-msg-attach-file[data-storage-path]');
          var paths = {};
          imgs.forEach(function (n)  { var p = n.getAttribute('data-storage-path'); if (p) paths[p] = true; });
          files.forEach(function (n) { var p = n.getAttribute('data-storage-path'); if (p) paths[p] = true; });
          Object.keys(paths).forEach(function (p) {
            if (signedUrlCache[p]) {
              applyUrl(root, p, signedUrlCache[p]);
              return;
            }
            sb.storage.from('chat-uploads').createSignedUrl(p, 3600).then(function (r) {
              if (r && r.data && r.data.signedUrl) {
                signedUrlCache[p] = r.data.signedUrl;
                applyUrl(root, p, r.data.signedUrl);
              }
            }).catch(function () {});
          });
        }
        function applyUrl(root, path, url) {
          root.querySelectorAll('img.hx-msg-attach-img[data-storage-path="' + path + '"]').forEach(function (n) {
            if (!n.getAttribute('src')) n.setAttribute('src', url);
          });
          root.querySelectorAll('a.hx-msg-attach-file[data-storage-path="' + path + '"]').forEach(function (n) {
            n.setAttribute('href', url);
          });
        }

        // ─── New conversation ────────────────────────────────
        async function newConversation() {
          var u = (await sb.auth.getUser()).data.user; if (!u) return;
          var active = getActiveProject();
          // Guard: a chat must always live inside a project once the user
          // has projects available. If they have none, route them to create
          // one first. If they have projects but none is selected, surface
          // the dropdown.
          if (!active || !active.id) {
            if (state.projectCount && state.projectCount > 0) {
              $('hx-c-project').focus();
              renderThread();
              return;
            } else {
              if (window.cxToast) window.cxToast('Create a project to start a new chat.', 'info');
              window.location.href = '/projects.html?new=1';
              return;
            }
          }
          var model = $('hx-c-model').value || 'ether';
          var proj  = active.id;
          var ins = await sb.from('conversations').insert({
            owner_id: u.id, project_id: proj, model: model, title: 'New chat'
          }).select().maybeSingle();
          if (ins.error) { if (window.cxToast) window.cxToast(ins.error.message, 'error'); return; }
          await sb.rpc('log_event', { p_kind: 'chat.conversation_created', p_payload: { id: ins.data.id, model: model } });
          await refreshList();
          await openConversation(ins.data.id);
          $('hx-c-input').focus();
        }

        // ─── Send message (SSE streaming) ────────────────────
        async function send(retryFromIdx) {
          if (state.sending || state.streaming) return;
          // Stop any active voice recording so it can't keep dictating
          // into a new turn after the user has hit send.
          if (typeof voiceState !== 'undefined' && voiceState !== 'idle') stopVoice();
          var text = $('hx-c-input').value.trim();

          // Regenerate path: replay the last user message
          if (typeof retryFromIdx === 'number') {
            var lastUser = null;
            for (var i = retryFromIdx - 1; i >= 0; i--) {
              if (state.messages[i].role === 'user') { lastUser = state.messages[i]; break; }
            }
            if (!lastUser) return;
            text = lastUser.content;
          }

          // Capture and freeze the current attachments — anything in the
          // composer right now belongs to THIS turn.
          var readyAttachs = state.attachments.filter(function (a) { return a.status === 'ready'; });

          if (!text && !readyAttachs.length) return;

          if (!state.conversation) await newConversation();

          // Build the content for the current user turn. Single string when
          // there's just text, or an array of content blocks when we have
          // images / pdfs / inlined text files.
          var currentContent = text;
          if (readyAttachs.length) {
            var blocks = [];
            // Text-file contents inlined first so the model has them as
            // context before images/docs.
            readyAttachs.forEach(function (a) {
              if (a.kind === 'file' && typeof a.text_content === 'string') {
                blocks.push({ type: 'text', text: 'File: ' + a.name + '\n---\n' + a.text_content });
              }
            });
            // Images
            readyAttachs.forEach(function (a) {
              if (a.kind === 'image' && a.base64) {
                blocks.push({
                  type: 'image',
                  source: { type: 'base64', media_type: a.media_type, data: a.base64 },
                });
              }
            });
            // PDFs
            readyAttachs.forEach(function (a) {
              if (a.kind === 'document' && a.base64) {
                blocks.push({
                  type: 'document',
                  source: { type: 'base64', media_type: a.media_type, data: a.base64 },
                });
              }
            });
            blocks.push({ type: 'text', text: text || 'Please describe these attachments.' });
            currentContent = blocks;
          }

          // Mirror copy of attachments for persistence + UI render of the
          // optimistic bubble (keeps the in-memory _objectURL alive).
          var persistAttachs = readyAttachs.map(function (a) {
            return {
              kind:         a.kind,
              name:         a.name,
              media_type:   a.media_type,
              size:         a.size,
              storage_path: a.storage_path,
            };
          });
          var displayAttachs = readyAttachs.map(function (a) {
            return {
              kind:         a.kind,
              name:         a.name,
              media_type:   a.media_type,
              size:         a.size,
              storage_path: a.storage_path,
              _objectURL:   a._objectURL,    // for immediate thumbnail
            };
          });

          // Composer reset (chips disappear immediately on send)
          $('hx-c-input').value = '';
          autoSize($('hx-c-input'));
          // Don't revoke object URLs yet — the optimistic message still uses
          // them for the thumbnail. They'll be GC'd on page unload.
          state.attachments = [];
          renderAttachmentBar();
          refreshSendDisabled();

          // Optimistic user message + typing indicator
          var userOptId = 'opt-u-' + Date.now();
          state.messages.push({
            id: userOptId, role: 'user',
            content: text,
            attachments: displayAttachs,
            created_at: new Date().toISOString(), __optimistic: true,
          });
          state.sending = true;
          renderThread();

          // Build the array we send to the model. Past turns are sent as
          // their plain text content (history attachments are stored but
          // not re-uploaded into the model context this round).
          var send_msgs = state.messages
            .filter(function (m) { return !m.__optimistic ? true : (m.role === 'user'); })
            .map(function (m) {
              if (m.id === userOptId) return { role: m.role, content: currentContent };
              return { role: m.role, content: m.content || '' };
            });

          var t0 = Date.now();
          var traceCell = $('hx-c-trace');
          traceCell.textContent = '…';

          // Streaming state — locals so retries don't collide with class state
          var streamId       = null;
          var streamNode     = null;
          var assistantText  = '';
          var thread         = $('hx-c-thread');

          function ensureStreamMessage() {
            if (streamId) return;
            streamId = 'opt-a-' + Date.now();
            state.messages.push({
              id: streamId, role: 'assistant', content: '',
              created_at: new Date().toISOString(),
              __optimistic: true, __streaming: true,
            });
            state.sending  = false;
            state.streaming = true;
            renderThread();
            streamNode = thread.querySelector(
              '[data-msg-key="' + streamId + '"] .hx-msg-content',
            );
          }

          function appendDelta(t) {
            if (!t) return;
            ensureStreamMessage();
            assistantText += t;
            // Keep the model in sync so any incidental re-render still
            // shows what the user has been reading.
            var s = state.messages.find(function (m) { return m.id === streamId; });
            if (s) s.content = assistantText;
            // Re-render the message body through the markdown pipeline so
            // checkboxes, code blocks, bold, links etc. appear live as the
            // model streams — not just plain text. Throttled to ~120ms so
            // we don't thrash the DOM on every tiny delta.
            scheduleStreamRender();
            // Auto-scroll only if the user hasn't scrolled up to read.
            var nearBottom = (thread.scrollHeight - thread.scrollTop - thread.clientHeight) < 80;
            if (nearBottom) thread.scrollTop = thread.scrollHeight;
          }

          // Throttled markdown re-render during streaming. Latest content
          // always wins; a trailing render fires after the burst settles.
          var streamRenderPending = false;
          var streamRenderLastAt = 0;
          function scheduleStreamRender() {
            var now = Date.now();
            var elapsed = now - streamRenderLastAt;
            if (elapsed >= 120) {
              streamRenderLastAt = now;
              runStreamRender();
              return;
            }
            if (streamRenderPending) return;
            streamRenderPending = true;
            setTimeout(function () {
              streamRenderPending = false;
              streamRenderLastAt = Date.now();
              runStreamRender();
            }, 120 - elapsed);
          }
          function runStreamRender() {
            if (!streamNode) return;
            try {
              streamNode.innerHTML = renderRichContent(assistantText, true);
            } catch (e) {
              // Fallback: at least show the raw text rather than crashing
              streamNode.textContent = assistantText;
            }
          }

          function finalizeError(msg) {
            // Replace the typing indicator with an inline error bubble
            state.sending  = false;
            state.streaming = false;
            // If a streaming bubble was already created, mark it as error.
            var existing = streamId ? state.messages.find(function (m) { return m.id === streamId; }) : null;
            if (existing) {
              existing.content = msg;
              existing.__error = true;
              existing.__streaming = false;
              existing.__optimistic = false;
            } else {
              state.messages.push({
                id: 'err-' + Date.now(), role: 'assistant', content: msg,
                __error: true, created_at: new Date().toISOString(),
              });
            }
            renderThread();
          }

          try {
            var sess = (await sb.auth.getSession()).data.session;
            if (!sess || !sess.access_token) throw new Error('Not signed in.');

            var resp = await fetch(PROJECT_URL + '/functions/v1/model-proxy', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Accept':       'text/event-stream',
                'Authorization': 'Bearer ' + sess.access_token,
              },
              body: JSON.stringify({
                model:           $('hx-c-model').value || 'ether',
                conversation_id: state.conversation.id,
                system:          HELIX_SYSTEM + (state.agentEnabled ? HELIX_AGENT_SYSTEM : ''),
                messages:        send_msgs,
                user_attachments: persistAttachs,
                max_tokens:      state.agentEnabled ? 8192 : 2048,
                stream:          true,
                tools:           {
                  // Agent mode auto-enables web_search only. Code execution
                  // can run long and occasionally stalls the sandbox — the
                  // user opts in explicitly via the Tools popover when needed.
                  web:  !!(state.webEnabled  || state.agentEnabled),
                  code: !!state.codeEnabled,
                },
              }),
            });

            var ct = (resp.headers.get('content-type') || '').toLowerCase();

            if (!resp.ok) {
              var errBody = null;
              try { errBody = await resp.json(); } catch (e) { /* ignore */ }
              var emsg = (errBody && (errBody.hint || errBody.message || errBody.error)) || ('HTTP ' + resp.status);
              finalizeError(emsg);
              return;
            }

            // Fallback: server didn't actually stream. Read the full JSON
            // and let realtime deliver canonical rows in a moment.
            if (ct.indexOf('text/event-stream') !== 0 || !resp.body) {
              await resp.json().catch(function () { return null; });
              state.sending  = false;
              state.streaming = false;
              setTimeout(function () { renderThread(); refreshBalance(); refreshList(); }, 600);
              return;
            }

            // Stream — read SSE from the body
            var reader  = resp.body.getReader();
            var decoder = new TextDecoder();
            var buf = '';

            while (true) {
              var chunk = await reader.read();
              if (chunk.done) break;
              buf += decoder.decode(chunk.value, { stream: true });
              var events = buf.split('\n\n');
              buf = events.pop() || '';
              for (var ei = 0; ei < events.length; ei++) {
                var evt = events[ei];
                if (!evt) continue;
                var evname = '';
                var dataStr = '';
                var lines = evt.split('\n');
                for (var li = 0; li < lines.length; li++) {
                  var line = lines[li];
                  if (line.indexOf('event:') === 0) evname = line.slice(6).trim();
                  else if (line.indexOf('data:') === 0) dataStr += line.slice(5).trim();
                }
                if (!dataStr) continue;
                var obj = null;
                try { obj = JSON.parse(dataStr); } catch (e) { continue; }
                if (evname === 'content_block_delta' && obj.delta && obj.delta.type === 'text_delta') {
                  appendDelta(obj.delta.text || '');
                } else if (evname === 'content_block_start' && obj.content_block) {
                  // Anthropic server-side tools — when the model invokes
                  // web_search or code_execution, inject a structured marker
                  // that the markdown renderer converts into a premium
                  // animated tool card (not raw italic text).
                  var cb = obj.content_block;
                  if (cb.type === 'server_tool_use' || cb.type === 'code_execution_tool_use') {
                    var toolName = cb.name || (cb.type === 'code_execution_tool_use' ? 'code_execution' : cb.type);
                    appendDelta('\n\n<<HXTOOL:running:' + toolName + '>>\n\n');
                  } else if (cb.type === 'web_search_tool_result' || cb.type === 'code_execution_tool_result') {
                    var resultTool = cb.type === 'code_execution_tool_result' ? 'code_execution' : 'web_search';
                    appendDelta('\n\n<<HXTOOL:done:' + resultTool + '>>\n\n');
                  }
                } else if (evname === 'message_delta' && obj.delta && obj.delta.stop_reason) {
                  // If the model stopped because it hit max_tokens, tell the user
                  if (obj.delta.stop_reason === 'max_tokens') {
                    appendDelta('\n\n> _Response truncated. Tap Regenerate or ask Helix to continue._');
                  }
                } else if (evname === 'helvex_done') {
                  if (obj.trace_id) traceCell.textContent = obj.trace_id;
                } else if (evname === 'error' && obj.error && obj.error.message) {
                  finalizeError(obj.error.message);
                }
              }
            }

            // Stream complete — commit final state.
            if (streamId) {
              var s = state.messages.find(function (m) { return m.id === streamId; });
              if (s) { s.content = assistantText; s.__streaming = false; }
            } else if (assistantText) {
              // No deltas were ever observed but a final blob came through —
              // unlikely, but cover it.
              ensureStreamMessage();
              if (streamNode) streamNode.textContent = assistantText;
            }

            state.streaming = false;
            state.sending   = false;

            // Realtime will deliver the canonical row from chat_record_pair
            // and dedup will replace the optimistic streaming message. Re-
            // render once afterwards so the action buttons attach.
            setTimeout(function () { renderThread(); refreshBalance(); refreshList(); }, 350);
          } catch (err) {
            finalizeError((err && err.message) || 'Send failed.');
          }
        }

        function regenerate(assistantIdx) {
          send(assistantIdx);
        }

        // ─── Delete current conversation ─────────────────────
        async function deleteCurrent() {
          if (!state.conversation) return;
          var btn = $('hx-c-clear');
          if (btn && btn.dataset.armed !== '1') {
            btn.dataset.armed = '1';
            btn.dataset.original = btn.textContent;
            btn.textContent = 'Click again to confirm';
            btn.classList.add('armed');
            setTimeout(function () {
              if (btn.dataset.armed === '1') {
                btn.dataset.armed = '';
                btn.textContent = btn.dataset.original || 'Delete';
                btn.classList.remove('armed');
              }
            }, 3000);
            return;
          }
          if (btn) { btn.dataset.armed = ''; btn.classList.remove('armed'); btn.textContent = btn.dataset.original || 'Delete'; }
          var id = state.conversation.id;
          await sb.from('conversations').update({ archived_at: new Date().toISOString() }).eq('id', id);
          await sb.rpc('log_event', { p_kind: 'chat.conversation_archived', p_payload: { id: id } });
          if (state.msgChannel) { try { state.msgChannel.unsubscribe(); } catch (e) {} state.msgChannel = null; }
          state.conversation = null;
          state.messages = [];
          renderThread();
          await refreshList();
        }

        // ─── Toolbar interactions ────────────────────────────
        $('hx-c-new').addEventListener('click', newConversation);
        $('hx-c-clear').addEventListener('click', deleteCurrent);

        // ─── Mobile drawer (conversations panel) ─────────────
        var drawerRail    = document.querySelector('.hx-chat-rail');
        var drawerBackdrop= $('hx-c-backdrop');
        var drawerToggle  = $('hx-c-drawer-toggle');
        function openDrawer() {
          if (drawerRail) drawerRail.classList.add('is-open');
          if (drawerBackdrop) drawerBackdrop.classList.add('is-visible');
        }
        function closeDrawer() {
          if (drawerRail) drawerRail.classList.remove('is-open');
          if (drawerBackdrop) drawerBackdrop.classList.remove('is-visible');
        }
        if (drawerToggle) drawerToggle.addEventListener('click', openDrawer);
        if (drawerBackdrop) drawerBackdrop.addEventListener('click', closeDrawer);
        // Auto-close drawer when user selects a conversation or starts a new one
        var railList = $('hx-c-list');
        if (railList) {
          railList.addEventListener('click', function (e) {
            // Only close on actual conversation item taps (not on empty space)
            var t = e.target.closest('.hx-chat-item');
            if (t) closeDrawer();
          });
        }
        var newBtnEl = $('hx-c-new');
        if (newBtnEl) newBtnEl.addEventListener('click', closeDrawer);
        // Close on ESC
        document.addEventListener('keydown', function (e) {
          if (e.key === 'Escape') closeDrawer();
        });

        // Apply model theme on initial load (Ether by default)
        applyModelTheme(($('hx-c-model') && $('hx-c-model').value) || 'ether', { silent: true });

        $('hx-c-model').addEventListener('change', async function () {
          var model = $('hx-c-model').value;
          // Trigger the dramatic morph animation BEFORE the DB update so
          // the user sees the chat reshape itself instantly.
          applyModelTheme(model);
          if (state.conversation) {
            await sb.from('conversations').update({ model: model }).eq('id', state.conversation.id);
            state.conversation.model = model;
          }
        });

        // Switching models reshapes the entire chat: body gets a data-model
        // attribute that swaps CSS theme variables, a full-screen ripple
        // sweep washes from the selector outward, and a 200px ghost of the
        // new model's logo briefly appears in the center of the chat pane.
        function applyModelTheme(model, opts) {
          opts = opts || {};
          var prev = document.body.getAttribute('data-model');
          document.body.setAttribute('data-model', model);
          if (opts.silent || prev === model) return;

          // Update the in-toolbar pill if exposed
          var modelPill = document.querySelector('.hx-chat-pill[title="Model"]');
          if (modelPill) modelPill.setAttribute('data-model', model);

          // Build (or rebuild) the cinematic morph overlay
          var overlay = document.getElementById('hx-c-morph');
          if (!overlay) {
            overlay = document.createElement('div');
            overlay.id = 'hx-c-morph';
            overlay.className = 'hx-morph';
            // 18 particles arranged radially; CSS reads --p to set angle.
            var particles = '';
            for (var i = 0; i < 18; i++) particles += '<i style="--p:' + i + '"></i>';
            overlay.innerHTML =
              '<div class="hx-morph-aurora"    aria-hidden="true"></div>' +
              '<div class="hx-morph-vignette"  aria-hidden="true"></div>' +
              '<div class="hx-morph-charge"    aria-hidden="true"></div>' +
              '<div class="hx-morph-flash"     aria-hidden="true"></div>' +
              '<div class="hx-morph-rings"     aria-hidden="true"><span></span><span></span><span></span><span></span></div>' +
              '<div class="hx-morph-particles" aria-hidden="true">' + particles + '</div>' +
              '<div class="hx-morph-beam"      aria-hidden="true"></div>' +
              '<div class="hx-morph-flare"     aria-hidden="true"></div>' +
              '<div class="hx-morph-mark"      aria-hidden="true"></div>' +
              '<div class="hx-morph-name"      aria-hidden="true"><span></span></div>' +
              '<div class="hx-morph-finale"    aria-hidden="true"></div>';
            document.body.appendChild(overlay);
          }
          // Inject the new model's logo + name
          var markEl = overlay.querySelector('.hx-morph-mark');
          if (markEl) markEl.innerHTML = modelLogoSvg(model);
          var nameEl = overlay.querySelector('.hx-morph-name span');
          if (nameEl) nameEl.textContent = model.charAt(0).toUpperCase() + model.slice(1);

          // Pulse the chat pane in sync — its accents pop once on the swap
          var pane = document.querySelector('.hx-chat-pane');
          if (pane) {
            pane.classList.remove('is-morphing');
            void pane.offsetWidth;
            pane.classList.add('is-morphing');
            setTimeout(function () { pane.classList.remove('is-morphing'); }, 1700);
          }

          // Camera shake on body at the impact moment (250ms after charge)
          document.body.classList.remove('hx-screen-shake');
          void document.body.offsetWidth;
          setTimeout(function () {
            document.body.classList.add('hx-screen-shake');
            setTimeout(function () { document.body.classList.remove('hx-screen-shake'); }, 360);
          }, 280);

          // Restart the overlay animation
          overlay.classList.remove('is-playing', 'is-ether', 'is-nexus', 'is-prometheus');
          void overlay.offsetWidth;
          overlay.classList.add('is-playing', 'is-' + model);
          setTimeout(function () { overlay.classList.remove('is-playing'); }, 2400);
        }
        // Project switch = full chat-context refresh. Closes the current
        // conversation, persists the new active project, reloads the
        // sidebar filtered to the new project's conversations, and opens
        // the most recent (or shows the empty state if none exist).
        async function switchActiveProject(projId, projName) {
          setActiveProject(projId, projName);
          // Tear down current conversation + realtime channel
          if (state.msgChannel) { try { state.msgChannel.unsubscribe(); } catch (e) {} state.msgChannel = null; }
          state.conversation = null;
          state.messages = [];
          $('hx-c-title').textContent = 'New chat';
          // Reload the sidebar against the new project
          await refreshList();
          // Open the most recent chat in this project (if any)
          if (state.conversations.length) {
            await openConversation(state.conversations[0].id);
          } else {
            renderThread();
          }
        }

        $('hx-c-project').addEventListener('change', async function () {
          var sel  = $('hx-c-project');
          var proj = sel.value || null;
          var name = (proj && sel.options[sel.selectedIndex]) ? sel.options[sel.selectedIndex].textContent : '';
          await switchActiveProject(proj, name);
        });

        // If another tab changes the active project, mirror the whole
        // context swap so all workspace tabs stay in sync.
        window.addEventListener('storage', async function (e) {
          if (e.key !== ACTIVE_KEY) return;
          var active = getActiveProject();
          var sel = $('hx-c-project');
          var newId = (active && active.id) || '';
          if (sel.value === newId) return; // already in sync
          sel.value = newId;
          await switchActiveProject(newId || null, (active && active.name) || '');
        });

        // ─── Composer wiring ─────────────────────────────────
        function autoSize(el) {
          el.style.height = 'auto';
          el.style.height = Math.min(200, el.scrollHeight) + 'px';
        }
        var inputEl   = $('hx-c-input');
        var sendBtn   = $('hx-c-send');
        var attachBtn = $('hx-c-attach');
        var fileInput = $('hx-c-file');
        var micBtn    = $('hx-c-mic');
        var inputRow  = $('hx-c-input-row');
        var attachBar = $('hx-c-attach-bar');

        function refreshSendDisabled() {
          var hasText = !!inputEl.value.trim();
          var hasReady = state.attachments.some(function (a) { return a.status === 'ready'; });
          var hasUploading = state.attachments.some(function (a) { return a.status === 'uploading'; });
          var voiceBusy =
            (typeof voiceState !== 'undefined') &&
            (voiceState === 'recording' || voiceState === 'starting' || voiceState === 'transcribing');
          sendBtn.disabled = (!hasText && !hasReady) || hasUploading || state.sending || state.streaming || voiceBusy;
        }

        // ─── Voice input — MediaRecorder + backend transcription ───
        // Records audio with MediaRecorder, ships the blob to our
        // /functions/v1/transcribe Edge Function which forwards to
        // Whisper (Groq or OpenAI). The browser's built-in
        // SpeechRecognition is unusable in production because Chrome's
        // engine routes through Google STT and silently fails with
        // `network` errors on common hosts.
        var listeningEl  = $('hx-c-listening');
        var voiceErrEl   = $('hx-c-voice-err');
        var voiceErrTimer = null;

        var hasMediaRecorder = !!(window.MediaRecorder
                              && navigator.mediaDevices
                              && navigator.mediaDevices.getUserMedia);

        if (!hasMediaRecorder) {
          micBtn.disabled = true;
          micBtn.title    = 'Voice input is not supported in this browser.';
        } else if (!window.isSecureContext) {
          micBtn.disabled = true;
          micBtn.title    = 'Voice input requires a secure (HTTPS) page.';
        } else {
          micBtn.title    = 'Voice input — click to record';
        }

        var mediaRecorder = null;     // active MediaRecorder during a session
        var audioChunks   = [];       // collected Blobs from ondataavailable
        var micStream     = null;     // MediaStream for the open mic
        var voiceState    = 'idle';   // 'idle' | 'starting' | 'recording' | 'transcribing'
        var recordingMime = '';       // negotiated MIME type
        var voicePanel    = $('hx-c-voice-panel');
        var voiceTimerEl  = $('hx-c-voice-timer');
        var voiceCancelBtn= $('hx-c-voice-cancel');
        var voiceDoneBtn  = $('hx-c-voice-done');
        var voiceCanceled = false;    // set by cancel button to skip transcription
        var voiceTimerHandle = null;
        var voiceStartedAt   = 0;
        var inputRowEl    = document.querySelector('.hx-chat-input-row');

        function fmtVoiceTime(ms) {
          var s = Math.max(0, Math.floor(ms / 1000));
          var mm = Math.floor(s / 60);
          var ss = s % 60;
          return (mm < 10 ? '0' : '') + mm + ':' + (ss < 10 ? '0' : '') + ss;
        }
        function startVoiceTimer() {
          voiceStartedAt = Date.now();
          if (voiceTimerEl) voiceTimerEl.textContent = '00:00';
          if (voiceTimerHandle) clearInterval(voiceTimerHandle);
          voiceTimerHandle = setInterval(function () {
            if (voiceTimerEl) voiceTimerEl.textContent = fmtVoiceTime(Date.now() - voiceStartedAt);
          }, 250);
        }
        function stopVoiceTimer() {
          if (voiceTimerHandle) { clearInterval(voiceTimerHandle); voiceTimerHandle = null; }
        }

        function setVoiceState(next) {
          voiceState = next;
          if (next === 'recording') {
            micBtn.classList.add('is-recording');
            micBtn.setAttribute('aria-pressed', 'true');
            if (voicePanel) voicePanel.hidden = false;
            if (inputRowEl) inputRowEl.classList.add('is-recording-mode');
            if (listeningEl) listeningEl.style.display = 'none';
            startVoiceTimer();
          } else if (next === 'transcribing') {
            micBtn.classList.remove('is-recording');
            micBtn.setAttribute('aria-pressed', 'false');
            if (voicePanel) voicePanel.hidden = true;
            if (inputRowEl) inputRowEl.classList.remove('is-recording-mode');
            stopVoiceTimer();
            if (listeningEl) {
              listeningEl.style.display = '';
              listeningEl.querySelector('span:last-child').textContent = 'Transcribing…';
            }
          } else {
            // idle / starting
            micBtn.classList.remove('is-recording');
            micBtn.setAttribute('aria-pressed', 'false');
            if (voicePanel) voicePanel.hidden = true;
            if (inputRowEl) inputRowEl.classList.remove('is-recording-mode');
            stopVoiceTimer();
            if (listeningEl) listeningEl.style.display = 'none';
          }
          refreshSendDisabled();
        }

        function showVoiceError(msg) {
          if (!voiceErrEl) { try { console.warn('[voice]', msg); } catch (e) {} return; }
          voiceErrEl.textContent = msg;
          voiceErrEl.style.display = '';
          voiceErrEl.style.opacity = '1';
          if (voiceErrTimer) clearTimeout(voiceErrTimer);
          voiceErrTimer = setTimeout(function () {
            voiceErrEl.style.opacity = '0';
            setTimeout(function () { voiceErrEl.style.display = 'none'; }, 250);
          }, 6000);
        }
        function clearVoiceError() {
          if (!voiceErrEl) return;
          if (voiceErrTimer) { clearTimeout(voiceErrTimer); voiceErrTimer = null; }
          voiceErrEl.style.display = 'none';
          voiceErrEl.textContent = '';
        }

        function pickRecordingMime() {
          var candidates = [
            'audio/webm;codecs=opus',
            'audio/webm',
            'audio/mp4',
            'audio/ogg;codecs=opus',
            'audio/ogg',
          ];
          if (!window.MediaRecorder || !MediaRecorder.isTypeSupported) return '';
          for (var i = 0; i < candidates.length; i++) {
            try { if (MediaRecorder.isTypeSupported(candidates[i])) return candidates[i]; }
            catch (e) { /* ignore */ }
          }
          return '';
        }

        function extForMime(m) {
          if (!m) return 'webm';
          if (m.indexOf('mp4') !== -1) return 'm4a';
          if (m.indexOf('ogg') !== -1) return 'ogg';
          return 'webm';
        }

        function cleanupMicStream() {
          if (micStream) {
            try { micStream.getTracks().forEach(function (t) { try { t.stop(); } catch (e) {} }); }
            catch (e) {}
            micStream = null;
          }
        }

        // ─── Text-to-Speech (premium ChatGPT-style voice playback) ────
        // One audio player at a time. Tapping the speaker on a message
        // fetches /functions/v1/tts (OpenAI tts-1-hd, voice 'nova') and
        // plays the MP3 back. Tapping again pauses. Cache the blob URL
        // per message so re-playing is instant.
        var ttsAudio    = null;     // currently active HTMLAudioElement
        var ttsBtn      = null;     // currently active speaker button
        var ttsBlobCache = Object.create(null); // msg.id -> blob URL
        function speakBtnSetState(btn, state) {
          // states: 'idle' | 'loading' | 'playing'
          if (!btn) return;
          btn.classList.remove('is-loading', 'is-playing');
          if (state === 'loading') btn.classList.add('is-loading');
          else if (state === 'playing') btn.classList.add('is-playing');
          var label = btn.querySelector('.hx-msg-act-label');
          if (label) label.textContent = state === 'playing' ? 'Pause' : state === 'loading' ? 'Loading…' : 'Listen';
        }
        function stopActiveTTS() {
          if (ttsAudio) {
            try { ttsAudio.pause(); ttsAudio.currentTime = 0; } catch (e) {}
          }
          if (ttsBtn) speakBtnSetState(ttsBtn, 'idle');
          ttsAudio = null;
          ttsBtn   = null;
        }
        async function speakMessage(btn, msg) {
          var text = (msg && msg.content) ? String(msg.content) : '';
          if (!text.trim()) return;

          // Same button tapped while playing → pause
          if (ttsBtn === btn && ttsAudio && !ttsAudio.paused) {
            stopActiveTTS();
            return;
          }
          // Different button tapped → stop the previous one first
          if (ttsBtn && ttsBtn !== btn) stopActiveTTS();

          // Cached blob → play immediately
          var cached = ttsBlobCache[msg.id];
          if (cached) {
            playTTSBlob(btn, cached);
            return;
          }

          speakBtnSetState(btn, 'loading');
          ttsBtn = btn;

          try {
            var sess = (await sb.auth.getSession()).data.session;
            if (!sess || !sess.access_token) {
              speakBtnSetState(btn, 'idle');
              ttsBtn = null;
              return;
            }
            var resp = await fetch(PROJECT_URL + '/functions/v1/tts', {
              method: 'POST',
              headers: {
                'Authorization': 'Bearer ' + sess.access_token,
                'Content-Type': 'application/json',
              },
              body: JSON.stringify({
                text: text.length > 4000 ? text.slice(0, 4000) : text,
                voice: 'nova',
                model: 'tts-1-hd',
              }),
            });
            if (!resp.ok) {
              speakBtnSetState(btn, 'idle');
              ttsBtn = null;
              return;
            }
            var blob = await resp.blob();
            var url  = URL.createObjectURL(blob);
            ttsBlobCache[msg.id] = url;
            playTTSBlob(btn, url);
          } catch (err) {
            speakBtnSetState(btn, 'idle');
            ttsBtn = null;
          }
        }
        function playTTSBlob(btn, blobUrl) {
          ttsAudio = new Audio(blobUrl);
          ttsBtn   = btn;
          speakBtnSetState(btn, 'playing');
          ttsAudio.addEventListener('ended', function () {
            speakBtnSetState(btn, 'idle');
            ttsAudio = null;
            ttsBtn   = null;
          });
          ttsAudio.addEventListener('error', function () {
            speakBtnSetState(btn, 'idle');
            ttsAudio = null;
            ttsBtn   = null;
          });
          ttsAudio.play().catch(function () {
            speakBtnSetState(btn, 'idle');
            ttsAudio = null;
            ttsBtn   = null;
          });
        }

        function insertTranscript(text) {
          if (!text) return;
          var t = String(text).trim();
          if (!t) return;
          var cur = inputEl.value;
          inputEl.value = (cur ? cur.replace(/\s+$/, '') + ' ' : '') + t;
          autoSize(inputEl);
          refreshSendDisabled();
          inputEl.focus();
          try { inputEl.selectionStart = inputEl.selectionEnd = inputEl.value.length; }
          catch (e) {}
        }

        async function startVoice() {
          if (!hasMediaRecorder)            return;
          if (voiceState !== 'idle')        return;
          clearVoiceError();
          setVoiceState('starting');

          // Real OS/browser permission prompt
          try {
            micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
          } catch (err) {
            setVoiceState('idle');
            var name = (err && err.name) || '';
            if (name === 'NotAllowedError' || name === 'PermissionDeniedError') {
              showVoiceError('Microphone permission was denied. Enable it for this site in your browser settings.');
            } else if (name === 'NotFoundError' || name === 'OverconstrainedError') {
              showVoiceError('No microphone was found on this device.');
            } else if (name === 'NotReadableError') {
              showVoiceError('The microphone is busy in another application.');
            } else if (name === 'SecurityError') {
              showVoiceError('Microphone access blocked by browser security policy.');
            } else {
              showVoiceError('Could not access the microphone: ' + (err && (err.message || name) || 'unknown error'));
            }
            return;
          }

          recordingMime = pickRecordingMime();
          audioChunks = [];

          try {
            mediaRecorder = recordingMime
              ? new MediaRecorder(micStream, { mimeType: recordingMime })
              : new MediaRecorder(micStream);
          } catch (err) {
            try { mediaRecorder = new MediaRecorder(micStream); recordingMime = ''; }
            catch (err2) {
              cleanupMicStream();
              setVoiceState('idle');
              showVoiceError('Recording is not supported by this browser.');
              return;
            }
          }

          mediaRecorder.ondataavailable = function (e) {
            if (e && e.data && e.data.size > 0) audioChunks.push(e.data);
          };
          mediaRecorder.onerror = function () {
            showVoiceError('Recording error.');
            try { mediaRecorder.stop(); } catch (e) {}
          };
          mediaRecorder.onstop = function () {
            // Build the blob, free the mic, fire transcription
            var blob;
            try {
              blob = new Blob(audioChunks, { type: recordingMime || 'audio/webm' });
            } catch (e) {
              blob = null;
            }
            audioChunks = [];
            cleanupMicStream();
            mediaRecorder = null;

            if (!blob || blob.size < 1024) {
              setVoiceState('idle');
              showVoiceError('Recording was too short.');
              return;
            }

            transcribeAudio(blob).catch(function (err) {
              setVoiceState('idle');
              showVoiceError(err && err.message ? err.message : 'Transcription failed.');
            });
          };

          try {
            mediaRecorder.start(250);     // collect chunks every 250ms
          } catch (err) {
            cleanupMicStream();
            mediaRecorder = null;
            setVoiceState('idle');
            showVoiceError('Could not start recording: ' + (err && err.message || 'unknown error'));
            return;
          }
          setVoiceState('recording');
        }

        async function transcribeAudio(blob) {
          setVoiceState('transcribing');
          var sess = (await sb.auth.getSession()).data.session;
          if (!sess || !sess.access_token) {
            setVoiceState('idle');
            throw new Error('Not signed in.');
          }

          var fd = new FormData();
          var ext = extForMime(recordingMime);
          fd.append('audio', blob, 'recording.' + ext);
          // Send the user's preferred language as a hint to Whisper.
          // navigator.language is e.g. "el-GR" or "en-US"; send the
          // 2-letter prefix.
          var lang = (navigator.language || '').slice(0, 2);
          if (lang) fd.append('language', lang);

          var resp;
          try {
            resp = await fetch(PROJECT_URL + '/functions/v1/transcribe', {
              method: 'POST',
              headers: { Authorization: 'Bearer ' + sess.access_token },
              body: fd,
            });
          } catch (err) {
            setVoiceState('idle');
            throw new Error('Network error during transcription.');
          }

          if (!resp.ok) {
            var errBody = null;
            try { errBody = await resp.json(); } catch (e) { /* ignore */ }
            setVoiceState('idle');
            // The Edge Function always emits a clean human-readable
            // `message` field; never display raw upstream JSON.
            var msg = (errBody && typeof errBody.message === 'string' && errBody.message)
                    || (errBody && typeof errBody.hint === 'string' && errBody.hint)
                    || ('Transcription failed (HTTP ' + resp.status + ').');
            // Long messages are clipped so the banner stays a single line.
            if (msg.length > 200) msg = msg.slice(0, 197) + '…';
            throw new Error(msg);
          }

          var data = await resp.json().catch(function () { return null; });
          var text = data && typeof data.text === 'string' ? data.text : '';
          setVoiceState('idle');
          if (!text.trim()) {
            showVoiceError("I didn't catch any speech. Try again.");
            return;
          }
          insertTranscript(text);
        }

        function stopVoice() {
          // Idempotent stop; transitions through transcribing on its own.
          if (voiceState === 'recording' && mediaRecorder) {
            try { mediaRecorder.stop(); } catch (e) {
              try { cleanupMicStream(); } catch (e2) {}
              mediaRecorder = null;
              setVoiceState('idle');
            }
          } else if (voiceState === 'starting') {
            // getUserMedia in flight — best we can do is mark intent;
            // the start() will see the state change and bail.
            cleanupMicStream();
            setVoiceState('idle');
          }
          // 'transcribing' has no cancel — the upload is in flight.
          // 'idle' is a no-op.
        }

        function toggleVoice() {
          if (voiceState === 'idle')      startVoice();
          else if (voiceState === 'recording' || voiceState === 'starting') stopVoice();
          // 'transcribing' clicks are ignored
        }

        // ─── Attachment management ───────────────────────────
        function renderAttachmentBar() {
          if (!state.attachments.length) { attachBar.innerHTML = ''; return; }
          var html = '';
          state.attachments.forEach(function (a) {
            var thumb;
            if (a.media_type && a.media_type.indexOf('image/') === 0 && a._objectURL) {
              thumb = '<span class="hx-attach-chip-thumb"><img src="' + a._objectURL + '" alt=""></span>';
            } else if (a.media_type === 'application/pdf') {
              thumb = '<span class="hx-attach-chip-thumb"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></span>';
            } else {
