<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Business Assistant — HelveX</title>
  <meta name="description" content="HelveX Business Assistant — persistent AI chat with custom personas. Plans, contracts, invoices, multilingual drafts." />
  <link rel="icon" type="image/png" href="/helvex-logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://yjmpallrtpeinpdilptj.supabase.co" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/platform.css" />
  <link rel="stylesheet" href="/platform-ai.css" />
  <style>
    /* Assistant layout: thread sidebar + chat area */
    .hx-asst-layout { display: grid; grid-template-columns: 260px 1fr; gap: 14px; margin-top: 14px; height: calc(100vh - 280px); min-height: 560px; }
    @media (max-width: 900px) { .hx-asst-layout { grid-template-columns: 1fr; height: auto; } .hx-thread-pane { max-height: 240px; } }

    .hx-thread-pane { background: #fff; border: 1px solid var(--hx-line); border-radius: var(--hx-r); display: flex; flex-direction: column; overflow: hidden; }
    .hx-thread-head { padding: 12px 12px 10px; border-bottom: 1px solid var(--hx-line); display: flex; gap: 8px; }
    .hx-thread-new { flex: 1; padding: 8px 12px; background: var(--hx-text); color: #fff; border: 0; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; transition: background 0.12s; }
    .hx-thread-new:hover { background: #000; }
    .hx-thread-search-wrap { padding: 8px 12px; border-bottom: 1px solid var(--hx-line); }
    .hx-thread-search { width: 100%; padding: 7px 10px; border: 1px solid var(--hx-line); border-radius: 8px; font: inherit; font-size: 12.5px; outline: none; }
    .hx-thread-search:focus { border-color: var(--hx-yellow-deep); }
    .hx-thread-list { flex: 1; overflow-y: auto; padding: 6px; }
    .hx-thread-item { padding: 10px 10px; border-radius: 8px; cursor: pointer; transition: background 0.12s; position: relative; }
    .hx-thread-item:hover { background: var(--hx-cream); }
    .hx-thread-item.active { background: rgba(252,211,77,0.18); border-left: 3px solid var(--hx-yellow-deep); padding-left: 7px; }
    .hx-thread-title { font-size: 12.5px; font-weight: 600; color: var(--hx-text); margin: 0 0 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .hx-thread-meta { font-size: 10.5px; color: var(--hx-text-mid); font-family: var(--hx-mono); display: flex; justify-content: space-between; align-items: center; }
    .hx-thread-del { background: transparent; border: 0; color: var(--hx-text-mid); cursor: pointer; opacity: 0; transition: opacity 0.12s, color 0.12s; padding: 0 2px; font-size: 12px; }
    .hx-thread-item:hover .hx-thread-del { opacity: 1; }
    .hx-thread-del:hover { color: #dc2626; }
    .hx-thread-empty { padding: 18px 14px; font-size: 12px; color: var(--hx-text-mid); text-align: center; line-height: 1.5; }

    .hx-asst-main { display: flex; flex-direction: column; overflow: hidden; background: #fff; border: 1px solid var(--hx-line); border-radius: var(--hx-r); }
    .hx-asst-bar { display: flex; align-items: center; justify-content: space-between; padding: 12px 18px; border-bottom: 1px solid var(--hx-line); background: var(--hx-cream); }
    .hx-persona-pill { display: inline-flex; align-items: center; gap: 8px; padding: 6px 12px; background: #fff; border: 1px solid var(--hx-line); border-radius: 8px; cursor: pointer; font-size: 12.5px; font-weight: 500; color: var(--hx-text); transition: border-color 0.12s; }
    .hx-persona-pill:hover { border-color: var(--hx-text); }
    .hx-persona-pill .ico { font-size: 14px; }
    .hx-persona-pill .arrow { color: var(--hx-text-mid); font-size: 10px; }
    .hx-asst-title { font-size: 13.5px; font-weight: 600; color: var(--hx-text); flex: 1; margin: 0 0 0 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .hxai-chat-scroll { flex: 1; overflow-y: auto; padding: 18px 18px 8px; display: flex; flex-direction: column; gap: 14px; }
    .hxai-chat-input-row { padding: 12px 18px 14px; border-top: 1px solid var(--hx-line); }
    .hxai-chat-input-row { display: flex; gap: 8px; }
    .hxai-chat-input-row textarea { flex: 1; min-height: 44px; max-height: 160px; padding: 12px 14px; border: 1px solid var(--hx-line); border-radius: 12px; font: inherit; font-size: 13.5px; resize: vertical; line-height: 1.5; }
    .hxai-chat-input-row textarea:focus { outline: none; border-color: var(--hx-yellow-deep); box-shadow: 0 0 0 3px rgba(252,211,77,0.18); }
    .hxai-chat-send { padding: 0 18px; background: var(--hx-text); color: #fff; border: 0; border-radius: 12px; font-weight: 600; font-size: 13px; cursor: pointer; transition: background 0.12s; }
    .hxai-chat-send:hover:not(:disabled) { background: #000; }
    .hxai-chat-send:disabled { opacity: 0.5; cursor: not-allowed; }

    .hx-chat-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; color: var(--hx-text-mid); padding: 28px; }
    .hx-chat-empty h3 { font-size: 18px; color: var(--hx-text); margin: 0 0 6px; }
    .hx-chat-empty p { font-size: 13.5px; margin: 0; max-width: 380px; line-height: 1.5; }
    .hx-chat-empty .hx-empty-icon { width: 48px; height: 48px; border-radius: 12px; background: var(--hx-cream); display: flex; align-items: center; justify-content: center; margin-bottom: 14px; }
    .hx-chat-empty svg { width: 24px; height: 24px; color: var(--hx-yellow-deep); }
    .hx-quick-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 20px; width: 100%; max-width: 540px; }
    @media (max-width: 700px) { .hx-quick-grid { grid-template-columns: 1fr; } }
    .hx-quick { padding: 12px 14px; background: var(--hx-cream); border: 1px solid var(--hx-line); border-radius: 10px; text-align: left; cursor: pointer; transition: border-color 0.12s, transform 0.12s; font-size: 12.5px; color: var(--hx-text); }
    .hx-quick:hover { border-color: var(--hx-yellow-deep); transform: translateY(-1px); }
    .hx-quick strong { display: block; font-size: 11.5px; font-weight: 600; margin-bottom: 2px; color: var(--hx-text-mid); text-transform: uppercase; letter-spacing: 0.05em; font-family: var(--hx-mono); }

    /* Persona picker dropdown */
    .hx-persona-menu { position: absolute; top: 100%; left: 0; margin-top: 4px; background: #fff; border: 1px solid var(--hx-line); border-radius: 10px; box-shadow: 0 12px 32px -8px rgba(15,15,16,0.18); padding: 6px; min-width: 280px; z-index: 100; display: none; }
    .hx-persona-menu.open { display: block; }
    .hx-persona-opt { padding: 10px 12px; border-radius: 7px; cursor: pointer; transition: background 0.10s; display: flex; gap: 10px; align-items: flex-start; }
    .hx-persona-opt:hover { background: var(--hx-cream); }
    .hx-persona-opt.active { background: rgba(252,211,77,0.15); }
    .hx-persona-opt-ico { font-size: 18px; line-height: 1; flex-shrink: 0; margin-top: 2px; }
    .hx-persona-opt-name { font-size: 13px; font-weight: 600; color: var(--hx-text); margin: 0; }
    .hx-persona-opt-desc { font-size: 11.5px; color: var(--hx-text-mid); margin: 1px 0 0; line-height: 1.4; }
    .hx-persona-menu-foot { border-top: 1px solid var(--hx-line); margin-top: 6px; padding: 8px 12px; }
    .hx-persona-menu-foot button { width: 100%; padding: 6px 10px; background: transparent; border: 1px dashed var(--hx-line); border-radius: 7px; font-size: 11.5px; color: var(--hx-text-mid); cursor: pointer; transition: all 0.12s; }
    .hx-persona-menu-foot button:hover { border-style: solid; color: var(--hx-text); border-color: var(--hx-text); }
    .hx-persona-wrap { position: relative; }
  </style>
</head>
<body data-active="app-assistant">

  <div class="hx-app">
    <aside class="hx-sidebar"></aside>
    <div>
      <div class="hx-topbar"></div>
      <main class="hx-main">

        <div class="hx-page-head">
          <div>
            <h1>Business assistant.</h1>
            <p class="sub">Persistent threads · custom personas · streaming HelveX · everything saved locally to your browser.</p>
          </div>
          <div class="hx-page-actions">
            <a href="/business-assistant" class="hx-btn hx-btn-secondary">About assistant</a>
          </div>
        </div>

        <div class="hx-grid hx-grid-3">
          <div class="hx-stat"><p class="hx-stat-label">Threads saved</p><p class="hx-stat-value hx-mono" id="hx-stat-threads">0</p><p class="hx-stat-meta">In your browser</p></div>
          <div class="hx-stat"><p class="hx-stat-label">Personas</p><p class="hx-stat-value hx-mono" id="hx-stat-personas">5</p><p class="hx-stat-meta">Built-in + custom</p></div>
          <div class="hx-stat"><p class="hx-stat-label">Model</p><p class="hx-stat-value hx-mono">Nexus 4.5</p><p class="hx-stat-meta">HelveX · streaming</p></div>
        </div>

        <div class="hx-asst-layout">

          <!-- Thread list sidebar -->
          <aside class="hx-thread-pane">
            <div class="hx-thread-head">
              <button class="hx-thread-new" id="hx-new-thread">+ New chat</button>
            </div>
            <div class="hx-thread-search-wrap">
              <input type="search" class="hx-thread-search" id="hx-thread-search" placeholder="Search threads…" />
            </div>
            <div class="hx-thread-list" id="hx-thread-list"></div>
          </aside>

          <!-- Chat area -->
          <div class="hx-asst-main">
            <div class="hx-asst-bar">
              <div class="hx-persona-wrap" id="hx-persona-wrap">
                <button class="hx-persona-pill" id="hx-persona-pill">
                  <span class="ico" id="hx-persona-ico">D</span>
                  <span id="hx-persona-name">Default</span>
                  <span class="arrow">▾</span>
                </button>
                <div class="hx-persona-menu" id="hx-persona-menu"></div>
              </div>
              <p class="hx-asst-title" id="hx-asst-title">New chat</p>
            </div>

            <div class="hxai-chat-scroll" id="hx-chat-scroll"></div>

            <div class="hxai-chat-input-row">
              <textarea id="hx-chat-input" placeholder="Type your question or instruction… (Enter to send, Shift+Enter for new line)"></textarea>
              <button class="hxai-chat-send" id="hx-chat-send">Send</button>
            </div>
          </div>
        </div>

      </main>
    </div>
  </div>

  <!-- New custom persona modal -->
  <div class="hxai-modal-back" id="hx-persona-modal" role="dialog" aria-modal="true">
    <div class="hxai-modal">
      <div class="hxai-modal-head">
        <h3>New custom persona</h3>
        <button class="close" id="hx-persona-modal-close" aria-label="Close">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="hxai-modal-body">
        <div class="hxai-field">
          <label for="hx-persona-name-input">Persona name <span class="hxai-hint">(short, e.g. "Swiss tax advisor")</span></label>
          <input type="text" id="hx-persona-name-input" maxlength="60" placeholder="Swiss tax advisor" />
        </div>
        <div class="hxai-field">
          <label for="hx-persona-system">Instructions <span class="hxai-hint">(how this persona should behave — minimum 20 characters)</span></label>
          <textarea id="hx-persona-system" rows="6" placeholder="You are a Swiss tax advisor. You explain VAT, withholding tax, and cantonal differences clearly. You cite the cantonal source when relevant. You never give advice that requires a licensed Treuhänder without flagging it."></textarea>
        </div>
        <div id="hx-persona-err" style="font-size:12.5px;color:#b91c1c;margin-top:4px;display:none;"></div>
      </div>
      <div class="hxai-modal-foot">
        <button class="hx-btn hx-btn-secondary" id="hx-persona-cancel">Cancel</button>
        <button class="hx-btn hx-btn-primary" id="hx-persona-save">Create persona</button>
      </div>
    </div>
  </div>

  <script src="/platform.js"></script>
  <script src="/platform-ai.js"></script>
  <script>
    (function () {
      // ============ PERSONAS ============
      const BUILTIN_PERSONAS = [
        { id: 'default',  ico: 'D',  name: 'Default',          desc: 'General business co-pilot. Concise, multilingual, action-first.', system: '' },
        { id: 'sales',    ico: 'S',  name: 'Sales coach',      desc: 'B2B sales mentor. Cold emails, discovery, objection handling.',  system: 'You are a senior B2B sales coach. You write copy that converts, prep talking points for calls, handle objections with direct counters. Concise, opinionated, no fluff. Match the user\'s language.' },
        { id: 'marketing',ico: 'M',  name: 'Marketing strategist',desc: 'Campaigns, positioning, copywriting, GTM.',                     system: 'You are a growth marketing strategist who has launched SaaS products from zero to $10M ARR. You think in funnels, channels, and unit economics. You give clear, opinionated recommendations with concrete next steps. Match the user\'s language.' },
        { id: 'legal',    ico: 'L',  name: 'Legal advisor (CH/EU)',desc: 'Swiss + EU contract drafting, GDPR, NDAs, ToS — not a replacement for a lawyer.', system: 'You are a corporate legal advisor specialising in Swiss and EU contract law. You draft NDAs, SoWs, terms of service, privacy policies; you explain GDPR obligations clearly; you flag risks honestly. Always end legal output with: "Reviewed by a qualified lawyer before signing — this is drafting assistance, not legal advice." Match the user\'s language.' },
        { id: 'recruit',  ico: 'R',  name: 'Recruiter',        desc: 'Job specs, interview kits, candidate rejection emails, sourcing.',system: 'You are a senior recruiter who has hired 500+ people across tech, sales, and operations. You write tight job specs that filter the right candidates, design interview kits, draft kind rejection emails. Match the user\'s language.' },
      ];

      // Personas remain client-side: they're UX customisation, not data
      // worth a server round-trip. Only the built-ins + user-added ones.
      const customPersonas = HXAI.store.get('assistant', 'custom_personas', []);
      let personas = [...BUILTIN_PERSONAS, ...customPersonas];

      // ============ THREADS ============
      // Threads + messages live in Supabase (assistant_threads,
      // assistant_messages) so they survive cache clears and follow the
      // user across devices. The in-memory `threads` array is the
      // working state — every mutation is mirrored asynchronously to
      // Supabase. UI stays optimistic so it feels instant.
      //
      // Shape: { id, title, personaId, personaName, personaIcon,
      //          messages: [{role, content}], createdAt, updatedAt,
      //          __dirty: bool, __loadedMessages: bool }
      let threads = [];
      let activeId = HXAI.store.get('assistant', 'active_thread', null);
      let supabaseClient = null;
      let supabaseOwnerId = null;

      function persist() {
        // Local-only state: keep the active-thread pointer + custom
        // personas in localStorage so reloads remember what was open.
        HXAI.store.set('assistant', 'active_thread', activeId);
        HXAI.store.set('assistant', 'custom_personas', customPersonas);
        document.getElementById('hx-stat-threads').textContent = threads.length;
        document.getElementById('hx-stat-personas').textContent = personas.length;
      }

      function activeThread() { return threads.find(t => t.id === activeId) || null; }
      function activePersona() {
        const t = activeThread();
        const pid = t ? t.personaId : 'default';
        return personas.find(p => p.id === pid) || personas[0];
      }

      // Fire-and-forget upsert. The UI never blocks on Supabase; we
      // only surface errors via console so a transient network blip
      // doesn't break the chat flow.
      function persistThreadRemote(t) {
        if (!supabaseClient || !supabaseOwnerId) return;
        const persona = personas.find(p => p.id === t.personaId) || personas[0];
        supabaseClient.from('assistant_threads').upsert({
          id: t.id,
          owner_id: supabaseOwnerId,
          persona_id: t.personaId,
          persona_name: persona ? persona.name : 'Default',
          persona_icon: persona ? persona.ico : null,
          title: t.title,
          updated_at: t.updatedAt || new Date().toISOString(),
        }).then((r) => { if (r.error) console.warn('[assistant] persist thread:', r.error.message); });
      }
      function persistMessageRemote(threadId, role, content) {
        if (!supabaseClient || !supabaseOwnerId) return;
        supabaseClient.from('assistant_messages').insert({
          thread_id: threadId, role, content,
        }).then((r) => { if (r.error) console.warn('[assistant] persist message:', r.error.message); });
      }
      function deleteThreadRemote(id) {
        if (!supabaseClient || !supabaseOwnerId) return;
        supabaseClient.from('assistant_threads').delete().eq('id', id)
          .then((r) => { if (r.error) console.warn('[assistant] delete thread:', r.error.message); });
      }

      // Lazy-load messages for a thread the first time it's opened.
      // Threads we list in the sidebar only have the title/persona meta;
      // pulling all messages up front would be wasteful.
      async function ensureMessagesLoaded(t) {
        if (!t || t.__loadedMessages) return;
        if (!supabaseClient) return;
        const r = await supabaseClient.from('assistant_messages')
          .select('role,content').eq('thread_id', t.id).order('created_at', { ascending: true });
        if (r.error) { console.warn('[assistant] load messages:', r.error.message); return; }
        t.messages = (r.data || []).map(m => ({ role: m.role, content: m.content }));
        t.__loadedMessages = true;
      }

      function newThread(personaId = 'default') {
        const persona = personas.find(p => p.id === personaId) || personas[0];
        const id = (window.crypto && crypto.randomUUID) ? crypto.randomUUID() : ('t_' + Date.now() + '_' + Math.random().toString(36).slice(2, 9));
        const now = new Date().toISOString();
        const t = {
          id,
          title: 'New thread',
          personaId,
          personaName: persona ? persona.name : 'Default',
          personaIcon: persona ? persona.ico : null,
          messages: [],
          createdAt: now,
          updatedAt: now,
          __loadedMessages: true, // brand-new thread → no messages yet
        };
        threads.unshift(t);
        activeId = t.id;
        persist();
        persistThreadRemote(t);
        return t;
      }

      function deleteThread(id) {
        threads = threads.filter(t => t.id !== id);
        if (activeId === id) activeId = threads[0]?.id || null;
        persist();
        deleteThreadRemote(id);
      }

      function autoTitle(msg) {
        const clean = (msg || '').replace(/\s+/g, ' ').trim();
        if (clean.length <= 48) return clean;
        return clean.slice(0, 45) + '…';
      }

      // ============ RENDER ============
      const listEl   = document.getElementById('hx-thread-list');
      const searchEl = document.getElementById('hx-thread-search');
      const scrollEl = document.getElementById('hx-chat-scroll');
      const input    = document.getElementById('hx-chat-input');
      const sendBtn  = document.getElementById('hx-chat-send');
      const newBtn   = document.getElementById('hx-new-thread');
      const titleEl  = document.getElementById('hx-asst-title');

      const pillEl   = document.getElementById('hx-persona-pill');
      const pillIco  = document.getElementById('hx-persona-ico');
      const pillName = document.getElementById('hx-persona-name');
      const menuEl   = document.getElementById('hx-persona-menu');

      function renderThreadList() {
        const query = searchEl.value.trim().toLowerCase();
        const filtered = !query ? threads : threads.filter(t => {
          if (t.title.toLowerCase().includes(query)) return true;
          return t.messages.some(m => (m.content || '').toLowerCase().includes(query));
        });

        if (filtered.length === 0) {
          listEl.innerHTML = `<div class="hx-thread-empty">${query ? 'No threads match your search.' : "No threads yet. Start a new chat — it'll appear here, saved automatically."}</div>`;
          return;
        }

        listEl.innerHTML = filtered.map(t => {
          const p = personas.find(p => p.id === t.personaId) || personas[0];
          const last = t.messages.length ? t.messages[t.messages.length - 1] : null;
          const preview = last ? (last.content || '').slice(0, 50) : '';
          return `
            <div class="hx-thread-item ${t.id === activeId ? 'active' : ''}" data-id="${t.id}">
              <div class="hx-thread-title">${HXAI.esc(t.title)}</div>
              <div class="hx-thread-meta">
                <span>${HXAI.esc(p.name)} · ${HXAI.store.timeAgo(t.updatedAt)}</span>
                <button class="hx-thread-del" data-del="${t.id}" title="Delete thread" aria-label="Delete thread"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14a2 2 0 01-2 2H9a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a2 2 0 012-2h2a2 2 0 012 2v2"/></svg></button>
              </div>
            </div>
          `;
        }).join('');

        listEl.querySelectorAll('.hx-thread-item').forEach(el => {
          el.addEventListener('click', (e) => {
            if (e.target.closest('[data-del]')) return;
            switchTo(el.dataset.id);
          });
        });
        listEl.querySelectorAll('[data-del]').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (btn.dataset.armed === '1') {
              deleteThread(btn.dataset.del);
              renderAll();
              return;
            }
            btn.dataset.armed = '1';
            btn.classList.add('armed');
            btn.title = 'Click again to confirm';
            const original = btn.innerHTML;
            btn.innerHTML = '<span style="font-size:11px;font-weight:600;letter-spacing:.02em;">Confirm</span>';
            const reset = () => { btn.dataset.armed = ''; btn.classList.remove('armed'); btn.title = 'Delete thread'; btn.innerHTML = original; };
            setTimeout(() => { if (btn.dataset.armed === '1') reset(); }, 3000);
          });
        });
      }

      function renderChat() {
        const t = activeThread();
        if (!t || t.messages.length === 0) {
          scrollEl.innerHTML = `
            <div class="hx-chat-empty">
              <div class="hx-empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg></div>
              <h3>${t ? 'Start the conversation' : 'No active thread'}</h3>
              <p>${t ? 'Type a question below, or pick one of these starters.' : 'Click "+ New chat" on the left to begin.'}</p>
              ${t ? `
                <div class="hx-quick-grid">
                  <button class="hx-quick" data-prompt="Γράψε μου ένα cold email για επιχείρηση που πουλάει consulting στην Ελβετία και θέλει να προσεγγίσει tech startups με 11-50 υπαλλήλους."><strong>Cold email · Greek</strong>Consulting → Swiss tech startups</button>
                  <button class="hx-quick" data-prompt="Draft a 1-page mutual NDA for a SaaS company sharing roadmap with an enterprise prospect. 2-year term, Swiss law."><strong>Mutual NDA</strong>1-page, 2-year, Swiss law</button>
                  <button class="hx-quick" data-prompt="I'm launching a new pricing tier next Monday (€49/mo, unlimited workspaces). Plan a 7-day launch sequence covering announcement, social, email, webinar invite — give me the calendar."><strong>Launch plan</strong>7-day pricing launch sequence</button>
                  <button class="hx-quick" data-prompt="A customer just emailed asking for a 30% discount on annual plan, says they're talking to a competitor. We have margin for 15% max. Draft my reply — keep them, don't grovel."><strong>Negotiation reply</strong>Discount ask, keep margin</button>
                </div>
              ` : ''}
            </div>
          `;
          scrollEl.querySelectorAll('.hx-quick').forEach(b => b.addEventListener('click', () => send(b.dataset.prompt)));
          return;
        }
        scrollEl.innerHTML = t.messages.map(m => bubbleHtml(m.role, m.content)).join('');
        wireRememberButtons();
        scrollEl.scrollTop = scrollEl.scrollHeight;
      }

      function bubbleHtml(role, text) {
        if (role === 'user') {
          return `<div class="hxai-msg user"><div class="hxai-msg-bubble">${HXAI.esc(text)}</div></div>`;
        }
        // Assistant messages get a "Remember this" affordance that saves
        // the selected text (or the full message) to public.memories so
        // future chats carry the fact in their system prompt.
        return `<div class="hxai-msg assistant"><div class="hxai-msg-avatar">HX</div><div class="hxai-msg-bubble"><span class="hxai-msg-text">${HXAI.esc(text)}</span><div class="hxai-msg-actions" style="margin-top:8px;display:flex;gap:4px;"><button class="hxai-remember" data-content="${HXAI.esc(text).replace(/"/g,'&quot;')}" type="button" style="font-size:11.5px;font-weight:500;color:var(--hx-text-mid);background:transparent;border:1px solid transparent;padding:3px 8px;border-radius:5px;cursor:pointer;font-family:inherit;transition:background 0.12s, border-color 0.12s, color 0.12s;">Remember this</button></div></div></div>`;
      }

      function wireRememberButtons() {
        scrollEl.querySelectorAll('.hxai-remember').forEach((b) => {
          if (b.__bound) return;
          b.__bound = true;
          b.addEventListener('mouseenter', () => { b.style.background = 'var(--hx-cream)'; b.style.borderColor = 'var(--hx-line)'; b.style.color = 'var(--hx-text)'; });
          b.addEventListener('mouseleave', () => { if (b.dataset.state !== 'saving' && b.dataset.state !== 'saved') { b.style.background = 'transparent'; b.style.borderColor = 'transparent'; b.style.color = 'var(--hx-text-mid)'; } });
          b.addEventListener('click', async () => {
            if (b.dataset.state === 'saving' || b.dataset.state === 'saved') return;
            b.dataset.state = 'saving';
            const orig = b.textContent;
            b.textContent = 'Saving…';
            try {
              const sb = (window.HX && window.HX.supabase) || null;
              const sess = sb ? (await sb.auth.getSession()).data.session : null;
              if (!sess || !sess.access_token) throw new Error('Sign in to save a memory.');
              const r = await fetch('/api/memory-save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + sess.access_token },
                body: JSON.stringify({ content: b.dataset.content, source: 'assistant_chat', tags: ['assistant'], importance: 3 }),
              });
              if (!r.ok) {
                const d = await r.json().catch(() => ({}));
                throw new Error(d.error || ('HTTP ' + r.status));
              }
              b.dataset.state = 'saved';
              b.textContent = 'Saved to Memory ✓';
              b.style.color = '#15803d';
            } catch (err) {
              b.dataset.state = '';
              b.textContent = orig;
              if (window.cxToast) window.cxToast((err && err.message) || 'Could not save.', 'error');
            }
          });
        });
      }

      function appendBubble(role, text) {
        const div = document.createElement('div');
        div.innerHTML = bubbleHtml(role, text).trim();
        const node = div.firstChild;
        scrollEl.appendChild(node);
        if (role === 'assistant') wireRememberButtons();
        scrollEl.scrollTop = scrollEl.scrollHeight;
        return node;
      }

      function appendTyping() {
        const w = document.createElement('div');
        w.className = 'hxai-msg assistant';
        w.innerHTML = `<div class="hxai-msg-avatar">HX</div><div class="hxai-msg-bubble"><div class="hxai-typing"><span></span><span></span><span></span></div></div>`;
        scrollEl.appendChild(w);
        scrollEl.scrollTop = scrollEl.scrollHeight;
        return w;
      }

      function clearEmptyState() {
        const e = scrollEl.querySelector('.hx-chat-empty');
        if (e) e.remove();
      }

      function renderTitleBar() {
        const t = activeThread();
        titleEl.textContent = t ? t.title : 'New chat';
        const p = activePersona();
        pillIco.textContent = p.ico;
        pillName.textContent = p.name;
      }

      function renderPersonaMenu() {
        menuEl.innerHTML = personas.map(p => `
          <div class="hx-persona-opt ${activePersona().id === p.id ? 'active' : ''}" data-pid="${p.id}">
            <div class="hx-persona-opt-ico">${p.ico}</div>
            <div>
              <p class="hx-persona-opt-name">${HXAI.esc(p.name)}</p>
              <p class="hx-persona-opt-desc">${HXAI.esc(p.desc)}</p>
            </div>
          </div>
        `).join('') + `
          <div class="hx-persona-menu-foot">
            <button id="hx-persona-add">+ Add custom persona</button>
          </div>
        `;
        menuEl.querySelectorAll('.hx-persona-opt').forEach(el => {
          el.addEventListener('click', () => {
            const t = activeThread() || newThread(el.dataset.pid);
            t.personaId = el.dataset.pid;
            t.updatedAt = new Date().toISOString();
            persist();
            menuEl.classList.remove('open');
            renderAll();
          });
        });
        document.getElementById('hx-persona-add').addEventListener('click', () => {
          menuEl.classList.remove('open');
          openPersonaModal();
        });
      }

      // ============ PERSONA CREATION MODAL ============
      const personaModal    = document.getElementById('hx-persona-modal');
      const personaNameInp  = document.getElementById('hx-persona-name-input');
      const personaSysInp   = document.getElementById('hx-persona-system');
      const personaErrEl    = document.getElementById('hx-persona-err');

      function openPersonaModal() {
        personaNameInp.value = '';
        personaSysInp.value = '';
        personaErrEl.style.display = 'none';
        personaModal.classList.add('open');
        setTimeout(() => personaNameInp.focus(), 30);
      }
      function closePersonaModal() {
        personaModal.classList.remove('open');
      }
      function showPersonaErr(msg) {
        personaErrEl.textContent = msg;
        personaErrEl.style.display = 'block';
      }
      function savePersona() {
        const name = personaNameInp.value.trim();
        const system = personaSysInp.value.trim();
        if (!name) { showPersonaErr('Please enter a persona name.'); personaNameInp.focus(); return; }
        if (system.length < 20) { showPersonaErr('Instructions must be at least 20 characters.'); personaSysInp.focus(); return; }
        const id = 'custom_' + HXAI.store.id();
        const ico = name.trim().charAt(0).toUpperCase();
        const p = { id, ico, name: name.slice(0, 60), desc: 'Custom persona', system };
        customPersonas.push(p);
        personas = [...BUILTIN_PERSONAS, ...customPersonas];
        persist();
        closePersonaModal();
        renderAll();
      }

      document.getElementById('hx-persona-modal-close').addEventListener('click', closePersonaModal);
      document.getElementById('hx-persona-cancel').addEventListener('click', closePersonaModal);
      document.getElementById('hx-persona-save').addEventListener('click', savePersona);
      personaModal.addEventListener('click', (e) => { if (e.target === personaModal) closePersonaModal(); });

      function renderAll() {
        renderThreadList();
        renderTitleBar();
        renderChat();
        renderPersonaMenu();
        persist();
      }

      async function switchTo(id) {
        activeId = id;
        const t = activeThread();
        // Lazy-load this thread's messages from Supabase the first
        // time it's opened. The render is intentionally split: empty
        // shell first (so the click feels immediate) then the loaded
        // body once the messages arrive.
        renderAll();
        if (t && !t.__loadedMessages) {
          await ensureMessagesLoaded(t);
          if (activeId === id) renderAll();
        }
        persist();
      }

      // ============ SEND ============
      async function send(messageText) {
        let t = activeThread();
        if (!t) t = newThread();
        const text = (messageText || input.value).trim();
        if (!text) return;

        clearEmptyState();
        appendBubble('user', text);
        t.messages.push({ role: 'user', content: text });
        if (t.messages.length === 1) {
          t.title = autoTitle(text);
          titleEl.textContent = t.title;
        }
        t.updatedAt = new Date().toISOString();
        input.value = '';
        input.style.height = 'auto';
        sendBtn.disabled = true;

        renderThreadList();
        persist();
        // Mirror user turn to Supabase (fire-and-forget). Title may
        // have just changed too, so refresh the thread row.
        persistMessageRemote(t.id, 'user', text);
        persistThreadRemote(t);

        const typing = appendTyping();
        let assistantBubble = null;
        let assembled = '';
        const persona = activePersona();

        try {
          await HXAI.runStream('/api/assistant-chat', {
            message: text,
            history: t.messages.slice(0, -1),
            system: persona.system || undefined,
          }, {
            onChunk: (delta) => {
              if (!assistantBubble) {
                typing.remove();
                assistantBubble = appendBubble('assistant', '');
              }
              assembled += delta;
              const target = assistantBubble.querySelector('.hxai-msg-text');
              target.textContent = assembled;
              scrollEl.scrollTop = scrollEl.scrollHeight;
            },
            onDone: (full) => {
              t.messages.push({ role: 'assistant', content: full });
              t.updatedAt = new Date().toISOString();
              persist();
              persistMessageRemote(t.id, 'assistant', full);
              persistThreadRemote(t);
              renderThreadList();
            },
          });
        } catch (err) {
          typing.remove();
          const errMsg = `Error: ${err.message || err}`;
          const errNode = appendBubble('assistant', errMsg);
          t.messages.push({ role: 'assistant', content: errMsg });
          persist();
          persistMessageRemote(t.id, 'assistant', errMsg);
        } finally {
          sendBtn.disabled = false;
          input.focus();
        }
      }

      // ============ WIRE ============
      sendBtn.addEventListener('click', () => send());
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
      });
      input.addEventListener('input', () => {
        input.style.height = 'auto';
        input.style.height = Math.min(input.scrollHeight, 160) + 'px';
      });
      newBtn.addEventListener('click', () => {
        newThread(activePersona().id);
        renderAll();
        input.focus();
      });
      searchEl.addEventListener('input', renderThreadList);

      pillEl.addEventListener('click', (e) => {
        e.stopPropagation();
        menuEl.classList.toggle('open');
      });
      document.addEventListener('click', (e) => {
        if (!e.target.closest('#hx-persona-wrap')) menuEl.classList.remove('open');
      });

      // ============ INIT ============
      // Render the empty shell immediately so the page doesn't look
      // frozen while we wait for auth + the threads list to come back
      // from Supabase. Real data swaps in once both have arrived.
      renderAll();

      function whenAuthReady(fn) {
        if (window.HX && window.HX.auth) { fn(); return; }
        document.addEventListener('hx:auth-ready', fn, { once: true });
      }

      whenAuthReady(async function () {
        supabaseClient = window.HX && window.HX.supabase;
        if (!supabaseClient) return;
        const u = (await supabaseClient.auth.getUser()).data.user;
        if (!u) return;
        supabaseOwnerId = u.id;

        // Load thread metadata (no messages yet — those load on demand
        // when the user opens a thread).
        const r = await supabaseClient.from('assistant_threads')
          .select('id,persona_id,persona_name,persona_icon,title,created_at,updated_at')
          .is('archived_at', null)
          .order('updated_at', { ascending: false });
        if (r.error) {
          console.warn('[assistant] load threads:', r.error.message);
        } else {
          threads = (r.data || []).map((row) => ({
            id: row.id,
            title: row.title || 'New thread',
            personaId: row.persona_id || 'default',
            personaName: row.persona_name || 'Default',
            personaIcon: row.persona_icon || null,
            messages: [],
            createdAt: row.created_at,
            updatedAt: row.updated_at,
            __loadedMessages: false,
          }));
        }

        // If the user already had an active thread last time, prefer it
        // (so reload returns you to the chat you were in). Otherwise
        // fall back to the most recent thread, then to a brand-new one.
        if (!threads.length) {
          newThread('default');
        } else if (!activeId || !activeThread()) {
          activeId = threads[0].id;
        }

        // Load messages for the active thread so the user sees their
        // last conversation without having to click around.
        const t = activeThread();
        if (t) await ensureMessagesLoaded(t);

        persist();
        renderAll();
        setTimeout(() => input.focus(), 100);
      });
    })();
  </script>
</body>
</html>
