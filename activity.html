<!DOCTYPE html>
<html lang="en">
<head>
  <script>location.replace('/chat'+location.search+location.hash);</script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Activity — HelveX</title>
  <meta name="description" content="HelveX activity — every event across your workspace in one timeline." />
  <link rel="icon" type="image/png" href="/helvex-logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/platform.css" />
</head>
<body data-active="activity">

  <div class="hx-app">
    <aside class="hx-sidebar"></aside>
    <div>
      <div class="hx-topbar"></div>
      <main class="hx-main">

        <div class="hx-aura" aria-hidden="true"></div>
        <header class="hx-pg-hero">
          <p class="hx-pg-eyebrow"><span class="hx-pg-eyebrow-dot" aria-hidden="true"></span>Activity · live feed</p>
          <div class="hx-pg-hero-grid">
            <div>
              <h1 class="hx-pg-title">Activity <em>·</em></h1>
              <p class="hx-pg-sub">Every event across your HelveX workspace — sign-ins, project briefs, API key issuance, plan changes, deployments — in one chronological feed with actor, timestamp, and trace ID.</p>
              <div class="hx-pg-cta-row">
                <button id="hx-act-refresh" class="hx-cta-primary">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
                  Refresh
                </button>
                <a href="/audit-log.html" class="hx-cta-secondary">Audit log</a>
              </div>
            </div>
            <div class="hx-pg-meta-strip">
              <div class="hx-pg-meta-item">
                <p class="hx-pg-meta-label">Retention</p>
                <p class="hx-pg-meta-value">365 days</p>
              </div>
              <div class="hx-pg-meta-item">
                <p class="hx-pg-meta-label">Region</p>
                <p class="hx-pg-meta-value hx-mono">EU-CH-1</p>
              </div>
            </div>
          </div>
        </header>

        <div class="hx-section-head">
          <h2>Recent activity</h2>
          <span class="meta" id="hx-act-meta">—</span>
        </div>
        <div id="hx-act-host"></div>

      </main>
    </div>
  </div>

  <script src="/platform.js"></script>
  <script>
    /* Real activity feed from public.activity_events with realtime subscription. */
    (function () {
      function whenAuthReady(fn) {
        if (window.HX && window.HX.supabase) { fn(); return; }
        document.addEventListener('hx:auth-ready', fn, { once: true });
      }
      var $ = function (id) { return document.getElementById(id); };
      function escape(s) {
        return (s == null ? '' : String(s))
          .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
      }
      function fmtTime(iso) {
        if (!iso) return '—';
        try { return new Date(iso).toLocaleString(undefined, { year:'numeric', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' }); }
        catch (e) { return '—'; }
      }
      function relTime(iso) {
        var d = new Date(iso); var diff = (Date.now() - d.getTime()) / 1000;
        if (diff < 60) return 'just now';
        if (diff < 3600) return Math.floor(diff/60) + 'm ago';
        if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
        return Math.floor(diff/86400) + 'd ago';
      }
      function iconFor(kind) {
        if (/api_key/.test(kind))   return '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3"/></svg>';
        if (/project/.test(kind))   return '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 7a2 2 0 0 1 2-2h4l2 3h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>';
        if (/profile|settings/.test(kind)) return '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>';
        if (/team|invitation/.test(kind)) return '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/></svg>';
        return '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>';
      }
      function labelFor(kind) {
        return (kind || '').split('.').map(function (s) {
          return s.charAt(0).toUpperCase() + s.slice(1).replace(/_/g, ' ');
        }).join(' / ');
      }

      function renderEmpty(host) {
        host.innerHTML =
          '<div class="hx-empty">' +
            '<div class="icon" aria-hidden="true">' +
              '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>' +
            '</div>' +
            '<h3>No activity yet</h3>' +
            '<p>Once you sign in elsewhere, brief a project, generate an API key, change a setting, or deploy — every action is logged here with actor, timestamp, and a unique event ID.</p>' +
            '<a href="/services.html" class="hx-btn hx-btn-secondary">Browse services</a>' +
          '</div>';
      }

      /* Realistic sample feed so the page is never empty on a fresh
         account. Clearly flagged as sample; replaced the instant real
         events arrive. */
      function sampleRows(email) {
        var who = email || 'you@workspace.com';
        var mins = function (n) { return new Date(Date.now() - n * 60000).toISOString(); };
        return [
          { id: 1042, kind: 'auth.sign_in',            actor_email: who, created_at: mins(8),    payload: { ip: '85.4.12.x', device: 'Safari · iOS' } },
          { id: 1041, kind: 'project.brief_created',    actor_email: who, created_at: mins(54),   payload: { project: 'Q3 GTM', model: 'nexus' } },
          { id: 1040, kind: 'deployment.succeeded',     actor_email: who, created_at: mins(120),  payload: { target: 'production', build: '4f866ef' } },
          { id: 1039, kind: 'api_key.created',          actor_email: who, created_at: mins(190),  payload: { name: 'server-prod', scope: 'read,write' } },
          { id: 1038, kind: 'billing.plan_changed',     actor_email: who, created_at: mins(60*7), payload: { from: 'Free', to: 'Pro' } },
          { id: 1037, kind: 'team.invitation_sent',     actor_email: who, created_at: mins(60*9), payload: { to: 'maria@workspace.com', role: 'editor' } },
          { id: 1036, kind: 'settings.updated',         actor_email: who, created_at: mins(60*23),payload: { field: 'timezone', value: 'Europe/Zurich' } },
          { id: 1035, kind: 'project.deployed',         actor_email: who, created_at: mins(60*30),payload: { project: 'Landing v2' } },
          { id: 1034, kind: 'auth.password_changed',    actor_email: who, created_at: mins(60*48),payload: {} },
          { id: 1033, kind: 'api_key.revoked',          actor_email: who, created_at: mins(60*72),payload: { name: 'legacy-key' } }
        ];
      }
      function sampleBanner() {
        return '<div class="hx-card" style="display:flex;align-items:center;gap:10px;padding:11px 14px;margin-bottom:12px;border-style:dashed;">' +
          '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--hx-text-mid)" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>' +
          '<span style="font-size:12.5px;color:var(--hx-text-mid);">Showing <strong style="color:var(--hx-text);">sample activity</strong> — your real events replace this automatically as you use HelveX.</span>' +
        '</div>';
      }


      function renderList(host, rows) {
        var html = '<div class="hx-card" style="padding:0;overflow:hidden;">';
        rows.forEach(function (r, idx) {
          var payload = '';
          if (r.payload && Object.keys(r.payload).length) {
            try { payload = '<code class="hx-mono" style="font-size:11.5px;color:var(--hx-text-dim);background:var(--hx-bg-2);padding:2px 6px;border-radius:4px;">' + escape(JSON.stringify(r.payload)) + '</code>'; }
            catch (e) {}
          }
          html += '<div style="display:flex;align-items:flex-start;gap:12px;padding:12px 16px;' + (idx > 0 ? 'border-top:1px solid var(--hx-line);' : '') + '">' +
            '<div style="width:28px;height:28px;border-radius:var(--hx-r-sm);background:var(--hx-bg-2);border:1px solid var(--hx-line);display:flex;align-items:center;justify-content:center;color:var(--hx-text-mid);flex-shrink:0;">' + iconFor(r.kind) + '</div>' +
            '<div style="flex:1;min-width:0;">' +
              '<div style="display:flex;align-items:baseline;justify-content:space-between;gap:10px;flex-wrap:wrap;">' +
                '<span style="font-size:13.5px;font-weight:500;">' + escape(labelFor(r.kind)) + '</span>' +
                '<span class="hx-mono" style="font-size:11.5px;color:var(--hx-text-dim);" title="' + escape(fmtTime(r.created_at)) + '">' + escape(relTime(r.created_at)) + '</span>' +
              '</div>' +
              (r.actor_email ? '<div style="font-size:12px;color:var(--hx-text-mid);margin-top:2px;">' + escape(r.actor_email) + '</div>' : '') +
              (payload ? '<div style="margin-top:6px;">' + payload + '</div>' : '') +
            '</div>' +
            '<span class="hx-mono" style="font-size:10.5px;color:var(--hx-text-faint);flex-shrink:0;">#' + r.id + '</span>' +
          '</div>';
        });
        html += '</div>';
        host.innerHTML = html;
      }

      whenAuthReady(function () {
        var sb = window.HX.supabase;
        var host = $('hx-act-host');
        var channel = null;

        async function refresh() {
          var r = await sb.from('activity_events').select('*').order('created_at', { ascending: false }).limit(200);
          if (r.error) {
            host.innerHTML = '<div class="hx-empty"><h3>Could not load activity</h3><p>' + escape(r.error.message) + '</p></div>';
            return;
          }
          var rows = r.data || [];
          if (rows.length === 0) {
            var u = (window.HX && window.HX.user) || null;
            var srows = sampleRows(u && u.email);
            $('hx-act-meta').textContent = 'sample · ' + srows.length + ' events';
            host.innerHTML = sampleBanner();
            var wrap = document.createElement('div'); host.appendChild(wrap);
            renderList(wrap, srows);
          } else {
            $('hx-act-meta').textContent = rows.length + (rows.length === 1 ? ' event' : ' events');
            renderList(host, rows);
          }
        }

        $('hx-act-refresh').addEventListener('click', refresh);

        // Realtime subscription — new events appear at the top live
        sb.auth.getUser().then(function (res) {
          var u = res && res.data ? res.data.user : null;
          if (!u || !sb.channel) return;
          channel = sb.channel('hx-activity-' + u.id)
            .on('postgres_changes',
                { event: 'INSERT', schema: 'public', table: 'activity_events', filter: 'owner_id=eq.' + u.id },
                function () { refresh(); })
            .subscribe();
        });

        window.addEventListener('beforeunload', function () {
          try { if (channel) channel.unsubscribe(); } catch (e) {}
        });

        refresh();
      });
    })();
  </script>
</body>
</html>
