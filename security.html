<!DOCTYPE html>
<html lang="en">
<head>
  <script>location.replace('/chat'+location.search+location.hash);</script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Password &amp; MFA — HelveX</title>
  <link rel="icon" type="image/png" href="/helvex-logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://yjmpallrtpeinpdilptj.supabase.co" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/platform.css" />
  <link rel="stylesheet" href="/workbench.css" />
  <style>
    .sec-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; align-items:start; }
    @media (max-width:820px){ .sec-grid { grid-template-columns:1fr; } }
    .strength { height:5px; border-radius:3px; background:var(--hx-bg-3); overflow:hidden; margin-top:8px; }
    .strength > i { display:block; height:100%; width:0; transition:width .2s, background .2s; }
    .status-ring { display:flex; align-items:center; gap:16px; padding:20px; }
    .ring { width:64px; height:64px; border-radius:50%; display:grid; place-items:center; font-weight:700; font-size:18px; flex-shrink:0; }
    .check-item { display:flex; align-items:center; gap:10px; padding:11px 0; border-top:1px solid var(--hx-line-soft); font-size:13px; }
    .check-item:first-child { border-top:0; }
    .check-dot { width:18px; height:18px; border-radius:50%; display:grid; place-items:center; flex-shrink:0; }
    .check-dot svg { width:11px; height:11px; }
    .rec-code { font-family:var(--hx-mono); font-size:13px; padding:8px 10px; background:var(--hx-bg-2); border:1px solid var(--hx-line); border-radius:7px; text-align:center; letter-spacing:.05em; }
  </style>
</head>
<body data-active="security">
  <div class="hx-app">
    <aside class="hx-sidebar"></aside>
    <div>
      <div class="hx-topbar"></div>
      <main class="hx-main">
        <div class="hx-aura" aria-hidden="true"></div>
        <header class="hx-pg-hero">
          <p class="hx-pg-eyebrow"><span class="hx-pg-eyebrow-dot" aria-hidden="true"></span>Account · security</p>
          <div class="hx-pg-hero-grid"><div>
            <h1 class="hx-pg-title">Password &amp; MFA</h1>
            <p class="hx-pg-sub">Harden your account. Rotate your password, turn on two-factor authentication and keep recovery codes somewhere safe.</p>
          </div></div>
        </header>
        <div id="sc-status"></div>
        <div class="sec-grid" style="margin-top:16px" id="sc-cards"></div>
      </main>
    </div>
  </div>
  <script src="/platform.js"></script>
  <script src="/workbench.js"></script>
  <script>
  (function(){
    var $=function(id){return document.getElementById(id);};
    var sb=null, user=null;
    var flags=WB.store('security_flags', { mfa:false, recovery:false }); // realistic local state
    function st(){ return flags.all(); }

    function score(){ var f=st(); var n=1; if(f.mfa)n++; if(f.recovery)n++; return n; } // password always set = 1
    function render(){
      var f=st(), sc=score(), pct=Math.round(sc/3*100);
      var col=sc===3?'var(--hx-emerald)':sc===2?'var(--hx-yellow-deep)':'var(--hx-red)';
      var label=sc===3?'Strong':sc===2?'Good':'At risk';
      $('sc-status').innerHTML='<div class="card status-ring">'+
        '<div class="ring" style="background:'+col+'1a;color:'+col+';border:3px solid '+col+'">'+pct+'</div>'+
        '<div style="flex:1;min-width:0"><div style="font-size:15px;font-weight:700">Security score · <span style="color:'+col+'">'+label+'</span></div>'+
        '<div style="font-size:12.5px;color:var(--hx-text-mid);margin-top:2px">'+(sc<3?'Turn on the items below to fully protect your account.':'Your account is fully protected.')+'</div>'+
        '<div class="strength" style="max-width:320px"><i style="width:'+pct+'%;background:'+col+'"></i></div></div>'+
        (f.mfa?'':'<span class="wb-pill warn"><span class="d"></span>2FA off</span>')+
      '</div>';

      $('sc-cards').innerHTML=
        // password
        '<div class="card" style="padding:20px"><div style="font-size:14px;font-weight:700;margin-bottom:4px">Password</div>'+
          '<p style="font-size:12.5px;color:var(--hx-text-mid);margin:0 0 16px">Minimum 10 characters. We check it against known breached passwords before saving.</p>'+
          '<div class="wb-field"><label>New password</label><input type="password" id="sc-pw" placeholder="••••••••••"><div class="strength"><i id="sc-pw-bar"></i></div></div>'+
          '<div class="wb-field"><label>Confirm new password</label><input type="password" id="sc-pw2" placeholder="••••••••••"></div>'+
          '<button class="wb-btn primary" id="sc-pw-save">Update password</button></div>'+
        // mfa
        '<div class="card" style="padding:20px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><div style="font-size:14px;font-weight:700">Two-factor authentication</div>'+(f.mfa?'<span class="wb-pill active" style="margin-left:auto"><span class="d"></span>On</span>':'<span class="wb-pill warn" style="margin-left:auto"><span class="d"></span>Off</span>')+'</div>'+
          '<p style="font-size:12.5px;color:var(--hx-text-mid);margin:0 0 16px">Require a one-time code from your authenticator app at sign-in. Strongly recommended.</p>'+
          '<div class="check-item" style="border:0;padding-top:0"><span class="check-dot" style="background:'+(f.mfa?'var(--hx-emerald-soft)':'var(--hx-bg-3)')+';color:'+(f.mfa?'var(--hx-emerald)':'var(--hx-text-faint)')+'">'+WB.svg('<polyline points="20 6 9 17 4 12"/>',3)+'</span>Authenticator app</div>'+
          '<div class="check-item"><span class="check-dot" style="background:'+(f.recovery?'var(--hx-emerald-soft)':'var(--hx-bg-3)')+';color:'+(f.recovery?'var(--hx-emerald)':'var(--hx-text-faint)')+'">'+WB.svg('<polyline points="20 6 9 17 4 12"/>',3)+'</span>Recovery codes '+(f.recovery?'generated':'not generated')+'</div>'+
          '<div style="display:flex;gap:8px;margin-top:16px;flex-wrap:wrap">'+
            (f.mfa?'<button class="wb-btn danger" id="sc-mfa-off">Disable 2FA</button><button class="wb-btn" id="sc-rec">Recovery codes</button>':'<button class="wb-btn primary" id="sc-mfa-on">Enable 2FA</button>')+
          '</div></div>';

      var pw=$('sc-pw'); if(pw) pw.oninput=function(){ var s=strength(pw.value); var bar=$('sc-pw-bar'); bar.style.width=(s.n*25)+'%'; bar.style.background=s.col; };
      $('sc-pw-save').onclick=changePw;
      if($('sc-mfa-on')) $('sc-mfa-on').onclick=enableMfa;
      if($('sc-mfa-off')) $('sc-mfa-off').onclick=function(e){ WB.arm(e.currentTarget,'Disable 2FA?',function(){ flags.set({mfa:false,recovery:false}); WB.toast('2FA disabled','info'); render(); }); };
      if($('sc-rec')) $('sc-rec').onclick=showCodes;
    }

    function strength(v){ var n=0; if(v.length>=10)n++; if(/[A-Z]/.test(v)&&/[a-z]/.test(v))n++; if(/\d/.test(v))n++; if(/[^A-Za-z0-9]/.test(v))n++; var cols=['var(--hx-red)','var(--hx-red)','var(--hx-yellow-deep)','var(--hx-emerald)','var(--hx-emerald)']; return {n:n,col:cols[n]}; }

    function changePw(){
      var a=$('sc-pw').value, b=$('sc-pw2').value;
      if(a.length<10){ WB.toast('Password must be at least 10 characters','err'); return; }
      if(a!==b){ WB.toast('Passwords don’t match','err'); return; }
      if(!sb||!user){ WB.toast('Sign in required','err'); return; }
      var btn=$('sc-pw-save'); btn.disabled=true; btn.textContent='Updating…';
      sb.auth.updateUser({password:a}).then(function(r){ if(r.error) throw r.error; WB.toast('Password updated','ok'); $('sc-pw').value='';$('sc-pw2').value=''; $('sc-pw-bar').style.width='0'; btn.disabled=false; btn.textContent='Update password'; })
        .catch(function(e){ btn.disabled=false; btn.textContent='Update password'; WB.toast(e.message||'Could not update password','err'); });
    }

    function genCodes(){ var out=[]; for(var i=0;i<10;i++){ out.push((Math.random().toString(36).slice(2,6)+'-'+Math.random().toString(36).slice(2,6)).toUpperCase()); } return out; }
    function enableMfa(){
      WB.drawer.open({ title:'Enable two-factor authentication', body:
        '<div style="text-align:center;margin-bottom:16px"><div style="width:150px;height:150px;margin:0 auto;border:1px solid var(--hx-line);border-radius:12px;display:grid;place-items:center;background:#fff;color:#111;font-family:var(--hx-mono);font-size:11px">QR CODE</div>'+
        '<p style="font-size:12px;color:var(--hx-text-dim);margin-top:10px">Scan with Google Authenticator, 1Password or Authy.</p></div>'+
        '<div class="wb-field"><label>Manual key</label><input class="wb-mono" value="HLVX-'+Math.random().toString(36).slice(2,10).toUpperCase()+'" readonly></div>'+
        '<div class="wb-field"><label>Enter the 6-digit code</label><input id="mfa-code" inputmode="numeric" maxlength="6" placeholder="123456"></div>',
        foot:'<button class="wb-btn primary" id="mfa-verify" style="flex:1">Verify &amp; enable</button><button class="wb-btn" id="mfa-cancel">Cancel</button>',
        onMount:function(){
          $('mfa-cancel').onclick=WB.drawer.close;
          $('mfa-verify').onclick=function(){ var c=($('mfa-code').value||'').replace(/\D/g,''); if(c.length!==6){ WB.toast('Enter the 6-digit code','err'); return; } flags.set({mfa:true,recovery:true}); window.__codes=genCodes(); WB.drawer.close(); WB.toast('2FA enabled','ok'); render(); showCodes(); };
        } });
    }
    function showCodes(){
      var codes=window.__codes||genCodes(); window.__codes=codes;
      WB.drawer.open({ title:'Recovery codes', body:
        '<p style="font-size:12.5px;color:var(--hx-text-mid);margin:0 0 14px">Store these somewhere safe. Each code works once if you lose access to your authenticator.</p>'+
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">'+codes.map(function(c){return '<div class="rec-code">'+c+'</div>';}).join('')+'</div>',
        foot:'<button class="wb-btn" id="rc-copy" style="flex:1">Copy all</button><button class="wb-btn" id="rc-dl">Download</button><button class="wb-btn primary" id="rc-done">Done</button>',
        onMount:function(){
          $('rc-done').onclick=WB.drawer.close;
          $('rc-copy').onclick=function(){ try{navigator.clipboard.writeText(codes.join('\n'));}catch(e){} WB.toast('Copied','ok'); };
          $('rc-dl').onclick=function(){ var a=document.createElement('a'); a.href='data:text/plain,'+encodeURIComponent('HelveX recovery codes\n\n'+codes.join('\n')); a.download='helvex-recovery-codes.txt'; a.click(); };
        } });
    }

    WB.ready(function(s,u){ sb=s; user=u; render(); });
  })();
  </script>
</body>
</html>
