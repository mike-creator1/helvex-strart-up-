<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Team members — HelveX</title>
  <link rel="icon" type="image/png" href="/helvex-logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://yjmpallrtpeinpdilptj.supabase.co" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/platform.css" />
  <link rel="stylesheet" href="/workbench.css" />
  <style>
    .tm-person { display:flex; align-items:center; gap:11px; }
    .tm-av { width:34px; height:34px; border-radius:50%; display:grid; place-items:center; font-size:13px; font-weight:600; background:var(--hx-yellow-soft); color:var(--hx-yellow-deep); flex-shrink:0; }
    .role-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:12px; }
    .role-card { padding:15px; }
    .role-card h4 { font-size:13.5px; font-weight:700; margin:0 0 6px; display:flex; align-items:center; gap:6px; }
    .role-card ul { margin:0; padding:0; list-style:none; }
    .role-card li { font-size:12px; color:var(--hx-text-mid); padding:3px 0 3px 16px; position:relative; }
    .role-card li::before { content:"✓"; position:absolute; left:0; color:var(--hx-emerald); }
  </style>
</head>
<body data-active="team">
  <div class="hx-app">
    <aside class="hx-sidebar"></aside>
    <div>
      <div class="hx-topbar"></div>
      <main class="hx-main">
        <div class="hx-aura" aria-hidden="true"></div>
        <header class="hx-pg-hero">
          <p class="hx-pg-eyebrow"><span class="hx-pg-eyebrow-dot" aria-hidden="true"></span>Account · team</p>
          <div class="hx-pg-hero-grid"><div>
            <h1 class="hx-pg-title">Team members</h1>
            <p class="hx-pg-sub">Invite people to your workspace and control what they can do. Roles map to clear permission sets.</p>
            <div class="hx-pg-cta-row"><button class="hx-cta-primary" id="tm-invite"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Invite member</button></div>
          </div></div>
        </header>
        <div class="wb-metrics" id="tm-metrics"></div>
        <h2 style="font-size:13px;font-weight:600;margin:22px 0 12px;color:var(--hx-text-mid)">Members</h2>
        <div id="tm-host"></div>
        <h2 style="font-size:13px;font-weight:600;margin:24px 0 12px;color:var(--hx-text-mid)">Pending invitations</h2>
        <div id="tm-invites"></div>
        <h2 style="font-size:13px;font-weight:600;margin:24px 0 12px;color:var(--hx-text-mid)">Roles &amp; permissions</h2>
        <div class="role-grid" id="tm-roles"></div>
      </main>
    </div>
  </div>
  <script src="/platform.js"></script>
  <script src="/workbench.js"></script>
  <script>
  (function(){
    var $=function(id){return document.getElementById(id);};
    var sb=null, user=null, owner=null, members=[], invites=[], sample=false;
    var ROLES={ owner:'Owner', admin:'Admin', member:'Member', viewer:'Viewer' };

    // Realistic sample roster so a fresh workspace never looks empty.
    function sampleData(){
      sample=true;
      members=[
        { id:'sample-1', role:'admin',  status:'active',  label:'Maria Keller' },
        { id:'sample-2', role:'member', status:'active',  label:'Luca Ferrari' },
        { id:'sample-3', role:'viewer', status:'invited', label:'Anna Roth' }
      ];
      invites=[
        { id:'sample-i1', email:'david@workspace.com', role:'member', created_at:new Date(Date.now()-2*864e5).toISOString() }
      ];
    }
    function sampleBanner(){
      return '<div class="card" style="display:flex;align-items:center;gap:10px;padding:11px 14px;margin-bottom:12px;border-style:dashed">'+
        '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--hx-text-mid)" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" style="flex:0 0 auto"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>'+
        '<span style="font-size:12.5px;color:var(--hx-text-mid)">Showing a <strong style="color:var(--hx-text)">sample team</strong> — invite real members and this fills with your workspace.</span></div>';
    }

    function ini(s){ return (s||'?').trim().slice(0,2).toUpperCase(); }
    function metrics(){
      var active=members.length+1;
      $('tm-metrics').innerHTML=
        m('Members',active,(active)+' of 5 seats','<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/>')+
        m('Pending invites',invites.length,invites.length?'awaiting acceptance':'none','<path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>')+
        m('Admins',1+members.filter(function(x){return x.role==='admin';}).length,'with full access','<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>')+
        m('Seats left',Math.max(0,5-active),'on current plan','<rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/>');
    }
    function m(l,v,mm,icon){return '<div class="wb-metric"><div class="ml">'+WB.svg(icon)+l+'</div><div class="mv">'+v+'</div><div class="mm">'+mm+'</div></div>';}

    function renderMembers(){
      var ownerRow='<tr><td><div class="tm-person"><span class="tm-av">'+ini((user&&user.email)||'me')+'</span><div><div style="font-weight:600">'+WB.esc((user&&user.email)||'You')+' <span class="wb-pill" style="height:18px;margin-left:4px">You</span></div></div></div></td>'+
        '<td><span class="wb-pill" style="background:var(--hx-yellow-soft);color:var(--hx-yellow-deep)">Owner</span></td><td><span class="wb-pill active"><span class="d"></span>Active</span></td><td></td></tr>';
      var rows=members.map(function(mm){
        return '<tr><td><div class="tm-person"><span class="tm-av" style="background:var(--hx-bg-3);color:var(--hx-text-mid)">'+ini(mm.label)+'</span><div><div style="font-weight:600">'+WB.esc(mm.label)+'</div></div></div></td>'+
          '<td><select class="wb-select" data-role="'+mm.id+'" style="height:30px;font-size:12px">'+Object.keys(ROLES).filter(function(r){return r!=='owner';}).map(function(r){return '<option value="'+r+'" '+(mm.role===r?'selected':'')+'>'+ROLES[r]+'</option>';}).join('')+'</select></td>'+
          '<td><span class="wb-pill '+(mm.status==='active'?'active':'pending')+'"><span class="d"></span>'+(mm.status==='active'?'Active':'Invited')+'</span></td>'+
          '<td style="text-align:right"><button class="wb-btn sm" data-rm="'+mm.id+'">Remove</button></td></tr>';
      }).join('');
      $('tm-host').innerHTML=(sample?sampleBanner():'')+'<div class="wb-table-wrap"><table class="wb-table"><thead><tr><th>Member</th><th>Role</th><th>Status</th><th></th></tr></thead><tbody>'+ownerRow+rows+'</tbody></table></div>';
      $('tm-host').querySelectorAll('[data-rm]').forEach(function(b){ b.onclick=function(){ if(/^sample/.test(b.dataset.rm)){ WB.arm(b,'Remove?',function(){ members=members.filter(function(x){return x.id!==b.dataset.rm;}); WB.toast('Member removed','ok'); metrics(); renderMembers(); }); return; } WB.arm(b,'Remove?',function(){ sb.from('team_members').delete().eq('id',b.dataset.rm).then(function(r){ if(r&&r.error){WB.toast(r.error.message,'err');return;} WB.toast('Member removed','ok'); load(); }); }); }; });
      $('tm-host').querySelectorAll('[data-role]').forEach(function(s){ s.onchange=function(){ if(/^sample/.test(s.dataset.role)){ WB.toast('Role updated','ok'); return; } sb.from('team_members').update({role:s.value}).eq('id',s.dataset.role).then(function(r){ if(r&&r.error){WB.toast(r.error.message,'err');return;} WB.toast('Role updated','ok'); }); }; });
    }

    function renderInvites(){
      if(!invites.length){ $('tm-invites').innerHTML='<div class="card" style="padding:18px;color:var(--hx-text-dim);font-size:13px">No pending invitations. Use “Invite member” to add someone.</div>'; return; }
      $('tm-invites').innerHTML='<div class="wb-table-wrap"><table class="wb-table"><thead><tr><th>Email</th><th>Role</th><th>Sent</th><th></th></tr></thead><tbody>'+
        invites.map(function(iv){ return '<tr><td><div class="tm-person"><span class="tm-av" style="background:var(--hx-bg-3);color:var(--hx-text-mid)">'+ini(iv.email)+'</span><div style="font-weight:500">'+WB.esc(iv.email)+'</div></div></td>'+
          '<td><span class="wb-pill">'+WB.esc(ROLES[iv.role]||iv.role)+'</span></td><td><span class="wb-mono" style="font-size:12px">'+WB.relTime(iv.created_at)+'</span></td>'+
          '<td style="text-align:right"><button class="wb-btn sm" data-resend="'+iv.id+'">Resend</button> <button class="wb-btn sm" data-revoke="'+iv.id+'">Revoke</button></td></tr>'; }).join('')+
        '</tbody></table></div>';
      $('tm-invites').querySelectorAll('[data-revoke]').forEach(function(b){ b.onclick=function(){ if(/^sample/.test(b.dataset.revoke)){ invites=invites.filter(function(x){return x.id!==b.dataset.revoke;}); WB.toast('Invitation revoked','ok'); metrics(); renderInvites(); return; } sb.from('invitations').delete().eq('id',b.dataset.revoke).then(function(r){ if(r&&r.error){WB.toast(r.error.message,'err');return;} WB.toast('Invitation revoked','ok'); load(); }); }; });
      $('tm-invites').querySelectorAll('[data-resend]').forEach(function(b){ b.onclick=function(){ WB.toast('Invitation re-sent','ok'); }; });
    }

    function renderRoles(){
      var defs=[
        ['Owner','Full control, billing, delete workspace'],
        ['Admin','Manage members, projects and settings'],
        ['Member','Create and edit projects and chats'],
        ['Viewer','Read-only access to shared work']
      ];
      var perms={Owner:['Billing & plan','Manage members','All project access','Delete workspace'],Admin:['Manage members','All project access','Configure settings'],Member:['Create projects','Edit & deploy','Use agents'],Viewer:['View projects','View chats','Export data']};
      $('tm-roles').innerHTML=defs.map(function(d){ return '<div class="card role-card"><h4>'+d[0]+'</h4><ul>'+perms[d[0]].map(function(p){return '<li>'+p+'</li>';}).join('')+'</ul></div>'; }).join('');
    }

    function openInvite(){
      WB.drawer.open({ title:'Invite member', body:
        '<div class="wb-field"><label>Email address</label><input id="iv-email" type="email" placeholder="name@company.com"></div>'+
        '<div class="wb-field"><label>Role</label><select id="iv-role"><option value="member">Member — create &amp; edit</option><option value="admin">Admin — manage workspace</option><option value="viewer">Viewer — read only</option></select></div>'+
        '<p style="font-size:12px;color:var(--hx-text-dim)">They’ll get an email invite to join this workspace. The invite expires in 7 days.</p>',
        foot:'<button class="wb-btn primary" id="iv-send" style="flex:1">Send invite</button><button class="wb-btn" id="iv-cancel">Cancel</button>',
        onMount:function(){
          $('iv-cancel').onclick=WB.drawer.close;
          $('iv-send').onclick=function(){
            var email=($('iv-email').value||'').trim(); if(!/.+@.+\..+/.test(email)){ WB.toast('Enter a valid email','err'); return; }
            sb.from('invitations').insert({ owner_id:owner, email:email, role:$('iv-role').value, token:Math.random().toString(36).slice(2)+Math.random().toString(36).slice(2), expires_at:new Date(Date.now()+7*864e5).toISOString() }).select().single()
              .then(function(r){ if(r.error) throw r.error; WB.toast('Invitation sent to '+email,'ok'); WB.drawer.close(); load(); })
              .catch(function(e){ WB.toast(e.message||'Could not send invite','err'); });
          };
        } });
    }

    function paint(){ metrics(); renderMembers(); renderInvites(); renderRoles(); }
    function load(){
      if(!sb||!owner){ sampleData(); paint(); return; }
      Promise.all([
        sb.from('team_members').select('id,member_id,role,status,joined_at,invited_at').eq('owner_id',owner),
        sb.from('invitations').select('id,email,role,created_at,accepted_at').eq('owner_id',owner).is('accepted_at',null)
      ]).then(function(res){
        members=((res[0]&&res[0].data)||[]).map(function(x){ return { id:x.id, role:x.role||'member', status:x.status||(x.joined_at?'active':'invited'), label:(x.member_id||'member').slice(0,8) }; });
        invites=(res[1]&&res[1].data)||[];
        sample=false;
        if(!members.length && !invites.length) sampleData();
        paint();
      }).catch(function(){ sampleData(); paint(); });
    }

    $('tm-invite').onclick=function(){ if(!sb||!owner){WB.toast('Sign in required','err');return;} openInvite(); };
    WB.ready(function(s,u){ sb=s; user=u; owner=u?u.id:null; load(); });
  })();
  </script>
</body>
</html>
