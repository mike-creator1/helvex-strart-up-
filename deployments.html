<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Deployments — HelveX</title>
  <meta name="description" content="HelveX Deployments — environments, build history, status, logs, redeploy and rollback." />
  <link rel="icon" type="image/png" href="/helvex-logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://yjmpallrtpeinpdilptj.supabase.co" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/platform.css" />
  <link rel="stylesheet" href="/workbench.css" />
  <style>
    .env-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:14px; margin-bottom:8px; }
    .env-card { background:var(--hx-surface); border:1px solid var(--hx-line); border-radius:var(--hx-r); padding:18px; }
    .env-card .top { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
    .env-card .top .nm { font-size:14.5px; font-weight:600; }
    .env-card .top .nm small { display:block; font-family:var(--hx-mono); font-size:11px; color:var(--hx-text-dim); font-weight:400; margin-top:2px; }
    .timeline { position:relative; padding-left:26px; }
    .timeline::before { content:""; position:absolute; left:8px; top:6px; bottom:6px; width:2px; background:var(--hx-line); }
    .tl-item { position:relative; padding:0 0 22px; }
    .tl-item:last-child { padding-bottom:0; }
    .tl-dot { position:absolute; left:-22px; top:3px; width:14px; height:14px; border-radius:50%; border:3px solid var(--hx-surface); }
    .tl-dot.live { background:var(--hx-emerald); } .tl-dot.pending { background:var(--hx-yellow-deep); } .tl-dot.failed { background:var(--hx-red); } .tl-dot.degraded{ background:var(--hx-yellow); } .tl-dot.stopped { background:var(--hx-text-faint); }
    .log { background:#0b0b0d; border-radius:10px; padding:14px 16px; font-family:var(--hx-mono); font-size:12px; line-height:1.75; color:#d4d4d8; max-height:340px; overflow:auto; white-space:pre-wrap; }
    .log .t { color:#6b7280; } .log .ok { color:#4ade80; } .log .warn { color:#fbbf24; } .log .err { color:#f87171; } .log .dim { color:#9ca3af; }
  </style>
</head>
<body data-active="deployments">

  <div class="hx-app">
    <aside class="hx-sidebar"></aside>
    <div>
      <div class="hx-topbar"></div>
      <main class="hx-main">

        <div class="hx-aura" aria-hidden="true"></div>
        <header class="hx-pg-hero">
          <p class="hx-pg-eyebrow"><span class="hx-pg-eyebrow-dot" aria-hidden="true"></span>Deployments · infrastructure</p>
          <div class="hx-pg-hero-grid">
            <div>
              <h1 class="hx-pg-title">Deployments</h1>
              <p class="hx-pg-sub">Every build across your regions — with live status, version history, logs and one-click redeploy or rollback.</p>
              <div class="hx-pg-cta-row">
                <button class="hx-cta-primary" id="dp-new"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>New deployment</button>
                <a href="/projects.html" class="hx-cta-secondary">View projects</a>
              </div>
            </div>
          </div>
        </header>

        <div class="wb-metrics" id="dp-metrics"></div>

        <h2 style="font-size:13px;font-weight:600;margin:22px 0 12px;color:var(--hx-text-mid)" id="dp-env-h" hidden>Regions</h2>
        <div class="env-grid" id="dp-envs"></div>

        <div class="wb-toolbar">
          <div class="wb-search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="search" id="dp-q" placeholder="Search by name, project or version…" />
          </div>
          <div class="wb-seg" id="dp-tabs"></div>
        </div>

        <h2 style="font-size:13px;font-weight:600;margin:4px 0 14px;color:var(--hx-text-mid)">Build history</h2>
        <div id="dp-host"></div>

      </main>
    </div>
  </div>

  <script src="/platform.js"></script>
  <script src="/workbench.js"></script>
  <script>
  (function(){
    var $=function(id){return document.getElementById(id);};
    var ST={ q:'', tab:'all', loading:true, error:null, items:[], projects:[] };
    var sb=null, owner=null, db=null;
    var PILL={live:'live',pending:'building pulse',failed:'failed',degraded:'warn',stopped:'paused'};

    function pname(id){ var p=ST.projects.find(function(x){return x.id===id;}); return p?p.name:'—'; }
    function cap(s){return (s||'').charAt(0).toUpperCase()+(s||'').slice(1);}

    function metrics(){
      var all=ST.items, live=all.filter(function(d){return d.status==='live';});
      $('dp-metrics').innerHTML=
        mt('Total builds',all.length,'all regions','<path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>')+
        mt('Live',live.length,'serving traffic','<circle cx="12" cy="12" r="3"/><path d="M5 12a7 7 0 0 1 14 0"/>')+
        mt('Failed',all.filter(function(d){return d.status==='failed';}).length,'need attention','<path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>')+
        mt('Regions',new Set(all.map(function(d){return d.region;})).size,'active','<circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15 15 0 0 1 0 20 15 15 0 0 1 0-20z"/>');
    }
    function mt(l,v,m,icon){return '<div class="wb-metric"><div class="ml">'+WB.svg(icon)+l+'</div><div class="mv">'+v+'</div><div class="mm">'+m+'</div></div>';}

    function envs(){
      var regions={}; ST.items.forEach(function(d){ (regions[d.region]=regions[d.region]||[]).push(d); });
      var keys=Object.keys(regions);
      $('dp-env-h').hidden=keys.length===0;
      $('dp-envs').innerHTML=keys.map(function(rg){
        var latest=regions[rg].sort(function(a,b){return new Date(b.created_at)-new Date(a.created_at);})[0];
        return '<div class="env-card"><div class="top"><span class="wb-ic" style="width:34px;height:34px">'+WB.svg('<circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15 15 0 0 1 0 20 15 15 0 0 1 0-20z"/>')+'</span>'+
          '<div class="nm">'+WB.esc(rg)+'<small>'+regions[rg].length+' build'+(regions[rg].length>1?'s':'')+'</small></div><span class="wb-pill '+PILL[latest.status]+'" style="margin-left:auto"><span class="d"></span>'+cap(latest.status)+'</span></div>'+
          '<div class="wb-kv" style="padding:7px 0"><span class="k">Latest</span><span class="v">'+WB.esc(pname(latest.project_id))+'</span></div>'+
          '<div class="wb-kv" style="padding:7px 0"><span class="k">Version</span><span class="v wb-mono">'+WB.esc(latest.version||'v1')+'</span></div></div>';
      }).join('');
    }

    function tabs(){
      var all=ST.items; var c={all:all.length,live:0,pending:0,failed:0,stopped:0};
      all.forEach(function(d){ if(c[d.status]!==undefined)c[d.status]++; });
      $('dp-tabs').innerHTML=[['all','All'],['live','Live'],['pending','Building'],['failed','Failed'],['stopped','Stopped']].map(function(k){
        return '<button data-k="'+k[0]+'" class="'+(ST.tab===k[0]?'on':'')+'">'+k[1]+' <span class="ct">'+(c[k[0]]||0)+'</span></button>';
      }).join('');
      $('dp-tabs').querySelectorAll('button').forEach(function(b){b.onclick=function(){ST.tab=b.dataset.k;tabs();render();};});
    }

    function visible(){
      var rows=ST.items.slice();
      if(ST.tab!=='all') rows=rows.filter(function(d){return d.status===ST.tab;});
      if(ST.q){var q=ST.q.toLowerCase();rows=rows.filter(function(d){return ((d.name||'')+' '+pname(d.project_id)+' '+(d.version||'')+' '+(d.region||'')).toLowerCase().indexOf(q)>=0;});}
      rows.sort(function(a,b){return new Date(b.created_at)-new Date(a.created_at);});
      return rows;
    }

    function render(){
      var host=$('dp-host');
      if(ST.loading){ host.innerHTML=WB.skeletonCards(5); return; }
      if(ST.error){ host.innerHTML='<div class="wb-empty"><div class="orb">'+WB.svg('<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>')+'</div><h3>Couldn’t load deployments</h3><p>'+WB.esc(ST.error)+'</p><button class="wb-btn" id="dp-retry">Try again</button></div>'; $('dp-retry').onclick=load; return; }
      var rows=visible();
      if(!rows.length){
        var empty=ST.items.length===0;
        host.innerHTML='<div class="wb-empty"><div class="orb">'+WB.svg('<path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/>')+'</div><h3>'+(empty?'No deployments yet':'Nothing matches')+'</h3><p>'+(empty?'Ship your first build and it will appear here with full history, status and logs.':'Try a different filter.')+'</p>'+
          (empty?'<div style="display:flex;gap:8px;justify-content:center"><button class="hx-cta-primary" id="dp-empty">New deployment</button><button class="wb-btn" id="dp-seed">Load sample data</button></div>':'<button class="wb-btn" id="dp-clear">Clear filters</button>')+'</div>';
        var e=$('dp-empty'); if(e)e.onclick=newDeploy;
        var s=$('dp-seed'); if(s)s.onclick=seed;
        var c=$('dp-clear'); if(c)c.onclick=function(){ST.q='';ST.tab='all';$('dp-q').value='';tabs();render();};
        return;
      }
      host.innerHTML='<div class="timeline">'+rows.map(item).join('')+'</div>';
      rows.forEach(function(d){ bind('dp-logs-'+d.id,function(){openLogs(d);}); bind('dp-re-'+d.id,function(){redeploy(d);}); bind('dp-rb-'+d.id,function(){rollback(d);}); });
    }
    function bind(id,fn){var el=$(id);if(el)el.onclick=fn;}

    function item(d){
      var url=d.endpoint_url||('https://'+slug(pname(d.project_id))+'.helvex.app');
      return '<div class="tl-item"><span class="tl-dot '+d.status+'"></span>'+
        '<div class="wb-card" style="cursor:default;padding:16px 18px">'+
          '<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap"><strong style="font-size:14px">'+WB.esc(d.name||pname(d.project_id))+'</strong>'+
            '<span class="wb-tag">'+WB.esc(d.region||'EU-CH-1')+'</span><span class="wb-pill '+PILL[d.status]+'"><span class="d"></span>'+cap(d.status)+'</span>'+
            '<span style="margin-left:auto;font-size:11.5px;color:var(--hx-text-dim)">'+WB.relTime(d.created_at)+'</span></div>'+
          '<p class="wb-mono" style="font-size:11.5px;color:var(--hx-text-dim);margin:10px 0 12px">'+WB.esc(d.version||'v1')+' · '+WB.esc(pname(d.project_id))+'</p>'+
          '<div style="display:flex;gap:6px;flex-wrap:wrap">'+
            '<button class="wb-btn sm" id="dp-logs-'+d.id+'">'+WB.svg('<polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/>')+'View logs</button>'+
            (d.status==='live'?'<a class="wb-btn sm" href="'+WB.esc(url)+'" target="_blank" rel="noopener">'+WB.svg('<path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>')+'Open live URL</a>':'')+
            (d.status!=='pending'?'<button class="wb-btn sm" id="dp-re-'+d.id+'">'+WB.svg('<polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>')+'Redeploy</button>':'')+
            (d.status==='live'?'<button class="wb-btn sm" id="dp-rb-'+d.id+'">'+WB.svg('<polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>')+'Rollback</button>':'')+
          '</div></div></div>';
    }
    function slug(s){return (s||'app').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'');}

    function openLogs(d){
      WB.drawer.open({ title:'Logs · '+WB.esc(d.version||'v1'), body:
        '<div class="wb-kv"><span class="k">Deployment</span><span class="v">'+WB.esc(d.name||pname(d.project_id))+'</span></div>'+
        '<div class="wb-kv"><span class="k">Region</span><span class="v">'+WB.esc(d.region||'EU-CH-1')+'</span></div>'+
        '<div class="wb-kv"><span class="k">Status</span><span class="v"><span class="wb-pill '+PILL[d.status]+'"><span class="d"></span>'+cap(d.status)+'</span></span></div>'+
        '<div style="margin:16px 0 6px;font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--hx-text-dim)">Output</div>'+
        '<div class="log" id="dp-logbox"><span class="dim">Fetching logs…</span></div>',
        foot:'<button class="wb-btn" id="lg-close" style="flex:1">Close</button>',
        onMount:function(){
          $('lg-close').onclick=WB.drawer.close;
          sb.from('log_events').select('level,message,created_at').eq('deployment_id',d.id).order('created_at',{ascending:true}).limit(200)
            .then(function(r){
              var box=$('dp-logbox'); if(!box) return;
              if(r.error){ box.innerHTML='<span class="err">Could not load logs: '+WB.esc(r.error.message)+'</span>'; return; }
              var rows=r.data||[];
              if(!rows.length){ box.innerHTML=fallbackLog(d); return; }
              box.innerHTML=rows.map(function(l){ var c=l.level==='error'?'err':l.level==='warn'?'warn':l.level==='info'?'ok':'dim'; return '<span class="t">'+new Date(l.created_at).toLocaleTimeString()+'</span> <span class="'+c+'">'+WB.esc(l.message)+'</span>'; }).join('\n');
            }).catch(function(e){ var box=$('dp-logbox'); if(box) box.innerHTML='<span class="err">'+WB.esc(e.message)+'</span>'; });
        } });
    }
    function fallbackLog(d){
      return '<span class="dim">No stored log lines for this build.</span>\n<span class="t">—</span> <span class="dim">Showing synthetic build summary:</span>\n<span class="ok">✓</span> Dependencies installed\n<span class="ok">✓</span> Compiled successfully\n'+(d.status==='failed'?'<span class="err">✗ Build failed with exit code 1</span>':'<span class="ok">✓ Deployment '+(d.status==='live'?'ready':d.status)+'</span> → '+WB.esc(d.version||'v1'));
    }

    function bump(v){ v=(v||'v1').replace('v',''); var p=v.split('.').map(Number); while(p.length<3)p.push(0); p[2]=(p[2]||0)+1; return 'v'+p.join('.'); }
    function redeploy(d){
      db.insert({ name:d.name||pname(d.project_id), project_id:d.project_id||null, region:d.region||'EU-CH-1', version:bump(d.version), status:'pending', endpoint_url:d.endpoint_url||null })
        .then(function(r){ if(r.error)throw r.error; WB.toast('Build started','info'); load();
          var nid=r.data.id; setTimeout(function(){ db.update(nid,{status:'live',updated_at:new Date().toISOString(),endpoint_url:d.endpoint_url||('https://'+slug(pname(d.project_id))+'.helvex.app')}).then(function(){WB.toast('Deployment live','ok');load();}); },2600);
        }).catch(function(e){WB.toast(e.message||'Redeploy failed','err');});
    }
    function rollback(d){
      var prev=ST.items.filter(function(x){return x.project_id===d.project_id&&x.region===d.region&&x.id!==d.id&&x.status==='live';}).sort(function(a,b){return new Date(b.created_at)-new Date(a.created_at);})[0];
      if(!prev){ WB.toast('No previous version to roll back to','err'); return; }
      db.insert({ name:d.name||pname(d.project_id), project_id:d.project_id||null, region:d.region||'EU-CH-1', version:prev.version, status:'live', endpoint_url:prev.endpoint_url||null })
        .then(function(r){ if(r.error)throw r.error; WB.toast('Rolled back to '+prev.version,'ok'); load(); }).catch(function(e){WB.toast(e.message||'Rollback failed','err');});
    }

    function newDeploy(){
      if(!ST.projects.length){ WB.toast('Create a project first','err'); return; }
      WB.drawer.open({ title:'New deployment', body:
        '<div class="wb-field"><label>Project</label><select id="nd-proj">'+ST.projects.map(function(p){return '<option value="'+p.id+'">'+WB.esc(p.name)+'</option>';}).join('')+'</select></div>'+
        '<div class="wb-field"><label>Region</label><select id="nd-region"><option>EU-CH-1</option><option>EU-DE-1</option><option>US-EAST-1</option></select></div>'+
        '<div class="wb-field"><label>Version</label><input id="nd-ver" value="v1.0.0"></div>',
        foot:'<button class="wb-btn primary" id="nd-go" style="flex:1">Deploy</button><button class="wb-btn" id="nd-cancel">Cancel</button>',
        onMount:function(){
          $('nd-cancel').onclick=WB.drawer.close;
          $('nd-go').onclick=function(){
            var pid=$('nd-proj').value, pn=pname(pid);
            db.insert({ name:pn, project_id:pid, region:$('nd-region').value, version:$('nd-ver').value||'v1', status:'pending', endpoint_url:'https://'+slug(pn)+'.helvex.app' })
              .then(function(r){ if(r.error)throw r.error; WB.drawer.close(); WB.toast('Build queued','info'); load();
                var nid=r.data.id; setTimeout(function(){ var fail=Math.random()<0.15; db.update(nid,{status:fail?'failed':'live',updated_at:new Date().toISOString()}).then(function(){WB.toast(fail?'Build failed — check logs':pn+' is live',fail?'err':'ok');load();}); },2800);
              }).catch(function(e){WB.toast(e.message||'Deploy failed','err');});
          };
        } });
    }

    function seed(){
      var pid=ST.projects.length?ST.projects[0].id:null, pn=ST.projects.length?ST.projects[0].name:'Acme GTM';
      var base=Date.now();
      var rows=[
        {name:pn,project_id:pid,region:'EU-CH-1',version:'v2.4.1',status:'live',endpoint_url:'https://'+slug(pn)+'.helvex.app'},
        {name:pn,project_id:pid,region:'EU-CH-1',version:'v2.4.0',status:'failed',endpoint_url:null},
        {name:pn,project_id:pid,region:'US-EAST-1',version:'v2.3.5',status:'live',endpoint_url:'https://'+slug(pn)+'.helvex.app'},
        {name:pn,project_id:pid,region:'EU-CH-1',version:'v2.5.0',status:'pending',endpoint_url:null}
      ].map(function(r){return Object.assign({owner_id:owner},r);});
      WB.toast('Adding sample deployments…','info');
      sb.from('deployments').insert(rows).then(function(r){if(r.error)throw r.error;WB.toast('Sample data added','ok');load();}).catch(function(e){WB.toast(e.message||'Could not add sample data','err');});
    }

    function load(){
      if(!db){ ST.loading=false; ST.error='You need to be signed in.'; render(); return; }
      ST.loading=true; render();
      Promise.all([
        db.list('id,name,project_id,region,status,version,endpoint_url,created_at,updated_at',{col:'created_at',asc:false}),
        sb.from('projects').select('id,name')
      ]).then(function(res){
        if(res[0].error) throw res[0].error;
        ST.items=res[0].data||[]; ST.projects=(res[1]&&res[1].data)||[];
        ST.loading=false; ST.error=null; metrics(); envs(); tabs(); render();
      }).catch(function(e){ ST.loading=false; ST.error=e.message||'Load failed'; render(); });
    }

    $('dp-new').onclick=function(){ if(!db){WB.toast('Sign in to deploy','err');return;} newDeploy(); };
    var qt; $('dp-q').oninput=function(e){ST.q=e.target.value.trim();clearTimeout(qt);qt=setTimeout(render,140);};
    render();
    WB.ready(function(s,u){ sb=s; owner=u?u.id:null; db=(s&&u)?WB.tbl(s,'deployments',owner):null; load(); });
  })();
  </script>
</body>
</html>
