<!DOCTYPE html>
<html lang="en" translate="no" class="notranslate">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CreateX — Set Password</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    if (window.tailwind) {
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              gold: '#C4A55A', 'gold-light': '#D4B870',
              dark: '#09090B', 'dark-card': '#111113',
            },
            fontFamily: {
              serif: ['Playfair Display', 'Georgia', 'serif'],
              sans: ['Inter', '-apple-system', 'sans-serif'],
            },
          },
        },
      };
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    window.SUPABASE_URL  = 'https://ikbdhxobdjlwirydhxym.supabase.co';
    window.SUPABASE_ANON = 'sb_publishable_chzlbY97SlQx_Apf4zqrTQ_mdwWhmyE';
    (function initSB(tries){
      tries = tries || 0;
      var lib = window.supabase;
      if (lib && typeof lib.createClient === 'function') {
        try {
          window.sb = lib.createClient(window.SUPABASE_URL, window.SUPABASE_ANON, {
            auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: false }
          });
          document.dispatchEvent(new Event('sb:ready'));
        } catch (err) { console.error('Supabase init failed:', err); }
        return;
      }
      if (tries > 80) { console.warn('Supabase SDK failed to load'); return; }
      setTimeout(function(){ initSB(tries + 1); }, 40);
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet" />
  <script src="lang/en.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Inter',sans-serif;background:#09090B;color:#fff;-webkit-font-smoothing:antialiased;min-height:100vh;}
    .font-serif{font-family:'Playfair Display',Georgia,serif;}

    @keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
    @keyframes shimmer{from{background-position:0% center;}to{background-position:-200% center;}}
    @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(196,165,90,.4);}50%{box-shadow:0 0 0 8px rgba(196,165,90,0);}}

    .gradient-text{
      background:linear-gradient(120deg,#fff 0%,#C4A55A 35%,#fff 65%,#C4A55A 100%);
      background-size:250% auto;-webkit-background-clip:text;background-clip:text;
      -webkit-text-fill-color:transparent;animation:shimmer 7s linear infinite;
    }
    .btn-gold{
      background:linear-gradient(135deg,#C4A55A 0%,#D4B870 50%,#C4A55A 100%);
      background-size:200% auto;color:#09090B;font-weight:700;
      border-radius:100px;transition:all .3s;cursor:pointer;border:none;
      display:inline-flex;align-items:center;justify-content:center;gap:8px;
    }
    .btn-gold:hover{background-position:right center;transform:translateY(-2px);box-shadow:0 14px 40px rgba(196,165,90,.4);}
    .btn-ghost{background:none;border:none;color:rgba(255,255,255,.35);cursor:pointer;
      font-size:13px;font-family:'Inter',sans-serif;display:inline-flex;align-items:center;gap:6px;
      transition:color .2s;text-decoration:none;}
    .btn-ghost:hover{color:#fff;}
    .back-premium{position:fixed;top:12px;left:18px;z-index:120;height:36px;padding:0 15px 0 12px;border-radius:100px;
      display:inline-flex;align-items:center;gap:9px;text-decoration:none;font-size:12px;font-weight:850;color:rgba(255,236,178,.86);
      border:1px solid rgba(196,165,90,.24);background:linear-gradient(135deg,rgba(196,165,90,.12),rgba(255,255,255,.035));
      box-shadow:0 14px 38px rgba(0,0,0,.34),0 0 0 1px rgba(255,255,255,.025) inset;backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
      transition:transform .22s,border-color .22s,background .22s,color .22s,box-shadow .22s;}
    .back-premium svg{width:15px;height:15px;transition:transform .22s;}
    .back-premium:hover{transform:translateX(-2px);border-color:rgba(196,165,90,.5);background:linear-gradient(135deg,rgba(196,165,90,.2),rgba(255,255,255,.055));color:#FFE8A6;box-shadow:0 18px 46px rgba(196,165,90,.14),0 14px 38px rgba(0,0,0,.36);}
    .back-premium:hover svg{transform:translateX(-2px);}

    .form-input{
      width:100%;background:rgba(255,255,255,.04);
      border:1.5px solid rgba(255,255,255,.1);color:#fff;
      border-radius:12px;padding:13px 16px;font-size:14px;
      font-family:'Inter',sans-serif;outline:none;
      transition:border-color .2s,box-shadow .2s;display:block;
    }
    .form-input:focus{border-color:rgba(196,165,90,.6);box-shadow:0 0 0 3px rgba(196,165,90,.08);}
    .form-input::placeholder{color:rgba(255,255,255,.2);}
    .form-label{display:block;font-size:11px;font-weight:600;color:rgba(255,255,255,.35);
      text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;text-align:left;}

    .orb{position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none;}

    .step-flow{display:flex;align-items:center;gap:0;}
    .step-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.12);}
    .step-dot.active{background:#C4A55A;animation:pulse 2s infinite;}
    .step-dot.done{background:rgba(196,165,90,.4);}
    .step-line{width:28px;height:1px;background:rgba(255,255,255,.08);}
    .step-line.done{background:rgba(196,165,90,.3);}

    .glass-card{background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.07);border-radius:20px;}
    @media(max-width:1280px){.brand-link{margin-left:154px;}}
    @media(max-width:680px){
      .back-premium{left:12px;width:38px;padding:0;justify-content:center;gap:0;}
      .back-premium span{display:none;}
      .brand-link{margin-left:48px;}
    }

    .anim{animation:fadeUp .55s ease both;}
    .d1{animation-delay:.05s;}.d2{animation-delay:.12s;}.d3{animation-delay:.20s;}.d4{animation-delay:.30s;}.d5{animation-delay:.40s;}
  </style>
</head>
<body>

<div id="lang-host" style="position:fixed;top:16px;right:20px;z-index:200;"></div>

<!-- Background -->
<div class="orb" style="width:400px;height:400px;background:#C4A55A;top:-15%;left:-10%;opacity:.08;"></div>
<div class="orb" style="width:300px;height:300px;background:#CC1016;bottom:10%;right:-8%;opacity:.05;"></div>

<!-- ─── HEADER ─── -->
<header style="position:sticky;top:0;z-index:50;background:rgba(9,9,11,.92);
     backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
     border-bottom:1px solid rgba(255,255,255,.06);">
  <div style="max-width:1100px;margin:0 auto;padding:0 24px;height:60px;
       display:flex;align-items:center;justify-content:space-between;">
    <a href="landing.html" class="back-premium" onclick="if(window.history.length>1){window.history.back();return false;}">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
      </svg>
      <span>Back</span>
    </a>
    <a href="landing.html" class="brand-link" style="display:flex;align-items:center;gap:10px;text-decoration:none;">
      <img src="createx-logo.svg" alt="CreateX" style="width:34px;height:34px;object-fit:contain;display:block;filter:drop-shadow(0 0 16px rgba(24,215,255,.32));" />
      <div>
        <div style="font-size:13px;font-weight:600;color:#fff;line-height:1;">CreateX</div>
        <div style="font-size:9px;font-weight:500;color:#18d7ff;letter-spacing:.15em;margin-top:2px;">AI Agent</div>
      </div>
    </a>

    <!-- Flow progress -->
    <div class="step-flow hidden md:flex" style="align-items:center;gap:0;">
      <div style="font-size:10px;color:rgba(255,255,255,.3);margin-right:8px;">Account</div>
      <div class="step-dot done"></div>
      <div class="step-line done"></div>
      <div class="step-dot done"></div>
      <div class="step-line done"></div>
      <div class="step-dot active"></div>
      <div class="step-line"></div>
      <div class="step-dot"></div>
      <div style="font-size:10px;color:rgba(255,255,255,.3);margin-left:8px;">Done</div>
    </div>

    <span aria-hidden="true" style="width:92px;"></span>
  </div>
</header>

<!-- ─── MAIN ─── -->
<main style="min-height:calc(100vh - 60px);display:flex;align-items:center;
     justify-content:center;padding:40px 20px;position:relative;">

  <div style="width:100%;max-width:460px;text-align:center;">

    <!-- Icon -->
    <div class="anim d1" style="width:72px;height:72px;border-radius:20px;margin:0 auto 24px;
         display:flex;align-items:center;justify-content:center;
         background:linear-gradient(135deg,rgba(196,165,90,.15),rgba(196,165,90,.04));
         border:1px solid rgba(196,165,90,.25);">
      <svg width="32" height="32" fill="none" stroke="#C4A55A" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
      </svg>
    </div>

    <!-- Heading -->
    <h1 class="anim d2 font-serif" style="font-size:32px;font-weight:800;margin-bottom:10px;">
      Set your <span class="gradient-text">password</span>
    </h1>
    <p class="anim d2" style="font-size:15px;color:rgba(255,255,255,.42);line-height:1.65;margin-bottom:32px;">
      Choose a strong password to secure your account.
    </p>

    <!-- Form -->
    <form class="anim d3" onsubmit="handleSetPassword(event)" style="text-align:left;">
      <div style="margin-bottom:14px;">
        <label class="form-label">New Password</label>
        <div style="position:relative;">
          <input id="sp-pass" type="password" class="form-input" placeholder="Min. 8 characters" style="padding-right:46px;" autocomplete="new-password" required minlength="8" />
          <button type="button" onclick="togglePwd('sp-pass',this)"
                  style="position:absolute;right:14px;top:50%;transform:translateY(-50%);
                         background:none;border:none;color:rgba(255,255,255,.28);cursor:pointer;line-height:0;">
            <svg width="17" height="17" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
          </button>
        </div>
      </div>
      <div style="margin-bottom:22px;">
        <label class="form-label">Confirm Password</label>
        <div style="position:relative;">
          <input id="sp-pass2" type="password" class="form-input" placeholder="Repeat password" style="padding-right:46px;" autocomplete="new-password" required minlength="8" />
          <button type="button" onclick="togglePwd('sp-pass2',this)"
                  style="position:absolute;right:14px;top:50%;transform:translateY(-50%);
                         background:none;border:none;color:rgba(255,255,255,.28);cursor:pointer;line-height:0;">
            <svg width="17" height="17" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Error msg (hidden by default) -->
      <div id="err-msg" style="display:none;color:rgba(239,68,68,.8);font-size:13px;margin-bottom:16px;text-align:center;">
        Password must be at least 8 characters.
      </div>

      <button type="submit" class="btn-gold" style="width:100%;padding:14px;font-size:15px;">
        <span>Save &amp; Continue</span>
        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"/>
        </svg>
      </button>
    </form>

    <!-- Security note -->
    <div class="anim d5 glass-card" style="margin-top:20px;padding:14px 18px;
         display:flex;align-items:center;gap:10px;text-align:left;">
      <svg width="16" height="16" fill="none" stroke="rgba(196,165,90,.5)" viewBox="0 0 24 24" style="flex-shrink:0;">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
      </svg>
      <span style="font-size:12px;color:rgba(255,255,255,.3);line-height:1.5;">
        Use at least 8 characters. Mix letters, numbers &amp; symbols for stronger protection.
      </span>
    </div>

  </div>
</main>

<script>
  function _authErr(error, fallback) {
    if (!error) return fallback || 'Authentication error';
    const parts = [error.message || error.error_description || error.error || fallback || 'Authentication error'];
    if (error.status) parts.push('Status: ' + error.status);
    if (error.code) parts.push('Code: ' + error.code);
    return parts.filter(Boolean).join('\n');
  }
  function _reportAuthErr(method, error, fallback) {
    const msg = _authErr(error, fallback);
    console.error('Supabase auth error:', {
      method,
      message: error && error.message,
      status: error && error.status,
      code: error && error.code,
      error
    });
    return msg;
  }
  function _showErr(msg) {
    const el = document.getElementById('err-msg');
    if (el) {
      if (msg) el.textContent = msg;
      el.style.display = 'block';
    }
  }
  function _hideErr() {
    const el = document.getElementById('err-msg');
    if (el) el.style.display = 'none';
  }
  function _waitSB(cb, tries){
    tries = tries || 0;
    if (window.sb) return cb();
    if (tries > 80) return cb();
    setTimeout(function(){ _waitSB(cb, tries + 1); }, 40);
  }

  function togglePwd(id, btn) {
    const inp = document.getElementById(id);
    inp.type = inp.type === 'password' ? 'text' : 'password';
  }

  async function handleSetPassword(e) {
    e.preventDefault();
    _hideErr();
    const p1 = document.getElementById('sp-pass').value;
    const p2 = document.getElementById('sp-pass2').value;
    if (p1.length < 8) { _showErr('Password must be at least 8 characters.'); return; }
    if (p1 !== p2) { _showErr('Passwords do not match.'); return; }

    const btn = e.target.querySelector('button[type="submit"]');
    if (btn) { btn.disabled = true; btn.style.opacity = '.7'; btn.style.cursor = 'wait'; }

    _waitSB(async () => {
      try {
        if (!window.sb) { window.location.href = 'pricing.html'; return; }
        const { data: sessData } = await window.sb.auth.getSession();
        if (!sessData || !sessData.session) {
          _showErr('Your session has expired. Please sign in again.');
          if (btn) { btn.disabled = false; btn.style.opacity = ''; btn.style.cursor = ''; }
          return;
        }
        const { error } = await window.sb.auth.updateUser({ password: p1 });
        if (error) {
          _showErr(_reportAuthErr('updateUser:set-password', error, 'Could not set password. Please try again.'));
          if (btn) { btn.disabled = false; btn.style.opacity = ''; btn.style.cursor = ''; }
          return;
        }
        console.info('Supabase password set for verified signup session.');
        window.location.href = 'pricing.html';
      } catch (err) {
        _showErr(_reportAuthErr('handleSetPassword', err, 'Could not set password. Please try again.'));
        if (btn) { btn.disabled = false; btn.style.opacity = ''; btn.style.cursor = ''; }
      }
    });
  }
</script>
<script>window.SSAI_LANGS={en:'English',el:'GR',de:'Deutsch',fr:'Français',it:'Italiano',es:'Español',pt:'Português',ko:'한국어',zh:'中文'};</script>
<script src="lang-widget.js?v=6"></script>
<script>initLang('lang-host');</script>
</body>
</html>
