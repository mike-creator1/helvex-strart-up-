<!DOCTYPE html>
<html lang="en">
<head>
  <script>location.replace('/chat'+location.search+location.hash);</script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Preferences — HelveX</title>
  <link rel="icon" type="image/png" href="/helvex-logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://yjmpallrtpeinpdilptj.supabase.co" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/platform.css" />
  <link rel="stylesheet" href="/workbench.css" />
  <style>
    .pref-row { display:flex; align-items:center; gap:16px; padding:16px 0; border-top:1px solid var(--hx-line-soft); }
    .pref-row:first-child { border-top:0; }
    .pref-row .grow { flex:1; min-width:0; }
    .pref-row .lbl { font-size:13.5px; font-weight:600; }
    .pref-row .sub { font-size:12px; color:var(--hx-text-dim); margin-top:2px; }
    .theme-seg { display:inline-flex; border:1px solid var(--hx-line); border-radius:9px; overflow:hidden; }
    .theme-seg button { padding:8px 14px; font-size:12.5px; color:var(--hx-text-mid); background:transparent; border:0; cursor:pointer; display:flex; align-items:center; gap:6px; }
    .theme-seg button svg { width:14px; height:14px; }
    .theme-seg button.on { background:var(--hx-bg-3); color:var(--hx-text); font-weight:600; }
    .sec-h { font-size:13px; font-weight:600; color:var(--hx-text-mid); margin:0 0 4px; }
  </style>
</head>
<body data-active="settings">
  <div class="hx-app">
    <aside class="hx-sidebar"></aside>
    <div>
      <div class="hx-topbar"></div>
      <main class="hx-main">
        <div class="hx-aura" aria-hidden="true"></div>
        <header class="hx-pg-hero">
          <p class="hx-pg-eyebrow"><span class="hx-pg-eyebrow-dot" aria-hidden="true"></span>Account · preferences</p>
          <div class="hx-pg-hero-grid"><div>
            <h1 class="hx-pg-title">Preferences</h1>
            <p class="hx-pg-sub">Make HelveX feel like yours — appearance, language, defaults and privacy. Changes apply instantly and sync to your account.</p>
          </div></div>
        </header>
        <div id="pr-host"></div>
      </main>
    </div>
  </div>
  <script src="/platform.js"></script>
  <script src="/workbench.js"></script>
  <script>
  (function(){
    var $=function(id){return document.getElementById(id);};
    var sb=null, user=null, projects=[];
    var cfg={ theme:(localStorage.getItem('hx.theme')||'light'), language:'en', timezone:'Europe/Zurich', default_project_id:null, default_model:'nexus' };
    var privacy=JSON.parse(localStorage.getItem('hx.privacy')||'{"analytics":true,"suggestions":true,"presence":true}');
    var host=$('pr-host'); host.innerHTML=WB.skeletonCards(2);

    var LANGS=[['en','English'],['el','Ελληνικά'],['de','Deutsch'],['fr','Français'],['it','Italiano'],['es','Español']];
    var TZS=['Europe/Zurich','Europe/London','Europe/Berlin','America/New_York','America/Los_Angeles','Asia/Tokyo','Australia/Sydney'];
    var MODELS=[['ether','Ether — fast'],['nexus','Nexus — balanced'],['prometheus','Prometheus — deep']];

    function render(){
      host.innerHTML=
        '<div class="card" style="padding:22px;margin-bottom:16px"><div class="sec-h">Appearance</div><p style="font-size:12px;color:var(--hx-text-dim);margin:0 0 14px">Light, dark, or follow your system.</p>'+
          '<div class="theme-seg" id="pr-theme">'+
            seg('light','<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.2" y1="4.2" x2="5.6" y2="5.6"/><line x1="18.4" y1="18.4" x2="19.8" y2="19.8"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.2" y1="19.8" x2="5.6" y2="18.4"/><line x1="18.4" y1="5.6" x2="19.8" y2="4.2"/>','Light')+
            seg('dark','<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>','Dark')+
            seg('system','<rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/>','System')+
          '</div></div>'+

        '<div class="card" style="padding:22px;margin-bottom:16px"><div class="sec-h">Localization</div>'+
          '<div class="pref-row"><div class="grow"><div class="lbl">Language</div><div class="sub">Interface language across HelveX.</div></div><select class="wb-select" id="pr-lang">'+LANGS.map(function(l){return '<option value="'+l[0]+'" '+(cfg.language===l[0]?'selected':'')+'>'+l[1]+'</option>';}).join('')+'</select></div>'+
          '<div class="pref-row"><div class="grow"><div class="lbl">Timezone</div><div class="sub">Used for timestamps and scheduling.</div></div><select class="wb-select" id="pr-tz">'+TZS.map(function(t){return '<option '+(cfg.timezone===t?'selected':'')+'>'+t+'</option>';}).join('')+'</select></div>'+
        '</div>'+

        '<div class="card" style="padding:22px;margin-bottom:16px"><div class="sec-h">Workspace defaults</div>'+
          '<div class="pref-row"><div class="grow"><div class="lbl">Default project</div><div class="sub">New chats and artifacts land here.</div></div><select class="wb-select" id="pr-proj"><option value="">None</option>'+projects.map(function(p){return '<option value="'+p.id+'" '+(cfg.default_project_id===p.id?'selected':'')+'>'+WB.esc(p.name)+'</option>';}).join('')+'</select></div>'+
          '<div class="pref-row"><div class="grow"><div class="lbl">Default model</div><div class="sub">Pre-selected when you open a new chat.</div></div><select class="wb-select" id="pr-model">'+MODELS.map(function(m){return '<option value="'+m[0]+'" '+(cfg.default_model===m[0]?'selected':'')+'>'+m[1]+'</option>';}).join('')+'</select></div>'+
        '</div>'+

        '<div class="card" style="padding:22px;margin-bottom:16px"><div class="sec-h">Privacy</div>'+
          privRow('analytics','Product analytics','Help improve HelveX with anonymous usage data.')+
          privRow('suggestions','Personalised suggestions','Use your activity to tailor recommendations.')+
          privRow('presence','Show online status','Let teammates see when you’re active.')+
        '</div>'+

        '<div style="display:flex;align-items:center;gap:12px"><span id="pr-state" style="font-size:12.5px;color:var(--hx-emerald)">All preferences saved</span><span style="flex:1"></span><button class="wb-btn primary" id="pr-save">Save preferences</button></div>';

      // theme
      host.querySelectorAll('#pr-theme button').forEach(function(b){ b.onclick=function(){ cfg.theme=b.dataset.t; applyTheme(); markTheme(); markDirty(); }; });
      markTheme();
      ['pr-lang','pr-tz','pr-proj','pr-model'].forEach(function(id){ $(id).onchange=function(){ markDirty(); }; });
      host.querySelectorAll('.wb-switch[data-p]').forEach(function(sw){ sw.onclick=function(){ var k=sw.dataset.p; privacy[k]=!privacy[k]; sw.classList.toggle('on',privacy[k]); markDirty(); }; });
      $('pr-save').onclick=save;
    }
    function seg(v,ic,label){ return '<button data-t="'+v+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">'+ic+'</svg>'+label+'</button>'; }
    function privRow(k,label,sub){ return '<div class="pref-row"><div class="grow"><div class="lbl">'+label+'</div><div class="sub">'+sub+'</div></div><button class="wb-switch '+(privacy[k]?'on':'')+'" data-p="'+k+'"></button></div>'; }
    function markTheme(){ host.querySelectorAll('#pr-theme button').forEach(function(b){ b.classList.toggle('on',b.dataset.t===cfg.theme); }); }
    function markDirty(){ var s=$('pr-state'); if(s){ s.textContent='Unsaved changes'; s.style.color='var(--hx-yellow-deep)'; } }
    function applyTheme(){ try{ localStorage.setItem('hx.theme',cfg.theme); }catch(e){} var r=cfg.theme==='system'?((window.matchMedia&&matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light'):cfg.theme; document.documentElement.setAttribute('data-theme',r); document.documentElement.style.colorScheme=r; }

    function save(){
      cfg.language=$('pr-lang').value; cfg.timezone=$('pr-tz').value; cfg.default_project_id=$('pr-proj').value||null; cfg.default_model=$('pr-model').value;
      try{ localStorage.setItem('hx.privacy',JSON.stringify(privacy)); localStorage.setItem('hx.language',cfg.language); }catch(e){}
      if(!sb||!user){ done(); return; }
      var btn=$('pr-save'); btn.disabled=true; btn.textContent='Saving…';
      sb.from('user_settings').upsert({ user_id:user.id, theme:cfg.theme, language:cfg.language, timezone:cfg.timezone, default_project_id:cfg.default_project_id, updated_at:new Date().toISOString() },{onConflict:'user_id'}).then(function(r){
        btn.disabled=false; btn.textContent='Save preferences'; if(r.error) throw r.error; done();
      }).catch(function(e){ btn.disabled=false; btn.textContent='Save preferences'; WB.toast(e.message||'Save failed','err'); });
    }
    function done(){ var s=$('pr-state'); s.textContent='All preferences saved'; s.style.color='var(--hx-emerald)'; WB.toast('Preferences saved','ok'); }

    WB.ready(function(s,u){
      sb=s; user=u;
      if(!s||!u){ render(); return; }
      Promise.all([
        sb.from('user_settings').select('theme,language,timezone,default_project_id').eq('user_id',u.id).maybeSingle(),
        sb.from('projects').select('id,name').order('updated_at',{ascending:false})
      ]).then(function(res){
        var d=res[0]&&res[0].data; if(d){ cfg.theme=d.theme||cfg.theme; cfg.language=d.language||cfg.language; cfg.timezone=d.timezone||cfg.timezone; cfg.default_project_id=d.default_project_id||null; }
        projects=(res[1]&&res[1].data)||[]; render();
      }).catch(render);
    });
  })();
  </script>
</body>
</html>
