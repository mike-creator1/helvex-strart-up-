<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orders — HelveX</title>
  <meta name="description" content="HelveX orders — every credit pack, subscription change, and project commitment in one history." />
  <link rel="icon" type="image/png" href="/helvex-logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/platform.css" />
</head>
<body data-active="orders">

  <div class="hx-app">
    <aside class="hx-sidebar"></aside>
    <div>
      <div class="hx-topbar"></div>
      <main class="hx-main">

        <div class="hx-page-head">
          <div>
            <h1>Orders.</h1>
            <p class="sub">Every commitment your account has made — credit packs, plan changes, and project briefs accepted into delivery.</p>
          </div>
          <div class="hx-page-actions">
            <a href="/invoices.html" class="hx-btn hx-btn-secondary">View invoices</a>
            <a href="/buy-credits.html" class="hx-btn hx-btn-primary">New top-up</a>
          </div>
        </div>

        <div class="hx-grid hx-grid-3">
          <div class="hx-stat">
            <p class="hx-stat-label">Orders YTD</p>
            <p class="hx-stat-value hx-mono" id="hx-ord-count">0</p>
            <p class="hx-stat-meta" id="hx-ord-count-meta">No history yet</p>
          </div>
          <div class="hx-stat">
            <p class="hx-stat-label">In progress</p>
            <p class="hx-stat-value hx-mono" id="hx-ord-in-progress">0</p>
            <p class="hx-stat-meta" id="hx-ord-in-progress-meta">Nothing delivering</p>
          </div>
          <div class="hx-stat">
            <p class="hx-stat-label">Total committed</p>
            <p class="hx-stat-value hx-mono" id="hx-ord-total">CHF 0</p>
            <p class="hx-stat-meta">Year to date</p>
          </div>
        </div>

        <div class="hx-section-head">
          <h2>Order history</h2>
          <span class="meta" id="hx-ord-meta">—</span>
        </div>
        <div id="hx-ord-host"></div>

      </main>
    </div>
  </div>

  <script src="/platform.js"></script>
  <script>
    /* Real orders feed — unions invoices + credit_grants + active subscriptions. */
    (function () {
      function whenAuthReady(fn) {
        if (window.HX && window.HX.auth) { fn(); return; }
        document.addEventListener('hx:auth-ready', fn, { once: true });
      }
      var $ = function (id) { return document.getElementById(id); };
      function escape(s) { return (s == null ? '' : String(s)).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }
      function fmtDate(iso) { if (!iso) return '—'; try { return new Date(iso).toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' }); } catch (e) { return '—'; } }
      function fmtMoney(cents, currency) {
        var amt = (cents || 0) / 100;
        try { return new Intl.NumberFormat(undefined, { style: 'currency', currency: (currency || 'CHF').toUpperCase() }).format(amt); }
        catch (e) { return (currency || 'CHF').toUpperCase() + ' ' + amt.toFixed(2); }
      }
      function badge(status) {
        var col = 'hx-badge-neutral';
        if (status === 'paid' || status === 'active' || status === 'granted') col = 'hx-badge-emerald';
        if (status === 'failed' || status === 'canceled')                     col = 'hx-badge-red';
        if (status === 'pending' || status === 'past_due')                    col = 'hx-badge-yellow';
        return '<span class="hx-badge ' + col + '"><span class="hx-badge-dot"></span>' + escape(status || '—') + '</span>';
      }

      whenAuthReady(function () {
        var sb = window.HX.supabase;
        var host = $('hx-ord-host');
        var yearStart = new Date(new Date().getFullYear(), 0, 1).toISOString();

        sb.auth.getUser().then(async function (res) {
          var u = res && res.data ? res.data.user : null;
          if (!u) return;

          var [invs, grants, subs] = await Promise.all([
            sb.from('invoices').select('id,stripe_invoice_id,amount_cents,currency,status,hosted_url,pdf_url,created_at').order('created_at', { ascending: false }),
            sb.from('credit_grants').select('id,amount,source,reference,created_at').order('created_at', { ascending: false }),
            sb.from('subscriptions').select('id,plan,status,current_period_end,cancel_at_period_end,created_at').order('created_at', { ascending: false })
          ]);

          var rows = [];

          (invs.data || []).forEach(function (r) {
            rows.push({
              ts: r.created_at,
              kind: 'Invoice',
              label: r.stripe_invoice_id ? ('Invoice ' + r.stripe_invoice_id.slice(-8).toUpperCase()) : 'Invoice',
              status: r.status || 'paid',
              amount_cents: r.amount_cents || 0,
              currency: r.currency || 'chf',
              link: r.hosted_url || r.pdf_url || null
            });
          });
          (grants.data || []).forEach(function (r) {
            rows.push({
              ts: r.created_at,
              kind: r.source === 'stripe' ? 'Credit pack' : (r.source === 'bonus' ? 'Bonus credits' : 'Credits'),
              label: r.amount.toLocaleString() + ' credits' + (r.source === 'stripe' ? ' · top-up' : ''),
              status: 'granted',
              amount_cents: null,
              currency: null,
              link: null
            });
          });
          (subs.data || []).forEach(function (r) {
            rows.push({
              ts: r.created_at,
              kind: 'Subscription',
              label: (r.plan ? (r.plan[0].toUpperCase() + r.plan.slice(1)) : 'Plan') + ' subscription' + (r.cancel_at_period_end ? ' (canceling)' : ''),
              status: r.status || 'active',
              amount_cents: null,
              currency: null,
              link: null,
              meta: r.current_period_end ? ('Renews ' + fmtDate(r.current_period_end)) : ''
            });
          });

          rows.sort(function (a, b) { return new Date(b.ts) - new Date(a.ts); });

          var ytd = rows.filter(function (r) { return r.ts >= yearStart; });
          var inProgress = (subs.data || []).filter(function (s) { return s.status === 'active' || s.status === 'past_due'; }).length;
          var totalChf = (invs.data || []).filter(function (r) { return r.created_at >= yearStart && r.status === 'paid'; })
                                          .reduce(function (sum, r) { return sum + (r.amount_cents || 0); }, 0);

          $('hx-ord-count').textContent = ytd.length;
          $('hx-ord-count-meta').textContent = ytd.length ? ytd.length + ' this year' : 'No history yet';
          $('hx-ord-in-progress').textContent = inProgress;
          $('hx-ord-in-progress-meta').textContent = inProgress ? inProgress + ' active' : 'Nothing delivering';
          $('hx-ord-total').textContent = fmtMoney(totalChf, 'chf');
          $('hx-ord-meta').textContent = rows.length + (rows.length === 1 ? ' order' : ' orders');

          if (rows.length === 0) {
            host.innerHTML =
              '<div class="hx-empty">' +
                '<div class="icon" aria-hidden="true"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg></div>' +
                '<h3>No orders yet</h3>' +
                '<p>Subscriptions, top-ups, and accepted project briefs will be listed here.</p>' +
                '<div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">' +
                  '<a href="/pricing.html" class="hx-btn hx-btn-primary">Choose a plan</a>' +
                  '<a href="/buy-credits.html" class="hx-btn hx-btn-secondary">Buy credits</a>' +
                '</div>' +
              '</div>';
            return;
          }

          var html = '<div style="overflow-x:auto;"><table class="hx-table"><thead><tr><th>Date</th><th>Type</th><th>Item</th><th class="right">Amount</th><th>Status</th><th></th></tr></thead><tbody>';
          rows.forEach(function (r) {
            html += '<tr>' +
              '<td><span class="hx-mono" style="font-size:12.5px;color:var(--hx-text-mid);">' + fmtDate(r.ts) + '</span></td>' +
              '<td><span class="hx-mono" style="font-size:12.5px;color:var(--hx-text-mid);">' + escape(r.kind) + '</span></td>' +
              '<td><strong>' + escape(r.label) + '</strong>' + (r.meta ? '<div style="font-size:11.5px;color:var(--hx-text-mid);margin-top:2px;">' + escape(r.meta) + '</div>' : '') + '</td>' +
              '<td class="right hx-mono">' + (r.amount_cents == null ? '—' : escape(fmtMoney(r.amount_cents, r.currency))) + '</td>' +
              '<td>' + badge(r.status) + '</td>' +
              '<td>' + (r.link ? '<a href="' + escape(r.link) + '" target="_blank" rel="noopener" class="hx-mono" style="font-size:12px;">View</a>' : '') + '</td>' +
            '</tr>';
          });
          html += '</tbody></table></div>';
          host.innerHTML = html;
        });
      });
    })();
  </script>
</body>
</html>
