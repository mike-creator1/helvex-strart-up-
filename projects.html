<!DOCTYPE html>
<html lang="en">
<head>
  <script>location.replace('/chat'+location.search+location.hash);</script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Projects — HelveX</title>
  <meta name="description" content="HelveX Projects — manage AI workspaces with deployments, files and conversations in one place." />
  <link rel="icon" type="image/png" href="/helvex-logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://yjmpallrtpeinpdilptj.supabase.co" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/platform.css" />
  <link rel="stylesheet" href="/workbench.css" />
  <style>
    .pj-card { display:flex; flex-direction:column; }
    .pj-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin:4px 0 14px; }
    .pj-stat { background:var(--hx-bg-2); border-radius:9px; padding:9px 10px; text-align:center; }
    .pj-stat .n { font-family:var(--hx-mono); font-size:16px; font-weight:600; color:var(--hx-text); }
    .pj-stat .l { font-size:10px; color:var(--hx-text-dim); margin-top:2px; text-transform:uppercase; letter-spacing:.03em; }
    .dr-section { margin:18px 0 8px; font-size:11px; font-weight:600; letter-spacing:.05em; text-transform:uppercase; color:var(--hx-text-dim); }
  </style>
</head>
<body data-active="projects">

  <div class="hx-app">
    <aside class="hx-sidebar"></aside>
    <div>
      <div class="hx-topbar"></div>
      <main class="hx-main">

        <div class="hx-aura" aria-hidden="true"></div>
        <header class="hx-pg-hero">
          <p class="hx-pg-eyebrow"><span class="hx-pg-eyebrow-dot" aria-hidden="true"></span>Workspace</p>
          <div class="hx-pg-hero-grid">
            <div>
              <h1 class="hx-pg-title">Projects</h1>
              <p class="hx-pg-sub">Each project ties together its conversations, files and deployments. Open one to manage everything in context.</p>
              <div class="hx-pg-cta-row">
                <button class="hx-cta-primary" id="pj-new"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>New project</button>
              </div>
            </div>
          </div>
        </header>

        <div class="wb-metrics" id="pj-metrics"></div>

        <div class="wb-toolbar">
          <div class="wb-search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="search" id="pj-q" placeholder="Search projects…" />
          </div>
          <div class="wb-seg" id="pj-tabs"></div>
          <select class="wb-select" id="pj-sort">
            <option value="activity">Sort: Last updated</option>
            <option value="name">Sort: Name (A–Z)</option>
            <option value="created">Sort: Newest</option>
          </select>
        </div>

        <div id="pj-host"></div>

      </main>
    </div>
  </div>

  <script src="/platform.js"></script>
  <script src="/workbench.js"></script>
  <script>
  (function(){
    var $=function(id){return document.getElementById(id);};
    var COLORS=['#6C5DD3','#0EA5E9','#10B981','#C9A227','#EC4899','#F97316'];
    var ST={ q:'', tab:'all', sort:'activity', loading:true, error:null, items:[], deps:[], files:[], convos:[] };
    var sb=null, owner=null, db=null;

    function depsFor(id){ return ST.deps.filter(function(d){return d.project_id===id;}); }
    function countFiles(id){ return ST.files.filter(function(f){return f.project_id===id;}).length; }
    function countChats(id){ return ST.convos.filter(function(c){return c.project_id===id;}).length; }

    function metrics(){
      var all=ST.items;
      $('pj-metrics').innerHTML=
        mt('Projects',all.length,all.filter(function(p){return p.status==='active';}).length+' active','<rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>')+
        mt('Deployments',ST.deps.length,ST.deps.filter(function(d){return d.status==='live';}).length+' live','<path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/>')+
        mt('Files',ST.files.length,'across projects','<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>')+
        mt('Conversations',ST.convos.length,'linked to projects','<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>');
    }
    function mt(l,v,m,icon){return '<div class="wb-metric"><div class="ml">'+WB.svg(icon)+l+'</div><div class="mv">'+v+'</div><div class="mm">'+m+'</div></div>';}

    function tabs(){
      var all=ST.items; var c={all:all.length,active:0,paused:0,archived:0};
      all.forEach(function(p){ if(c[p.status]!==undefined)c[p.status]++; });
      $('pj-tabs').innerHTML=['all','active','paused','archived'].map(function(k){
        return '<button data-k="'+k+'" class="'+(ST.tab===k?'on':'')+'">'+cap(k)+' <span class="ct">'+c[k]+'</span></button>';
      }).join('');
      $('pj-tabs').querySelectorAll('button').forEach(function(b){b.onclick=function(){ST.tab=b.dataset.k;tabs();render();};});
    }
    function cap(s){return s.charAt(0).toUpperCase()+s.slice(1);}

    function visible(){
      var rows=ST.items.slice();
      if(ST.tab!=='all') rows=rows.filter(function(p){return p.status===ST.tab;});
      if(ST.q){var q=ST.q.toLowerCase();rows=rows.filter(function(p){return (p.name+' '+(p.description||'')+' '+p.slug).toLowerCase().indexOf(q)>=0;});}
      rows.sort(function(a,b){
        if(ST.sort==='name') return a.name.localeCompare(b.name);
        if(ST.sort==='created') return new Date(b.created_at)-new Date(a.created_at);
        return new Date(b.updated_at)-new Date(a.updated_at);
      });
      return rows;
    }

    function render(){
      var host=$('pj-host');
      if(ST.loading){ host.innerHTML=WB.skeletonCards(6); return; }
      if(ST.error){ host.innerHTML='<div class="wb-empty"><div class="orb">'+WB.svg('<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>')+'</div><h3>Couldn’t load projects</h3><p>'+WB.esc(ST.error)+'</p><button class="wb-btn" id="pj-retry">Try again</button></div>'; $('pj-retry').onclick=load; return; }
      var rows=visible();
      if(!rows.length){
        var empty=ST.items.length===0;
        host.innerHTML='<div class="wb-empty"><div class="orb">'+WB.svg('<path d="M3 7a2 2 0 0 1 2-2h4l2 3h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>')+'</div><h3>'+(empty?'No projects yet':'No projects match')+'</h3><p>'+(empty?'Create a workspace to organise conversations, files and deployments together.':'Try another search or filter.')+'</p>'+
          (empty?'<div style="display:flex;gap:8px;justify-content:center"><button class="hx-cta-primary" id="pj-empty">Create project</button><button class="wb-btn" id="pj-seed">Load sample data</button></div>':'<button class="wb-btn" id="pj-clear">Clear filters</button>')+'</div>';
        var e=$('pj-empty'); if(e)e.onclick=openNew;
        var s=$('pj-seed'); if(s)s.onclick=seed;
        var c=$('pj-clear'); if(c)c.onclick=function(){ST.q='';ST.tab='all';$('pj-q').value='';tabs();render();};
        return;
      }
      host.innerHTML='<div class="wb-grid">'+rows.map(card).join('')+'</div>';
      rows.forEach(function(p){ $('pj-'+p.id).onclick=function(){openDetail(p);}; });
    }

    function card(p){
      var col=COLORS[Math.abs(hash(p.id))%COLORS.length];
      var deps=depsFor(p.id); var latest=deps.sort(function(a,b){return new Date(b.created_at)-new Date(a.created_at);})[0];
      return '<div class="wb-card pj-card" id="pj-'+p.id+'">'+
        '<div class="wb-card-head"><div class="wb-ic" style="background:'+col+'1a;border-color:'+col+'33;color:'+col+'">'+WB.esc(p.name.charAt(0).toUpperCase())+'</div>'+
          '<div style="flex:1;min-width:0"><h3 style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+WB.esc(p.name)+'</h3><div class="sub">'+WB.esc(p.slug)+'.helvex.app</div></div>'+
          '<span class="wb-pill '+p.status+'"><span class="d"></span>'+cap(p.status)+'</span></div>'+
        '<p class="desc" style="display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:34px">'+WB.esc(p.description||'No description yet.')+'</p>'+
        '<div class="pj-stats"><div class="pj-stat"><div class="n">'+deps.length+'</div><div class="l">Deploys</div></div>'+
          '<div class="pj-stat"><div class="n">'+countFiles(p.id)+'</div><div class="l">Files</div></div>'+
          '<div class="pj-stat"><div class="n">'+countChats(p.id)+'</div><div class="l">Chats</div></div></div>'+
        '<div class="wb-card-foot">'+(latest?'<span class="wb-pill '+(latest.status==='live'?'live':latest.status==='failed'?'failed':latest.status==='pending'?'building pulse':'idle')+'" style="height:20px"><span class="d"></span>'+cap(latest.status)+'</span>':'<span class="dim" style="color:var(--hx-text-dim);font-size:11.5px">No deployments</span>')+
          '<span style="margin-left:auto;display:flex;align-items:center;gap:5px">'+WB.svg('<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>')+WB.relTime(p.updated_at)+'</span></div>'+
      '</div>';
    }
    function hash(s){var h=0;for(var i=0;i<s.length;i++){h=(h<<5)-h+s.charCodeAt(i);h|=0;}return h;}

    function openDetail(p){
      var col=COLORS[Math.abs(hash(p.id))%COLORS.length];
      var deps=depsFor(p.id).sort(function(a,b){return new Date(b.created_at)-new Date(a.created_at);});
      var body=
        '<div class="wb-kv"><span class="k">Status</span><span class="v"><span class="wb-pill '+p.status+'"><span class="d"></span>'+cap(p.status)+'</span></span></div>'+
        '<div class="wb-kv"><span class="k">Live URL</span><span class="v wb-mono">'+WB.esc(p.slug)+'.helvex.app</span></div>'+
        '<div class="wb-kv"><span class="k">Deployments</span><span class="v">'+deps.length+'</span></div>'+
        '<div class="wb-kv"><span class="k">Files</span><span class="v">'+countFiles(p.id)+'</span></div>'+
        '<div class="wb-kv"><span class="k">Conversations</span><span class="v">'+countChats(p.id)+'</span></div>'+
        '<div class="wb-kv"><span class="k">Created</span><span class="v">'+WB.fmtDate(p.created_at)+'</span></div>'+
        '<div class="wb-kv"><span class="k">Last updated</span><span class="v">'+WB.relTime(p.updated_at)+'</span></div>'+
        '<div class="dr-section">Recent deployments</div>'+
        (deps.length?deps.slice(0,5).map(function(d){return '<div class="wb-kv"><span class="k wb-mono">'+WB.esc(d.version||'v1')+' · '+WB.esc(d.region||'')+'</span><span class="v"><span class="wb-pill '+(d.status==='live'?'live':d.status==='failed'?'failed':d.status==='pending'?'building':'idle')+'"><span class="d"></span>'+cap(d.status)+'</span></span></div>';}).join(''):'<p class="desc" style="color:var(--hx-text-mid)">No deployments in this project yet.</p>')+
        '<div class="dr-section">Quick actions</div>'+
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">'+
          '<a class="wb-btn" href="/chat">'+WB.svg('<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>')+'Open chat</a>'+
          '<a class="wb-btn" href="/deployments.html">'+WB.svg('<path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/>')+'Deployments</a>'+
          '<a class="wb-btn" href="/memory.html">'+WB.svg('<path d="M12 2a3 3 0 0 0-3 3v1a3 3 0 0 0-3 3v1a3 3 0 0 0-1 5.83V18a3 3 0 0 0 3 3h1.5a2.5 2.5 0 0 0 5 0H16a3 3 0 0 0 3-3v-2.17A3 3 0 0 0 18 10V9a3 3 0 0 0-3-3V5a3 3 0 0 0-3-3z"/>')+'Memory</a>'+
          '<a class="wb-btn" href="/services.html">'+WB.svg('<path d="M9 2v4M15 2v4M5 6h14l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2z"/>')+'Services</a>'+
        '</div>';
      var foot='<button class="wb-btn" id="dr-toggle" style="flex:1">'+(p.status==='active'?'Pause':'Activate')+'</button><button class="wb-btn danger" id="dr-archive">'+(p.status==='archived'?'Delete':'Archive')+'</button>';
      WB.drawer.open({ title:'<span style="display:inline-flex;align-items:center;gap:10px"><span class="wb-ic" style="width:30px;height:30px;font-size:14px;background:'+col+'1a;border-color:'+col+'33;color:'+col+'">'+WB.esc(p.name.charAt(0).toUpperCase())+'</span>'+WB.esc(p.name)+'</span>', body:body, foot:foot, onMount:function(){
        $('dr-toggle').onclick=function(){ var ns=p.status==='active'?'paused':'active'; db.update(p.id,{status:ns,updated_at:new Date().toISOString()}).then(function(r){if(r.error)throw r.error;WB.toast('Project '+ns,'ok');WB.drawer.close();load();}).catch(function(e){WB.toast(e.message,'err');}); };
        $('dr-archive').onclick=function(e){
          if(p.status==='archived'){ WB.arm(e.currentTarget,'Delete forever?',function(){ db.remove(p.id).then(function(r){if(r.error)throw r.error;WB.toast('Project deleted','ok');WB.drawer.close();load();}).catch(function(er){WB.toast(er.message,'err');}); }); }
          else { db.update(p.id,{status:'archived',updated_at:new Date().toISOString()}).then(function(r){if(r.error)throw r.error;WB.toast('Project archived','info');WB.drawer.close();load();}).catch(function(er){WB.toast(er.message,'err');}); }
        };
      } });
    }

    function slugify(s){return (s||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').slice(0,63)||'project';}
    function openNew(){
      WB.drawer.open({ title:'New project', body:
        '<div class="wb-field"><label>Project name</label><input id="np-name" placeholder="e.g. Spring Campaign" maxlength="80"></div>'+
        '<div class="wb-field"><label>Description</label><textarea id="np-desc" placeholder="What is this workspace for?"></textarea></div>'+
        '<div class="wb-field"><label>Subdomain</label><input id="np-slug" placeholder="auto from name"><div style="font-size:11px;color:var(--hx-text-dim);font-family:var(--hx-mono);margin-top:5px" id="np-prev">your-project.helvex.app</div></div>',
        foot:'<button class="wb-btn primary" id="np-save" style="flex:1">Create project</button><button class="wb-btn" id="np-cancel">Cancel</button>',
        onMount:function(){
          var name=$('np-name'), slug=$('np-slug'), prev=$('np-prev'), touched=false;
          name.oninput=function(){ if(!touched)slug.value=slugify(name.value); prev.textContent=(slug.value||'your-project')+'.helvex.app'; };
          slug.oninput=function(){ touched=true; slug.value=slugify(slug.value); prev.textContent=(slug.value||'your-project')+'.helvex.app'; };
          $('np-cancel').onclick=WB.drawer.close;
          $('np-save').onclick=function(){
            var n=name.value.trim(); if(!n){WB.toast('Name is required','err');return;}
            var btn=$('np-save'); btn.disabled=true; btn.textContent='Creating…';
            db.insert({ name:n.slice(0,80), slug:slugify(slug.value||n), description:$('np-desc').value.trim()||null, status:'active' })
              .then(function(r){ if(r.error)throw r.error; WB.toast('Project created','ok'); WB.drawer.close(); load(); })
              .catch(function(e){ btn.disabled=false; btn.textContent='Create project'; WB.toast(e.message||'Could not create','err'); });
          };
        } });
    }

    function seed(){
      var rows=[
        {name:'Acme GTM',slug:'acme-gtm',description:'Go-to-market for the Q3 launch — landing pages, campaigns and analytics.',status:'active'},
        {name:'Billing Revamp',slug:'billing-revamp',description:'Stripe migration, invoices and usage-based metering.',status:'active'},
        {name:'Customer Insights',slug:'customer-insights',description:'Churn analysis, NPS and cohort reporting dashboards.',status:'active'},
        {name:'Support Copilot',slug:'support-copilot',description:'AI agent that drafts replies grounded in the knowledge base.',status:'paused'}
      ].map(function(r){return Object.assign({owner_id:owner},r);});
      WB.toast('Adding sample projects…','info');
      sb.from('projects').insert(rows).then(function(r){if(r.error)throw r.error;WB.toast('Sample data added','ok');load();}).catch(function(e){WB.toast(e.message||'Could not add sample data','err');});
    }

    function load(){
      if(!db){ ST.loading=false; ST.error='You need to be signed in.'; render(); return; }
      ST.loading=true; render();
      Promise.all([
        db.list('id,name,slug,description,status,created_at,updated_at',{col:'updated_at',asc:false}),
        sb.from('deployments').select('id,project_id,status,version,region,created_at'),
        sb.from('project_files').select('id,project_id'),
        sb.from('conversations').select('id,project_id')
      ]).then(function(res){
        if(res[0].error) throw res[0].error;
        ST.items=res[0].data||[]; ST.deps=(res[1]&&res[1].data)||[]; ST.files=(res[2]&&res[2].data)||[]; ST.convos=(res[3]&&res[3].data)||[];
        ST.loading=false; ST.error=null; metrics(); tabs(); render();
        try{ if(new URLSearchParams(location.search).get('new')==='1') openNew(); }catch(e){}
      }).catch(function(e){ ST.loading=false; ST.error=e.message||'Load failed'; render(); });
    }

    $('pj-new').onclick=function(){ if(!db){WB.toast('Sign in to create projects','err');return;} openNew(); };
    var qt; $('pj-q').oninput=function(e){ST.q=e.target.value.trim();clearTimeout(qt);qt=setTimeout(render,140);};
    $('pj-sort').onchange=function(e){ST.sort=e.target.value;render();};
    render();
    WB.ready(function(s,u){ sb=s; owner=u?u.id:null; db=(s&&u)?WB.tbl(s,'projects',owner):null; load(); });
  })();
  </script>
</body>
</html>
