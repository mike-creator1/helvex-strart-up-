<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>HeliX — Chat</title>
<link rel="icon" type="image/png" href="/helvex-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://yjmpallrtpeinpdilptj.supabase.co" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0B0B0D; --rail:#0E0E11; --surface:#141418; --surface-2:#1A1A20; --raised:#202028;
  --line:#262630; --line-soft:#1C1C22; --line-strong:#333341;
  --text:#F4F4F6; --mid:#A6A6B2; --dim:#6E6E7C; --faint:#46464F;
  --accent:#7C6CFF; --accent-2:#9A8CFF; --accent-soft:rgba(124,108,255,.14); --accent-line:rgba(124,108,255,.4);
  --ok:#3FB66B; --warn:#E5B84B; --danger:#F2555A; --danger-soft:rgba(242,85,90,.14);
  --mono:'JetBrains Mono',ui-monospace,monospace;
  --ease:cubic-bezier(.2,.7,.2,1);
}
:root[data-theme="light"]{
  --bg:#FBFAF8; --rail:#F4F2EE; --surface:#FFFFFF; --surface-2:#F7F5F1; --raised:#FFFFFF;
  --line:#E7E3DB; --line-soft:#F0EDE6; --line-strong:#D6D1C7;
  --text:#16151A; --mid:#5C5A63; --dim:#8A8893; --faint:#B6B4BD;
  --accent:#6A57F0; --accent-2:#7C6CFF; --accent-soft:rgba(106,87,240,.10); --accent-line:rgba(106,87,240,.32);
}
*{box-sizing:border-box;margin:0;}
html,body{height:100%;}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased;letter-spacing:-.006em;overflow:hidden;}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer;}
a{color:inherit;text-decoration:none;}
svg{display:block;}
::selection{background:var(--accent-soft);}
*::-webkit-scrollbar{width:10px;height:10px;}
*::-webkit-scrollbar-thumb{background:var(--line-strong);border-radius:99px;border:3px solid transparent;background-clip:content-box;}

.app{display:grid;grid-template-columns:300px 1fr;height:100vh;height:100dvh;}

/* ───────── Sessions sidebar ───────── */
.rail{background:var(--rail);border-right:1px solid var(--line-soft);display:flex;flex-direction:column;min-height:0;}
.rail-top{padding:16px 16px 10px;display:flex;align-items:center;gap:10px;}
.brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:17px;letter-spacing:-.02em;}
.brand-mark{width:28px;height:28px;border-radius:9px;background:linear-gradient(140deg,var(--accent-2),var(--accent));display:grid;place-items:center;color:#fff;}
.brand-mark svg{width:16px;height:16px;}
.brand-pro{font-size:9.5px;font-weight:800;letter-spacing:.1em;color:var(--accent);border:1px solid var(--accent-line);background:var(--accent-soft);padding:2px 6px;border-radius:5px;}
.new-btn{margin:6px 14px 10px;display:flex;align-items:center;justify-content:center;gap:8px;height:42px;border-radius:12px;background:var(--accent);color:#fff;font-weight:600;font-size:13.5px;box-shadow:0 8px 20px -10px var(--accent);transition:filter .14s,transform .12s;}
.new-btn:hover{filter:brightness(1.06);} .new-btn:active{transform:scale(.98);}
.new-btn svg{width:17px;height:17px;}
.search{margin:0 14px 8px;display:flex;align-items:center;gap:8px;height:36px;padding:0 11px;background:var(--surface);border:1px solid var(--line);border-radius:10px;}
.search svg{width:15px;height:15px;color:var(--dim);} .search input{flex:1;border:0;background:none;outline:none;color:var(--text);font-size:13px;}
.search input::placeholder{color:var(--faint);}
.sess-list{flex:1;overflow-y:auto;padding:4px 10px 16px;}
.sess-group{font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);padding:14px 8px 6px;}
.sess{display:block;width:100%;text-align:left;padding:10px 11px;border-radius:10px;cursor:pointer;transition:background .12s;position:relative;}
.sess:hover{background:var(--surface);}
.sess.active{background:var(--surface-2);}
.sess.active::before{content:"";position:absolute;left:0;top:9px;bottom:9px;width:3px;border-radius:0 3px 3px 0;background:var(--accent);}
.sess-t{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:6px;}
.sess-dot{width:6px;height:6px;border-radius:50%;background:var(--ok);flex-shrink:0;}
.sess-p{font-size:11.5px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
.sess-time{font-size:10.5px;color:var(--faint);margin-top:3px;font-family:var(--mono);}
.sess-del{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:26px;height:26px;border-radius:7px;display:none;place-items:center;color:var(--dim);}
.sess:hover .sess-del{display:grid;} .sess-del:hover{background:var(--raised);color:var(--danger);} .sess-del svg{width:14px;height:14px;}
.rail-foot{padding:12px 14px;border-top:1px solid var(--line-soft);display:flex;align-items:center;gap:10px;}
.rail-foot .av{width:30px;height:30px;border-radius:50%;background:var(--accent-soft);color:var(--accent);display:grid;place-items:center;font-weight:700;font-size:12px;border:1px solid var(--accent-line);}
.rail-foot .who{flex:1;min-width:0;font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rail-foot .who small{display:block;font-weight:400;color:var(--dim);font-size:11px;}
.icon-btn{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;color:var(--mid);transition:background .12s,color .12s;}
.icon-btn:hover{background:var(--surface);color:var(--text);} .icon-btn svg{width:17px;height:17px;}

/* ───────── Main ───────── */
.main{display:flex;flex-direction:column;min-width:0;min-height:0;}
.topbar{height:56px;flex-shrink:0;display:flex;align-items:center;gap:12px;padding:0 18px;border-bottom:1px solid var(--line-soft);background:color-mix(in srgb,var(--bg) 80%,transparent);backdrop-filter:saturate(160%) blur(12px);}
.menu-btn{display:none;}
.conv-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.spacer{flex:1;}
/* model switcher */
.model{position:relative;}
.model-btn{display:inline-flex;align-items:center;gap:8px;height:36px;padding:0 12px;border-radius:10px;border:1px solid var(--line);background:var(--surface);font-size:13px;font-weight:600;transition:border-color .12s,background .12s;}
.model-btn:hover{border-color:var(--line-strong);}
.model-btn .mdot{width:7px;height:7px;border-radius:50%;background:var(--accent);}
.model-btn svg{width:14px;height:14px;color:var(--dim);}
.model-menu{position:absolute;top:calc(100% + 6px);right:0;width:260px;background:var(--surface);border:1px solid var(--line);border-radius:14px;box-shadow:0 24px 60px -16px rgba(0,0,0,.5);padding:6px;z-index:50;}
.model-menu.hidden{display:none;}
.model-opt{display:flex;gap:10px;padding:10px 11px;border-radius:9px;cursor:pointer;}
.model-opt:hover{background:var(--surface-2);}
.model-opt .mi{width:30px;height:30px;border-radius:8px;background:var(--accent-soft);color:var(--accent);display:grid;place-items:center;flex-shrink:0;}
.model-opt .mi svg{width:16px;height:16px;}
.model-opt .mt{font-size:13px;font-weight:600;} .model-opt .ms{font-size:11.5px;color:var(--dim);}
.model-opt .mck{margin-left:auto;color:var(--accent);display:none;} .model-opt.on .mck{display:block;} .model-opt .mck svg{width:16px;height:16px;}

.thread{flex:1;overflow-y:auto;scroll-behavior:smooth;}
.thread-inner{max-width:760px;margin:0 auto;padding:30px 24px 24px;width:100%;}

/* messages */
.msg{margin-bottom:30px;animation:msgIn .3s var(--ease) both;}
@keyframes msgIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.msg.user{display:flex;justify-content:flex-end;}
.msg.user .bubble{max-width:82%;background:var(--accent);color:#fff;padding:12px 16px;border-radius:18px 18px 5px 18px;font-size:14.5px;line-height:1.55;white-space:pre-wrap;word-wrap:break-word;box-shadow:0 8px 20px -12px var(--accent);}
.msg.ai .head{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.msg.ai .av{width:30px;height:30px;border-radius:9px;background:linear-gradient(140deg,var(--accent-2),var(--accent));display:grid;place-items:center;color:#fff;flex-shrink:0;}
.msg.ai .av svg{width:17px;height:17px;}
.msg.ai .who{font-size:13px;font-weight:700;}
.msg.ai .model-chip{font-size:10.5px;font-weight:600;color:var(--accent);background:var(--accent-soft);padding:2px 8px;border-radius:999px;}
.msg.ai .time{font-size:11px;color:var(--faint);font-family:var(--mono);margin-left:auto;}
.msg.ai .content{font-size:14.5px;line-height:1.72;color:var(--text);}
.content p{margin:0 0 12px;} .content p:last-child{margin-bottom:0;}
.content h3.md{font-size:15.5px;font-weight:700;margin:18px 0 8px;}
.content ul,.content ol{margin:0 0 12px;padding-left:22px;} .content li{margin:4px 0;}
.content strong{font-weight:700;} .content em{font-style:italic;}
.content code{font-family:var(--mono);font-size:12.5px;background:var(--surface-2);padding:1.5px 5px;border-radius:5px;}
.codeblock{background:#08080A;border:1px solid var(--line);border-radius:12px;margin:6px 0 14px;overflow:hidden;}
:root[data-theme="light"] .codeblock{background:#1a1a1f;}
.codeblock .cb-head{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid rgba(255,255,255,.08);font-size:11px;color:#9a9aa6;font-family:var(--mono);}
.codeblock .cb-copy{color:#9a9aa6;font-size:11px;cursor:pointer;}.codeblock .cb-copy:hover{color:#fff;}
.codeblock pre{margin:0;padding:13px 14px;overflow-x:auto;font-family:var(--mono);font-size:12.5px;line-height:1.65;color:#e6e6ec;}

/* msg actions */
.msg-actions{display:flex;gap:4px;margin-top:12px;opacity:0;transition:opacity .14s;}
.msg.ai:hover .msg-actions,.msg.ai:last-child .msg-actions{opacity:1;}
.act{display:inline-flex;align-items:center;gap:6px;height:30px;padding:0 10px;border-radius:8px;font-size:12px;font-weight:500;color:var(--mid);border:1px solid transparent;transition:background .12s,color .12s,border-color .12s;}
.act:hover{background:var(--surface);color:var(--text);border-color:var(--line);}
.act svg{width:14px;height:14px;}
.act.done{color:var(--ok);}

/* thinking */
.thinking .head{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.think-live{display:flex;flex-wrap:wrap;align-items:center;gap:8px;padding-left:40px;}
.think-pulse{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:tpulse 1.3s ease-out infinite;}
@keyframes tpulse{0%{box-shadow:0 0 0 0 var(--accent-line);}70%{box-shadow:0 0 0 7px transparent;}100%{box-shadow:0 0 0 0 transparent;}}
.think-now{font-size:13.5px;font-weight:650;color:var(--mid);}
.kw{display:inline-flex;align-items:center;font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:999px;color:var(--accent);background:var(--accent-soft);border:1px solid var(--accent-line);opacity:0;transform:translateY(4px);animation:kwin .4s var(--ease) forwards,kwglow 2.4s ease-in-out infinite;}
@keyframes kwin{to{opacity:1;transform:none;}}
@keyframes kwglow{0%,100%{box-shadow:0 0 0 0 transparent;}50%{box-shadow:0 0 12px -4px var(--accent-line);}}

/* follow-ups */
.followups{margin-top:18px;padding-left:40px;display:flex;flex-direction:column;gap:8px;align-items:flex-start;}
.fu-label{font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);}
.fu{display:inline-flex;align-items:center;gap:8px;padding:9px 14px;border-radius:999px;border:1px solid var(--line);background:var(--surface);font-size:13px;font-weight:550;transition:border-color .14s,background .14s,transform .12s;}
.fu:hover{border-color:var(--accent-line);background:var(--accent-soft);} .fu:active{transform:scale(.98);}
.fu svg{width:14px;height:14px;color:var(--accent);}

/* error */
.err{margin-top:8px;padding:14px 16px;border-radius:12px;background:var(--danger-soft);border:1px solid var(--danger);color:var(--text);font-size:13.5px;display:flex;align-items:center;gap:12px;}
.err svg{width:18px;height:18px;color:var(--danger);flex-shrink:0;}
.err .retry{margin-left:auto;padding:7px 12px;border-radius:8px;background:var(--danger);color:#fff;font-size:12.5px;font-weight:600;}

/* empty state */
.empty{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;gap:8px;}
.empty .orb{width:60px;height:60px;border-radius:18px;background:linear-gradient(140deg,var(--accent-2),var(--accent));display:grid;place-items:center;color:#fff;margin-bottom:14px;box-shadow:0 16px 40px -16px var(--accent);}
.empty .orb svg{width:30px;height:30px;}
.empty h1{font-size:28px;font-weight:750;letter-spacing:-.025em;}
.empty p{color:var(--mid);font-size:14px;max-width:420px;}
.empty .sugs{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;width:min(560px,92vw);margin-top:18px;}
.empty .sug{text-align:left;padding:13px 15px;border:1px solid var(--line);border-radius:13px;background:var(--surface);transition:border-color .14s,transform .12s,background .14s;}
.empty .sug:hover{border-color:var(--accent-line);background:var(--surface-2);transform:translateY(-2px);}
.empty .sug .st{font-size:13px;font-weight:600;} .empty .sug .ss{font-size:12px;color:var(--dim);margin-top:2px;}

/* composer */
.composer-wrap{flex-shrink:0;padding:10px 24px calc(18px + env(safe-area-inset-bottom));}
.composer{max-width:760px;margin:0 auto;background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:8px 8px 8px 8px;transition:border-color .14s,box-shadow .14s;box-shadow:0 10px 30px -18px rgba(0,0,0,.5);}
.composer:focus-within{border-color:var(--accent-line);box-shadow:0 0 0 3px var(--accent-soft),0 10px 30px -18px rgba(0,0,0,.5);}
.composer textarea{width:100%;border:0;background:none;outline:none;resize:none;color:var(--text);font:inherit;font-size:15px;line-height:1.5;padding:8px 8px 4px;max-height:200px;}
.composer textarea::placeholder{color:var(--faint);}
.comp-row{display:flex;align-items:center;gap:6px;padding:4px 4px 0;}
.tool{display:inline-flex;align-items:center;gap:6px;height:34px;padding:0 11px;border-radius:10px;border:1px solid var(--line);color:var(--mid);font-size:12.5px;font-weight:550;transition:all .12s;}
.tool svg{width:15px;height:15px;}
.tool:hover{color:var(--text);border-color:var(--line-strong);}
.tool.on{color:var(--accent);border-color:var(--accent-line);background:var(--accent-soft);}
.tool.icon{width:34px;padding:0;justify-content:center;}
.send{margin-left:auto;width:38px;height:38px;border-radius:11px;background:var(--accent);color:#fff;display:grid;place-items:center;transition:filter .12s,transform .12s,background .12s;}
.send:hover{filter:brightness(1.07);} .send:active{transform:scale(.93);}
.send:disabled{background:var(--surface-2);color:var(--faint);cursor:not-allowed;}
.send svg{width:18px;height:18px;}
.send.stop{background:var(--danger);} .send.stop svg{width:14px;height:14px;}
.comp-hint{text-align:center;font-size:11px;color:var(--faint);margin-top:9px;}

.backdrop{display:none;}
@media (max-width:860px){
  .app{grid-template-columns:1fr;}
  /* Sessions list IS the home screen on mobile; the thread takes over when a chat opens */
  .rail{display:flex;width:100%;border-right:none;}
  .app.show-thread .rail{display:none;}
  .main{display:none;}
  .app.show-thread .main{display:flex;}
  .backdrop{display:none!important;}
  .menu-btn{display:grid;place-items:center;width:36px;height:36px;border-radius:9px;color:var(--mid);border:1px solid var(--line);}
  .menu-btn svg{width:20px;height:20px;}
  .thread-inner,.composer{padding-left:16px;padding-right:16px;}
  .empty .sugs{grid-template-columns:1fr;}
}
@media (prefers-reduced-motion:reduce){*{animation:none!important;scroll-behavior:auto!important;}}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="backdrop" id="backdrop"></div>
  <!-- Sessions -->
  <aside class="rail">
    <div class="rail-top">
      <div class="brand"><span class="brand-mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-8.5 8.5 9.5 9.5 0 0 1-4-.9L3 20l1.9-5a8.38 8.38 0 0 1-.9-3.5A8.5 8.5 0 0 1 12.5 3 8.38 8.38 0 0 1 21 11.5z"/></svg></span>HeliX<span class="brand-pro">PRO</span></div>
    </div>
    <button class="new-btn" id="new-chat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>New chat</button>
    <div class="search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7.5"/><line x1="21" y1="21" x2="16.8" y2="16.8"/></svg><input id="search" placeholder="Search chats…"></div>
    <div class="sess-list" id="sess-list"></div>
    <div class="rail-foot">
      <div class="av" id="user-av">·</div>
      <div class="who" id="user-who">Loading…<small id="user-sub">&nbsp;</small></div>
      <button class="icon-btn" id="theme-btn" title="Theme"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <header class="topbar">
      <button class="menu-btn" id="menu-btn" aria-label="Back to chats"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
      <span class="conv-title" id="conv-title">New chat</span>
      <span class="spacer"></span>
      <div class="model">
        <button class="model-btn" id="model-btn"><span class="mdot"></span><span id="model-label">HeliX Sonnet</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></button>
        <div class="model-menu hidden" id="model-menu"></div>
      </div>
    </header>

    <div class="thread" id="thread"></div>

    <div class="composer-wrap">
      <div class="composer">
        <textarea id="input" rows="1" placeholder="Message HeliX…"></textarea>
        <div class="comp-row">
          <button class="tool on" id="tool-web" data-tool="web"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18"/><path d="M12 3a14 14 0 0 1 0 18 14 14 0 0 1 0-18"/></svg><span>Web</span></button>
          <button class="tool" id="tool-focus" data-tool="focus"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="3"/></svg><span>Focus</span></button>
          <button class="tool icon" id="tool-attach" title="Attach"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a5 5 0 0 1-7.07-7.07l9.19-9.19a3.5 3.5 0 0 1 4.95 4.95l-8.49 8.49a2 2 0 0 1-2.83-2.83l8.49-8.49"/></svg></button>
          <button class="tool icon" id="tool-mic" title="Voice"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0 0 14 0"/><line x1="12" y1="18" x2="12" y2="22"/></svg></button>
          <button class="send" id="send" disabled><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="6 11 12 5 18 11"/></svg></button>
        </div>
      </div>
      <p class="comp-hint">HeliX can make mistakes. Verify important information.</p>
    </div>
  </main>
</div>

<script src="/auth.js" data-hx-auth="1"></script>
<script>
(function(){
  var $=function(id){return document.getElementById(id);};
  var sb=null, user=null;
  var ST={ conversations:[], convId:null, messages:[], model:'HeliX Sonnet', sending:false, abort:null, q:'', web:true, focus:false };
  var MODELS=[

  function esc(s){return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function escAttr(s){return esc(s).replace(/"/g,'&quot;');}
  function rel(iso){ if(!iso)return''; var d=(Date.now()-new Date(iso).getTime())/1000; if(d<60)return'now'; if(d<3600)return Math.floor(d/60)+'m'; if(d<86400)return Math.floor(d/3600)+'h'; if(d<604800)return Math.floor(d/86400)+'d'; return Math.floor(d/604800)+'w'; }
  function timeOf(iso){ try{return new Date(iso||Date.now()).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});}catch(e){return'';} }
  function uid(){return 'tmp_'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

  /* ───── markdown (safe) ───── */
  function md(t){
    t=String(t||'');
    var blocks=[], i=0;
    t=t.replace(/```(\w*)\n?([\s\S]*?)```/g,function(_,lang,code){ blocks.push({lang:lang||'code',code:code.replace(/\n$/,'')}); return '␀CB'+(blocks.length-1)+'␀'; });
    t=esc(t);
    // headings
    t=t.replace(/^###?\s+(.+)$/gm,'<h3 class="md">$1</h3>');
    // bold / italic / inline code
    t=t.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
    t=t.replace(/(^|[^*])\*([^*\n]+)\*/g,'$1<em>$2</em>');
    t=t.replace(/`([^`]+)`/g,'<code>$1</code>');
    // lists
    var lines=t.split('\n'), out=[], inUl=false, inOl=false;
    function closeLists(){ if(inUl){out.push('</ul>');inUl=false;} if(inOl){out.push('</ol>');inOl=false;} }
    lines.forEach(function(ln){
      var ulm=ln.match(/^\s*[-•]\s+(.+)$/), olm=ln.match(/^\s*\d+\.\s+(.+)$/);
      if(ulm){ if(inOl){out.push('</ol>');inOl=false;} if(!inUl){out.push('<ul>');inUl=true;} out.push('<li>'+ulm[1]+'</li>'); }
      else if(olm){ if(inUl){out.push('</ul>');inUl=false;} if(!inOl){out.push('<ol>');inOl=true;} out.push('<li>'+olm[1]+'</li>'); }
      else if(/^<h3/.test(ln)){ closeLists(); out.push(ln); }
      else if(/^␀CB\d+␀$/.test(ln.trim())){ closeLists(); out.push(ln.trim()); }
      else if(ln.trim()===''){ closeLists(); out.push(''); }
      else { closeLists(); out.push('<p>'+ln+'</p>'); }
    });
    closeLists();
    var html=out.join('\n').replace(/\n{2,}/g,'\n');
    html=html.replace(/␀CB(\d+)␀/g,function(_,n){ var b=blocks[+n]; return '<div class="codeblock"><div class="cb-head"><span>'+esc(b.lang)+'</span><span class="cb-copy" data-code="'+escAttr(b.code)+'">Copy</span></div><pre>'+esc(b.code)+'</pre></div>'; });
    return html;
  }

  /* ───── thinking keywords from prompt ───── */
  function keywords(t){
    t=String(t||'').toLowerCase();
    var map=[
      [/\b(code|bug|debug|function|error|refactor|api)\b/,['Syntax','Logic','Edge cases','Tests']],
      [/\b(email|reply|message|write|draft|copy)\b/,['Tone','Structure','Clarity','Draft']],
      [/\b(plan|roadmap|launch|timeline|step|milestone)\b/,['Steps','Milestones','Priorities']],
      [/\b(analy|data|metric|chart|trend|report|kpi)\b/,['Data','Trends','Metrics','Insight']],
      [/\b(research|find|compare|source|fact|explore)\b/,['Sources','Facts','Compare','Verify']],
      [/\b(idea|brainstorm|create|design|name)\b/,['Angles','Concepts','Variations']],
      [/\b(decide|option|choose|vs)\b/,['Trade-offs','Criteria','Recommendation']],
      [/\b(learn|explain|teach|understand|summar)\b/,['Concept','Example','Breakdown']]
    ];
    var intent=[]; for(var k=0;k<map.length;k++){ if(map[k][0].test(t)){intent=map[k][1];break;} }
    var stop={the:1,and:1,for:1,with:1,that:1,this:1,what:1,how:1,you:1,your:1,can:1,please:1,help:1,need:1,want:1,give:1,make:1,about:1,'και':1,'για':1,'που':1,'στο':1,'είναι':1,'θέλω':1,'κάνε':1};
    var w=t.replace(/[^a-zα-ωά-ώ0-9\s]/gi,' ').split(/\s+/).filter(function(x){return x.length>3&&!stop[x];});
    var pk=[]; w.forEach(function(x){if(pk.indexOf(x)<0)pk.push(x);});
    pk=pk.slice(0,3).map(function(x){return x.charAt(0).toUpperCase()+x.slice(1);});
    var all=intent.concat(pk),seen={},out=[]; all.forEach(function(x){var l=x.toLowerCase();if(!seen[l]){seen[l]=1;out.push(x);}});
    return out.slice(0,5);
  }
  function followups(t){
    t=String(t||'').toLowerCase();
    var m=[
      [/\b(code|bug|debug|function|error|refactor)\b/,['Add error handling','Write tests for this','Explain how it works']],
      [/\b(email|reply|message|write|draft)\b/,['Make it shorter','Make it more formal','Add a call to action']],
      [/\b(plan|roadmap|launch|timeline|step)\b/,['Break into weekly tasks','What are the risks?','Make a checklist']],
      [/\b(analy|data|metric|chart|trend|report)\b/,['Summarize the key insight','What should I do next?','Visualize as a chart']],
      [/\b(research|find|compare|source|fact)\b/,['Give me the sources','Compare top options','Go deeper']],
      [/\b(idea|brainstorm|create|design|name)\b/,['Give me 5 more','Refine the best','Make it bolder']],
      [/\b(decide|option|choose|vs)\b/,['Recommend one','What are the trade-offs?','What would you do?']],
      [/\b(learn|explain|teach|summar)\b/,['Explain simpler','Give an example','Quiz me']]
    ];
    for(var k=0;k<m.length;k++){ if(m[k][0].test(t))return m[k][1]; }
    return ['Go deeper','Summarize the key points','What should I do next?'];
  }

  function render(){

      if(ST.streamText!=null){

    }
    if(!ST.sending && !ST.error && ST.messages.length){
      var last=ST.messages[ST.messages.length-1];

      }
    }
    html+='</div>';

  }

  function wireSeeds(){
    document.querySelectorAll('[data-seed]').forEach(function(b){ b.onclick=function(){ var i=$('input'); i.value=b.getAttribute('data-seed'); i.dispatchEvent(new Event('input')); i.focus(); if(b.classList.contains('fu'))send(); }; });

  function wireThread(){
    wireSeeds();
    document.querySelectorAll('.cb-copy').forEach(function(c){ c.onclick=function(){ try{navigator.clipboard.writeText(c.getAttribute('data-code'));c.textContent='Copied';setTimeout(function(){c.textContent='Copy';},1200);}catch(e){} }; });
    document.querySelectorAll('.act').forEach(function(b){ b.onclick=function(){ var a=b.getAttribute('data-a'),idx=+b.getAttribute('data-idx'),m=ST.messages[idx];
      if(a==='copy'){ try{navigator.clipboard.writeText(m.content);b.classList.add('done');b.innerHTML=ic('copy')+'Copied';setTimeout(function(){b.classList.remove('done');b.innerHTML=ic('copy')+'Copy';},1300);}catch(e){} }
      if(a==='regen'){ regenerate(); }

  /* ───── data ───── */
  function tblConv(){ return sb.from('conversations'); }
  function tblMsg(){ return sb.from('messages'); }

  function loadConversations(){
    if(!sb||!user) return Promise.resolve();
    return tblConv().select('id,title,model,updated_at,created_at').is('archived_at',null).order('updated_at',{ascending:false}).limit(60)
      .then(function(r){ ST.conversations=(r.data||[]); renderSessions(); });
  }
  function renderSessions(){
    var list=$('sess-list');
    var rows=ST.conversations.filter(function(c){ return !ST.q || (c.title||'').toLowerCase().indexOf(ST.q)>=0; });
    if(!rows.length){ list.innerHTML='<div style="padding:24px 12px;text-align:center;color:var(--dim);font-size:12.5px">'+(ST.conversations.length?'No matches.':'No chats yet. Start one above.')+'</div>'; return; }
    list.innerHTML='<div class="sess-group">Recent</div>'+rows.map(function(c){
      return '<button class="sess '+(c.id===ST.convId?'active':'')+'" data-cid="'+c.id+'">'+
        '<div class="sess-t">'+(c.id===ST.convId?'<span class="sess-dot"></span>':'')+esc(c.title||'New chat')+'</div>'+
        '<div class="sess-time">'+esc(c.model||'HeliX')+' · '+rel(c.updated_at)+'</div>'+
        '<span class="sess-del" data-del="'+c.id+'" title="Delete"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg></span>'+
      '</button>';
    }).join('');
    list.querySelectorAll('.sess').forEach(function(s){ s.onclick=function(e){ if(e.target.closest('[data-del]'))return; openConversation(s.getAttribute('data-cid')); closeRail(); }; });
    list.querySelectorAll('[data-del]').forEach(function(d){ d.onclick=function(e){ e.stopPropagation(); delConversation(d.getAttribute('data-del')); }; });

  function openConversation(id){
    ST.convId=id; ST.error=null; ST.streamText=null;
    try{ $('app').classList.add('show-thread'); }catch(e){}
    var c=ST.conversations.filter(function(x){return x.id===id;})[0];
    $('conv-title').textContent=c?(c.title||'New chat'):'Chat';
    if(c&&c.model){ ST.model=c.model; updateModelLabel(); }
    $('thread').innerHTML='<div class="empty"><div class="orb" style="animation:tpulse 1.2s infinite">'+ICON_AI+'</div></div>';
    tblMsg().select('id,role,content,model,created_at').eq('conversation_id',id).order('created_at',{ascending:true})
      .then(function(r){ ST.messages=(r.data||[]).map(function(m){return {role:m.role,content:m.content,model:m.model,created_at:m.created_at};}); render(); renderSessions(); });
  }
  function delConversation(id){
    tblConv().update({archived_at:new Date().toISOString()}).eq('id',id).then(function(){
      ST.conversations=ST.conversations.filter(function(c){return c.id!==id;});
      if(ST.convId===id){ newChat(); }
      renderSessions();
    });
  }
  function newChat(){ ST.convId=null; ST.messages=[]; ST.error=null; ST.streamText=null; $('conv-title').textContent='New chat'; try{ $('app').classList.add('show-thread'); }catch(e){} render(); renderSessions(); $('input').focus(); }
  function backToSessions(){ try{ $('app').classList.remove('show-thread'); }catch(e){} loadConversations(); }

  /* ───── send / stream ───── */
  function titleFrom(t){ t=String(t||'').replace(/\s+/g,' ').trim(); return (t.length>46?t.slice(0,46)+'…':t)||'New chat'; }

  function send(){ var v=$('input').value.trim(); if(!v||ST.sending)return; $('input').value=''; autosize(); submit(v); }

  function submit(text){
    if(ST.sending) return;
    ST.error=null;
    ST.messages.push({role:'user',content:text,created_at:new Date().toISOString()});
    ST.sending=true; ST.streamText=null;
    $('send').classList.add('stop'); $('send').disabled=false; $('send').innerHTML='<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>';
    render();
    persistAndStream(text);
  }

  async function persistAndStream(text){
    var token=null;
    try{ var s=await sb.auth.getSession(); token=s&&s.data&&s.data.session?s.data.session.access_token:null; }catch(e){}
    // ensure conversation + persist user msg
    if(!ST.convId){
      try{
        var r=await tblConv().insert({owner_id:user.id,title:titleFrom(text),model:ST.model,workspace:'home'}).select().single();
        if(!r.error&&r.data){ ST.convId=r.data.id; ST.conversations.unshift(r.data); $('conv-title').textContent=r.data.title; renderSessions(); }
      }catch(e){}
    }
    if(ST.convId){ try{ tblMsg().insert({conversation_id:ST.convId,owner_id:user.id,role:'user',content:text,model:ST.model}); }catch(e){} }

    // history (exclude the just-added user msg is included; backend wants prior)
    var hist=ST.messages.slice(0,-1).filter(function(m){return m.role==='user'||m.role==='assistant';}).slice(-20).map(function(m){return {role:m.role,content:m.content};});
    var sys = ST.focus ? 'Be extremely direct and concise. No preamble, no caveats. Lead with the answer.' : '';

    ST.abort=new AbortController();
    try{
      var resp=await fetch('/api/assistant-chat',{method:'POST',signal:ST.abort.signal,
        headers:{'content-type':'application/json',authorization:token?('Bearer '+token):''},
        body:JSON.stringify(sys?{message:text,history:hist,system:sys}:{message:text,history:hist})});
      if(!resp.ok){ var et=''; try{var j=await resp.json();et=j.error||'';}catch(e){} throw new Error(et||('HeliX is unavailable ('+resp.status+')')); }
      ST.streamText=''; render();
      var reader=resp.body.getReader(), dec=new TextDecoder('utf-8'), buf='';
      while(true){
        var rd=await reader.read(); if(rd.done)break;
        buf+=dec.decode(rd.value,{stream:true});
        var nl; while((nl=buf.indexOf('\n'))>=0){
          var line=buf.slice(0,nl); buf=buf.slice(nl+1);
          if(line.indexOf('data: ')===0){ var d=line.slice(6).trim(); if(!d||d==='[DONE]')continue;
            try{ var o=JSON.parse(d); if(o.type==='content_block_delta'&&o.delta&&typeof o.delta.text==='string'){ ST.streamText+=o.delta.text; var el=$('streaming'); if(el){ el.innerHTML=md(ST.streamText)+'<span style="opacity:.5">▍</span>'; scrollBottom(); } } }catch(e){}
          }
        }
      }
      finishStream();
    }catch(err){
      if(err && err.name==='AbortError'){ finishStream(true); return; }
      ST.sending=false; ST.streamText=null; ST.error=(err&&err.message)||'Something went wrong.'; resetSend(); render();
    }
  }

  function finishStream(aborted){
    var txt=ST.streamText||''; ST.sending=false; ST.streamText=null; ST.abort=null; resetSend();
    if(txt.trim()){
      ST.messages.push({role:'assistant',content:txt,model:ST.model,created_at:new Date().toISOString()});
      if(ST.convId){
        try{ tblMsg().insert({conversation_id:ST.convId,owner_id:user.id,role:'assistant',content:txt,model:ST.model}); }catch(e){}
        try{ tblConv().update({updated_at:new Date().toISOString()}).eq('id',ST.convId).then(function(){loadConversations();}); }catch(e){}
      }
    }
    render();
  }
  function resetSend(){ var b=$('send'); b.classList.remove('stop'); b.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="6 11 12 5 18 11"/></svg>'; b.disabled=!$('input').value.trim(); }
  function stopGen(){ if(ST.abort){ try{ST.abort.abort();}catch(e){} } }
  function regenerate(){ // drop everything after the last user message, then re-stream it
    if(ST.sending)return;
    var li=-1; for(var k=ST.messages.length-1;k>=0;k--){ if(ST.messages[k].role==='user'){li=k;break;} }
    if(li<0)return;
    ST.messages=ST.messages.slice(0,li+1);
    ST.sending=true; ST.streamText=null; ST.error=null;
    $('send').classList.add('stop'); $('send').disabled=false; $('send').innerHTML='<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>';
    render(); persistAndStream(ST.messages[li].content);
  }

  /* ───── composer ───── */

  function renderModelMenu(){
    $('model-menu').innerHTML=MODELS.map(function(m){return '<div class="model-opt '+(m.id===ST.model?'on':'')+'" data-m="'+escAttr(m.id)+'"><span class="mi"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">'+m.ic+'</svg></span><div><div class="mt">'+esc(m.name)+'</div><div class="ms">'+esc(m.desc)+'</div></div><span class="mck"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span></div>';}).join('');
    $('model-menu').querySelectorAll('[data-m]').forEach(function(o){ o.onclick=function(){ ST.model=o.getAttribute('data-m'); updateModelLabel(); renderModelMenu(); $('model-menu').classList.add('hidden'); if(ST.convId){try{tblConv().update({model:ST.model}).eq('id',ST.convId);}catch(e){}} }; });
  }
  $('model-btn').onclick=function(e){ e.stopPropagation(); $('model-menu').classList.toggle('hidden'); };
  document.addEventListener('click',function(e){ if(!e.target.closest('.model'))$('model-menu').classList.add('hidden'); });

  /* theme */
  function applyTheme(t){ document.documentElement.setAttribute('data-theme',t); try{localStorage.setItem('helix.chat.theme',t);}catch(e){} }
  try{ applyTheme(localStorage.getItem('helix.chat.theme')||'dark'); }catch(e){}
  $('theme-btn').onclick=function(){ applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark'); };

  /* mobile rail */
  function closeRail(){ $('app').classList.remove('rail-open'); }
  $('menu-btn').onclick=backToSessions;   /* mobile: back to the sessions list */
  $('backdrop').onclick=closeRail;

  /* init */
  renderModelMenu(); updateModelLabel(); render();
  function whenAuth(fn){ if(window.HX&&window.HX.supabase){fn();return;} document.addEventListener('hx:auth-ready',fn,{once:true}); }
  whenAuth(function(){
    sb=window.HX.supabase;
    sb.auth.getUser().then(function(r){
      user=r&&r.data?r.data.user:null;
      if(user){ var em=user.email||''; var nm=(em.split('@')[0]||'You'); $('user-av').textContent=(nm[0]||'U').toUpperCase(); $('user-who').innerHTML=esc(nm.charAt(0).toUpperCase()+nm.slice(1))+'<small>'+esc(em)+'</small>'; loadConversations(); }
    }).catch(function(){});
  });
})();
</script>
</body>
</html>
