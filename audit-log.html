<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Audit log — HelveX</title>
  <link rel="icon" type="image/png" href="/helvex-logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://yjmpallrtpeinpdilptj.supabase.co" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/platform.css" />
  <link rel="stylesheet" href="/workbench.css" />
  <style>
    .al-kind { font-family:var(--hx-mono); font-size:12.5px; font-weight:600; }
    .al-row { cursor:pointer; }
    .json { background:var(--hx-bg-2); border:1px solid var(--hx-line); border-radius:10px; padding:14px; font-family:var(--hx-mono); font-size:12px; line-height:1.6; white-space:pre-wrap; word-break:break-word; max-height:300px; overflow:auto; }
  </style>
</head>
<body data-active="audit-log">
  <div class="hx-app">
    <aside class="hx-sidebar"></aside>
    <div>
      <div class="hx-topbar"></div>
      <main class="hx-main">
        <div class="hx-aura" aria-hidden="true"></div>
        <header class="hx-pg-hero">
          <p class="hx-pg-eyebrow"><span class="hx-pg-eyebrow-dot" aria-hidden="true"></span>Account · audit</p>
          <div class="hx-pg-hero-grid"><div>
            <h1 class="hx-pg-title">Audit log</h1>
            <p class="hx-pg-sub">A tamper-evident record of every meaningful action in your workspace — who did what, from where, and when.</p>
            <div class="hx-pg-cta-row"><button class="hx-cta-secondary" id="al-export">Export CSV</button></div>
          </div></div>
        </header>
        <div class="wb-metrics" id="al-metrics"></div>
        <div class="wb-toolbar">
          <div class="wb-search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input id="al-q" type="search" placeholder="Search events, actor, IP…"></div>
          <div class="wb-seg" id="al-cats"></div>
          <select class="wb-select" id="al-sev"><option value="all">All severity</option><option value="info">Info</option><option value="warning">Warning</option><option value="critical">Critical</option></select>
        </div>
        <div id="al-host"></div>
      </main>
    </div>
  </div>
  <script src="/platform.js"></script>
  <script src="/workbench.js"></script>
  <script>
  (function(){
    var $=function(id){return document.getElementById(id);};
    var sb=null, owner=null, db=null;
    var ST={ q:'', cat:'all', sev:'all', loading:true, error:null, items:[] };

    function category(kind){ kind=kind||''; if(kind.indexOf('auth')===0||kind.indexOf('security')===0) return 'auth'; if(kind.indexOf('project')===0) return 'project'; if(kind.indexOf('deploy')===0) return 'deploy'; if(kind.indexOf('billing')===0||kind.indexOf('invoice')===0) return 'billing'; if(kind.indexOf('member')===0||kind.indexOf('team')===0||kind.indexOf('invite')===0) return 'team'; return 'other'; }
    function severity(kind){ kind=kind||''; if(/delete|removed|revok|fail|denied|breach/.test(kind)) return 'critical'; if(/updated|changed|disabled|paused|signed_out/.test(kind)) return 'warning'; return 'info'; }
    function sevPill(s){ return '<span class="wb-pill '+(s==='critical'?'failed':s==='warning'?'warn':'ok')+'"><span class="d"></span>'+s.charAt(0).toUpperCase()+s.slice(1)+'</span>'; }

    function metrics(){
      var all=ST.items, today=all.filter(function(e){return (Date.now()-new Date(e.created_at))<864e5;}).length;
      $('al-metrics').innerHTML=
        m('Total events',all.length,'recorded','<polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>')+
        m('Today',today,'in the last 24h','<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>')+
        m('Critical',all.filter(function(e){return severity(e.kind)==='critical';}).length,'sensitive actions','<path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/>')+
        m('Last event',all.length?WB.relTime(all[0].created_at):'—','most recent','<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>');
    }
    function m(l,v,mm,icon){return '<div class="wb-metric"><div class="ml">'+WB.svg(icon)+l+'</div><div class="mv" style="font-size:'+(String(v).length>6?'18px':'26px')+'">'+v+'</div><div class="mm">'+mm+'</div></div>';}

    function cats(){
      var counts={}; ST.items.forEach(function(e){var c=category(e.kind);counts[c]=(counts[c]||0)+1;});
      var defs=[['all','All'],['auth','Auth'],['project','Projects'],['deploy','Deploy'],['billing','Billing'],['team','Team']];
      $('al-cats').innerHTML=defs.filter(function(d){return d[0]==='all'||counts[d[0]];}).map(function(d){ return '<button data-k="'+d[0]+'" class="'+(ST.cat===d[0]?'on':'')+'">'+d[1]+' <span class="ct">'+(d[0]==='all'?ST.items.length:counts[d[0]])+'</span></button>'; }).join('');
      $('al-cats').querySelectorAll('button').forEach(function(b){b.onclick=function(){ST.cat=b.dataset.k;cats();render();};});
    }

    function visible(){
      var rows=ST.items.slice();
      if(ST.cat!=='all') rows=rows.filter(function(e){return category(e.kind)===ST.cat;});
      if(ST.sev!=='all') rows=rows.filter(function(e){return severity(e.kind)===ST.sev;});
      if(ST.q){var q=ST.q.toLowerCase();rows=rows.filter(function(e){return ((e.kind||'')+' '+(e.actor_email||'')+' '+(e.ip||'')).toLowerCase().indexOf(q)>=0;});}
      return rows;
    }

    function render(){
      var host=$('al-host');
      if(ST.loading){ host.innerHTML=WB.skeletonCards(3); return; }
      if(ST.error){ host.innerHTML='<div class="wb-empty"><div class="orb">'+WB.svg('<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/>')+'</div><h3>Couldn’t load the audit log</h3><p>'+WB.esc(ST.error)+'</p><button class="wb-btn" id="al-retry">Try again</button></div>'; $('al-retry').onclick=load; return; }
      var rows=visible();
      if(!rows.length){
        var empty=ST.items.length===0;
        host.innerHTML='<div class="wb-empty"><div class="orb">'+WB.svg('<polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>')+'</div><h3>'+(empty?'No events yet':'Nothing matches')+'</h3><p>'+(empty?'As you and your team work, every meaningful action will be logged here.':'Adjust your search or filters.')+'</p>'+(empty?'<button class="wb-btn" id="al-seed">Load sample events</button>':'<button class="wb-btn" id="al-clear">Clear filters</button>')+'</div>';
        var s=$('al-seed'); if(s)s.onclick=seed;
        var c=$('al-clear'); if(c)c.onclick=function(){ST.q='';ST.cat='all';ST.sev='all';$('al-q').value='';$('al-sev').value='all';cats();render();};
        return;
      }
      host.innerHTML=(ST.sample?sampleBanner():'')+'<div class="wb-table-wrap"><table class="wb-table"><thead><tr><th>Event</th><th>Actor</th><th>Severity</th><th>IP</th><th>When</th></tr></thead><tbody>'+
        rows.map(function(e,i){ return '<tr class="al-row" data-i="'+i+'"><td><span class="al-kind">'+WB.esc(e.kind||'event')+'</span></td>'+
          '<td>'+WB.esc(e.actor_email||'—')+'</td><td>'+sevPill(severity(e.kind))+'</td>'+
          '<td><span class="wb-mono" style="font-size:12px">'+WB.esc(e.ip||'—')+'</span></td>'+
          '<td><span class="wb-mono" style="font-size:12px" title="'+WB.esc(e.created_at||'')+'">'+WB.relTime(e.created_at)+'</span></td></tr>'; }).join('')+
        '</tbody></table></div>';
      host.querySelectorAll('.al-row').forEach(function(r){ r.onclick=function(){ detail(rows[+r.dataset.i]); }; });
    }

    function detail(e){
      WB.drawer.open({ title:WB.esc(e.kind||'Event'), body:
        '<div class="wb-kv"><span class="k">Severity</span><span class="v">'+sevPill(severity(e.kind))+'</span></div>'+
        '<div class="wb-kv"><span class="k">Actor</span><span class="v">'+WB.esc(e.actor_email||'—')+'</span></div>'+
        '<div class="wb-kv"><span class="k">IP address</span><span class="v wb-mono">'+WB.esc(e.ip||'—')+'</span></div>'+
        '<div class="wb-kv"><span class="k">When</span><span class="v">'+WB.fmtDate(e.created_at)+' · '+WB.relTime(e.created_at)+'</span></div>'+
        '<div class="wb-kv"><span class="k">User agent</span><span class="v" style="font-size:11px;text-align:right">'+WB.esc((e.user_agent||'—')).slice(0,80)+'</span></div>'+
        '<div style="margin:16px 0 8px;font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--hx-text-dim)">Payload</div>'+
        '<div class="json">'+WB.esc(JSON.stringify(e.payload||{},null,2))+'</div>',
        foot:'<button class="wb-btn" id="al-close" style="flex:1">Close</button>',
        onMount:function(){ $('al-close').onclick=WB.drawer.close; } });
    }

    function exportCsv(){
      var rows=visible(); if(!rows.length){ WB.toast('Nothing to export','info'); return; }
      var head=['kind','actor_email','severity','ip','created_at'];
      var csv=[head.join(',')].concat(rows.map(function(e){ return [e.kind,e.actor_email||'',severity(e.kind),e.ip||'',e.created_at].map(function(x){return '"'+String(x==null?'':x).replace(/"/g,'""')+'"';}).join(','); })).join('\n');
      var a=document.createElement('a'); a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv); a.download='helvex-audit-log.csv'; a.click(); WB.toast('Exported '+rows.length+' events','ok');
    }

    function seed(){
      var now=Date.now();
      var rows=[
        {kind:'auth.signed_in',actor_email:'you@helvex.app',ip:'85.4.12.9',payload:{method:'email'},created_at:new Date(now-60000).toISOString()},
        {kind:'project.created',actor_email:'you@helvex.app',ip:'85.4.12.9',payload:{name:'Acme GTM'},created_at:new Date(now-36e5).toISOString()},
        {kind:'deploy.succeeded',actor_email:'you@helvex.app',ip:'85.4.12.9',payload:{version:'v2.4.1'},created_at:new Date(now-72e5).toISOString()},
        {kind:'member.invited',actor_email:'you@helvex.app',ip:'85.4.12.9',payload:{email:'sara@helvex.app',role:'admin'},created_at:new Date(now-9e6).toISOString()},
        {kind:'security.password_changed',actor_email:'you@helvex.app',ip:'85.4.12.9',payload:{},created_at:new Date(now-864e5).toISOString()},
        {kind:'project.deleted',actor_email:'you@helvex.app',ip:'85.4.12.9',payload:{name:'Old draft'},created_at:new Date(now-2*864e5).toISOString()}
      ].map(function(r){return Object.assign({owner_id:owner},r);});
      WB.toast('Adding sample events…','info');
      sb.from('activity_events').insert(rows).then(function(r){ if(r.error) throw r.error; WB.toast('Sample events added','ok'); load(); }).catch(function(e){WB.toast(e.message||'Could not add events','err');});
    }

    // In-memory sample trail so the page is never blank on a fresh
    // account (no DB write — purely illustrative until real events land).
    function sampleEvents(){
      var now=Date.now(), email=(window.HX&&window.HX.user&&window.HX.user.email)||'you@workspace.com', ip='85.4.12.9';
      return [
        {id:'s1',kind:'auth.signed_in',actor_email:email,ip:ip,user_agent:navigator.userAgent,payload:{method:'email'},created_at:new Date(now-9e5).toISOString()},
        {id:'s2',kind:'project.created',actor_email:email,ip:ip,payload:{name:'Q3 GTM'},created_at:new Date(now-36e5).toISOString()},
        {id:'s3',kind:'deploy.succeeded',actor_email:email,ip:ip,payload:{version:'v2.4.1',build:'4f866ef'},created_at:new Date(now-72e5).toISOString()},
        {id:'s4',kind:'billing.plan_changed',actor_email:email,ip:ip,payload:{from:'Free',to:'Pro'},created_at:new Date(now-26e6).toISOString()},
        {id:'s5',kind:'member.invited',actor_email:email,ip:ip,payload:{email:'maria@workspace.com',role:'admin'},created_at:new Date(now-9e6).toISOString()},
        {id:'s6',kind:'security.password_changed',actor_email:email,ip:ip,payload:{},created_at:new Date(now-864e5).toISOString()},
        {id:'s7',kind:'api_key.created',actor_email:email,ip:ip,payload:{name:'server-prod'},created_at:new Date(now-1.6*864e5).toISOString()},
        {id:'s8',kind:'project.deleted',actor_email:email,ip:ip,payload:{name:'Old draft'},created_at:new Date(now-2*864e5).toISOString()}
      ];
    }
    function sampleBanner(){
      return '<div class="card" style="display:flex;align-items:center;gap:10px;padding:11px 14px;margin-bottom:12px;border-style:dashed">'+
        '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--hx-text-mid)" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" style="flex:0 0 auto"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>'+
        '<span style="font-size:12.5px;color:var(--hx-text-mid)">Showing a <strong style="color:var(--hx-text)">sample audit trail</strong> — every real action is recorded here as you and your team work.</span></div>';
    }

    function load(){
      if(!db){ ST.items=sampleEvents(); ST.sample=true; ST.loading=false; ST.error=null; metrics(); cats(); render(); return; }
      ST.loading=true; render();
      db.list('id,kind,actor_email,ip,user_agent,payload,created_at',{col:'created_at',asc:false}).then(function(r){
        if(r.error) throw r.error; ST.items=r.data||[]; ST.sample=false;
        if(!ST.items.length){ ST.items=sampleEvents(); ST.sample=true; }
        ST.loading=false; ST.error=null; metrics(); cats(); render();
      }).catch(function(e){ ST.loading=false; ST.error=e.message||'Load failed'; render(); });
    }

    $('al-export').onclick=exportCsv;
    var qt; $('al-q').oninput=function(e){ST.q=e.target.value.trim();clearTimeout(qt);qt=setTimeout(render,140);};
    $('al-sev').onchange=function(e){ST.sev=e.target.value;render();};
    render();
    WB.ready(function(s,u){ sb=s; owner=u?u.id:null; db=(s&&u)?WB.tbl(s,'activity_events',owner):null; load(); });
  })();
  </script>
</body>
</html>
