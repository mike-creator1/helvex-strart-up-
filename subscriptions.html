<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subscriptions — HelveX</title>
  <meta name="description" content="Manage your HelveX subscription, billing cycle, and renewal." />
  <link rel="icon" type="image/png" href="/helvex-logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/platform.css" />
</head>
<body data-active="subscriptions">

  <div class="hx-app">
    <aside class="hx-sidebar"></aside>
    <div>
      <div class="hx-topbar"></div>
      <main class="hx-main">

        <div class="hx-page-head">
          <div>
            <h1>Subscriptions.</h1>
            <p class="sub">Your active HelveX plan, renewal, and upgrade options. Changing tier takes effect on the next billing cycle.</p>
          </div>
          <div class="hx-page-actions">
            <a href="/pricing.html" class="hx-btn hx-btn-secondary">Change plan</a>
            <button type="button" id="hx-sub-portal" class="hx-btn hx-btn-primary" style="display:none;">Manage in Stripe</button>
          </div>
        </div>

        <div class="hx-section-head">
          <h2>Active subscription</h2>
        </div>
        <div id="hx-sub-active-host">
          <div class="hx-empty">
            <h3>Loading…</h3>
          </div>
        </div>

        <div class="hx-section-head">
          <h2>Subscription history</h2>
        </div>
        <div id="hx-sub-history-host">
          <div class="hx-empty">
            <h3>Loading…</h3>
          </div>
        </div>

      </main>
    </div>
  </div>

  <script src="/platform.js"></script>
  <script>
    (function () {
      function whenAuthReady(fn) {
        if (window.HX && window.HX.auth) { fn(); return; }
        document.addEventListener('hx:auth-ready', fn, { once: true });
      }
      function esc(s) { return (s == null ? '' : String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
      function titleCase(s) { return (s || '').charAt(0).toUpperCase() + (s || '').slice(1); }
      function fmtDate(iso) {
        if (!iso) return '—';
        try { return new Date(iso).toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' }); }
        catch (e) { return '—'; }
      }
      function emptyActive() {
        return '<div class="hx-empty">' +
          '<div class="icon" aria-hidden="true">' +
            '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">' +
              '<polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>' +
            '</svg>' +
          '</div>' +
          '<h3>No active subscription</h3>' +
          '<p>Pick a plan to unlock monthly credits, priority delivery, and a senior engineer on your team.</p>' +
          '<a href="/pricing.html" class="hx-btn hx-btn-primary">Compare plans</a>' +
        '</div>';
      }
      function emptyHistory() {
        return '<div class="hx-empty">' +
          '<div class="icon" aria-hidden="true">' +
            '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">' +
              '<circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/>' +
            '</svg>' +
          '</div>' +
          '<h3>No history yet</h3>' +
          '<p>Past plan changes and renewals will be listed here.</p>' +
        '</div>';
      }
      whenAuthReady(function () {
        var sb = window.HX.supabase;
        var activeHost = document.getElementById('hx-sub-active-host');
        var histHost = document.getElementById('hx-sub-history-host');

        // Active subscription from public.subscriptions, balance from public.credits_balance
        Promise.all([
          sb.from('subscriptions').select('plan, status, current_period_end, cancel_at_period_end, updated_at').order('updated_at', { ascending: false }).limit(1).maybeSingle(),
          sb.from('credits_balance').select('credits_total, credits_used, updated_at').maybeSingle()
        ]).then(function (results) {
          var sub = results[0] && results[0].data ? results[0].data : null;
          var bal = results[1] && results[1].data ? results[1].data : null;
          var status = sub && sub.status;
          var plan = sub && sub.plan;
          var hasActive = sub && status && /^(active|trialing|past_due)$/.test(status);
          if (!hasActive) { activeHost.innerHTML = emptyActive(); return; }
          // Reveal "Manage in Stripe" once an active subscription is confirmed.
          var portalBtn = document.getElementById('hx-sub-portal');
          if (portalBtn) {
            portalBtn.style.display = '';
            portalBtn.addEventListener('click', async function () {
              var orig = portalBtn.textContent;
              portalBtn.disabled = true; portalBtn.textContent = 'Opening…';
              try {
                var s = (await sb.auth.getSession()).data.session;
                if (!s || !s.access_token) { window.location.href = '/signup'; return; }
                var resp = await fetch('https://yjmpallrtpeinpdilptj.supabase.co/functions/v1/create-billing-portal-session', {
                  method: 'POST',
                  headers: { 'content-type': 'application/json', authorization: 'Bearer ' + s.access_token },
                  body: '{}'
                });
                var body = null; try { body = await resp.json(); } catch (e) {}
                if (!resp.ok || !body || !body.url) throw new Error((body && (body.message || body.error)) || ('Portal failed (HTTP ' + resp.status + ').'));
                window.location.href = body.url;
              } catch (err) {
                if (window.cxToast) window.cxToast((err && err.message) || 'Could not open portal.', 'error');
                portalBtn.disabled = false; portalBtn.textContent = orig;
              }
            });
          }
          var remaining = bal ? Math.max(0, (bal.credits_total || 0) - (bal.credits_used || 0)) : 0;
          var renewLabel = sub.cancel_at_period_end ? 'Ends' : 'Renews';
          activeHost.innerHTML =
            '<div class="hx-card">' +
              '<div class="hx-card-head">' +
                '<div>' +
                  '<p class="hx-card-eyebrow">Current plan</p>' +
                  '<h3>' + esc(titleCase(plan)) + '</h3>' +
                '</div>' +
                '<span class="hx-badge hx-badge-neutral">' + esc(titleCase(status)) + '</span>' +
              '</div>' +
              '<div class="hx-grid hx-grid-3" style="margin-top:14px;">' +
                '<div><p class="hx-stat-label">Credits remaining</p><p class="hx-stat-value hx-mono">' + remaining + '</p></div>' +
                '<div><p class="hx-stat-label">Credits used</p><p class="hx-stat-value hx-mono">' + (bal ? (bal.credits_used || 0) : 0) + '</p></div>' +
                '<div><p class="hx-stat-label">' + renewLabel + '</p><p class="hx-stat-value" style="font-size:16px;">' + fmtDate(sub.current_period_end) + '</p></div>' +
              '</div>' +
              '<p class="desc" style="margin-top:14px;">Change tier from <a href="/pricing.html" style="color:var(--hx-text);text-decoration:underline;">Pricing</a>. Invoices live under <a href="/invoices.html" style="color:var(--hx-text);text-decoration:underline;">Invoices</a>.</p>' +
            '</div>';
        }).catch(function () { activeHost.innerHTML = emptyActive(); });

        // History from public.credit_grants (real source-of-truth for grants/topups/renewals)
        sb.from('credit_grants').select('id, amount, source, reference, created_at').order('created_at', { ascending: false }).limit(50)
          .then(function (r) {
            var rows = r && r.data ? r.data : [];
            if (!rows.length) { histHost.innerHTML = emptyHistory(); return; }
            var html = '<div class="hx-card" style="padding:0;overflow:hidden;">';
            rows.forEach(function (t, i) {
              var label = titleCase(t.source || 'Grant');
              if (t.reference) label += ' · ' + esc(t.reference);
              html += '<div style="display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 16px;' + (i > 0 ? 'border-top:1px solid var(--hx-line);' : '') + '">' +
                '<div>' +
                  '<div style="font-size:13.5px;font-weight:500;">' + label + '</div>' +
                  '<div class="hx-mono" style="font-size:11.5px;color:var(--hx-text-dim);">' + fmtDate(t.created_at) + '</div>' +
                '</div>' +
                '<span class="hx-mono" style="font-size:12.5px;">+' + (t.amount || 0) + ' credits</span>' +
              '</div>';
            });
            html += '</div>';
            histHost.innerHTML = html;
          })
          .catch(function () { histHost.innerHTML = emptyHistory(); });
      });
    })();
  </script>
</body>
</html>
