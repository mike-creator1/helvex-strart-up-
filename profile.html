<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile — HelveX</title>
  <meta name="description" content="HelveX user profile — your details and team membership." />
  <link rel="icon" type="image/png" href="/helvex-logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/platform.css" />
</head>
<body data-active="profile">

  <div class="hx-app">
    <aside class="hx-sidebar"></aside>
    <div>
      <div class="hx-topbar"></div>
      <main class="hx-main">

        <div class="hx-page-head">
          <div>
            <h1>Profile.</h1>
            <p class="sub">How you appear to your delivery team and inside your organisation's workspace.</p>
          </div>
        </div>

        <div class="hx-card">
          <div style="display:flex;gap:20px;align-items:center;flex-wrap:wrap;">
            <div id="hx-profile-avatar" style="width:64px;height:64px;border-radius:50%;background:var(--hx-text);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:600;color:#FFFFFF;flex-shrink:0;">·</div>
            <div style="flex:1;min-width:200px;">
              <h2 id="hx-profile-name" style="margin:0;font-size:20px;font-weight:600;letter-spacing:-0.02em;">—</h2>
              <p id="hx-profile-meta" style="margin:4px 0 0;color:var(--hx-text-mid);font-size:13.5px;">—</p>
            </div>
          </div>
        </div>

        <div class="hx-section-head">
          <h2>Personal details</h2>
        </div>
        <div class="hx-card">
          <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:18px;">
            <div class="hx-field" style="margin:0;">
              <label>First name</label>
              <input type="text" id="hx-input-first" placeholder="First name" />
            </div>
            <div class="hx-field" style="margin:0;">
              <label>Last name</label>
              <input type="text" id="hx-input-last" placeholder="Last name" />
            </div>
            <div class="hx-field" style="margin:0;">
              <label>Email</label>
              <input type="email" id="hx-input-email" disabled style="opacity:0.6;cursor:not-allowed;" />
              <div class="help">Used for sign-in. Contact support to change.</div>
            </div>
            <div class="hx-field" style="margin:0;">
              <label>Job title</label>
              <input type="text" id="hx-input-title" placeholder="e.g. Operations Lead" />
            </div>
            <div class="hx-field" style="margin:0;grid-column:span 2;">
              <label>Company</label>
              <input type="text" id="hx-input-company" placeholder="Your company" />
            </div>
          </div>
          <div style="display:flex;gap:8px;margin-top:20px;">
            <button class="hx-btn hx-btn-primary">Save profile</button>
            <button class="hx-btn hx-btn-ghost">Cancel</button>
          </div>
        </div>

        <div class="hx-section-head">
          <h2>Account</h2>
        </div>
        <div class="hx-card">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:18px;flex-wrap:wrap;">
            <div>
              <p class="hx-card-eyebrow">Member since</p>
              <p class="hx-mono" id="hx-profile-since" style="margin:0;font-size:14px;color:var(--hx-text);">—</p>
            </div>
            <div>
              <p class="hx-card-eyebrow">User ID</p>
              <p class="hx-mono" id="hx-profile-uid" style="margin:0;font-size:12.5px;color:var(--hx-text-mid);word-break:break-all;">—</p>
            </div>
            <a href="/team.html" class="hx-btn hx-btn-secondary hx-btn-sm">Manage team</a>
          </div>
        </div>

      </main>
    </div>
  </div>

  <script src="/platform.js"></script>
  <script>
    /* Real read/write of public.profiles via Supabase JS. */
    (function () {
      function whenAuthReady(fn) {
        if (window.HX && window.HX.auth) { fn(); return; }
        document.addEventListener('hx:auth-ready', fn, { once: true });
      }
      function initials(first, last, email) {
        var a = (first || '').trim();
        var b = (last || '').trim();
        if (a || b) return ((a[0] || '') + (b[0] || '')).toUpperCase();
        var e = (email || '').trim();
        return e ? e[0].toUpperCase() : '·';
      }
      function fmtDate(iso) {
        if (!iso) return '—';
        try {
          return new Date(iso).toLocaleDateString(undefined, { year:'numeric', month:'short', day:'numeric' });
        } catch (e) { return '—'; }
      }

      var $ = function (id) { return document.getElementById(id); };
      var btnSave = null, btnCancel = null;
      var snapshot = {};
      var user = null;

      function setHeader(first, last, company, email) {
        var fullName = (first + ' ' + last).trim() || (email ? email.split('@')[0] : 'Account');
        if ($('hx-profile-avatar')) $('hx-profile-avatar').textContent = initials(first, last, email);
        if ($('hx-profile-name'))   $('hx-profile-name').textContent = fullName;
        if ($('hx-profile-meta'))   {
          var bits = [];
          if (company) bits.push(company);
          if (email) bits.push(email);
          $('hx-profile-meta').textContent = bits.join(' · ') || '—';
        }
      }

      function fillForm(p) {
        if ($('hx-input-first'))   $('hx-input-first').value   = p.first_name || '';
        if ($('hx-input-last'))    $('hx-input-last').value    = p.last_name  || '';
        if ($('hx-input-email'))   $('hx-input-email').value   = p.email      || '';
        if ($('hx-input-title'))   $('hx-input-title').value   = p.title      || '';
        if ($('hx-input-company')) $('hx-input-company').value = p.company    || '';
      }

      function readForm() {
        return {
          first_name: ($('hx-input-first').value || '').trim() || null,
          last_name:  ($('hx-input-last').value  || '').trim() || null,
          title:      ($('hx-input-title').value || '').trim() || null,
          company:    ($('hx-input-company').value || '').trim() || null
        };
      }

      function setStatus(msg, kind) {
        var existing = $('hx-profile-status');
        if (!existing) {
          existing = document.createElement('p');
          existing.id = 'hx-profile-status';
          existing.style.cssText = 'margin:12px 0 0;font-size:12.5px;font-weight:500;';
          var actionsRow = btnSave && btnSave.parentNode;
          if (actionsRow && actionsRow.parentNode) actionsRow.parentNode.appendChild(existing);
        }
        existing.style.color = kind === 'error' ? 'var(--hx-red)' : 'var(--hx-emerald)';
        existing.textContent = msg || '';
      }

      whenAuthReady(function () {
        var sb = window.HX.supabase;
        // Wire the buttons (the markup uses two buttons in a row — the
        // primary one is "Save profile", the ghost one is "Cancel").
        var actions = document.querySelectorAll('.hx-btn');
        actions.forEach(function (b) {
          if (/save profile/i.test(b.textContent)) btnSave = b;
          if (/^cancel$/i.test(b.textContent.trim())) btnCancel = b;
        });

        sb.auth.getUser().then(function (res) {
          user = res && res.data ? res.data.user : null;
          if (!user) return;
          // Read or upsert the row in public.profiles. The signup edge fn
          // already inserts a row on account creation; read it.
          sb.from('profiles').select('*').eq('id', user.id).maybeSingle()
            .then(function (r) {
              var prof = (r && r.data) || {
                id: user.id,
                email: user.email,
                first_name: (user.user_metadata || {}).first_name || '',
                last_name:  (user.user_metadata || {}).last_name  || '',
                company:    (user.user_metadata || {}).company    || ''
              };
              snapshot = JSON.parse(JSON.stringify(prof));
              setHeader(prof.first_name, prof.last_name, prof.company, prof.email);
              fillForm(prof);
              if ($('hx-profile-since')) $('hx-profile-since').textContent = fmtDate(prof.created_at || user.created_at);
              if ($('hx-profile-uid'))   $('hx-profile-uid').textContent   = user.id;
            });
        });

        if (btnCancel) {
          btnCancel.addEventListener('click', function (e) {
            e.preventDefault();
            fillForm(snapshot);
            setStatus('');
          });
        }
        if (btnSave) {
          btnSave.addEventListener('click', async function (e) {
            e.preventDefault();
            if (!user) return;
            var label = btnSave.textContent;
            btnSave.disabled = true; btnSave.textContent = 'Saving…';
            setStatus('');
            try {
              var patch = readForm();
              // Upsert ensures the row exists (in case the trigger missed it
              // for a legacy account). Always sets id + email server-side.
              var up = await sb.from('profiles').upsert({
                id: user.id, email: user.email, ...patch
              }, { onConflict: 'id' }).select().maybeSingle();
              if (up.error) throw up.error;
              snapshot = up.data;
              setHeader(snapshot.first_name, snapshot.last_name, snapshot.company, snapshot.email);
              await sb.rpc('log_event', { p_kind: 'profile.updated', p_payload: { fields: Object.keys(patch) } });
              setStatus('Saved.', 'ok');
            } catch (err) {
              setStatus((err && err.message) || 'Could not save.', 'error');
            } finally {
              btnSave.disabled = false; btnSave.textContent = label;
            }
          });
        }
      });
    })();
  </script>
</body>
</html>
