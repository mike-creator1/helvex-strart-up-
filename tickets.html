<!DOCTYPE html>
<html lang="en">
<head>
  <script>location.replace('/chat'+location.search+location.hash);</script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Support — HelveX</title>
  <link rel="icon" type="image/png" href="/helvex-logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://yjmpallrtpeinpdilptj.supabase.co" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/platform.css" />
  <link rel="stylesheet" href="/workbench.css" />
  <style>
    .help-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:12px; }
    .help-card { padding:18px; display:flex; flex-direction:column; gap:4px; }
    .help-card .hi { width:38px; height:38px; border-radius:10px; display:grid; place-items:center; background:var(--hx-yellow-soft); color:var(--hx-yellow-deep); margin-bottom:8px; }
    .help-card .hi svg { width:19px; height:19px; }
    .help-card h3 { font-size:14px; font-weight:600; margin:0; }
    .help-card p { font-size:12px; color:var(--hx-text-mid); margin:0; }
    .status-bar { display:flex; align-items:center; gap:12px; padding:16px 18px; }
  </style>
</head>
<body data-active="support">
  <div class="hx-app">
    <aside class="hx-sidebar"></aside>
    <div>
      <div class="hx-topbar"></div>
      <main class="hx-main">
        <div class="hx-aura" aria-hidden="true"></div>
        <header class="hx-pg-hero">
          <p class="hx-pg-eyebrow"><span class="hx-pg-eyebrow-dot" aria-hidden="true"></span>Account · support</p>
          <div class="hx-pg-hero-grid"><div>
            <h1 class="hx-pg-title">Support</h1>
            <p class="hx-pg-sub">Find an answer fast, check live system status, or open a ticket and track it through to resolution.</p>
            <div class="hx-pg-cta-row"><button class="hx-cta-primary" id="sp-new"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>New ticket</button></div>
          </div></div>
        </header>

        <div class="card status-bar" style="margin-bottom:18px"><span class="wb-pill active"><span class="d pulse" style="animation:wbPulse 1.4s ease-in-out infinite"></span>All systems operational</span><span style="font-size:12.5px;color:var(--hx-text-mid)">API · Dashboard · Auth · Deployments — 99.98% uptime (30d)</span><a class="wb-btn sm" href="/status.html" style="margin-left:auto">Status page</a></div>

        <h2 style="font-size:13px;font-weight:600;margin:0 0 12px;color:var(--hx-text-mid)">Get help</h2>
        <div class="help-grid" id="sp-help"></div>

        <h2 style="font-size:13px;font-weight:600;margin:24px 0 12px;color:var(--hx-text-mid)">Your requests</h2>
        <div id="sp-host"></div>
      </main>
    </div>
  </div>
  <script src="/platform.js"></script>
  <script src="/workbench.js"></script>
  <script>
  (function(){
    var $=function(id){return document.getElementById(id);};
    var sb=null, owner=null, db=null;
    var ST={ loading:true, error:null, items:[] };
    var PILL={open:'warn',pending:'building',resolved:'ok',closed:'idle'};

    function help(){
      var cards=[
        ['<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>','Documentation','Guides, API reference and how-tos.','/docs.html'],
        ['<circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/>','Help center','Answers to common questions.','/help-center.html'],
        ['<path d="M4 4h16v16H4z"/><polyline points="22,6 12,13 2,6"/>','Email us','support@helvex.ch · replies within a day.','mailto:support@helvex.ch'],
        ['<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>','Ask HeliX','Get an instant answer in chat.','/chat']
      ];
      $('sp-help').innerHTML=cards.map(function(c){ return '<a class="card card-hover help-card" href="'+c[3]+'"><div class="hi">'+WB.svg(c[0])+'</div><h3>'+c[1]+'</h3><p>'+c[2]+'</p></a>'; }).join('');
    }

    function render(){
      var host=$('sp-host');
      if(ST.loading){ host.innerHTML=WB.skeletonCards(2); return; }
      if(ST.error){ host.innerHTML='<div class="wb-empty"><div class="orb">'+WB.svg('<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/>')+'</div><h3>Couldn’t load your requests</h3><p>'+WB.esc(ST.error)+'</p><button class="wb-btn" id="sp-retry">Try again</button></div>'; $('sp-retry').onclick=load; return; }
      if(!ST.items.length){ host.innerHTML='<div class="wb-empty"><div class="orb">'+WB.svg('<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>')+'</div><h3>No support requests</h3><p>Open a ticket and it will appear here with live status and replies.</p><button class="hx-cta-primary" id="sp-empty">Open your first ticket</button></div>'; $('sp-empty').onclick=openNew; return; }
      host.innerHTML='<div class="wb-table-wrap"><table class="wb-table"><thead><tr><th>Subject</th><th>Topic</th><th>Priority</th><th>Status</th><th>Updated</th></tr></thead><tbody>'+
        ST.items.map(function(t,i){ return '<tr class="al-row" data-i="'+i+'" style="cursor:pointer"><td style="font-weight:600">'+WB.esc(t.subject)+'</td><td>'+WB.esc(t.topic||'General')+'</td>'+
          '<td><span class="wb-pill '+(t.priority==='urgent'||t.priority==='high'?'failed':t.priority==='low'?'idle':'warn')+'">'+WB.esc(cap(t.priority||'normal'))+'</span></td>'+
          '<td><span class="wb-pill '+(PILL[t.status]||'idle')+'"><span class="d"></span>'+WB.esc(cap(t.status||'open'))+'</span></td>'+
          '<td><span class="wb-mono" style="font-size:12px">'+WB.relTime(t.updated_at||t.created_at)+'</span></td></tr>'; }).join('')+
        '</tbody></table></div>';
      host.querySelectorAll('.al-row').forEach(function(r){ r.onclick=function(){ detail(ST.items[+r.dataset.i]); }; });
    }
    function cap(s){return (s||'').charAt(0).toUpperCase()+(s||'').slice(1);}

    function detail(t){
      WB.drawer.open({ title:WB.esc(t.subject), body:
        '<div class="wb-kv"><span class="k">Status</span><span class="v"><span class="wb-pill '+(PILL[t.status]||'idle')+'"><span class="d"></span>'+cap(t.status||'open')+'</span></span></div>'+
        '<div class="wb-kv"><span class="k">Topic</span><span class="v">'+WB.esc(t.topic||'General')+'</span></div>'+
        '<div class="wb-kv"><span class="k">Priority</span><span class="v">'+cap(t.priority||'normal')+'</span></div>'+
        '<div class="wb-kv"><span class="k">Opened</span><span class="v">'+WB.fmtDate(t.created_at)+'</span></div>'+
        '<div style="margin:16px 0 8px;font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--hx-text-dim)">Message</div>'+
        '<div style="font-size:13.5px;line-height:1.6;color:var(--hx-text)">'+WB.esc(t.message||'—')+'</div>',
        foot:(t.status!=='closed'?'<button class="wb-btn" id="sp-close" style="flex:1">Mark as resolved</button>':'')+'<button class="wb-btn'+(t.status==='closed'?' primary':'')+'" id="sp-x" '+(t.status!=='closed'?'':'style="flex:1"')+'>Close</button>',
        onMount:function(){ $('sp-x').onclick=WB.drawer.close; var c=$('sp-close'); if(c)c.onclick=function(){ db.update(t.id,{status:'resolved',updated_at:new Date().toISOString()}).then(function(r){ if(r&&r.error){WB.toast(r.error.message,'err');return;} WB.toast('Marked resolved','ok'); WB.drawer.close(); load(); }); }; } });
    }

    function openNew(){
      if(!db){ WB.toast('Sign in to open a ticket','err'); return; }
      WB.drawer.open({ title:'New support ticket', body:
        '<div class="wb-field"><label>Subject</label><input id="t-subj" placeholder="Briefly, what’s happening?"></div>'+
        '<div class="wb-field"><label>Topic</label><select id="t-topic"><option>Billing</option><option>Technical issue</option><option>Account &amp; access</option><option>Feature request</option><option>Other</option></select></div>'+
        '<div class="wb-field"><label>Priority</label><select id="t-prio"><option value="low">Low</option><option value="normal" selected>Normal</option><option value="high">High</option><option value="urgent">Urgent</option></select></div>'+
        '<div class="wb-field"><label>Message</label><textarea id="t-msg" placeholder="Share details, steps to reproduce, links…"></textarea></div>',
        foot:'<button class="wb-btn primary" id="t-send" style="flex:1">Submit ticket</button><button class="wb-btn" id="t-cancel">Cancel</button>',
        onMount:function(){
          $('t-cancel').onclick=WB.drawer.close;
          $('t-send').onclick=function(){
            var subj=($('t-subj').value||'').trim(); if(!subj){WB.toast('A subject is required','err');return;}
            db.insert({ subject:subj, topic:$('t-topic').value, priority:$('t-prio').value, status:'open', message:($('t-msg').value||'').trim() })
              .then(function(r){ if(r.error) throw r.error; WB.toast('Ticket submitted — we’ll be in touch','ok'); WB.drawer.close(); load(); })
              .catch(function(e){ WB.toast(e.message||'Could not submit','err'); });
          };
        } });
    }

    function load(){
      help();
      if(!db){ ST.loading=false; ST.items=[]; render(); return; }
      ST.loading=true; render();
      db.list('id,subject,topic,priority,status,message,created_at,updated_at',{col:'created_at',asc:false}).then(function(r){
        if(r.error) throw r.error; ST.items=r.data||[]; ST.loading=false; ST.error=null; render();
      }).catch(function(e){ ST.loading=false; ST.error=e.message||'Load failed'; render(); });
    }

    $('sp-new').onclick=openNew;
    help(); render();
    WB.ready(function(s,u){ sb=s; owner=u?u.id:null; db=(s&&u)?WB.tbl(s,'support_tickets',owner):null; load(); });
  })();
  </script>
</body>
</html>
